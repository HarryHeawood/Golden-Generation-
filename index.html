// ============================================================
//  TOURNAMENT
// ============================================================
function startTournament(){
  const comp=thisComp();
  // GUARD: a tournament that has already been decided this year must not be rebuilt.
  // Once you've been graded (won or exited) for G.year, the only way onward is the
  // aging cycle. Without this, a stray navigation back into the pre-tournament screen
  // could restart the whole competition. Send the player to the correct next screen.
  if(G._gradedYear===G.year){
    if(G.tournamentActive)return G.stage==='ko'?screenKnockoutHub():screenGroupHub();
    return screenAgingReport&&G.agingReport?screenAgingReport():screenSquad();
  }
  // ---- Seeded group draw ----
  // Rank the whole field by OVR and split into four pots. Your group takes one team from
  // each pot, and you are drawn from the pot your own strength puts you in — so two of the
  // tournament's top seeds can't land in the same group (Morocco & you both being ranked
  // 1–2 no longer means you share a group).
  const me=G.field.find(x=>x.you);
  const ranked=[...G.field].sort((a,b)=>b.ov-a.ov);
  const nGroups=Math.max(1,Math.round(G.field.length/4));
  const myRank=ranked.findIndex(t=>t.you);
  const myPot=Math.min(3,Math.floor(myRank/nGroups)); // which pot you belong to
  // Build the four pots (pot 0 = strongest). Slice by group count so each pot has ~one team
  // per group, exactly as real tournament seeding works.
  const pots=[0,1,2,3].map(p=>ranked.slice(p*nGroups,(p+1)*nGroups).filter(t=>!t.you));
  const drawn=[];
  for(let p=0;p<4;p++){
    if(p===myPot)continue;               // your slot in your own pot is you
    const potArr=pots[p].sort(()=>Math.random()-0.5);
    if(potArr.length)drawn.push(potArr[0]);
  }
  // If pots were thin (small field) top up from any remaining non-group teams.
  if(drawn.length<3){
    const extra=[...G.field].filter(x=>!x.you && !drawn.some(d=>d.name===x.name)).sort(()=>Math.random()-0.5);
    while(drawn.length<3 && extra.length)drawn.push(extra.shift());
  }
  G.group=[me,...drawn.slice(0,3)].map(t=>({...t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}));
  // Remember who you shared a group with — in a real tournament you cannot be drawn
  // against them again until the final. Used by drawNextTie to avoid impossible rematches.
  // MUST be set BEFORE buildOtherGroups(): that function reads G.groupOppNames to exclude
  // your group-mates from the other groups. Setting it afterwards (as it was) left it
  // undefined at that point, so buildOtherGroups threw on `.includes` and the entire
  // "Begin the group stage" click died silently — the tournament never started.
  G.groupOppNames=G.group.filter(t=>!t.you).map(t=>t.name);
  // Draw the REST of the field into real groups too, so the third-place table (and who
  // qualifies) reflects genuine simulated results rather than invented numbers. Your
  // group is group 0; the other nations are split into groups of 4 by seeding pot.
  buildOtherGroups(me);
  const us=G.group.findIndex(t=>t.you);
  const idx=[0,1,2,3].filter(i=>i!==us);
  G.matchdays=[
    {ours:[us,idx[0]],other:[idx[1],idx[2]]},
    {ours:[us,idx[1]],other:[idx[0],idx[2]]},
    {ours:[us,idx[2]],other:[idx[0],idx[1]]},
  ];
  G.matchday=0;
  G.otherResults=[];
  G.hubTab='group';
  G.lastResult=null;G.mediaFeed=null;
  setStage('group',true);
  initStats();G.tournUnbeaten=true;
  // Golden Boot race — seed star forwards from top nations across the field. Seed a few
  // forwards per contender (not just one striker) so the race has realistic depth and
  // your players face genuine competition for the boot.
  G.scorers={};
  const contenders=[...G.field].sort((a,b)=>b.ov-a.ov).slice(0,16);
  contenders.forEach(t=>{const sq=fieldSquad(t);
    const fwds=sq.filter(p=>['ST','RW','LW'].includes(p.pos)).slice(0,3);
    (fwds.length?fwds:[sq[0]]).forEach(fw=>{G.scorers[fw.id]={name:fw.name,team:t.name,iso:t.iso,goals:0,you:t.you};});});
  // Baseline tournament goals for the AI contenders' forwards, representing all the group
  // and knockout goals scored across the field before/around your own run. Without this,
  // the boot race is empty except for the handful of matches you personally witness, so
  // your scorers top the charts by default. Stronger nations' forwards score more.
  contenders.filter(t=>!t.you).forEach(t=>{
    const strength=clamp((t.ov-70)/6,0.2,4);
    const teamGoals=Math.max(0,Math.round(Math.abs(gauss())*strength+rnd(0,2)));
    creditGoals(t.name,t.iso,teamGoals,false);
  });
  G.tournBracket=[]; // notable knockout results for the bracket tab
  screenGroupHub();
}
// ============================================================
//  BEST THIRD-PLACED TEAMS
//  Formats with more knockout slots than (2 × groups) take the best third-placed
//  teams to fill the bracket — the 48-team World Cup (12 groups → 8 best thirds) and
//  24-team tournaments (6 groups → 4 best thirds). We model the OTHER groups' third-
//  placed teams so the player can see, live, whether their own third place is good
//  enough to go through.
// ============================================================
function thirdPlaceFormat(){
  const comp=thisComp();const n=comp.teams||0;
  // groups of 4; top two auto-advance; the rest of a power-of-two bracket is filled by
  // the best third-placed teams.
  const groups=Math.round(n/4);
  if(groups<4)return null;                     // small formats: no third-place route
  // knockout bracket size: 48→32 (best 8 thirds), 24→16 (best 4 thirds), 16→8 (top two only)
  const knockoutSize = n>=48?32 : n>=24?16 : 8;
  const thirdsQualify = clamp(knockoutSize - groups*2, 0, groups);
  if(thirdsQualify<=0)return null;             // e.g. 16-team: top 2 of 4 = 8, no thirds
  return {groups, thirdsQualify};
}
// Split the whole field into real groups of four. Your group is index 0 (already
// drawn above); the rest are seeded into pots so each group has ~one team per pot,
// exactly like a real draw. These groups are then genuinely simulated in step with
// your own matchdays, so standings — and the third-place table — are REAL.
function buildOtherGroups(me){
  const fmt=thirdPlaceFormat();
  G.otherGroups=null; G.thirdFmt=fmt||null;
  if(!fmt)return;                                   // small formats: no third-place route
  const groups=fmt.groups;
  // everyone except you and your three group-mates
  const oppNames=G.groupOppNames||[];               // guard: never read undefined.includes
  const rest=[...G.field].filter(t=>!t.you && !oppNames.includes(t.name));
  // seed into pots by strength, then deal one per group across pots — real draw shape
  const ranked=[...rest].sort((a,b)=>b.ov-a.ov);
  const perPot=groups-1;                            // groups minus your own
  // We need (groups-1) groups of 4 from `rest`. Deal pot by pot.
  const need=(groups-1)*4;
  const field=ranked.slice(0,need);
  // pad if the field is short (shouldn't happen for a full WC, but be safe)
  while(field.length<need && ranked.length){ field.push(ranked[field.length%ranked.length]); }
  const others=[];
  for(let g=0; g<groups-1; g++) others.push([]);
  // pot p holds the p-th strongest slice; deal each pot's teams one per group, shuffled
  for(let pot=0; pot<4; pot++){
    const slice=field.slice(pot*(groups-1),(pot+1)*(groups-1)).sort(()=>Math.random()-0.5);
    slice.forEach((t,gi)=>{ if(others[gi]) others[gi].push({...t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}); });
  }
  // fixtures for each group: the classic 6-match round robin, ordered into 3 matchdays
  G.otherGroups=others.map(grp=>({
    teams:grp,
    // matchday fixtures as index pairs into `teams` (0-3): [[0,3],[1,2]],[[0,2],[1,3]],[[0,1],[2,3]]
    schedule:[[[0,3],[1,2]],[[0,2],[1,3]],[[0,1],[2,3]]]
  }));
}
// Play one matchday of every OTHER group, using the SAME simScore engine your own
// matches use. Called in step with your matchdays so the tables fill out believably.
function advanceOtherGroups(){
  if(!G.otherGroups)return;
  const md=G.matchday-1;                            // your matchday just incremented; play the same index
  if(md<0||md>2)return;
  G.otherGroups.forEach(grp=>{
    const fixtures=grp.schedule[md]; if(!fixtures)return;
    fixtures.forEach(([i,j])=>{
      const a=grp.teams[i], b=grp.teams[j]; if(!a||!b)return;
      const [ga,gb]=simScore(a.ov,b.ov);
      applyGroupResult(a,b,ga,gb);
    });
  });
}
// Apply a single result to two teams' standings.
function applyGroupResult(a,b,ga,gb){
  a.P++; b.P++; a.GF+=ga; a.GA+=gb; b.GF+=gb; b.GA+=ga;
  if(ga>gb){a.W++;b.L++;a.Pts+=3;}
  else if(gb>ga){b.W++;a.L++;b.Pts+=3;}
  else {a.D++;b.D++;a.Pts++;b.Pts++;}
}
// Rank a group's four teams by the real tie-breakers.
function rankGroup(teams){
  return [...teams].sort((x,y)=>y.Pts-x.Pts||(y.GF-y.GA)-(x.GF-x.GA)||y.GF-x.GF||x.name.localeCompare(y.name));
}
// The REAL third-place table: the actual third-placed side from every group (yours and
// the simulated others), ranked together, with the qualification cut marked.
function thirdPlaceTable(){
  const fmt=G.thirdFmt||thirdPlaceFormat();
  if(!fmt||!G.otherGroups)return null;
  const rows=[];
  // your own group's third-placed team — computed from the live table
  const myThird=rankGroup(G.group)[2];
  if(myThird) rows.push({...myThird});
  // every other group's third-placed team
  G.otherGroups.forEach(grp=>{
    const third=rankGroup(grp.teams)[2];

function creditGoals(teamName,iso,n,you){

  const ids=Object.keys(G.scorers).filter(id=>G.scorers[id].team===teamName);
  for(let i=0;i<n;i++){

      const sc=pick(sq.filter(p=>['ST','RW','LW','CM'].includes(p.pos)));if(!sc)continue;

function myScorerCredit(n){
  // credit YOUR goals to the players who ACTUALLY scored them this match. The animated
  // match already recorded real scorers in md.ledger (GK-excluded), so the Golden Boot
  // race and career goal tallies now reflect what happened on the pitch rather than a
  // random reassignment to your top forwards.
  if(n<=0)return;const nat=myNation();
  const md=G.matchData;
  const bump=(p)=>{
    if(!p)return;
    if(!G.scorers[p.id])G.scorers[p.id]={name:p.name,team:nat.name,iso:nat.iso,goals:0,you:true};
    G.scorers[p.id].goals++;
  };
  // 1) preferred path: read real scorers from this match's ledger
  if(md&&md.ledger&&md.homeXI){
    let credited=0;
    md.homeXI.forEach(p=>{
      const g=md.ledger[p.id]&&md.ledger[p.id].goals||0;
      for(let k=0;k<g&&credited<n;k++){bump(p);credited++;}
    });
    if(credited>=n)return;
    n-=credited;   // any remainder (rare) falls through to the weighted method
  }
  // 2) fallback: weight toward your best forwards (never a keeper)
  for(let i=0;i<n;i++){
    const fwd=G.squad.filter(p=>!p.injured&&p.pos!=='GK'&&['ST','RW','LW','CM','CAM'].includes(p.pos)).sort((a,b)=>effRating(b)-effRating(a));
    const sc=pick(fwd.slice(0,5));if(!sc)continue;
    bump(sc);
  }
}

// ============================================================
//  THE CORE 4 MATCHUP (Alpha 7.3)
//  A four-way cycle. Each approach preys on one, is prey to another, and is
//  neutral against the one two steps away:
//    Possession → beats Low Block → beats Direct → beats Gegenpress → beats Possession
//  Theory: possession patiently unpicks a deep block, but is suffocated by a press
//  that hunts the ball high; direct balls fly over that press, but find no space
//  against a compact block; the block soaks up direct football, then is worn down
//  by patient possession.
// ============================================================

// How much a tactical edge is WORTH, in effective rating points, to the side holding it.
// Locked design: up to ±3.7 a side (a net ~7 swing at parity) — enough to decide a tight
// game — but it FADES as the talent gap grows, so a tactical trick can never overturn
// real class. At a 15-point gap it's worth barely a third of that.
// How each approach actually LOOKS in the numbers (Alpha 7.8). Beyond who wins, the
// four styles should produce recognisably different matches:
//   possession — dominates the ball, works a lot of patient openings of modest quality
//   gegenpress — chaos: both sides get more shots, and turnovers create good ones
//   direct     — cedes the ball, fewer but sharper attempts
//   lowblock   — barely has the ball, rare chances but dangerous ones, concedes little
// poss   = possession appetite (points of the ball)
// vol    = own shot volume · qual = own chance quality · concede = opponent volume vs you
const STYLE_PROFILE={

  gegenpress:{poss:  3, vol:1.16, qual:1.02, concede:1.14},
  direct:    {poss: -6, vol:0.96, qual:1.12, concede:1.02},

  if(!qualified)G._reviewReturn=stamped(()=>screenGroupResult(pos,false));

function ordinal(n){return n+({1:'st',2:'nd',3:'rd'}[n]||'th')}

// ============================================================
//  REAL KNOCKOUT BRACKET
//  Every other nation plays too. The strong survive, upsets happen,
//  and you meet whoever genuinely came through the other side.
// ============================================================
function startKnockouts(){
  const comp=thisComp();
  // Entering a new phase: drop any media feed/result cached during the GROUP stage.
  // Without this, the pre-tournament prediction feed (built when the group Media tab was
  // first opened, before any result existed) could survive into the knockouts and show
  // stale "…or go out in the group" predictions after a knockout exit.
  G.mediaFeed=null;G.lastResult=null;
  // Set up the rounds BEFORE declaring the stage, or the invariant check fires.
  G.koRounds=comp.type==='WC'?['Round of 32','Round of 16','Quarter-final','Semi-final','FINAL']:['Round of 16','Quarter-final','Semi-final','FINAL'];
  setStage('ko',true);
  G.koIdx=0;
  // Build the field that reached the knockouts: the best sides mostly qualify from
  // their groups, with a sprinkling of upsets — then seed a real bracket.
  const size=Math.pow(2,G.koRounds.length); // 32 or 16
  const me=G.field.find(x=>x.you);
  // The knockout field is now the REAL set of qualifiers: top two from every group,
  // plus the best third-placed teams — all from the simulated standings. This makes
  // the group stage and the third-place table actually mean something. (If for any
  // reason the groups weren't built — non-third-place formats — fall back to the old
  // strength+noise survival model so nothing breaks.)
  let pool;
  if(G.otherGroups){
    const qualifiers=[];
    // top two from your own group (excluding you — you're seeded separately as `me`)
    rankGroup(G.group).slice(0,2).filter(t=>!t.you).forEach(t=>qualifiers.push(t));
    // top two from every other group
    G.otherGroups.forEach(grp=>{ rankGroup(grp.teams).slice(0,2).forEach(t=>qualifiers.push(t)); });
    // the best third-placed teams that made the cut (excluding you)
    const tp=thirdPlaceTable();
    if(tp){ tp.rows.slice(0,tp.cut).filter(t=>!t.you).forEach(t=>qualifiers.push(t)); }
    // de-dup by name, then take exactly size-1 to sit alongside you
    const seen=new Set([me.name]);
    pool=qualifiers.filter(t=>{ if(seen.has(t.name))return false; seen.add(t.name); return true; })
      .map(t=>({...t}))
      .slice(0,size-1);
    // safety top-up if a short field left us under-filled
    if(pool.length<size-1){
      const extra=G.field.filter(t=>!t.you && !seen.has(t.name)).sort((a,b)=>b.ov-a.ov);
      while(pool.length<size-1 && extra.length){const t=extra.shift();seen.add(t.name);pool.push({...t});}
    }
  } else {
    pool=G.field.filter(x=>!x.you).map(t=>({...t,
      // group-stage survival score: strength + noise (upsets, but the good go through)
      _score:t.ov+gauss()*5.5
    })).sort((a,b)=>b._score-a._score).slice(0,size-1);
  }
  // seed: strongest at the extremes so giants meet late, as in a real bracket
  const seeded=[me,...pool].sort((a,b)=>b.ov-a.ov);
  G.koBracket=seeded;      // survivors, refreshed each round
  G.koResults=[];          // other ties, for the bracket view
  G.koOpp=null;
  drawNextTie();
  screenKnockoutHub();
}
// pick your opponent from the surviving field — a proper seeded pairing
function drawNextTie(){
  let others=G.koBracket.filter(t=>!t.you);
  if(!others.length){G.koOpp=null;return;}
  const n=G.koBracket.length;
  // Real-tournament rule: you cannot face a nation from your own group again until
  // the FINAL. Filter them out of the pool of possible opponents for every earlier
  // round; if that would leave nobody (tiny fields), fall back to the full pool.
  const isFinal = n<=2;
  const groupOpp = G.groupOppNames||[];
  let eligible = isFinal ? others : others.filter(t=>!groupOpp.includes(t.name));
  if(!eligible.length) eligible = others;   // safety: never leave you without an opponent
  if(n<=2){G.koOpp=eligible[0];return;}
  // Classic seeded bracket: seed i plays seed (n-1-i). As the field halves each round
  // the survivors are stronger, so you meet a genuine heavyweight by the semis —
  // and the final is against the best side left standing.
  const meIdx=G.koBracket.findIndex(t=>t.you);
  let oppIdx=n-1-meIdx;
  if(oppIdx===meIdx)oppIdx=(meIdx+1)%n;
  let opp=G.koBracket[oppIdx];
  // If the seeded pick is a group opponent (or is you), replace it from the eligible set.
  if(!opp||opp.you||(!isFinal&&groupOpp.includes(opp.name))) opp=pick(eligible);
  // Late rounds: no hiding. From the QF on you face one of the strongest remaining
  // (still respecting the no-group-rematch rule via the eligible set).
  if(G.koIdx>=2){
    const strong=[...eligible].sort((a,b)=>b.ov-a.ov);
    const top=strong.slice(0,Math.max(1,Math.ceil(strong.length*0.4)));
    opp=pick(top);
  }
  if(!opp||opp.you)opp=pick(eligible);
  G.koOpp=opp;
}
// simulate every OTHER tie in the round; strong sides usually advance
function simOtherTies(){
  const others=G.koBracket.filter(t=>!t.you&&t.name!==(G.koOpp&&G.koOpp.name));
  const survivors=[];const results=[];
  // pair them up 1v(n-1), 2v(n-2)... the same seeded logic
  const arr=[...others];
  const lateness=G.koIdx/(G.koRounds.length-1); // 0 early → 1 final
  const luck=3.6-2.8*lateness;                   // upsets fade harder as the rounds deepen
  while(arr.length>=2){
    const a=arr.shift();const b=arr.pop();
    const[ga,gb]=simScore(a.ov,b.ov);
    let x=ga,y=gb;
    if(x===y){
      if(a.ov+gauss()*luck>=b.ov+gauss()*luck)x++;else y++;
    }
    const winner=x>y?a:b;
    survivors.push(winner);
    // Credit these goals to the boot race too — otherwise every knockout goal scored in
    // ties you're not involved in vanishes, letting YOUR scorers dominate the Golden Boot
    // unopposed. Now the AI's forwards rack up goals across the whole bracket as they should.
    creditGoals(a.name,a.iso,x,false);
    creditGoals(b.name,b.iso,y,false);
    results.push({a:a.name,aIso:a.iso,b:b.name,bIso:b.iso,ga:x,gb:y,winner:winner.name});
  }
  if(arr.length)survivors.push(arr[0]); // odd one out advances
  G.koResults=results;
  return survivors;
}
function screenKnockoutHub(){applyTheme('comp');
  const me=G.field.find(x=>x.you);

    G.koResults.slice(0,6).map(r=>`<div class="fixture">

      ${flag(r.bIso)}</div>`).join(''):'';
  const remaining=G.koBracket.filter(t=>!t.you).sort((a,b)=>b.ov-a.ov).slice(0,4)

  go(statusBar()+ticker(tournamentNews())+`<div class="wrap">

    <div class="scorebug"><div class="comp">${G.koRounds[G.koIdx]}${G.host?' · '+G.host.nation:''}</div><div class="row">
      <div class="side">${flag(me.iso)}<span class="tn">${shortNat(me.name)}</span></div>
      <div class="sc" style="font-size:26px;color:var(--dim)">vs</div>
      <div class="side away">${flag(opp.iso)}<span class="tn">${shortNat(opp.name)}</span></div>
    </div></div>
    <div class="notecard" style="font-size:12.5px"><b>${shortNat(opp.name)}</b> rated <b>${opp.ov}</b> · you are <b>${me.ov}</b>.
      ${opp.ov>me.ov+3?'They are favourites. This is a real test.':opp.ov<me.ov-3?'You are strongly fancied — but knockouts are cruel.':'Nothing between these two.'}</div>
    ${matchupCardHTML(opp,me.ov)}
    ${(()=>{const t=rivalryTaunt(opp.name);return t?`<div class="notecard" style="border-left:3px solid var(--red);font-size:12.5px">🔥 ${t}</div>`:'';})()}
    ${remaining?`<div class="notecard" style="font-size:12px"><span style="color:var(--dim2)">Still in the tournament:</span><div class="dynasty" style="margin-top:8px">${remaining}</div></div>`:''}
    <div class="btnrow">
      <button class="btn gold2" onclick="G.quickSim=false;playKnockout()">Kick off →</button>
      <button class="btn gold" onclick="G.quickSim=true;playKnockout()">⚡ Quick sim</button>
      <button class="btn ghost sm" onclick="screenTournamentStats()">📊 Stats</button>
    </div>
    ${others}
    </div>`);
}
function playKnockout(){
  // Guard: once a tournament has concluded, this must be inert. Without it, a stray
  // call re-pushes history and can hand the trophy to the wrong nation.
  if(!G.tournamentActive||G.stage!=='ko'||!G.koOpp){G._afterMatch=null;return;}
  const me=G.field.find(x=>x.you);const opp=G.koOpp;
  G.roundLabel=G.koRounds[G.koIdx];G.compLabel=thisComp().name;
  runMatch(me,opp,true,()=>{
    myScorerCredit(G.matchData.hs);creditGoals(opp.name,opp.iso,G.matchData.as,false);
    try{captureMatchStats({meNat:_natRef(myNation()), oppNat:_natRef(opp), stage:G.koRounds[G.koIdx]});}catch(e){console.warn(e);}
    recordMatch(G.matchData.won,false,(opp&&opp.ov)||undefined);
    recordRivalry(opp.name,G.matchData.won,false,G.koRounds[G.koIdx]);
    initStats();G.stats.knockouts=Math.max(G.stats.knockouts,1);
    // ---- underdog feats logged live in the knockout ----
    {
      const nat=myNation();const f=nat?nat.factory:55;
      // Giant-killing: a Minnow-or-smaller beating an Elite-tier opponent (their
      // OVR reflects an elite factory, ~82+ at the sharp end of a tournament).
      if(f<35 && G.matchData.won && (G.koOpp&&G.koOpp.ov>=82))G.stats.giantKilled=true;
      // Fairytale: reaching a final with a tiny nation. Winning the semi-final
      // (the round before FINAL) is the moment you book your place in it.
      if(f<35 && G.matchData.won && G.koRounds[G.koIdx]==='Semi-final')G.stats.minnowFinal=true;
    }
    if(G.koIdx===G.koRounds.length-1)G.stats.finals=Math.max(G.stats.finals,1);
    if(!G.matchData.won){recordExit();endTournament();G.history.push({year:G.year,comp:thisComp().name,result:`${G.koRounds[G.koIdx]} exit`,won:false});return screenKnockoutOut();}
    // advance the REAL bracket: every other tie is played, survivors carry through
    const survivors=simOtherTies();
    G.koBracket=[me,...survivors].sort((a,b)=>b.ov-a.ov);
    G.koOpp=null;
    if(G.koIdx>=G.koRounds.length-1||G.koBracket.length<2){
      endTournament();
      G.history.push({year:G.year,comp:thisComp().name,result:'CHAMPIONS',won:true});return screenChampions();}
    G.koIdx++;drawNextTie();screenKnockoutAdvance();
  });
}
function screenKnockoutAdvance(){applyTheme('comp');

  G.mediaFeed=buildMediaFeed(G.lastResult);
  const reactPosts=renderMediaFeed(G.mediaFeed.filter(x=>x.format==='post').slice(0,2));
  go(statusBar()+`<div class="wrap"><div class="banner"><div class="bk">Through to the ${G.koRounds[G.koIdx]}</div>
    <h2>${me.name} ${hs}–${as} ${opp.name}</h2><div class="bs">The dream survives. One more step.</div></div>
    <div class="mediahead">Reaction</div>${reactPosts}
    <div class="btnrow" style="justify-content:center"><button class="btn gold" onclick="screenKnockoutHub()">Next round →</button></div></div>`);
}
function screenKnockoutOut(){applyTheme('comp');

  G._reviewReturn=stamped(screenKnockoutOut);   // stamp AFTER stage settles to null

// The advance bar shown under every post-campaign review. This is the ONE guaranteed
// route onward, whether or not there is a manager to review. Previously the only way
// forward lived inside managerReviewHTML()'s "Renew contract" button — so if the boss
// had just retired (or there was none), the review rendered empty and the screen became
// a dead end, sending the player in a loop back through Record Books. Now the flow
// forward is always here and always works.
function reviewAdvanceBar(){
  const m=G.manager;
  const reviewShowing = !!(m && G.mgrReview);   // the manager review box + its buttons are visible
  // If a manager just retired during this campaign, tell the player plainly.
  const retiredNote = (!m && G.retiredManager)
    ? `<div class="notecard" style="border-left:3px solid var(--gold);font-size:12.5px;margin-bottom:12px">
         👋 <b>${G.retiredManager.name}</b> has retired. You'll appoint a successor before the next campaign.</div>`
    : (!m)
    ? `<div class="notecard" style="border-left:3px solid var(--amber);font-size:12.5px;margin-bottom:12px">
         There is no manager in place. You'll appoint one before the next campaign.</div>`
    : '';
  // When the manager review box is on screen, ITS buttons (Renew / candidates / part ways)
  // are how you move forward — so we DON'T add a second "Continue" that does the same
  // thing. We only offer the standalone advance button when there's no review box to
  // carry the decision (e.g. no manager, or the review isn't being shown).
  if(reviewShowing){
    return `<div class="btnrow" style="justify-content:center;margin-top:4px">
      <button class="btn ghost sm" onclick="screenHistory()">📖 Record books</button>
    </div>`;
  }
  return `${retiredNote}<div class="btnrow" style="justify-content:center">
    <button class="btn gold" onclick="advanceFromReview()">Continue to ${G.year+1} →</button>
    <button class="btn ghost" onclick="screenHistory()">📖 Record books</button>
  </div>`;
}
// Single safe entry point onward from any review screen. Clears the review, then hands
// off to the normal post-campaign cycle (which itself handles a vacant dugout).
function advanceFromReview(){
  if(G.manager)G.mgrRenewed=true;   // keeping him on is an implicit renewal
  G.mgrReview=null;
  G._reviewReturn=null;

}

// ---------- MATCH ENGINE (text commentary, manual finish) ----------
function tacticalRating(){
  const base=squadOverall(G.squad)+(G.moraleMod||0);const t=G.tactics;let att=0,def=0,stam=0;
  const fm=FORMATIONS[t.formation].mod;if(fm.att)att+=fm.att;if(fm.def)def+=fm.def;
  if(t.mentality==='attacking'){att+=3;def-=3}if(t.mentality==='defensive'){att-=3;def+=3}
  if(t.tempo==='direct'){att+=2;stam-=1}if(t.tempo==='patient'){def+=1;stam+=1}
  if(t.press==='high'){att+=2;def+=1;stam-=3}if(t.press==='low'){def+=2;stam+=2;att-=1}
  // an old squad suffers more under a high press (tactical realism)
  const avail=G.squad.filter(p=>!p.injured);
  const avgAge=avail.length?avail.reduce((s,p)=>s+p.age,0)/avail.length:27;
  if(t.press==='high'&&avgAge>28.5)stam-=2;
  return{base,att:base+att,def:base+def,stam,avgAge};
}

// ============================================================
//  LINEUPS — both starting XIs, with live match events attached
// ============================================================
// Build an opponent XI that respects a formation, so positions line up with ours.
function oppStartingXI(team){
  return buildXI(fieldSquad(team),'4-3-3');
}

function buildXI(candidates,formation){
  const need=FORMATIONS[formation].need;
  const slots=[];Object.entries(need).forEach(([pos,n])=>{for(let i=0;i<n;i++)slots.push(pos);});
  slots.sort((a,b)=>SLOT_PRIORITY.indexOf(a)-SLOT_PRIORITY.indexOf(b));
  const xi=[];const used=new Set();
  slots.forEach(slot=>{
    const c=candidates.filter(p=>!used.has(p.id)).sort((a,b)=>slotRate(b,slot)-slotRate(a,slot));
    if(c[0]){xi.push({...c[0],slot});used.add(c[0].id);}
  });
  return xi;
}
// order an XI for display: GK, defence, midfield, attack
const SLOT_ORDER={GK:0,RB:1,CB:2,LB:3,RM:4,CDM:5,CM:6,CAM:7,AM:8,LM:9,RW:10,ST:11,LW:12};
function orderXI(xi){
  return [...xi].sort((a,b)=>(SLOT_ORDER[a.slot??a.pos]??9)-(SLOT_ORDER[b.slot??b.pos]??9));
}
function myStartingXI(){
  return buildXI(G.squad.filter(p=>!p.injured),G.tactics.formation);
}
// who assists? weighted to creators, never the scorer, sometimes nobody (solo goal)
// who scores? forwards mostly, but anyone can
function pickScorerFrom(xi,sentOff){
  // Never let a goalkeeper be the scorer (checks true position, not just the slot).
  const avail=xi.filter(p=>(!sentOff||!sentOff.has(p.id)) && p.pos!=='GK' && (p.slot||p.pos)!=='GK');
  if(!avail.length)return null;
  const w=p=>({ST:10,RW:5,LW:5,CAM:5,AM:4.5,CM:3.2,RM:2.4,LM:2.4,CDM:1.2,RB:0.8,LB:0.8,CB:1.1}[p.slot||p.pos]||1);
  const total=avail.reduce((a,p)=>a+w(p)*(0.6+p.rating/140),0);
  let r=Math.random()*total;
  for(const p of avail){r-=w(p)*(0.6+p.rating/140);if(r<=0)return p;}
  return avail[0];
}
function pickAssister(xi,scorerId){
  if(Math.random()<0.22)return null;                 // solo effort / rebound
  const w=p=>({CAM:6.5,AM:6,CM:5,LW:4,RW:4,RM:3.5,LM:3.5,CDM:2.5,RB:2,LB:2,ST:2,CB:1,GK:0.2}[p.slot||p.pos]||1);
  const cands=xi.filter(p=>p.id!==scorerId);
  if(!cands.length)return null;
  const total=cands.reduce((a,p)=>a+w(p),0);
  let r=Math.random()*total;
  for(const p of cands){r-=w(p);if(r<=0)return p;}
  return cands[0];
}
// cards: defenders and holding mids see more; a red is rare
// Per-MINUTE booking probability for the one player sampled each minute per side.
// Tuned so a match yields ~3.5 yellows and ~0.1 reds across both teams.
function bookingChance(p,press){
  const base={CDM:0.038,CB:0.030,RB:0.024,LB:0.024,CM:0.030,RM:0.022,LM:0.022,CAM:0.016,AM:0.018,ST:0.016,RW:0.015,LW:0.015,GK:0.004}[p.slot||p.pos]||0.020;
  return base*(press==='high'?1.35:press==='low'?0.8:1);
}


// ---- render the two XIs side by side, with live event icons ----
// Icons are strictly bounded: at most 2 goal glyphs, 1 assist glyph, 1 card.
// Beyond that we collapse to a count, so a hat-trick can never widen the row.
function playerIcons(pid,ledger){
  const l=ledger[pid];if(!l)return '';
  let out='';
  if(l.goals===1)out+='<span class="ic goal" title="Goal">⚽</span>';
  else if(l.goals===2)out+='<span class="ic goal" title="2 goals">⚽</span><span class="ic goal">⚽</span>';
  else if(l.goals>2)out+=`<span class="ic goal" title="${l.goals} goals">⚽<sup>${l.goals}</sup></span>`;
  if(l.assists===1)out+='<span class="ic assist" title="Assist">👟</span>';
  else if(l.assists>1)out+=`<span class="ic assist" title="${l.assists} assists">👟<sup>${l.assists}</sup></span>`;
  if(l.red)out+='<span class="ic red" title="Sent off"></span>';
  else if(l.yellow)out+='<span class="ic yel" title="Booked"></span>';
  return out;
}
function formPip(v){

// Build the ledger from ONLY the events that have already been revealed.
// The full-match ledger is computed up front by runMatch(), so rendering it

function ledgerUpTo(events,limit){
  const led={};
  const mark=(pid,k)=>{if(!pid)return;(led[pid]=led[pid]||{goals:0,assists:0,yellow:0,red:0})[k]++;};
  const idxOf=e=>e.m==='ET'?200:(e.type==='ht'?45:Number(e.m));
  (events||[]).forEach(e=>{
    if(limit!=null && idxOf(e)>limit)return;
    if(e.type==='goal'||e.type==='goalopp'){mark(e.scorerId,'goals');mark(e.assistId,'assists');}
    else if(e.type==='yellow')mark(e.playerId,'yellow');
    else if(e.type==='red')mark(e.playerId,'red');

// HOME ON THE LEFT, AWAY ON THE RIGHT. The sim always tracks YOUR goals as `hs` and your

function matchSides(){

  return {
    away,

    R:{ name: away?md.me.name:md.opp.name, iso: away?md.me.iso:md.opp.iso, isMe:away },

function lineupsHTML(revealedMinute){

  // player's badge tells you his unit at a glance, and the first man in each band
  // carries the label. A 4-5-1 and a 4-3-3 sit happily beside each other.
  const col=n=>['gk','def','mid','att'][n];

      const b=bandOf(p);

      const inner = rightSide

        : `${icons}${rat}${form}${name}${badge}${label}`;
      // Tap opens the player card; the second arg tells openPlayer whether it's an opponent.
      const tap = `onclick="openPlayer(${p.id},${isOpp?'true':'false'})" style="cursor:pointer"`;
      return `<div class="pl-row ${col(b)}" ${tap}>${inner}</div>`;

  const s=matchSides();

      <div class="lu-team away"><span>${shortNat(s.R.name)}</span>${flag(s.R.iso)}</div>
    </div>

      <span>${shapeOf(leftXI)}</span>
      <span class="lu-key">⚽ goal · 👟 assist · <i class="kc yel"></i> · <i class="kc red"></i></span>
      <span>${shapeOf(rightXI)}</span>
    </div>
    <div class="lu-cols">
      <div class="lu-col home">${sideRows(leftXI,false,!leftIsMe)}</div>

    </div>

      <span><i class="ld gk"></i>GK</span><span><i class="ld def"></i>DEF</span>

// ONE definition of which unit a slot belongs to. RM/LM/AM are midfielders —
// that's the whole point of a 4-5-1 having five of them.
const SLOT_BAND={GK:0,
  RB:1,LB:1,CB:1,
  CDM:2,CM:2,CAM:2,RM:2,LM:2,AM:2,
  RW:3,LW:3,ST:3};
function bandOf(p){return SLOT_BAND[p.slot||p.pos]??3;}
// derive a readable shape (e.g. "4-5-1") from an actual XI
function shapeOf(xi){
  if(!xi||!xi.length)return '';
  const d=xi.filter(p=>bandOf(p)===1).length;
  const m=xi.filter(p=>bandOf(p)===2).length;
  const a=xi.filter(p=>bandOf(p)===3).length;

}
function refreshLineups(revealedMinute){

function runMatch(me,opp,knockout,done,aggContext,venue){
  const tac=tacticalRating();
  // HOST ADVANTAGE applies to whichever side is hosting: lift my effective attack/defence
  // if I'm the host, or the opponent's rating if they are. Only in an active tournament.
  const myHost=hostBoostFor(me&&me.you?{name:(myNation()||{}).name,id:(myNation()||{}).id}:me);
  if(myHost){tac.att+=myHost;tac.def+=myHost;}
  // VENUE ADVANTAGE for two-legged ties (playoffs): 'home' lifts me, 'away' lifts the
  // opponent, 'neutral'/undefined lifts neither. Same ~3-point swing as a tournament host.
  const VENUE_BOOST=3;
  let venueOpp=0;
  if(venue==='home'){tac.att+=VENUE_BOOST;tac.def+=VENUE_BOOST;}
  else if(venue==='away'){venueOpp=VENUE_BOOST;}
  // CORE 4 MATCHUP (7.3): the style battle, mirrored — worth up to ±3.7 a side, fading
  // to almost nothing when the talent gap is large. Stored for the match report.
  try{assistPickApproach(opp);}catch(e){}   // 7.5: delegated tactical direction
  const _tShift=tacticalShift((G.tactics||{}).style, teamStyle(opp), tac.base, opp.ov);
  if(_tShift){tac.att+=_tShift;tac.def+=_tShift;}
  G._lastMatchup={mine:normStyle((G.tactics||{}).style),theirs:teamStyle(opp),shift:_tShift};
  const oppOv=opp.ov+hostBoostFor(opp)+venueOpp-_tShift;const events=[];
  let myShots=0,oppShots=0,myXG=0,oppXG=0;
  // ---- the two starting elevens, and a per-player event ledger ----
  const homeXI=orderXI(myStartingXI());
  const awayXI=orderXI(opp.you?[]:oppStartingXI(opp));
  const ledger={};   // playerId -> {goals, assists, yellow, red}
  const mark=(pid,k)=>{if(!pid)return;(ledger[pid]=ledger[pid]||{goals:0,assists:0,yellow:0,red:0})[k]++;};
  const sentOff=new Set();
  // ---- possession is now LIVE: a baseline that drifts minute to minute ----
  // Possession is a TUG OF WAR between the two approaches, not just a bonus for mine:
  // a possession side against a low block sees the ball far more than against a rival
  // who also wants it. (Alpha 7.8)
  const myProf=styleProfile((G.tactics||{}).style), oppProf=styleProfile(teamStyle(opp));
  let basePoss=50+(tac.att-oppOv)*0.8+(myProf.poss-oppProf.poss)*0.55;
  basePoss=clamp(basePoss+gauss()*4,26,74);
  let poss=basePoss;
  const possTrack=[];   // one reading per minute, for a live bar
  const shotQ=(mult)=>{const big=Math.random()<0.13*(mult||1);
    const q=big?rnd(0.25,0.55):rnd(0.02,0.13);return clamp(q*(mult||1),0.02,0.72);};
  const pressure=knockout?0.88:1;
  let stamina=100,oppStamina=100;
  // RED CARDS bite hard now. Playing a man (or more) down is a real, compounding
  // handicap — not just a name removed from the scoresheet. Each dismissal cuts that
  // side's attacking threat sharply and its defensive solidity even more (you're
  // stretched, chasing the ball, tiring faster). These multipliers fold straight into
  // the shot-volume ratios below, so a red card visibly swings the run of play.
  const redCount=side=>[...sentOff].filter(id=>(side==='me'?homeXI:awayXI).some(x=>x.id===id)).length;
  const attMult=side=>{const n=redCount(side);return n===0?1:n===1?0.78:n===2?0.58:0.42;};   // fewer, worse chances
  const defMult=side=>{const n=redCount(side);return n===0?1:n===1?0.72:n===2?0.50:0.34;};   // defence suffers more
  // A red also drains the short-handed side's legs faster — ten men chase all game.
  const redDrain=side=>1+redCount(side)*0.35;

  function playMinutes(from,to,isET){
    for(let m=from;m<=to;m++){
      // fatigue (extra time drains harder; a red card drains the short-handed side faster)
      const drain=isET?1.15:1;
      stamina-=rnd(0.4,0.8)*(1-tac.stam*0.03)*drain*redDrain('me');const fat=clamp(stamina/100,0.62,1);
      oppStamina-=rnd(0.4,0.8)*drain*redDrain('opp');const oppFat=clamp(oppStamina/100,0.62,1);
      // possession drifts: mean-reverting random walk, nudged by who's on top
      const chasing=(events.filter(e=>e.type==='goal').length)-(events.filter(e=>e.type==='goalopp').length);
      const pull=(basePoss-poss)*0.12 + (chasing<0?0.35:chasing>0?-0.25:0);
      poss=clamp(poss+pull+gauss()*1.6,22,78);
      possTrack.push({m,v:Math.round(poss)});
      const possBoost=1+(poss-50)*0.003;   // holding the ball creates a bit more
      // Shot volume scales with the attack/defence ratio, but the ratio is CAPPED and
      // the exponent softened so a huge rating gap can't manufacture 50+ shots and
      // 10-2 scorelines. A dominant side gets more and better chances — not absurdly so.
      // My attack is cut if I'm down to ten; the opponent's defence eases if THEY are.
      const myRatio=Math.min(1.5,(tac.att*fat*attMult('me'))/(oppOv*oppFat*defMult('opp')));
      if(Math.random()<0.12*Math.pow(myRatio,2.1)*pressure*possBoost*(isET?0.52:1)*myProf.vol*oppProf.concede){
        myShots++;const q=shotQ(myProf.qual);myXG+=q;
        if(Math.random()<q*1.05){
          const sc=pickScorerFrom(homeXI,sentOff);
          const as=sc?pickAssister(homeXI.filter(p=>!sentOff.has(p.id)),sc.id):null;
          if(sc)mark(sc.id,'goals'); if(as)mark(as.id,'assists');
          events.push({m,type:'goal',side:'me',scorer:sc?sc.name:scorerName(),scorerId:sc?sc.id:null,
            assist:as?as.name:null,assistId:as?as.id:null,
            txt:pick(['strikes','finishes coolly','buries it','powers it home'])});}
        else if(q>0.2)events.push({m,type:'chance',side:'me',txt:pick(['spurns a huge chance — saved!','hits the bar from close range!','somehow blazes over!','is denied one-on-one!'])});
        else if(Math.random()<0.25)events.push({m,type:'chance',side:'me',txt:pick(['forces a save','flashes one wide','tries from range'])});
      }
      // The opponent's attack is cut if THEY are down; my defence eases if I am short-handed.
      const oppRatio=Math.min(1.5,(oppOv*oppFat*attMult('opp'))/(tac.def*fat*defMult('me')));
      if(Math.random()<0.12*Math.pow(oppRatio,2.1)*pressure*(2-possBoost)*(isET?0.52:1)*oppProf.vol*myProf.concede){
        oppShots++;const q=shotQ(oppProf.qual);oppXG+=q;
        if(Math.random()<q*1.05){
          const sc=pickScorerFrom(awayXI,sentOff);
          const as=sc?pickAssister(awayXI.filter(p=>!sentOff.has(p.id)),sc.id):null;
          if(sc)mark(sc.id,'goals'); if(as)mark(as.id,'assists');
          events.push({m,type:'goalopp',side:'opp',scorer:sc?sc.name:null,scorerId:sc?sc.id:null,
            assist:as?as.name:null,assistId:as?as.id:null,txt:'score'});}
        else if(q>0.2)events.push({m,type:'chance',side:'opp',txt:pick(['waste a golden chance!','are denied by a stunning save!','hit the post!'])});
        else if(Math.random()<0.25)events.push({m,type:'chance',side:'opp',txt:pick(['test the keeper','shoot wide','probe from distance'])});
      }
      // ---- bookings ----
      [['me',homeXI],['opp',awayXI]].forEach(([side,xi])=>{
        if(!xi.length)return;
        const p=pick(xi.filter(x=>!sentOff.has(x.id)));
        if(!p)return;
        const chance=bookingChance(p,G.tactics.press)*(isET?0.7:1);
        if(Math.random()<chance){
          const led=ledger[p.id];
          const alreadyBooked=led&&led.yellow>0;
          if(alreadyBooked&&Math.random()<0.22){
            mark(p.id,'red');sentOff.add(p.id);
            // Count how many of THIS side are already off — "down to ten" was printed
            // for every dismissal, even the second.
            const off=[...sentOff].filter(id=>(side==='me'?homeXI:awayXI).some(x=>x.id===id)).length;
            const left=11-off;
            events.push({m,type:'red',side,player:p.name,playerId:p.id,
              txt:`<b>SENT OFF!</b> Second yellow for ${shortName(p.name)}. Down to ${numWord(left)}.`});
          }else if(Math.random()<0.010){
            mark(p.id,'red');sentOff.add(p.id);
            const off=[...sentOff].filter(id=>(side==='me'?homeXI:awayXI).some(x=>x.id===id)).length;
            const left=11-off;
            events.push({m,type:'red',side,player:p.name,playerId:p.id,
              txt:`<b>STRAIGHT RED!</b> ${shortName(p.name)} walks. Reckless. Down to ${numWord(left)}.`});
          }else if(!alreadyBooked){
            mark(p.id,'yellow');
            events.push({m,type:'yellow',side,player:p.name,playerId:p.id,
              txt:`${shortName(p.name)} goes into the book.`});
          }
        }
      });
      if(m===45)events.push({m,type:'ht'});
      if(m===90&&isET===false)events.push({m:90,type:'ft90'});
      if(m===105)events.push({m,type:'etht'});
    }
  }
  playMinutes(1,90,false);
  let hs=events.filter(e=>e.type==='goal').length,as=events.filter(e=>e.type==='goalopp').length;
  let wentToET=false,wentToPens=false;
  // A tie needs a winner when it's a knockout match, OR when it's the second leg of a
  // two-legged playoff and the AGGREGATE is level after 90 minutes. In the playoff case
  // extra time (and any resulting penalties) is decided on the running aggregate, so a
  // 4-4 aggregate correctly goes to ET and then a real, playable shootout — never a
  // silent coin-flip loss.
  const aggLevelAfter90 = !!(aggContext && ((aggContext.me + hs) === (aggContext.them + as)));
  const needsWinner = knockout || aggLevelAfter90;
  if(needsWinner && (knockout ? hs===as : aggLevelAfter90)){
    // ---- REAL EXTRA TIME: 30 more minutes, tired legs, fewer chances ----
    wentToET=true;
    playMinutes(91,120,true);
    hs=events.filter(e=>e.type==='goal').length;
    as=events.filter(e=>e.type==='goalopp').length;
    // In a playoff, whether it goes to penalties depends on the AGGREGATE after ET.
    const levelAfterET = aggContext ? ((aggContext.me+hs)===(aggContext.them+as)) : (hs===as);
    if(levelAfterET)wentToPens=true;   // → penalties, decided by the player
  }
  // Qualifying is played home-and-away. The match is staged in the HOME team's country:
  // your home leg at your national stadium, your away leg at the opponent's. Finals matches
  // are always at the tournament host's grounds (a major tournament has one host nation).
  let stadium; const awayGame = (venue==='away');
  if(G.stage==='qual'){
    stadium = awayGame ? homeStadium(opp) : homeStadium(myNation());
  }else{
    stadium=(G.host&&G.host.cities)?pick(G.host.cities):'';
  }
  // make every player in THIS match resolvable by the player-card opener (issue 7)
  G.matchPlayers=[...homeXI,...awayXI];
  G.matchData={me,opp,events,hs,as,won:hs>as,stadium,knockout,wentToET,wentToPens,aggContext,awayGame,
    possTrack,homeXI,awayXI,ledger,
    stats:{poss:Math.round(basePoss),myShots,oppShots,myXG:myXG.toFixed(1),oppXG:oppXG.toFixed(1),
      myStyle:normStyle((G.tactics||{}).style),oppStyle:teamStyle(opp)}};
  G._afterMatch=stamped(done);
  // BUGFIX: a draw after extra time used to jump STRAIGHT to the shootout, skipping
  // the 120 minutes entirely. Now the match plays out as normal; animateMatch() ends
  // with a "To penalties" button, and the quick-sim result shows the full scoreline
  // before offering the shootout.
  if(G.quickSim){
    if(wentToPens)return showQuickResult();   // shows 120' result + penalties button
    return showQuickResult();
  }
  animateMatch();
}

// ============================================================
//  PENALTY SHOOTOUT — the most dramatic moment in football
// ============================================================
// every player has a hidden penalty ability, shaped by position and quality
// Elite takers must be elite. This previously topped out at 79 even for Brazil,
// because the rating contribution was too shallow. Also DETERMINISTIC now.
function penaltyRating(p){
  const posBonus={ST:10,CAM:8,RW:6,LW:6,CM:5,AM:7,RM:4,LM:4,LB:0,RB:0,CDM:-2,CB:-5,GK:-14}[p.pos]??0;
  let r=p.rating*0.82+posBonus+6;
  if(p.arch==='poacher')r+=5;
  if(p.arch==='leader')r+=4;           // ice in the veins
  if(p.arch==='veteran')r+=3;
  if(p.arch==='flair')r+=((p.id*23)%9)-4;   // brilliant or catastrophic, but stable
  if(p.arch==='wonderkid')r-=2;        // young nerves
  return clamp(Math.round(r),25,96);
}
// DETERMINISTIC. Previously this had a gauss() term and was recomputed on every
// render, so a taker's composure label flickered between "Composed" and "Nervy"
// after you had already picked him. A player's nerve is a property, not a dice roll.
function penComposure(p){
  let c=55;
  if(p.arch==='leader')c+=18;
  if(p.arch==='veteran')c+=14;
  if(p.arch==='wonderkid')c-=10;
  if(p.arch==='flair')c-=5;
  c+=(p.caps||0)*0.12;                 // experience steadies you
  c+=((p.id*37)%11)-5;                 // stable per-player idiosyncrasy, not noise
  return clamp(Math.round(c),20,95);
}

function screenPickTakers(){
  const avail=G.squad.filter(p=>!p.injured);
  const xi=bestXIFrom(avail,G.tactics.formation);
  G.penPool=xi.map(p=>({...p,pen:penaltyRating(p),comp:penComposure(p)}));
  if(!G.penOrder)G.penOrder=[];
  const chosen=G.penOrder;
  const rows=[...G.penPool].sort((a,b)=>b.pen-a.pen).map(p=>{
    const idx=chosen.findIndex(x=>x.id===p.id);
    const conf=p.comp>=75?'Ice cold':p.comp>=60?'Composed':p.comp>=45?'Nervy':'Terrified';
    const ccol=p.comp>=75?'var(--green)':p.comp>=60?'var(--accent)':p.comp>=45?'var(--amber)':'var(--red)';
    return `<div class="prow ${idx>=0?'picked':''}" onclick="toggleTaker(${p.id})">

      <div class="body">
        <div class="r1"><span class="pname">${p.name}</span></div>
        <div class="r2"><span class="tag style">Penalty ${p.pen}</span>
          <span class="tag" style="background:rgba(255,255,255,.06);color:${ccol}">${conf}</span></div>
      </div>
      <div class="stats"><div class="stat-rat ${ratClass(p.rating)}">${p.rating}</div></div>
    </div>`;
  }).join('');
  go(statusBar()+`<div class="wrap">

// resolve one penalty: technique + composure vs pressure of the moment
function takePen(taker,pressure){
  const nerve=taker.comp-pressure*22;             // pressure erodes composure
  const chance=clamp(0.50+ (taker.pen-60)*0.006 + nerve*0.0032, 0.30, 0.90);
  const scored=Math.random()<chance;
  let how;
  if(scored)how=pick(['sends the keeper the wrong way','buries it in the top corner','rolls it calmly down the middle','smashes it high into the net']);
  else how=pick(['SAVED! The keeper guesses right!','OVER THE BAR! He never looked like scoring.','off the post and away!','saved low to his left!']);
  return {scored,how};
}

function nextIsMine(){const S=G.shootout;return S.history.filter(h=>h.side==='me').length<=S.history.filter(h=>h.side==='opp').length;}
function nextTaker(){
  const S=G.shootout;const n=S.history.filter(h=>h.side==='me').length;
  if(n<5)return G.penOrder[n];
  // sudden death: anyone left, weakest first (the drama of the reluctant taker)
  const used=S.history.filter(h=>h.side==='me').map(h=>h.id);
  const rest=G.penPool.filter(p=>!used.includes(p.id)).sort((a,b)=>b.pen-a.pen);
  return rest[0]||G.penPool[0];
}
function nextTakerLabel(){
  const S=G.shootout;
  const n=Math.max(S.history.filter(h=>h.side==='me').length,S.history.filter(h=>h.side==='opp').length);
  if(S.suddenDeath)return 'SUDDEN DEATH · miss and it\'s over';
  return `Penalty ${n+1} of 5`;
}
function takeNextPen(){
  const S=G.shootout;if(S.over)return;   // the shootout is finished; stay on the page
  const {opp}=G.matchData;
  const mine=nextIsMine();
  const round=Math.floor(S.history.length/2)+1;
  // pressure rises with the round, and spikes when a miss loses it
  let pressure=clamp(round*0.13,0,0.75);
  if(S.suddenDeath)pressure=0.9;
  if(mine){
    const t=nextTaker();
    const r=takePen(t,pressure);
    if(r.scored)S.myScore++;
    S.history.push({side:'me',round,taker:t.name.split(' ').slice(-1)[0],id:t.id,scored:r.scored,how:r.how});
  }else{
    // AI taker quality scales with their nation strength
    const oppPen={pen:clamp(opp.ov*0.6+22,30,90),comp:clamp(opp.ov*0.7,30,88)};
    const r=takePen(oppPen,pressure);
    if(r.scored)S.oppScore++;
    S.history.push({side:'opp',round,taker:opp.name,scored:r.scored,how:r.how});
  }
  evaluateShootout();
  screenShootout();
}
function evaluateShootout(){
  const S=G.shootout;
  const myKicks=S.history.filter(h=>h.side==='me').length;
  const oppKicks=S.history.filter(h=>h.side==='opp').length;

  // ---- SUDDEN DEATH: after both teams reach 5 kicks and are level ----
  // A sudden-death round is only decided once BOTH teams have taken their kick in
  // that round (equal kick counts). Never declare a result while one side still has
  // a penalty to take.
  if(S.suddenDeath || (myKicks>5||oppKicks>5)){
    if(myKicks===oppKicks && myKicks>=5){
      if(S.myScore!==S.oppScore){S.over=true;S.winner=S.myScore>S.oppScore?'me':'opp';return;}
    }
    return;   // unequal kicks, or still level → play on
  }

  // ---- REGULATION (best of 5): clinch the instant it's mathematically settled ----
  // The trophy is decided as soon as one side cannot be caught, EVEN IF that side has
  // taken fewer kicks. Previously we required the trailing side to have kicked at least
  // as many times, which forced a pointless extra kick when the LEADING side had clinched
  // early on fewer kicks — e.g. you're 3/5 and done, they're 4/4 and already can't be
  // caught, yet the game still made them step up for a meaningless 5th. The only thing we
  // must avoid is ending mid-round in a way that skips a kick that COULD still matter, and
  // "cannot be caught" already guarantees the remaining kicks can't matter.
  const myLeft=Math.max(0,5-myKicks), oppLeft=Math.max(0,5-oppKicks);
  if(S.myScore > S.oppScore + oppLeft){S.over=true;S.winner='me';return;}
  if(S.oppScore > S.myScore + myLeft){S.over=true;S.winner='opp';return;}

  // Both completed their 5 regulation kicks and it's level → sudden death.
  if(myKicks>=5 && oppKicks>=5 && myKicks===oppKicks){
    if(S.myScore!==S.oppScore){S.over=true;S.winner=S.myScore>S.oppScore?'me':'opp';return;}
    S.suddenDeath=true;   // level after 5 each → sudden death
  }
}
// Fire the parked post-match continuation EXACTLY once. Every "Continue →" after a match
// routes through here so a double-tap or a re-render can't advance the bracket twice or

function fireAfterMatch(){

}
function finishShootout(){
  const S=G.shootout;const won=S.winner==='me';

  md.won=won;md.pens={my:S.myScore,opp:S.oppScore};

  // could advance the bracket twice or re-open a finished tournament.
  fireAfterMatch();
}
// quick-sim path: resolve the shootout instantly
function quickShootout(){
  const {me,opp}=G.matchData;
  const avail=G.squad.filter(p=>!p.injured);
  const xi=bestXIFrom(avail,G.tactics.formation).map(p=>({...p,pen:penaltyRating(p),comp:penComposure(p)}));
  const takers=[...xi].sort((a,b)=>(b.pen*0.6+b.comp*0.4)-(a.pen*0.6+a.comp*0.4)).slice(0,5);
  let my=0,th=0;const log=[];
  for(let i=0;i<5;i++){
    const p=clamp((i+1)*0.13,0,0.75);
    const r1=takePen(takers[i],p);if(r1.scored)my++;log.push({side:'me',taker:takers[i].name.split(' ').slice(-1)[0],scored:r1.scored});
    const oppPen={pen:clamp(opp.ov*0.6+22,30,90),comp:clamp(opp.ov*0.7,30,88)};
    const r2=takePen(oppPen,p);if(r2.scored)th++;log.push({side:'opp',taker:opp.name,scored:r2.scored});
  }
  while(my===th){
    const p=0.9;
    const t=pick(xi);const r1=takePen(t,p);if(r1.scored)my++;log.push({side:'me',taker:t.name.split(' ').slice(-1)[0],scored:r1.scored});
    const oppPen={pen:clamp(opp.ov*0.6+22,30,90),comp:clamp(opp.ov*0.7,30,88)};
    const r2=takePen(oppPen,p);if(r2.scored)th++;log.push({side:'opp',taker:opp.name,scored:r2.scored});
  }
  G.matchData.won=my>th;G.matchData.pens={my,opp:th};G.matchData.penLog=log;
  showQuickResult();
}

// A tiny transient toast popup — the game had no live toast, only a saves-screen note.
function popToast(msg){
  const old=document.getElementById('gg-toast');if(old)old.remove();
  const t=document.createElement('div');t.id='gg-toast';t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:9999;'
    +'background:var(--panel2);color:var(--txt);border:1px solid var(--accent);border-radius:10px;'

// ---------- AGING ENGINE ----------
// Cycles are now ANNUAL (qualification years included), so players age one year
// per cycle and growth/decline is scaled accordingly — a slower, truer arc.
function ageAndContinue(){
  const gap=1;
  const risers=[],fallers=[],retired=[],newcomers=[];
  const brake=recoveryDecayBrake();   // good recovery facilities soften age decline
  G.pool.forEach(p=>{
    const old=p.rating;
    p.age+=gap;
    p.rating=abilityAtAge(p.potential,p.age);
    // TRAINING BRAKE: a declining player loses a little less each year with top facilities.
    if(brake>0 && p.rating<old){p.rating=Math.round(clamp(p.rating+Math.min(brake*2,old-p.rating),42,99));}
    refreshForm(p);
    const c=clubForRating(p.rating);p.club=c.name;p.clubTier=c.tier;p.newbie=false;
    // caps & goals accumulate over a career (feeds the Hall of Fame)
    p.caps+=Math.round(rnd(2,9));
    if(['ST','RW','LW','CM'].includes(p.pos))p.hofGoals=(p.hofGoals||0)+Math.round(rnd(0,4));
    const diff=p.rating-old;
    // Retirement: every player has his OWN international swansong, decided once and
    // remembered, so careers wind down across a realistic spread rather than a whole
    // squad walking off together. Two things push the age out: POSITION (keepers and
    // centre-backs last longer, pace-reliant forwards fade sooner) and QUALITY — a truly
    // elite player stays at or above international level for far longer, so he plays on
    // deep into his thirties even as he declines. The youngest a normal player hangs up
    // his boots is 33; only genuine physical collapse ends it earlier.
    if(p.retireAge===undefined){
      // Base curve centred at ~35 with a wide spread. Floor is 33 (below, only injury or
      // collapse ends a career early); tail runs into the low 40s for the exceptional.
      let ra=35.5+gauss()*2.6;
      if(p.pos==='GK')ra+=Math.round(rnd(3,5));    // keepers age gracefully
      if(p.pos==='CB')ra+=Math.round(rnd(1,3));    // centre-backs a touch longer
      if(['RW','LW','ST'].includes(p.pos))ra-=1;   // pace-reliant roles fade sooner
      // QUALITY BONUS: the better the player at his peak, the longer he stays relevant.
      // A ~95 peak adds ~4 years over an average international; a journeyman adds nothing.
      const peak=p.peakRating||p.rating;
      if(peak>=72)ra += (peak-72)*0.19;            // +0 at 72, ~+4.4 at 95
      p.retireAge=clamp(Math.round(ra),33,43);
    }
    // He retires when he reaches his personal age. The elite cling on a year or two beyond
    // even that. Early retirement now requires a genuine collapse: he's past 35 AND his
    // level has fallen a long way from his own peak — so a gently-declining star plays on
    // rather than vanishing at 34.
    if(p.peakRating===undefined||p.rating>p.peakRating)p.peakRating=p.rating;
    const elite     = p.rating>=85;
    const collapsed = p.age>=35 && p.rating <= p.peakRating-12;   // his level has truly gone
    const dueByAge  = p.age >= (elite ? p.retireAge+2 : p.rating>=78 ? p.retireAge+1 : p.retireAge);
    if(dueByAge || collapsed){p.retire=true;}
    else if(diff>=1)risers.push({p,diff});
    else if(diff<=-1)fallers.push({p,diff});
  });
  retired.push(...G.pool.filter(p=>p.retire));
  retired.forEach(p=>considerHallOfFame(p));
  // Post the more notable retirements to the social feed (capped so it doesn't flood).
  retired.filter(p=>(p.caps||0)>=25||p.rating>=72).slice(0,3).forEach(p=>postRetirement(p));
  G.pool=G.pool.filter(p=>!p.retire);
  advanceYouthEra();   // this cycle's intake quality is decided here
  try{acadFocusMilestones();}catch(e){}   // 7.4: the culture shift, reported as it lands
  try{assistAcademyDirection();}catch(e){}   // 7.5: delegated academy stewardship
  // ---- ACADEMY: age up the youth prospects; some graduate into the senior pool ----
  const graduates = advanceAcademy();
  // regenerate youth to keep the pool at 40. Prefer real academy graduates first, so
  // the players you've watched come through actually arrive — then top up as needed.
  let need=POOL_TARGET-G.pool.length;const wish=['GK','CB','CB','RB','LB','CM','CM','CDM','CAM','RM','LM','RW','LW','ST','CF'];
  const pc={};G.pool.forEach(p=>pc[p.pos]=(pc[p.pos]||0)+1);
  graduates.forEach(g=>{
    if(G.pool.length>=POOL_TARGET)return;
    g.newbie=true;g.hofGoals=0;g.fromAcademy=true;
    newcomers.push(g);G.pool.push(g);pc[g.pos]=(pc[g.pos]||0)+1;need--;
  });
  for(let i=0;i<need;i++){
    wish.sort((a,b)=>(pc[a]||0)-(pc[b]||0));const pos=wish[0];pc[pos]=(pc[pos]||0)+1;
    const np=genPlayer(G.natId,pos,Math.round(rnd(18,21)),true);np.newbie=true;np.hofGoals=0;
    newcomers.push(np);G.pool.push(np);
  }
  // SPECIALIST FLOOR. The top-up above only runs (40 - pool size) times, so a pool
  // sitting near 40 could keep 2 keepers for years — and 2 keepers is a trap: one
  // injury makes SQUAD_MINIMA's 2-GK requirement unfillable and the Confirm button
  // never unlocks. Keepers retire late (+3-5 years) so they're rarely replaced by
  // natural churn. Guarantee a working minimum for the thin specialist lines,
  // regardless of how full the pool is.
  // LINE FLOOR (7.7). Every line — not just keepers and centre-backs — is guaranteed
  // enough bodies that injuries can never make SQUAD_MINIMA unfillable. This is what
  // stops the Delegate/Confirm button naming fewer than 23.
  const beforeFloor=G.pool.length;
  enforceLineFloors(G.pool,G.natId,false);
  if(G.pool.length>beforeFloor){
    for(let i=beforeFloor;i<G.pool.length;i++)newcomers.push(G.pool[i]);
  }
  // Also keep a couple of specialist positions genuinely deep (keepers retire late and
  // are rarely replaced by natural churn).
  [{pos:'GK',min:5},{pos:'CB',min:6}].forEach(f=>{
    let have=G.pool.filter(p=>p.pos===f.pos).length,guard=0;
    while(have<f.min && guard++<8){
      const np=genPlayer(G.natId,f.pos,Math.round(rnd(18,21)),true);
      np.newbie=true;np.hofGoals=0;newcomers.push(np);G.pool.push(np);have++;
    }
  });
  // replenish the academy with a fresh crop of 14-year-olds
  replenishAcademy();
  // Feed content: an academy U17 roundup, and occasionally a spotlight on the best kid.
  postAcademyU17Roundup();
  generateFollowedPosts();   // accounts you follow post their yearly updates into your feed
  if(Math.random()<0.5){const gem=[...(G.academy||[])].filter(p=>p.age>=15).sort((a,b)=>scoutedRange(b).hi-scoutedRange(a).hi)[0];if(gem&&scoutedRange(gem).hi>=80)postAcademySpotlight(gem);}
  G.year+=gap;
  deskTick();                      // secretaries retire every 10-30 years — a marker, nothing more
  deskNote('aging');
  if(newcomers.length)deskNote('youth');
  if(G.year-2025>=8)deskNote('longGame');
  G.retiredManager=null;
  G.squad=[];G.host=null;G.tournamentActive=false;G.fieldYear=null;G.stage=null;
  clearContinuations();
  G._gradedYear=null;G._qualGradedYear=null;G._reviewReturn=null;
  G._offerCheckedThisTurn=false;   // fresh season → offers may roll again (subject to cooldown)
  try{ initFinance(); tickSponsors(); rollSponsorOffers(); }catch(e){console.warn('sponsor turn',e);}  // Alpha 4.8: deals age; new offers appear (values reflect recent form)
  decayRankings();                 // world ranking drifts toward baseline; results push it
  try{ generateWorldForm(); G._worldFormYear=G.year; }catch(e){console.warn('world form',e);}   // Alpha 4.9: plausible form guides for every nation
  ageRivalManagers();             // rival bosses age, deals run down, some move on
  try{ageRivalPools();pruneImmersive();}catch(e){console.warn(e);}   // rival players age with your own
  if(G.manager&&G.mgrContractYearsLeft!=null){
    G.mgrContractYearsLeft=Math.max(0,G.mgrContractYearsLeft-1);   // your deal ticks down
  }
  if(Math.random()<0.7)postManagerHeadline();   // a rival-manager story most seasons
  G.playoffRival=null;G.playoffDone=false;G.playoffOutcome=null;G.playoffLeg=1;G.playoffLegs=[];G.qualPos=null;
  // shortlist refreshes naturally each year via managerShortlist()'s year check
  G.moraleMod=0;
  // MANAGER PERSISTS across cycles — he is only replaced if sacked.
  if(G.manager){
    G.manager.yearsAtNation=(G.manager.yearsAtNation||0)+1;
    G.mgrJustHired=false;
    checkManagerRetirement();   // he may hang up his coat
  }
  rollInjuries();
  recordSquadTrend();   // capture this year's best-23 OVR & age for the trend graph
  G.agingReport={risers,fallers,retired,newcomers};
  screenAgingReport();
}

// ============================================================
//  CAREERS — players are people, not curves.
//  Every tournament a man plays is written down, so the Hall of
//  Fame lands emotionally rather than statistically.
// ============================================================
function initCareers(){
  if(!G.careers)G.careers={};      // playerId -> {tournaments:[], debut, goals, assists, caps}
}
function careerOf(p){
  initCareers();
  if(!G.careers[p.id])G.careers[p.id]={
    id:p.id,name:p.name,pos:p.pos,debut:null,
    tournaments:[],goals:0,assists:0,caps:0,
    titles:0,finals:0,peak:p.potential,
  };
  return G.careers[p.id];
}
// Give a player a plausible BACKSTORY the first time his profile is opened, so a fresh
// save doesn't show every established international on zeros. Derived from his age,
// rating and seeded tournament count; real stats then accrue on top from live matches.
// Marked _seeded so it only happens once and never overwrites real accrued numbers.
function seedCareerHistory(p){
  const c=careerOf(p);
  if(c._seeded||c.apps||c.goals||c.assists)return c;   // already has real/seeded data
  c._seeded=true;
  const t=p.tourns||0;
  const seniorYears=Math.max(0,p.age-18);
  // apps: caps already model international appearances; use them as the app baseline
  c.apps=(c.apps||0)+Math.max(0, p.caps||Math.round(seniorYears*rnd(4,8)));
  c.mins=(c.mins||0)+Math.round(c.apps*rnd(55,90));
  // goal/assist output scaled by position and quality
  const attack=['ST','CF','RW','LW','CAM'].includes(p.pos)?1:['RM','LM','CM','AM'].includes(p.pos)?0.45:['CDM','RWB','LWB','RB','LB'].includes(p.pos)?0.15:0.04;
  const quality=clamp((p.rating-55)/40,0.1,1.3);
  c.goals=(c.goals||0)+Math.round(c.apps*0.28*attack*quality*rnd(0.6,1.3));
  c.assists=(c.assists||0)+Math.round(c.apps*0.20*(attack*0.7+0.3)*quality*rnd(0.6,1.3));
  c.mom=(c.mom||0)+Math.round((c.goals+c.assists)*rnd(0.10,0.22));
  // seed the tournament timeline so "Tourn" and the career screen aren't empty
  if(t>0 && c.tournaments.length===0){
    const comps=['FIFA World Cup','Continental Championship'];
    let yr=(G.year||2026)-t*2;
    for(let i=0;i<t;i++){
      c.tournaments.push({year:yr, comp:pick(comps), age:Math.max(17,p.age-(t-i)*2), rating:clamp(p.rating-(t-i)*2,40,96),
        result:'featured', goals:Math.round(rnd(0,attack*2)), assists:Math.round(rnd(0,1)), apps:Math.round(rnd(2,6)), mins:Math.round(rnd(120,500)), mom:0});
      yr+=2;
    }
    if(c.debut===null)c.debut=c.tournaments[0].year;
  }
  return c;
}
// called once per tournament, for every man in the squad — plus rival players
// who actually featured (via captureMatchStats). Records the per-tournament
// timeline entry that powers the career screen.
function recordTournamentCaps(resultTag){
  initCareers();
  const comp=thisComp();
  const ts=(G.tournamentStats||{})[G.year]||{players:{},cleanSheets:{}};
  // Your squad — everyone gets a tournament entry, even bench men who didn't feature.
  (G.squad||[]).forEach(p=>{
    const c=careerOf(p);
    if(c.debut===null)c.debut=G.year;
    c.peak=Math.max(c.peak,p.potential);
    // caps here is the synthesized career-caps counter (separate from real apps/mins).
    c.caps+=Math.round(rnd(3,7));
    // REAL major-tournament experience: everyone in the squad was AT the tournament,
    // so their tourns count goes up by one. This is the number squad selection weighs —
    // it's why blooding a young player now pays off in future tournaments.
    p.tourns=(p.tourns||0)+1;
    const ss=ts.players&&ts.players[p.id];
    if(ss&&ss.goals)p.tournGoals=(p.tournGoals||0)+ss.goals;
    if(resultTag==='champions')c.titles=(c.titles||0)+1;
    if(resultTag==='champions'||resultTag==='FINAL')c.finals=(c.finals||0)+1;
    const s=ts.players[p.id]||{goals:0,assists:0,mins:0,apps:0,mom:0};
    c.tournaments.push({year:G.year,comp:comp.name,age:p.age,rating:p.rating,result:resultTag,
      goals:s.goals||0,assists:s.assists||0,apps:s.apps||0,mins:s.mins||0,mom:s.mom||0});
    if(c.tournaments.length>16)c.tournaments.shift();
  });
  // Rival participants — track their tournament timeline too, honouring "full parity".
  Object.values(ts.players||{}).forEach(s=>{
    if(s.you)return;                 // your squad already handled above
    const c=(G.careers||{})[s.pid];  // captureMatchStats already ensured this exists
    if(!c)return;
    if(c.debut==null)c.debut=G.year;
    // Rival titles/finals only credited to the two finalists' XIs.
    // For now: any nation reaching FINAL/champions gets logged from THEIR own perspective
    // via the winner recording in screenChampions — skip touching titles here.
    c.tournaments=c.tournaments||[];
    c.tournaments.push({year:G.year,comp:comp.name,age:s.age,rating:0,result:'featured',
      goals:s.goals||0,assists:s.assists||0,apps:s.apps||0,mins:s.mins||0,mom:s.mom||0});
    if(c.tournaments.length>16)c.tournaments.shift();
  });
  pruneCareers();
}
// Keep careers for the living, the enshrined, and the recently retired. Nothing else.
function pruneCareers(){
  if(!G.careers)return;
  const alive=new Set((G.pool||[]).map(p=>p.id));
  // Rival players are also "alive" if they still exist in a persisted rival pool.
  const rivalAlive=new Set();
  Object.values(G.rivalPools||{}).forEach(pool=>pool.forEach(p=>rivalAlive.add(p.id)));
  const enshrined=new Set((G.hallOfFame||[]).map(p=>p.pid).filter(Boolean));
  Object.keys(G.careers).forEach(id=>{
    const n=Number(id);
    if(alive.has(n)||rivalAlive.has(n))return;   // still playing (yours or rival) — keep
    if(enshrined.has(n))return;                  // a legend — always keep
    const c=G.careers[id];
    if(c.titles>0)return;                        // any title-winner is history
    // Retired rival/own player who mattered: kept as "notable" history
    if((c.goals||0)>=6 || (c.mom||0)>=3 || (c.apps||0)>=25)return;
    delete G.careers[id];
  });
  // Hard ceiling, oldest-first, so a 100-year dynasty can't balloon.
  const ids=Object.keys(G.careers);
  const CEIL=400;
  if(ids.length>CEIL){
    const droppable=ids.filter(i=>!alive.has(Number(i))&&!rivalAlive.has(Number(i)))
      .sort((a,b)=>(G.careers[a].debut||0)-(G.careers[b].debut||0));
    droppable.slice(0,ids.length-CEIL).forEach(i=>delete G.careers[i]);
  }
}
function careerSummary(c){
  if(!c||!c.tournaments.length)return 'Never played a tournament.';
  const first=c.tournaments[0],last=c.tournaments[c.tournaments.length-1];
  const best=c.tournaments.reduce((a,b)=>b.rating>a.rating?b:a);
  const bits=[];
  bits.push(`Debuted in ${first.year} aged ${first.age}.`);
  if(c.tournaments.length>1)bits.push(`Played ${c.tournaments.length} tournaments across ${last.year-first.year} years.`);
  bits.push(`Peaked at ${best.rating} in ${best.year}.`);
  if(c.titles)bits.push(`<b>Won ${c.titles} title${c.titles>1?'s':''}.</b>`);
  else if(c.finals)bits.push(`Reached ${c.finals} final${c.finals>1?'s':''} without lifting one.`);
  if(c.goals)bits.push(`${c.goals} tournament goal${c.goals>1?'s':''}.`);
  return bits.join(' ');
}

// tiny inline SVG sparkline — no library, no dependency
function sparkline(vals){
  const w=280,h=52,pad=4;
  const min=Math.min(...vals)-2,max=Math.max(...vals)+2;
  const x=i=>pad+(i/(vals.length-1||1))*(w-pad*2);
  const y=v=>h-pad-((v-min)/((max-min)||1))*(h-pad*2);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const dots=vals.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="var(--accent)"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:52px;display:block">
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

function _natRef(team){
  if(!team)return {id:'?',name:'?',iso:'un'};

  const n=NATIONS.find(x=>x.name===team.name);

}
function initImmersive(){

// ---- Persistent rival player pools ---------------------------------
// Rivals now age year-on-year like your own squad, so careers span eras.
function rivalPoolFor(team){
  initImmersive();
  const key=team.id!=null?team.id:team.name;

}
function storeRivalPool(team,players){
