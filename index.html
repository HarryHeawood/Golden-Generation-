// Every feed gets its own id and host element. Previously only the Media tab wrapped
// its output in <div id="mediafeed">, so on result screens the like/reply buttons
// silently did nothing — and G._feed was overwritten by whichever feed rendered last.
let _feedSeq=0;
function renderMediaFeed(feed){
  if(!feed||!feed.length)return '<div class="notecard">Quiet news day.</div>';
  const fid='feed'+(++_feedSeq);
  G._feeds=G._feeds||{};
  G._feeds[fid]=feed;
  return `<div class="mediafeed" id="${fid}">`+feed.map((item,i)=>{
    if(item.format==='paper'){
      return `<article class="paper ${item.outlet.cls}">
        <div class="paper-masthead"><span>${item.outlet.name}</span><span class="paper-edition">${item.time}</span></div>
        <h3 class="paper-headline">${item.headline}</h3>
        <div class="paper-byline">By ${item.byline}</div>
        <p class="paper-stand">${item.standfirst}</p>
        ${item.pull?`<div class="paper-pull">${item.pull}</div>`:''}
      </article>`;
    }
    const a=item.who,r=item.reacts;
    const nat=myNation();
    const myAv=`<div class="post-av xs" style="background:var(--accent);color:var(--accent-ink)">${nat?nat.iso.slice(0,2).toUpperCase():'Y'}</div>`;
    // Pre-written persona chatter (toggled by the 💬 count) still shown when expanded.
    const thread=(item.expanded?(item.thread||[]):[]).map(t=>`
      <div class="reply">
        <div class="post-av sm" style="background:${t.who.av}">${t.who.name[0]}</div>
        <div class="reply-body">
          <div class="reply-head"><b>${t.who.name}</b>${t.who.v?'<span class="verified">✓</span>':''}
            <span class="post-handle">${t.who.handle}</span></div>
          <div class="reply-text">${t.text}</div>
          <div class="reply-likes">♡ ${fmtNum(t.likes)}</div>
        </div>
      </div>`).join('');
    // YOUR conversation with this account — same threaded model as the world feed, so
    // the post-qualification reaction feed is fully interactive: reply, get a reply back,
    // reply again. `convo` is a running back-and-forth stored on the item.
    const convo=(item.convo||[]).map(m=>{
      if(m.side==='me'){
        return `<div class="reply argue mine-reply">${myAv}
          <div class="reply-body"><div class="reply-head"><b>${nat?nat.name:'You'}</b><span class="verified">✓</span>
            <span class="post-handle">${G.social?G.social.handle:'@you'}</span></div>
            <div class="reply-text">${m.text}</div><div class="reply-likes">♡ ${fmtNum(m.likes||0)}</div></div></div>`;
      }
      const w=m.who||a;
      return `<div class="reply argue"><div class="post-av xs" style="background:${w.av}">${w.name[0]}</div>
        <div class="reply-body"><div class="reply-head"><b>${w.name}</b>${w.v?'<span class="verified">✓</span>':''}
          <span class="post-handle">${w.handle}</span></div>
          <div class="reply-text">${m.text}</div><div class="reply-likes">♡ ${fmtNum(m.likes||0)}</div></div></div>`;
    }).join('');
    const pend=item._pending?`<div class="reply-pending" style="margin-left:22px">✨ typing…</div>`:'';
    const composing=(G._replyingToFeed===item.id)?`
      <div class="argue-composer">
        <textarea id="feedreply-${item.id}" class="social-input argue-input" maxlength="240" placeholder="Reply to ${a.name}…"></textarea>
        <div class="argue-composer-bar">
          <button class="btn gold sm" onclick="sendFeedReply('${fid}',${i})">Reply</button>
          <button class="btn ghost sm" onclick="G._replyingToFeed=null;refreshFeed('${fid}')">Cancel</button>
        </div>
      </div>`:'';
    const replyCount=(r.replies||0)+((item.convo||[]).length);
    return `<article class="post">
      <div class="post-av" style="background:${a.av}">${a.name[0]}</div>
      <div class="post-body">
        <div class="post-head">
          <span class="post-name">${a.name}</span>${a.v?'<span class="verified">✓</span>':''}
          <span class="post-handle">${a.handle}</span>
          <span class="post-dot">·</span><span class="post-time">${item.time}</span>
        </div>
        <div class="post-bio">${a.bio}</div>
        <div class="post-text">${item.text.replace(/\n/g,'<br>')}</div>
        <div class="post-actions">
          <button class="pa" onclick="openFeedReply('${fid}',${i})">
            <span>💬</span> ${fmtNum(replyCount)}</button>
          <button class="pa" onclick="boostPost('${fid}',${i})"><span>🔁</span> ${fmtNum(r.rt+(item.boosted?1:0))}</button>
          <button class="pa like ${item.liked?'on':''}" onclick="likePost('${fid}',${i})">
            <span>${item.liked?'❤️':'🤍'}</span> ${fmtNum(r.likes+(item.liked?1:0))}</button>
        </div>
        ${convo?`<div class="argue-thread">${convo}</div>`:''}
        ${pend}
        ${composing}
        ${item.expanded&&thread?`<div class="thread">${thread}</div>`:''}
      </div>
    </article>`;
  }).join('')+`</div>`;
}
// interactions — the feed is live, not a photograph
function _feedItem(fid,i){const f=G._feeds&&G._feeds[fid];return f&&f[i];}
function likePost(fid,i){
  const it=_feedItem(fid,i);if(!it)return;
  it.liked=!it.liked;
  refreshFeed(fid);
}
function boostPost(fid,i){
  const it=_feedItem(fid,i);if(!it)return;
  if(it.boosted)return;
  it.boosted=true;it.reacts.rt+=1;
  refreshFeed(fid);
}
function toggleThread(fid,i){
  const it=_feedItem(fid,i);if(!it)return;
  it.expanded=!it.expanded;
  refreshFeed(fid);
}
// Re-render one feed in place, preserving its id so its buttons keep working.
function refreshFeed(fid){
  G._currentFeedId=fid;
  const host=document.getElementById(fid);
  const feed=G._feeds&&G._feeds[fid];
  if(!host||!feed)return;
  const tmp=document.createElement('div');
  if(fid==='social_feed'){
    tmp.innerHTML=renderSocialFeed(feed);
  }else{
    _feedSeq--;                     // reuse the same id
    tmp.innerHTML=renderMediaFeed(feed);
  }
  const fresh=tmp.firstElementChild;
  if(fresh){host.innerHTML=fresh.innerHTML;G._feeds[fid]=feed;}
}

// ============================================================
//  SOCIAL — a living, interactive account that persists across the save.
//  You post free text, gain followers, get likes and replies the game
//  generates for you, and receive notifications. Big moments (results,
//  a manager retiring, a wonderkid emerging) are announced here as a feed
//  that grows over your whole dynasty.
// ============================================================
function initSocial(){
  if(G.social)return;
  const nat=myNation();
  G.social={
    handle:'@you',
    followers: 500 + Math.round((nat?nat.factory:40)*40),   // a bigger nation = bigger platform
    posts: [],          // {id, text, time, year, likes, replies:[{who,text,likes}], liked, mine:true}
    feed: [],           // announcements + others' posts, newest first
    following: [],      // accounts you follow: {key, name, handle, av, v, kind:'nation'|'persona', iso?, factory?}
    notifications: [],  // {id, kind:'like'|'reply'|'follow', who, text, postId, read, year}
    seenNotif: 0,
    nextId: 1,
  };
}
function socialId(){return G.social.nextId++;}
// ============================================================
//  FOLLOWING — follow nations and personalities from search; their posts then appear
//  in your feed, auto-generated as your dynasty rolls forward.
// ============================================================
function isFollowing(key){initSocial();return (G.social.following||[]).some(f=>f.key===key);}
function toggleFollow(key,name,handle,av,v,kind,iso,factory){
  initSocial();
  G.social.following=G.social.following||[];
  const i=G.social.following.findIndex(f=>f.key===key);
  if(i>=0){G.social.following.splice(i,1);}
  else{
    G.social.following.push({key,name,handle,av,v:!!v,kind,iso,factory});
    // a welcome post from the account you just followed, so the follow feels immediate
    const post=makeFollowPost({key,name,handle,av,v,kind,iso,factory},true);
    if(post){G.social.feed=G.social.feed||[];G.social.feed.unshift(post);}
    G.social.notifications.unshift({id:socialId(),kind:'follow',who:{name,handle,av,v:!!v},text:'— you followed them',read:false,year:G.year});
  }
  // re-render whatever is showing
  if(G._screen==='screenSearch'&&document.getElementById('search-results')){const box=document.getElementById('search-input');runSearch(box?box.value:'');}
  else refreshCurrentFeed();
}
// A single auto-generated post in a followed account's voice.
function makeFollowPost(f,isWelcome){
  const yr=G.year;
  let text;
  if(f.kind==='nation'){
    const n=NATIONS.find(x=>x.name===f.name)||{factory:f.factory||55,name:f.name};
    const tier=tierOf(n.factory);
    const strong=n.factory>=77, mid=n.factory>=55;
    if(isWelcome)text=`Official ${f.name} account. Following the road to glory — up the ${NATION_TAGS[f.name]||'lads'}! 🇺🇳`.replace('🇺🇳','');
    else{
      const pool=[
        `Camp update: the squad is in good spirits ahead of a big ${yr}. ${strong?'Expectation is nothing less than the latter stages.':mid?'Quietly fancy a run this time.':'Every game is a chance to make history.'}`,
        `Throwback to some famous ${f.name} nights. The next generation want their own. 📺`,
        `Ticket news and travel details for ${yr} dropping soon. Stand by. 🎫`,
        `${strong?'Another year, another chance to add to the cabinet.':'Belief is building around this group.'} #${(f.name||'').replace(/\s/g,'')}`,
        `Youth report: some exciting names coming through the ${f.name} pipeline. The future looks bright. 🌱`,
      ];
      text=pick(pool);
    }
  }else{ // persona (pundit/journalist/scout style)
    if(isWelcome)text=`Thanks for the follow. Honest takes on the international game — no agenda, just football. 👇`;
    else{
      const pool=[
        `Hot take for ${yr}: the gap between the elite and the chasing pack is closing. Anyone can be beaten on their day.`,
        `Watching a lot of tournament football this cycle. A few unfancied sides are better than the bookies think.`,
        `The best story in the game right now is the nations punching above their weight. Long may it continue. ⚽`,
        `Reminder: form is temporary, a golden generation is forever. Some of these squads are special.`,
        `Scouting notes from ${yr}: keep an eye on the young forwards coming through. Real talent out there. 🔭`,
      ];
      text=pick(pool);
    }
  }
  return {
    id:'flw'+socialId(),
    who:{name:f.name,handle:f.handle,av:f.av,v:!!f.v,bio:f.kind==='nation'?'Official account':'Football voice'},
    text, year:yr, kind:'followed',
    reacts:{likes:Math.round(rnd(20,2000)),rt:Math.round(rnd(5,300)),replies:Math.round(rnd(2,120))},
    liked:false, boosted:false, convo:[], _followed:true
  };
}
// Each year, followed accounts post an update or two into your feed.
function generateFollowedPosts(){
  initSocial();
  const following=G.social.following||[];
  if(!following.length)return;
  following.forEach(f=>{
    if(Math.random()<0.7){   // most followed accounts post something each cycle
      const post=makeFollowPost(f,false);
      if(post)G.social.feed.unshift(post);
    }
  });
}
// followers grow with success and with posting; shrink a touch with failure
function bumpFollowers(delta){
  initSocial();
  G.social.followers=Math.max(50,Math.round(G.social.followers+delta));
}
function unreadNotifs(){initSocial();return G.social.notifications.filter(n=>!n.read).length;}

// The game speaks: push an announcement into the social feed (manager retires,
// wonderkid emerges, result, etc). These read like a verified account posting news.
function socialAnnounce(whoId, text, weight){
  initSocial();
  const who = whoId==='fan' ? fanPersona(myNation()) : persona(whoId);
  const e=engagement(weight||0.6);
  G.social.feed.unshift({
    id:socialId(), format:'post', who, text, time:'now', year:G.year,
    reacts:e, thread:buildThread(who.kind||'reporter',weight||0.6),
    liked:false, expanded:false, boosted:false, announce:true
  });
  // keep the feed from growing without bound
  if(G.social.feed.length>80)G.social.feed.length=80;
}
// A richer content post — carries a visual media block (spotlight card etc). Used for
// academy features, retirements, achievements: the kind of content the feed circles
// around between ads.
function socialPost({who, text, media, weight, kind}){
  initSocial();
  const p = typeof who==='string' ? (who==='fan'?fanPersona(myNation()):persona(who)) : who;
  G.social.feed.unshift({
    id:socialId(), format:'post', who:p, text, media, kind, time:'now', year:G.year,
    reacts:engagement(weight||0.6), thread:[], convo:[],
    liked:false, expanded:false, boosted:false, announce:true
  });
  if(G.social.feed.length>80)G.social.feed.length=80;
}

function positionName(pos){return {GK:'goalkeeper',CB:'centre-back',RB:'right-back',LB:'left-back',RWB:'wing-back',LWB:'wing-back',CDM:'defensive midfielder',CM:'midfielder',CAM:'attacking midfielder',RM:'winger',LM:'winger',AM:'playmaker',RW:'winger',LW:'winger',ST:'striker',CF:'forward'}[pos]||'player';}

// You post. The world reacts over the following moments: likes tick up, a few
// replies arrive, and you gain (or occasionally lose) followers.
function postToSocial(text){
  initSocial();
  text=(text||'').trim();
  if(!text)return;
  if(text.length>280)text=text.slice(0,280);
  const post={id:socialId(), text, time:'now', year:G.year, likes:0, replies:[], liked:false, mine:true, _pending:false};
  G.social.posts.unshift(post);
  // seed the reaction: how much the world engages depends on your following + luck
  const reach = Math.min(1, 0.2 + G.social.followers/40000 + Math.random()*0.5);
  const baseLikes = Math.round(reach * (G.social.followers*0.02) * (0.5+Math.random()));
  post.likes = Math.max(1, baseLikes);
  // how many replies this post will get
  const nReplies = Math.random()<0.78 ? 1+Math.floor(Math.random()*3) : 0;
  // pick the accounts who will reply (mix of fans + named pundits)
  const repliers=[];
  for(let i=0;i<nReplies;i++){
    repliers.push(Math.random()<0.55 ? fanPersona(myNation()) : pick(PERSONAS));
  }
  // 1) seed instant synthetic replies so the feed is never empty or laggy
  repliers.forEach(who=>{
    post.replies.push({id:socialId(), who, text: socialReplyText(text), likes: Math.round(Math.random()*post.likes*0.4), _synthetic:true, thread:[]});
    G.social.notifications.unshift({id:socialId(),kind:'reply',who,text:'replied to your post',postId:post.id,read:false,year:G.year});
  });
  // some notable accounts "like" it → notifications
  const likers = Math.random()<0.6 ? 1+Math.floor(Math.random()*2) : 0;
  for(let i=0;i<likers;i++){
    const who=pick(PERSONAS);
    G.social.notifications.unshift({id:socialId(),kind:'like',who,text:'liked your post',postId:post.id,read:false,year:G.year});
  }
  // followers respond to activity
  const fGain = Math.round(reach * (5 + Math.random()*40));
  bumpFollowers(fGain);
  if(fGain>0)G.social.notifications.unshift({id:socialId(),kind:'follow',who:{name:fGain+' new followers',handle:'',av:'#26d5e0',v:false},text:'started following you',read:false,year:G.year});
  // 2) upgrade to AI-written, context-aware replies in the background (best-effort).
  //    If the API is unavailable, the synthetic replies simply remain.
  if(repliers.length)fetchAIReplies(post, repliers);
  screenSocial('posts');
}
// Ask the in-app model to write short, in-character replies that actually respond to
// what the player wrote. Best-effort and fully async: the synthetic replies are already
// shown, and we swap in the AI ones when (if) they arrive.
async function fetchAIReplies(post, repliers){
  try{
    post._pending=true;
    const nat=myNation();
    const ctx=[
      `You are generating short social-media replies to a football manager's post in a football management game.`,
      `The manager runs the ${nat?nat.name:'national'} team, currently in the year ${G.year}.`,
      `Their post reads: "${post.text}"`,
      ``,
      `Write ONE reply from each of these accounts, in their voice, reacting SPECIFICALLY to what the post says:`,
      ...repliers.map((w,i)=>`${i+1}. ${w.name} (${w.handle}) — ${w.bio||'a football fan'}`),
      ``,
      `Rules: each reply under 140 characters, casual social-media tone, football-literate, may use 1 emoji max, no hashtags unless natural, do not repeat the post back verbatim. Some can agree, some can be sceptical or funny.`,
      `Respond with ONLY a JSON array of strings, one reply per account in order, nothing else.`
    ].join('\n');
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:ctx}]
      })
    });    if(!res.ok)throw new Error('api '+res.status);
    const data=await res.json();
    let out=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim();
    out=out.replace(/```json/gi,'').replace(/```/g,'').trim();
    let arr;
    try{arr=JSON.parse(out);}catch(e){
      // try to salvage a bracketed array from the text
      const m=out.match(/\[[\s\S]*\]/);arr=m?JSON.parse(m[0]):null;
    }
    if(!Array.isArray(arr)||!arr.length)throw new Error('bad shape');
    // swap the synthetic replies for the AI ones (same accounts, same order)
    post.replies=post.replies.map((r,i)=>{
      const aiText=typeof arr[i]==='string'?arr[i]:(arr[i]&&arr[i].text);
      if(aiText)return {...r, text:String(aiText).slice(0,180), _synthetic:false, _ai:true};
      return r;
    });
    post._pending=false;
    // re-render if the player is still looking at a social screen
    if(G._screen==='screenSocial'){
      screenSocial(G._socialTab||'posts');
    }
  }catch(e){
    // API unavailable or failed — keep the synthetic replies silently
    post._pending=false;
  }
}
// context-flavoured auto-replies to whatever the player wrote (instant fallback)
function socialReplyText(playerText){
  const nat=myNation();const N=nat?nat.name:'we';
  const generic=[
    'This aged well 😅','Bookmarking this','Facts.','Hard disagree but respect it',
    'The manager needs to see this','Say it louder for the ones at the back',
    `${N} till I die 🏴`,'Ratio incoming','W take','L take tbh','Been saying this for years',
    'Optimism in these parts? Rare.','Screenshotting for later','This is the one 🙏',
    'Overrated take','Underrated take','We move.','Nervous about this one not gonna lie',
  ];
  return pick(generic);
}

// ============================================================================
//  SHAREABLE ACHIEVEMENT CARD (Alpha 4.9) — a themed, generated image players can post
//  to social media. The whole point is virality with no ad budget: the card travels
//  outside the game carrying the domain, so anyone who sees it knows where to play.
//  Brag-first: it leads with the single most impressive TRUE thing right now.
// ============================================================================
const SHARE_DOMAIN = 'goldengeneration.app';   // printed on the card + used in share text

// Pick the headline — the flex. Most impressive true statement, in priority order.
function shareHeadline(){
  const nat=myNation()||{}; const st=G.stats||{};
  const rank=myRank();
  const wc=(st.wcTitles||0), titles=(st.titles||0);
  if(G.lastResult==='champions' && G._lastCompWasWC) return {big:'WORLD CHAMPIONS', sub:'Champions of the world', emoji:'🏆'};
  if(wc>=2) return {big:wc+'× WORLD CHAMPIONS', sub:'A dynasty of champions', emoji:'🏆'};
  if(wc===1) return {big:'WORLD CHAMPIONS', sub:'Champions of the world', emoji:'🏆'};
  if(G.lastResult==='champions') return {big:'TOURNAMENT CHAMPIONS', sub:'Continental kings', emoji:'🏆'};
  if(G.lastResult==='final') return {big:'TOURNAMENT FINALISTS', sub:'So close to glory', emoji:'🥈'};
  if(rank===1) return {big:'WORLD NUMBER ONE', sub:'Top of the global rankings', emoji:'👑'};
  if(rank&&rank<=3) return {big:'WORLD TOP '+rank, sub:'Among the world\u2019s elite', emoji:'🌍'};
  if(titles>=1) return {big:titles+' MAJOR TITLE'+(titles>1?'S':''), sub:'A trophy-laden reign', emoji:'🏆'};
  if(rank&&rank<=10) return {big:'WORLD TOP '+rank, sub:'Climbing the global order', emoji:'📈'};
  const yrs=(G.year||2025)-2025;
  if(yrs>=1) return {big:yrs+'-YEAR DYNASTY', sub:'Building something special', emoji:'⚽'};
  return {big:'A NEW DYNASTY', sub:'The journey begins', emoji:'⚽'};
}
function shareStats(){
  const nat=myNation()||{}; const st=G.stats||{};
  const squad=(G.squad||[]).filter(p=>!p.injured);
  const ovr = squad.length ? Math.round(squad.slice().sort((a,b)=>b.rating-a.rating).slice(0,11).reduce((s,p)=>s+p.rating,0)/Math.min(11,squad.length)) : null;
  const top = squad.length ? squad.slice().sort((a,b)=>b.rating-a.rating)[0] : null;
  const rank=myRank();
  // Richer payload (Alpha 8.0) — the card was showing a fraction of the story.
  const years=(G.year||2025)-2025;
  const wcT=(st.wcTitles||0);
  return {
    rank, ovr,
    topName: top?top.name:null, topRating: top?top.rating:null, topPos: top?top.pos:null,
    mgrName: G.manager?G.manager.name:null, mgrRating: G.manager?G.manager.rating:null,
    mgrStyle: G.manager?styleLabelOf(G.manager.style):null,
    titles:(st.titles||0), wcTitles:wcT, year:G.year, nation:nat.name, iso:nat.iso,
    factory:nat.factory, stars:(typeof tierStars==='function'?tierStars(nat.factory):''),
    years, played:(st.played||0), wins:(st.wins||0), draws:(st.draws||0), losses:(st.losses||0),
    winPct: st.played?Math.round((st.wins||0)/st.played*100):null,
    bestStreak:(st.bestStreak||0),
    mode:(typeof assistModeLabel==='function'?assistModeLabel():null),
    acadFocus:(G.acadFocus&&G.acadFocus.focus)?styleLabelOf(G.acadFocus.focus):null
  };
}

// Draw the card onto a canvas and return a Blob (PNG). Themed to the nation's accent.
// Pass ov={h,s} to render a SPECIFIC stamped card (a trophy from the cabinet) instead
// of the live dynasty state. (Alpha 6.8)
async function renderShareCanvas(ov){
  const h=(ov&&ov.h)||shareHeadline(), s=(ov&&ov.s)||shareStats();
  const W=1080, H=1080;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  // read the live theme accent so the card matches the player's nation reskin
  const cs=getComputedStyle(document.documentElement);
  const accent=(cs.getPropertyValue('--accent')||'#26d5e0').trim()||'#26d5e0';
  const ink=(cs.getPropertyValue('--accent-ink')||'#04222a').trim()||'#04222a';
  // background: deep gradient
  const g=x.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#0a0f1c'); g.addColorStop(1,'#131d33');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  // accent glow top strip
  const gg=x.createLinearGradient(0,0,W,0); gg.addColorStop(0,accent); gg.addColorStop(1,'transparent');
  x.globalAlpha=0.18; x.fillStyle=gg; x.fillRect(0,0,W,300); x.globalAlpha=1;
  x.fillStyle=accent; x.fillRect(0,0,W,10);
  const cx=W/2;
  // game title
  x.textAlign='center'; x.fillStyle=accent;
  x.font='800 34px "Barlow Condensed",sans-serif';
  x.fillText('GOLDEN GENERATION', cx, 90);
  // emoji + headline
  x.font='120px sans-serif'; x.fillText(h.emoji, cx, 250);
  x.fillStyle='#fff'; x.font='900 92px "Barlow Condensed",sans-serif';
  wrapText(x, h.big.toUpperCase(), cx, 370, W-120, 88);
  x.fillStyle=accent; x.font='600 40px "Barlow Condensed",sans-serif';
  x.fillText(h.sub, cx, 470);
  // nation + year (flag drawn async below)
  x.fillStyle='#fff'; x.font='800 68px "Barlow Condensed",sans-serif';
  x.fillText((s.nation||'').toUpperCase()+'  ·  '+s.year, cx, 600);
  // hero stat tiles
  const tiles=[];
  if(s.rank)   tiles.push(['WORLD RANK','#'+s.rank]);
  if(s.ovr)    tiles.push(['SQUAD OVR', String(s.ovr)]);
  if(s.titles) tiles.push(['TITLES', String(s.titles)]);
  if(s.mgrRating) tiles.push(['MANAGER', String(s.mgrRating)]);
  const n=Math.min(4,tiles.length); const tw=210, gap=24; const startX=cx-((n*tw+(n-1)*gap)/2)+tw/2;
  tiles.slice(0,4).forEach((t,i)=>{
    const tx=startX+i*(tw+gap);
    x.fillStyle='rgba(255,255,255,.06)'; roundRect(x,tx-tw/2,680,tw,150,16); x.fill();
    x.fillStyle=accent; x.font='900 64px "Barlow Condensed",sans-serif'; x.textAlign='center';
    x.fillText(t[1], tx, 760);
    x.fillStyle='rgba(255,255,255,.6)'; x.font='700 22px "Barlow Condensed",sans-serif';
    x.fillText(t[0], tx, 800);
  });
  // tier stars under the nation
  if(s.stars){
    x.fillStyle='#f5c542'; x.font='600 36px "Barlow Condensed",sans-serif'; x.textAlign='center';
    x.fillText(s.stars, cx, 648);
  }
  // the dynasty in one line: record, years, streak (Alpha 8.0)
  const recBits=[];
  if(s.years)   recBits.push(s.years+' yr'+(s.years===1?'':'s')+' in charge');
  if(s.played)  recBits.push(s.wins+'W-'+s.draws+'D-'+s.losses+'L'+(s.winPct!=null?' ('+s.winPct+'%)':''));
  if(s.bestStreak>2) recBits.push('best run '+s.bestStreak);
  if(recBits.length){
    x.fillStyle='rgba(255,255,255,.62)'; x.font='600 27px "Barlow Condensed",sans-serif'; x.textAlign='center';
    x.fillText(recBits.join('   ·   '), cx, 872);
  }
  // star player line
  if(s.topName){
    x.fillStyle='#fff'; x.font='700 40px "Barlow Condensed",sans-serif'; x.textAlign='center';
    x.fillText('⭐ '+s.topName+'  '+s.topRating, cx, 920);
    x.fillStyle='rgba(255,255,255,.5)'; x.font='600 26px "Barlow Condensed",sans-serif';
    x.fillText('Star '+(s.topPos||'player'), cx, 958);
  }
  // footer CTA
  x.fillStyle=accent; roundRect(x,cx-300,1000,600,60,30); x.fill();
  x.fillStyle=ink; x.font='800 34px "Barlow Condensed",sans-serif';
  const footBits=[];
  if(s.mgrName)  footBits.push('🧑‍💼 '+s.mgrName+(s.mgrRating?' ('+s.mgrRating+')':'')+(s.mgrStyle?' · '+s.mgrStyle:''));
  if(s.acadFocus)footBits.push('🎓 '+s.acadFocus+' academy');
  if(s.mode)     footBits.push(s.mode==='Simulated'?'🤝 Simulated':'🎮 Fully Manual');
  if(footBits.length){
    x.fillStyle='rgba(255,255,255,.55)'; x.font='600 25px "Barlow Condensed",sans-serif'; x.textAlign='center';
    x.fillText(footBits.join('   ·   '), cx, 998);
  }
  x.fillText('PLAY FREE · '+SHARE_DOMAIN, cx, 1040);
  // NB: we deliberately don't draw the external flag onto the canvas — loading a cross-origin
  // image can "taint" the canvas and make toBlob() throw, killing the whole export. The nation
  // name + accent theming already identify the country. The in-page preview card shows the flag.
  return await new Promise(res=>cv.toBlob(res,'image/png'));
}
function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}
function wrapText(x,text,cx,y,maxW,lh){
  const words=text.split(' '); let line=''; const lines=[];
  words.forEach(w=>{ const test=line?line+' '+w:w; if(x.measureText(test).width>maxW && line){lines.push(line);line=w;} else line=test; });
  if(line)lines.push(line);
  const startY=y-((lines.length-1)*lh)/2;
  lines.forEach((l,i)=>x.fillText(l,cx,startY+i*lh));
}
function drawFlag(x,iso,X,Y,w,h){
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ try{x.drawImage(img,X,Y,w,h);}catch(e){} res(); };
    img.onerror=rej;
    img.src=FLAG+iso+'.svg';
  });
}
// Build the image and hand it to the native share sheet (falls back to download).
async function shareAchievement(){
  G._toast='Building your card…'; 
  try{
    const blob=await renderShareCanvas();
    if(!blob)throw new Error('no image');
    const file=new File([blob],'golden-generation.png',{type:'image/png'});
    const h=shareHeadline(); const nat=myNation()||{};
    const st=shareStats();
    const bits=[];
    if(st.stars)  bits.push(st.stars);
    if(st.rank)   bits.push('World #'+st.rank);
    if(st.ovr)    bits.push('Squad '+st.ovr);
    if(st.titles) bits.push(st.titles+' title'+(st.titles===1?'':'s')+(st.wcTitles?' ('+st.wcTitles+' WC)':''));
    if(st.years)  bits.push(st.years+' yrs in charge');
    if(st.mode)   bits.push(st.mode);
    const text=`${nat.name} — ${h.big}!\n${bits.join(' · ')}\nMy Golden Generation dynasty. Play free at ${SHARE_DOMAIN}`;
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text});
      G._toast='Shared! 🎉';
    }else{
      // fallback: download the image so they can post it manually
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='golden-generation.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
      G._toast='Card saved to your photos — post it anywhere!';
    }
  }catch(e){ console.warn('share failed',e); G._toast='Could not build the card — try again'; }
  if(G._screen==='screenSocial')screenSocial(G._socialTab);
}

// You reply to a feed post (world feed OR post-qualification reaction feed); the poster

function sendFeedReply(fid,i){
  const it=_feedItem(fid,i);if(!it)return;
  const el=document.getElementById('feedreply-'+it.id);
  const text=(el&&el.value||'').trim();if(!text)return;
  it.convo=it.convo||[];
  it.convo.push({side:'me',text:text.slice(0,240),likes:Math.round(Math.random()*6)});
  G._replyingToFeed=null;
  // reply back most of the time; the chance eases off as a thread drags on but never
  // dies out completely, so a back-and-forth stays alive as long as you keep engaging.
  const rounds=it.convo.filter(m=>m.side!=='me').length;
  if(Math.random()<Math.max(0.55,0.92-rounds*0.12)){
    it._pending=true;
    const backMsg={side:'them',who:it.who,text:pettyReplyText(),likes:Math.round(Math.random()*18),_synthetic:true};
    it.convo.push(backMsg);
    try{if(G.social&&G.social.notifications)G.social.notifications.unshift({id:socialId(),kind:'reply',who:it.who,text:'replied to you',read:false,year:G.year});}catch(_){}

// AI-upgrade a feed reply so it reads the conversation and responds in character.
async function fetchFeedReply(item,targetMsg,fid){
  try{
    item._pending=true;
    const nat=myNation();
    const history=(item.convo||[]).map(m=>(m.side==='me'?`You (${nat?nat.name:'manager'}): "${m.text}"`:`${item.who.name}: "${m.text}"`)).join('\n');
    const ctx=[
      `You are ${item.who.name} (${item.who.handle}), ${item.who.bio||'a football account'}, replying to the ${nat?nat.name:'national team'} manager in a football management game. Year ${G.year}.`,
      `Your original post was: "${item.text}"`,
      `The conversation so far:\n${history}`,
      `Write your next reply in character — under 130 characters, casual, football-literate, cheeky not cruel, max 1 emoji. Respond ONLY with the reply text.`
    ].join('\n');
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:ctx}]})});
    if(!res.ok)throw new Error('api');
    const data=await res.json();
    let out=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim().replace(/^["']|["']$/g,'').replace(/```/g,'');
    if(out&&targetMsg){targetMsg.text=out.slice(0,200);targetMsg._synthetic=false;targetMsg._ai=true;}
    item._pending=false;
    if(fid&&fid!=='social_feed'){try{refreshFeed(fid);}catch(_){}}
    else if(G._screen==='screenSocial')screenSocial(G._socialTab||'feed');
    else refreshFeed('social_feed');
  }catch(e){item._pending=false;try{refreshFeed(fid||'social_feed');}catch(_){}}
}

    }).join('');

    const composing = (G._replyingTo===rp.id) ? `

  const open = p._open!==false;
  const pending = p._pending ? `<div class="reply-pending">✨ more replies coming in…</div>` : '';
  const replyCount=(p.replies||[]).reduce((n,r)=>n+1+((r.thread||[]).length),0);
  return `<article class="post mine">
    <div class="post-av" style="background:var(--accent);color:var(--accent-ink)">${nat?nat.iso.slice(0,2).toUpperCase():'You'}</div>

      </div>
      ${open?`<div class="thread">${replies||'<div class="reply-empty">No replies yet.</div>'}${pending}</div>`:''}

// you fire back at a fan; they (usually) fire back at you, and it can escalate
function sendClapback(postId,replyId){
  const post=G.social.posts.find(p=>p.id===postId);if(!post)return;
  const rp=(post.replies||[]).find(r=>r.id===replyId);if(!rp)return;
  const el=document.getElementById('argue-input-'+replyId);
  const text=(el&&el.value||'').trim();
  if(!text)return;
  rp.thread=rp.thread||[];
  rp.thread.push({side:'me', text: text.slice(0,240), likes: Math.round(Math.random()*8)});
  G._replyingTo=null;
  // does the fan clap back? the longer the argument, the more likely they bow out
  const rounds=rp.thread.filter(m=>m.side!=='me').length;
  const clapBackChance = Math.max(0.25, 0.9 - rounds*0.18);
  if(Math.random()<clapBackChance){
    // instant placeholder, then AI upgrade
    rp._pending=true;
    const themMsg={side:'them', text: pettyReplyText(), likes: Math.round(Math.random()*20), _synthetic:true};
    rp.thread.push(themMsg);
    G.social.notifications.unshift({id:socialId(),kind:'reply',who:rp.who,text:'replied to you',postId:post.id,read:false,year:G.year});
    fetchArgumentReply(post, rp, themMsg);
  }
  screenSocial('posts');
  setTimeout(()=>{const t=document.querySelector('.post.mine .thread');},20);
}

// AI-generated escalating clapback that reads the whole argument so far
async function fetchArgumentReply(post, rp, targetMsg){
  try{
    rp._pending=true;
    const nat=myNation();
    const history=(rp.thread||[]).map(m=> (m.side==='me'?`Manager (${nat?nat.name:'you'}): "${m.text}"`:`${rp.who.name}: "${m.text}"`)).join('\n');
    const ctx=[
      `You are ${rp.who.name} (${rp.who.handle}), ${rp.who.bio||'a passionate football fan'}, arguing with the ${nat?nat.name:'national team'} manager in the replies of a football management game. The year is ${G.year}.`,
      `The manager's original post was: "${post.text}"`,
      `Your first reply was: "${rp.text}"`,
      `The argument so far:\n${history}`,
      ``,
      `Write your next reply — a petty, funny, competitive comeback that directly responds to the manager's last message. Stay in character. Keep it under 130 characters, casual social-media banter, cheeky not cruel, 1 emoji max. It's playful football rivalry, never genuinely nasty.`,
      `Respond with ONLY the reply text, nothing else — no quotes, no name prefix.`
    ].join('\n');
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:ctx}]})
    });
    if(!res.ok)throw new Error('api '+res.status);
    const data=await res.json();
    let out=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim();
    out=out.replace(/^["']|["']$/g,'').replace(/```/g,'').trim();
    if(out && targetMsg){targetMsg.text=out.slice(0,200);targetMsg._synthetic=false;targetMsg._ai=true;}
    rp._pending=false;
    if(G._screen==='screenSocial')screenSocial(G._socialTab||'posts');
  }catch(e){ rp._pending=false; if(G._screen==='screenSocial')screenSocial(G._socialTab||'posts'); }
}

// ============================================================
//  RISK 1 — STATE INTEGRITY
//  A single mutable global mutated from 200+ functions is how
//  every serious bug in this project happened. We can't rewrite
//  that safely, but we CAN make illegal states announce themselves.
// ============================================================
const DEV_ASSERTS = true;   // flip off to silence in production

// Legal (stage, tournamentActive) combinations. Anything else is a bug.
const LEGAL_STAGES=[null,'qual','group','ko','playoff'];
function checkInvariants(where){
  if(!DEV_ASSERTS)return;
  const problems=[];
  if(G.natId && !myNation())problems.push('natId not in NATIONS: '+G.natId);
  if(!LEGAL_STAGES.includes(G.stage??null))problems.push('illegal stage: '+G.stage);
  if(G.tournamentActive && !G.stage)problems.push('tournament active with no stage');
  if(!G.tournamentActive && G.stage)problems.push('stage "'+G.stage+'" set but tournament inactive');
  if(G.stage==='group'&&(!G.group||!G.matchdays))problems.push('group stage without a group');
  if(G.stage==='ko'&&!G.koRounds)problems.push('knockout stage without rounds');
  if(G.stage==='qual'&&!G.qualGroup)problems.push('qualifying without a group');
  if(G.squad&&G.squad.length>23)problems.push('squad of '+G.squad.length);
  if(G.pool&&G.pool.length>POOL_TARGET+25)problems.push('pool of '+G.pool.length);
  if(G.year<2025||G.year>2525)problems.push('year out of range: '+G.year);
  if(problems.length){
    const msg='[STATE] after '+where+': '+problems.join(' · ');
    console.error(msg);
    G._stateErrors=(G._stateErrors||[]).concat({where,problems,year:G.year});
  }
  return problems.length===0;
}
// Wrap the lifecycle mutations so they can't be set incoherently.
function setStage(stage,active){
  if(!LEGAL_STAGES.includes(stage))throw new Error('illegal stage: '+stage);
  G.stage=stage;
  G.tournamentActive=(active!==undefined)?active:(stage!==null);
  if(!G.tournamentActive)G.stage=null;
  checkInvariants('setStage('+stage+')');
}
function endTournament(){
  // ONE place that closes a tournament, so it always closes fully.
  G.tournamentActive=false;G.stage=null;
  G._afterMatch=null;                 // no stale continuation may survive
  checkInvariants('endTournament');
}

// ============================================================
//  RISK 2 — CALLBACK HYGIENE
//  Functions parked on global state can fire against a world
//  that has moved on. Stamp them with the year+stage they were
//  created in, and refuse to run them if that has changed.
// ============================================================
function stamped(fn){
  const yr=G.year, st=G.stage, nat=G.natId;
  const wrapped=function(){
    if(G.year!==yr||G.stage!==st||G.natId!==nat){
      if(DEV_ASSERTS)console.warn('[CALLBACK] refused stale continuation from',nat,yr,st,'→ now',G.natId,G.year,G.stage);
      return;
    }
    return fn.apply(this,arguments);
  };
  wrapped._stamp={yr,st,nat};
  return wrapped;
}
function clearContinuations(){
  G._afterMatch=null;G._reviewReturn=null;G._afterReview=null;
}

// ============================================================
//  RISK 3 — SCREEN MODEL
//  28 screens with no notion of "where am I". Track it, validate
//  transitions, and give every screen a safe fallback.
// ============================================================
const SCREEN_REQUIRES={
  screenSquad:g=>!!g.natId&&!!g.pool,
  screenManager:g=>!!g.natId&&!!g.squad,
  screenTactics:g=>!!g.manager,
  screenGroupHub:g=>g.stage==='group'&&!!g.group,
  screenKnockoutHub:g=>g.stage==='ko'&&!!g.koRounds,
  screenQualHub:g=>g.stage==='qual'&&!!g.qualGroup,
  screenPlayoffDraw:g=>!!g.qualGroup,
  screenPreTournament:g=>!!g.natId&&Array.isArray(g.squad)&&g.squad.length>0,
  screenAchievements:g=>!!g.stats,
  screenHistory:g=>!!g.natId,
};
function safeScreen(name,fn){
  return function(){
    const req=SCREEN_REQUIRES[name];
    if(req&&!req(G)){
      if(DEV_ASSERTS)console.warn('[SCREEN] '+name+' called with invalid state — falling back');
      return fallbackScreen();
    }
    G._screen=name;
    const r=fn.apply(this,arguments);
    checkInvariants(name);
    return r;
  };
}
// Where do we land when a screen refuses to render?
function fallbackScreen(){
  if(!G.natId)return screenTitle();
  if(G.tournamentActive&&G.stage==='ko')return screenKnockoutHub();
  if(G.tournamentActive&&G.stage==='group')return screenGroupHub();
  if(G.tournamentActive&&G.stage==='qual')return screenQualHub();
  if(G.squad&&G.squad.length)return screenSquad();
  return screenTitle();
}
// A visible diagnostic, so problems surface instead of silently corrupting a save.
function stateReport(){
  const errs=G._stateErrors||[];
  if(!errs.length)return '';
  return `<div class="notecard" style="border-left:3px solid var(--red)">
    <b>⚠ ${errs.length} state warning${errs.length===1?'':'s'}</b> — please report.
    <div style="font-size:11px;color:var(--dim2);margin-top:6px">${errs.slice(-3).map(e=>e.where+': '+e.problems[0]).join('<br>')}</div>
  </div>`;
}

// ============================================================
//  SAVE SYSTEM — persist a dynasty across sessions
//  Artifacts can't use localStorage, so we persist via the
//  storage API when present, and fall back to an in-memory
//  slot + downloadable save file otherwise.
// ============================================================
const SAVE_SLOTS=3;
let MEM_SAVES={};   // fallback when no persistent storage exists

// which parts of G form a save? (skip transient render state)
const SAVE_KEYS=['natId','year','pool','squad','tactics','manager','history','stats','careers','rivalries','mgrMarketLean','youthEra','eraLeft','sinceGolden','goldenEra','goldenEraStarted','goldenEraEnded',
  'winners','hallOfFame','qualifiedFor','qualified','mgrShortlist','mgrShortlistYear','_mgrDeclineCount',
  'scorers','field','fieldYear','host','tournamentActive','stage','hubTab',
  'group','matchdays','matchday','otherResults','koBracket','koRounds','koIdx','koOpp','koResults','groupOppNames','otherGroups','thirdFmt',
  'qualGroup','qualRound','qualResults','qualPot','qualPots','qualPos','qualAutoSpots',
  'playoffRival','playoffDone','playoffOutcome','playoffLeg','playoffLegs',
  'moraleMod','_gradedYear','_qualGradedYear','social','academy','hostHistory','_adClicks','squadTrend',
  'ranking','rivalMgrs','mgrContractYears','mgrContractYearsLeft','finance','budgetBonus','pendingOffer','poachedManager',
  // Alpha 3.0 — Immersive Stats subsystem
  'tournamentStats','records','h2h','formGuide','rivalPools','matchLog','nationRecent',
  '_qualTables','_qualTablesYear','_worldFormYear','_rankCapped','_facReseed48b',
  'desk'];

// Opponent squads are lazily generated and cached on each team as `_squad`.
// They are fully regenerable from the nation's factory rating, and serialising
// them bloated a save from ~15KB to over 500KB. Strip them.
function stripCaches(v){
  if(Array.isArray(v))return v.map(stripCaches);
  if(v&&typeof v==='object'){
    const o={};
    for(const k in v){if(k==='_squad')continue;o[k]=stripCaches(v[k]);}
    return o;
  }
  return v;
}
function serialiseSave(){
  const out={};
  SAVE_KEYS.forEach(k=>{if(G[k]!==undefined)out[k]=stripCaches(G[k]);});
  const nat=myNation();
  return {
    v:20,
    savedAt:new Date().toISOString(),
    meta:{
      nation:nat?nat.name:'—', iso:nat?nat.iso:'un',
      year:G.year,
      titles:(G.stats&&G.stats.titles)||0,
      years:(G.year||2025)-2025,
      manager:G.manager?G.manager.name:null,
    },
    data:out,
  };
}
function applySave(save){
  if(!save||!save.data)return false;
  // wipe current dynasty first
  SAVE_KEYS.forEach(k=>{delete G[k];});
  Object.entries(save.data).forEach(([k,v])=>{G[k]=v;});
  // rebuild anything transient
  G.mediaFeed=null;G.newAchievements=null;G._reviewReturn=null;
  // CORE 4 MIGRATION (Alpha 7.1): saves made under the old six styles carry dead keys
  // (tiki/highpress/wingplay/counter). Fold them onto the four families.
  try{
    (G.pool||[]).forEach(p=>{if(p&&p.style)p.style=normStyle(p.style);});
    (G.squad||[]).forEach(p=>{if(p&&p.style)p.style=normStyle(p.style);});
    if(G.manager&&G.manager.style){
      G.manager.style=normStyle(G.manager.style);
      const ms=MGR_STYLES.find(s=>s.key===G.manager.style);
      if(ms)G.manager.styleLabel=ms.label;
    }
    if(G.tactics&&G.tactics.style)G.tactics.style=normStyle(G.tactics.style);
  }catch(e){}
  // Saves made before the trend feature have no history — seed it from the current year
  // so the graph has a starting point going forward.
  if(!Array.isArray(G.squadTrend)||!G.squadTrend.length){G.squadTrend=[];try{recordSquadTrend();}catch(e){}}
  return true;
}
async function storageAvailable(){
  return !!(typeof window!=='undefined' && window.storage && window.storage.set);
}
async function writeSlot(i,save){
  try{
    if(await storageAvailable()){
      await window.storage.set('gg_save_'+i, JSON.stringify(save));
      return true;
    }
  }catch(e){/* fall through */}
  MEM_SAVES[i]=save;return true;
}
async function readSlot(i){
  try{
    if(await storageAvailable()){
      const r=await window.storage.get('gg_save_'+i);
      if(r&&r.value)return JSON.parse(r.value);
      return null;
    }
  }catch(e){/* fall through */}
  return MEM_SAVES[i]||null;
}
async function clearSlot(i){
  try{
    if(await storageAvailable()){await window.storage.delete('gg_save_'+i);}
  }catch(e){}
  delete MEM_SAVES[i];
}
async function saveTo(i){
  const ok=await writeSlot(i,serialiseSave());
  G._toast = ok==='no-auth' ? 'Sign in (top-right) to save your dynasty to the cloud.'
           : ok===true      ? 'Saved to slot '+(i+1)+' ✓'
           : 'Save failed — cloud error'+(window._lastCloudError?' ('+window._lastCloudError+')':'');
  screenSaves();
}
async function loadFrom(i){
  const sv=await readSlot(i);
  if(!sv){G._toast='Slot '+(i+1)+' is empty';return screenSaves();}
  applySave(sv);
  G._toast=null;
  // land on a sensible screen for the restored state (resumes a live tournament rather
  // than restarting it — see resumeGame)
  G.squad=G.squad&&G.squad.length?G.squad:[];
  return resumeGame();
}
// export/import: a save you can keep forever
function exportSave(){
  const json=JSON.stringify(serialiseSave());
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  const nat=myNation();
  a.href=URL.createObjectURL(blob);
  a.download=`golden-generation-${(nat?nat.name:'save').replace(/\s+/g,'-').toLowerCase()}-${G.year}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  G._toast='Save file downloaded';screenSaves();
}
function importSave(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      try{
        const sv=JSON.parse(ev.target.result);
        if(!sv.data||!sv.meta)throw new Error('Not a Golden Generation save');
        applySave(sv);
        G._toast=null;
        resumeGame();
      }catch(err){G._toast='Could not read that save file';screenSaves();}
    };
    rd.readAsText(file);
  };
  inp.click();
}
async function screenSaves(){applyTheme(G.natId?'comp':'home');

      <div class="btnrow" style="margin-top:22px"><button class="btn ghost" onclick="G._toast=null;${inGame?'resumeGame()':'screenTitle()'}">← Back</button></div>
    </div>`);
  }

  const slots=[];
  for(let i=0;i<SAVE_SLOTS;i++)slots.push(await readSlot(i));
  const cards=slots.map((sv,i)=>{

    return `<div class="saveslot">
      <div class="ss-num">${i+1}</div>
      ${flag(m.iso,'ss-flag')}

        <div class="ss-title">${shortNat(m.nation)}</div>
        <div class="ss-meta">${m.year} · ${m.years} yr${m.years===1?'':'s'} · ${m.titles} title${m.titles===1?'':'s'}${m.manager?' · '+m.manager.split(' ').slice(-1)[0]:''}</div>
        <div class="ss-when">Saved ${when}</div>
      </div>
      <div class="ss-actions">
        <button class="btn sm gold" onclick="loadFrom(${i})">Load</button>
        ${inGame?`<button class="btn sm ghost" onclick="confirmOverwrite(${i})">Overwrite</button>`:''}
        <button class="btn sm ghost" onclick="confirmDeleteSlot(${i})">Delete</button>
      </div></div>`;
  }).join('');
  go((inGame?statusBar():'')+`<div class="wrap">
    <div class="sechead" style="margin-top:18px"><span class="bar"></span><h2>Saves</h2>

// ============================================================
//  THE DESK — the secretary's notes
//  The player is the FA Director. They are not lectured by their own institution;
//  a secretary brings them what has landed and notes what it means. The voice is a
//  register, not a character: dry, declarative, never awed, and honest that its
//  information is incomplete (the game hides ratings — the desk must not pretend
//  to be an oracle). Notes NEVER interrupt: firing a note only lights the dot on
//  the nav button. If the Director never taps it, they are never taught. That is
//  a legitimate choice in a game about consequence.
//  Secretaries retire every 10-30 years. That is a marker of time passing and
//  nothing else — no mechanical effect, no change in voice or help.
// ============================================================
const DESK_NAMES=['Enfield','Marsh','Okonkwo','Vasquez','Hartley','Nakamura','Brennan','Sowande','Petrov','Aldridge','Costa','Whitlock','Rahimi','Duval','Kowalski','Mbeki'];
// Each note fires once, at the decision that makes it mean something.
const DESK_NOTES={
  firstSquad:{t:'Your first squad',
    b:`Twenty-three names by Friday, Director. The press will count the strikers before they read the reasoning.<br><br>The shape has to hold up — keepers, defenders, midfield, attack. You'll be told the squad is unbalanced by people who have not seen the training reports. Occasionally they'll be right.`},
  age:{t:'On the older ones',
    b:`He's thirty-three. Not a warning — you'll have seen the same reports I have.<br><br>Only that they climb toward whatever they were going to be until around twenty-five, hold it to twenty-nine or so, and then the reports start disagreeing with the eye. The ones who look like this at thirty-three rarely look like it at thirty-five.<br><br>A brilliant thirty-three-year-old is a sunset. It's still worth watching.`},
  styles:{t:'On style',
    b:`The manager wants players who suit the system. Enough of them and the thing clicks — I'm told there's a lift, though nobody will put a number on it in writing.<br><br>A broad spread makes you harder to plan against. A narrow one makes you better at the plan you've got.<br><br>The best players or the right ones, Director. It's an old question and the answer changes.`},
  form:{t:'On form',
    b:`Club form and international form are different animals. Some of them are immense for their club and cannot find the pitch in a white shirt.<br><br>It's the international form that moves them at a tournament. I'd not read too much into a hot autumn at club level.`},
  injuries:{t:'The medical report',
    b:`The medical report's in. It lands before every tournament and it doesn't negotiate.<br><br>Some of them carry a tendency — it's in the file, though not in words anyone will commit to. The same names keep appearing on these lists, which tells you something the file won't.`},
  aging:{t:'The aging report',
    b:`The squad is a year older. All of it, at once.<br><br>I find it reads better in one sitting than spread across the summer. Nothing in it will surprise you. That's rather the difficulty.`},
  youth:{t:'On the academies',
    b:`The crop's up.<br><br>Each nation produces at its own rate — some reliably, some barely at all. When it comes, it comes in a cluster, and that cluster is the only thing that will ever be called a golden generation.<br><br>One of them might be worth the wait. I couldn't tell you which, and neither can the scouts, whatever they'll claim in the morning.`},
  finance:{t:'On the budget',
    b:`The books, Director. Federation income against what the programme costs to run.<br><br>It compounds quietly in both directions. Nobody writes about the budget until there isn't one.`},
  manager:{t:'On appointments',
    b:`You appoint. He picks the team on the day.<br><br>They arrive with their own ideas about how football should be played and they do not abandon them because the Director would prefer otherwise. Choose accordingly.<br><br>They also leave. They always leave.`},
  longGame:{t:'The long game',
    b:`Some years there's nothing to decide and the squad ages anyway.<br><br>That's the job, Director. Everyone else measures you by the last tournament. The desk measures in decades.`},
};
const DESK_ORDER=['firstSquad','age','styles','form','injuries','aging','youth','finance','manager','longGame'];
function initDesk(){
  if(!G.desk)G.desk={name:DESK_NAMES[Math.floor(Math.random()*DESK_NAMES.length)],since:G.year||2025,
    nextChange:(G.year||2025)+10+Math.floor(Math.random()*21),read:{},fired:{},succession:[]};

// surface as NUTMEG posts instead — a football-media voice, once ever, so they ride the
// forced social checkpoint and light the Socials dot without spamming the feed. The rest
// were pure teaching notes that duplicate the Basic Guide, or already have richer feed
// posts (academy/youth watch, retirements), so they simply no-op. Firing is still tracked

const NOTE_POSTS={
  injuries:{who:'presser',weight:0.7,text:()=>{
    const n=(G.pool||[]).filter(p=>p.injured).length;

function deskNote(key){
  if(!G.natId||!DESK_NOTES[key])return;
  const d=initDesk();
  if(d.fired[key])return;
  d.fired[key]=G.year;

function deskUnread(){
  if(!G.natId)return 0;

// Called once a year. The only thing that ever changes about the desk.
function deskTick(){
  if(!G.natId)return;
  const d=initDesk();
  if(G.year>=d.nextChange){
    const old=d.name;
    let next=old;
    while(next===old)next=DESK_NAMES[Math.floor(Math.random()*DESK_NAMES.length)];
    d.succession.push({name:old,from:d.since,to:G.year});
    d.name=next;d.since=G.year;
    d.nextChange=G.year+10+Math.floor(Math.random()*21);
    d.pendingIntro=true;
  }
}
// ============================================================
//  TUTORIAL SANDBOX
//  Reached from the title screen, never forced on a real save. The Director's
//  own dynasty is snapshotted key-by-key, a throwaway scenario is played in the
//  same live game code, and the snapshot is restored on exit — so nothing that
//  happens in here can ever touch a save.
//  The scenario is scripted to be winnable: a strong nation, 10/10 in qualifying,
//  and a run at the tournament. simScore is temporarily weighted in the
//  Director's favour rather than faking results, so every screen, stat and feed
//  behaves exactly as it does in a real game.
// ============================================================
const TUT={active:false, installed:false, snap:null, mine:false, realSimScore:null, realSimRest:null, realTacticalRating:null};
function tutSnapshot(){
  const snap={};
  SAVE_KEYS.forEach(k=>{ try{snap[k]=JSON.parse(JSON.stringify(G[k]));}catch(e){snap[k]=G[k];} });
  return snap;
}
function tutRestore(snap){
  // Deep-copy on the way BACK too. Assigning snap[k] by reference would alias the
  // Director's live state to the snapshot object: a second run of the sandbox would
  // then mutate the very save this is meant to protect.
  SAVE_KEYS.forEach(k=>{
    try{ G[k]=JSON.parse(JSON.stringify(snap[k])); }
    catch(e){ G[k]=snap[k]; }
  });
}
// Guaranteeing the scenario: 10 qualifiers, 10 wins.
// The Director's matches reach the scoreline by TWO different paths, and rigging one
// without the other silently half-works:
//   playQualMatch  -> runMatch(): a live minute-by-minute engine driven by
//                     tacticalRating(). It never calls simScore.
//   simRestOfQualifying / "sim the rest" -> simScore() directly.
// So both are handled, and neither touches rival fixtures: simOtherQualGames and the
// knockout sim also call simScore, and rigging those would wreck every group table on
// screen. The wrapper below only fires while TUT.mine is set — i.e. around the
// Director's own fixture — and everything else falls through to the real engine.
// (A rating boost alone was measured and rejected: +26 gives 10/10 in only 42% of
// campaigns, and +45 gets 87% at the cost of a 7-goal rout in nearly every one.)
const TUT_EDGE=30;          // for the LIVE match engine: dominant but not farcical
function tutMyResult(){
  const ga=Math.random()<0.7?0:1;                  // usually a clean sheet
  const gf=ga+1+Math.floor(Math.random()*3);       // always a win, by 1-3
  return [gf,ga];
}
function tutInstallSim(){
  if(TUT.installed)return;
  TUT.installed=true;
  // --- path 1: the simulated fixtures -------------------------------------
  TUT.realSimScore=simScore;
  simScore=function(a,b){
    // Only the Director's own fixture is rigged. TUT.mine scopes us to
    // simRestOfQualifying; the inflated base then identifies HIS call within it,
    // leaving simOtherQualGames (and every knockout/group sim) on the real engine
    // so the tables around him stay honest.
    if(TUT.active&&TUT.mine){TUT.mine=false;return tutMyResult();}   // one-shot: his fixture only
    return TUT.realSimScore(a,b);
  };
  TUT.realSimRest=simRestOfQualifying;
  simRestOfQualifying=function(){
    if(!TUT.active)return TUT.realSimRest.apply(this,arguments);
    // Per matchday simRestOfQualifying runs: MY simScore call, then simOtherQualGames()
    // for the rivals. A one-shot latch fires on the first simScore of each round (his)
    // and disarms itself, so the rival games fall through to the real engine untouched.
    // Re-arming happens AFTER simOtherQualGames returns — the round boundary. Re-arming
    // any earlier (e.g. off recordMatch, which runs before the rivals play) hands the
    // rigged result to a rival fixture instead: measured at 3/10 wins, not 10/10.
    const realOther=simOtherQualGames;
    simOtherQualGames=function(){ const r=realOther.apply(this,arguments); TUT.mine=true; return r; };
    TUT.mine=true;
    try{ return TUT.realSimRest.apply(this,arguments); }
    finally{ simOtherQualGames=realOther; TUT.mine=false; }
  };
  // --- path 2: the live match engine ---------------------------------------
  TUT.realTacticalRating=tacticalRating;
  tacticalRating=function(){
    const t=TUT.realTacticalRating.apply(this,arguments);
    if(!TUT.active)return t;
    t.base=(t.base||0)+TUT_EDGE; t.att=(t.att||0)+TUT_EDGE; t.def=(t.def||0)+TUT_EDGE;
    return t;
  };
}
function tutUninstallSim(){
  if(!TUT.installed)return;
  if(TUT.realSimScore)simScore=TUT.realSimScore;
  if(TUT.realSimRest)simRestOfQualifying=TUT.realSimRest;
  if(TUT.realTacticalRating)tacticalRating=TUT.realTacticalRating;
  TUT.realSimScore=TUT.realSimRest=TUT.realTacticalRating=null;
  TUT.mine=false; TUT.installed=false;
}
function tutBanner(){
  if(document.getElementById('tut-bar'))return;
  const b=document.createElement('div');b.className='tut-bar';b.id='tut-bar';
  b.innerHTML=`<div><div class="tb-lab">Tutorial scenario</div>
      <div class="tb-sub">Nothing here touches your save</div></div>
    <button class="gg-btn ghost" onclick="tutEnd()">Leave</button>`;
  document.body.appendChild(b);
  document.body.classList.add('tut-on');
}
function tutStart(){
  TUT.snap=tutSnapshot();
  TUT.active=true;
  tutInstallSim();
  tutBanner();
  // Wales: a mid-tier nation (factory 50), deliberately NOT an elite one.
  //  - Its managers ask ~£2-3m, so the haggling steps are 0.25m and the negotiation
  //    actually demonstrates itself. An elite nation's manager asks £11m, where the
  //    step is 0.5m and the fine-grained bargaining the tutorial is teaching is invisible.
  //  - Qualifying means something, so the 10/10 scenario reads as an achievement.
  // NB ids are UPPERCASE ISO with dashes as underscores (see the NATIONS map) — the
  // old lookup for 'fr' never matched anything and silently fell through to the
  // factory>=80 fallback, so this had been quietly running Argentina all along.
  const nat=NATIONS.find(n=>n.id==='GB_WLS')
         || NATIONS.find(n=>n.factory>=45&&n.factory<=55)
         || NATIONS[0];
  chooseNation(nat.id);
  // The walkthrough is a TWO-SEASON arc: qualify (the rigged 10/10 scenario), turn
  // the year, then the tournament itself. That only works if the sandbox opens on a
  // qualifying year — otherwise the campaign the whole scenario was built around is
  // skipped and the Director meets the finals cold. (Alpha 6.0 — found by the walker.)
  let _g=8; while(_g-->0 && thisComp().type!=='QUAL')G.year++;
  // chooseNation now lands on the Assistant setup (5.6+); the sandbox teaches the
  // MANUAL game, so set full control and move straight to the squad screen.
  assistPreset('manual');
  // chooseNation resets the desk; give the sandbox its own secretary and skip the
  // first-run offer, since the Director has chosen the tutorial deliberately.
  initDesk();
  G.desk.guideOffered=true;
  G.desk.tutorial=true;
  setTimeout(()=>{try{ggStart();}catch(e){}},300);
}
function tutEnd(){
  TUT.active=false;
  tutUninstallSim();
  try{ggEnd();}catch(e){}
  const b=document.getElementById('tut-bar');if(b)b.remove();
  document.body.classList.remove('tut-on');
  // Put the Director's own dynasty back exactly as it was.
  if(TUT.snap){tutRestore(TUT.snap);TUT.snap=null;}
  screenTitle();
}
function tutConfirmExit(){
  if(!TUT.active)return screenTitle();
  tutEnd();
}

const GG={on:false,i:0,maxI:0,raf:null,lastRect:null};
function ggEl(sel){try{return document.querySelector(sel);}catch(e){return null;}}
// Which screen is on the DOM right now. The guide follows the Director across
// screens, so it re-detects rather than trusting where it thinks it is.
// Which screen is on the DOM right now.
// Order matters: the hired-manager screen and the hiring shortlist BOTH use
// .mgrcard — only the hired one carries .sel — so test the specific case first.
function ggScreen(){
  // Order matters — several screens share markup:
  //  * .mgrcard is on BOTH the hiring shortlist and the hired-manager screen; only
  //    the hired one carries .sel, so test that first.
  //  * .gtable is on the qualifying hub, the tournament group hub AND the group-result
  //    screen. .hubtabs is unique to the tournament hub; .trophy-ic/.newscard to the
  //    pre-tournament screen. Qualifying is the .gtable screen with neither.
  if(ggEl('#plist'))return 'squad';
  if(ggEl('.renew-opts'))return 'contract';
  if(ggEl('.neg-card')||ggEl('.neg-offerbox')||ggEl('.neg-quote'))return 'negotiation';
  // Season-turn screens FIRST — the review carries manager markup and the aging
  // report uses .newscard, so both would be misread by the tests below.
  if(ggEl('button[onclick*="advanceFromReview"]')||ggEl('.mr-grid'))return 'review';
  if(ggEl('button[onclick*="enterBudgetPhase"]')&&ggEl('.an'))return 'aging';
  if(ggEl('.mgrcard.sel'))return 'manager';
  if(ggEl('.mgrcard'))return 'hire';
  if(ggEl('.fac-dot'))return 'budget';
  if(ggEl('button[onclick*="afterBudget()"]'))return 'outcome';
  if(ggEl('.hubtabs'))return 'tournament';
  // QUALIFYING before the splash test: the qual hub renders a comp splash of its
  // own, which used to win here and mislabel the entire campaign as 'pretournament'
  // (Alpha 6.0 — found by the tutorial walker). Its buttons are the reliable tell.
  if(ggEl('button[onclick*="playQualMatch"]')||ggEl('button[onclick*="simRestOfQualifying"]')||ggEl('button[onclick*="resolveQualification"]'))return 'qual';
  // .newscard appears on ANY screen with media reactions (match results, aging) —
  // the splash banner is otherwise unique to a tournament's front door.
  if(ggEl('.compsplash'))return 'pretournament';
  if(ggEl('.gtable'))return 'qual';
  return null;
}
// Advance to the first step belonging to a screen, skipping any whose element
// isn't there (screens branch: a hired manager shows different controls).
// Enter a screen's steps. Progress is MONOTONIC: the walkthrough never rewinds to a
// screen it has already finished. Without this, any back-button (or a screen the game
// legitimately revisits, like the squad screen mid-cycle) restarts the tutorial from
// step 1 — which is what made it appear to loop forever.
function ggEnterScreen(name){
  for(let i=0;i<GG_STEPS.length;i++){
    if(GG_STEPS[i].screen!==name)continue;
    if(i<GG.maxI)continue;                       // already been past here — don't rewind
    if(GG_STEPS[i].optional&&!ggEl(GG_STEPS[i].sel))continue;
    GG.i=i;GG.maxI=Math.max(GG.maxI,i);GG.lastRect=null;ggRender();return true;
  }
  return false;
}
function ggStart(){
  if(!G.desk)initDesk();
  G.desk.guideStarted=true;G.desk.guideDone=false;
  GG.on=true;GG.i=0;GG.maxI=0;
  // Four panels, not one overlay: they fence the target, leaving it untouched.
  ['gg-n','gg-s','gg-w','gg-e'].forEach(id=>{
    const d=document.createElement('div');d.className='gg-dim';d.id=id;
    // Normally the dimmed area swallows taps so a stray one can't act on the game.
    // A step marked `passthrough` needs the opposite: the Director is choosing among
    // items in a container too tall to fence with the card beside it, so the panels
    // dim but let clicks land. See the shortlist step.
    d.onclick=e=>{

function ggRect(st,el){
  const h=st&&st.hole?ggEl(st.hole):null;
  let base=(h&&h.getBoundingClientRect().width)?h.getBoundingClientRect():el.getBoundingClientRect();
  // `grow` extends the lit hole to also enclose another element, so one step can spotlight
  // a card AND the action buttons that sit just outside it as a single region. Without it,

  // below the card, which is exactly where those buttons live, hiding them. (Alpha 6.5)

// Fence the four panels around the hole. Anything not covered stays fully live.
function ggPosition(r){

  // card has nowhere to go and ends up over the content. Instead: no hole. Dim the whole
  // view lightly and float the card. There's nothing specific to avoid covering.
  // "Too tall" isn't a fixed fraction — it's whether a card (≈210px) can fit in the
  // margin left above OR below the padded target. If neither margin can hold the card,
  // there's nowhere to put it without covering the target, so switch to no-hole mode.

      else{e.style.width='0px';e.style.height='0px';}});
    const ring=document.getElementById('gg-ring');
    if(ring){ring.style.width='0px';ring.style.height='0px';}   // no ring when there's no hole
    const card=document.getElementById('gg-card');
    if(card){

      card.style.left=Math.max(8,Math.round((vw-cw)/2))+'px';

        // Pin the card to the roomier edge, clear of the hole, rather than floating over
        // its centre — which is what dropped it onto those controls.
        const holeTop=Math.max(0,r.top-pad), holeBot=Math.min(vh,r.top+r.height+pad);

      } else {

    e.style.left=x+'px';e.style.top=y+'px';
    e.style.width=Math.max(0,ww)+'px';e.style.height=Math.max(0,hh)+'px';};
  set('gg-n',0,0,vw,t);                    // above
  set('gg-s',0,t+h,vw,vh-(t+h));           // below
  set('gg-w',0,t,l,h);                     // left of
  set('gg-e',l+w,t,vw-(l+w),h);            // right of

    // common case on a phone: a full-height table, or the whole negotiation panel).
    // The old fallback squeezed the card into the biggest margin, which meant sitting
    // ON the target and covering the submit / contract-length / table controls.
    // Instead, PIN the card to a screen edge as a floating panel and make it not

    // Everything above is preference; this is law. If the placed card intersects
    // the padded hole, push it fully below, else fully above; as a last resort pin
    // it to whichever screen edge the hole doesn't reach. Measured before this fix:

}

function screenGuideBasic(){applyTheme("home");
  go(statusBar()+`<div class="wrap"><div class="sechead" style="margin-top:20px"><span class="bar"></span><h2>Basic guide</h2><span class="sub">what's what</span></div>
   <p class="lede">A game about time. You keep one nation across tournament after tournament, and the squad ages whether you like it or not.</p>
   <div class="notecard" style="border-left:3px solid var(--gold)"><b>Follow the yellow.</b> On every screen, the <b style="color:var(--gold)">solid yellow button</b> is the quickest way forward — you can sim decades just by following it. A <b style="color:var(--gold)">yellow-outlined button</b> is the very same step done hands-on (play the match yourself, haggle the wage). Everything else — teal actions, grey backs — is optional. You are never lost: find the yellow.</div>
   <div class="notecard"><b>Age is king.</b> Players grow toward a hidden potential until ~25, peak 26–29, then decline. A brilliant 33-year-old is a sunset; a raw 19-year-old may be a sunrise.</div>
   <div class="notecard"><b>The talent factory.</b> Each nation has a hidden rating for how good, and how often, its youth arrives. Brazil reliably produces gems; Cape Verde barely ever does — but rare deviation can strike gold. That crop is your golden generation.</div>
   <div class="notecard"><b>Playing styles.</b> Every player suits a style (Possession, Direct, High Press, Counter, Wing Play, Tiki-Taka). Pick a team style and enough on-style players give a hidden lift — but a <i>balanced</i> spread makes you adaptable too. The real question: pick the best players, or the <i>right</i> ones?</div>
   <div class="notecard"><b>Club vs international form.</b> Shown as words. Some players are brilliant for their club but freeze for country; international form is what moves their tournament level.</div>
   <div class="notecard"><b>Major Tournament Caps.</b> How many major tournaments a player has actually played. Experience matters on the big stage: seasoned players lift your side, while untested ones — especially older players who should know better — are a genuine risk. Blood a young talent now and he'll be battle-hardened later. Shown as a number on each player.</div>
   <div class="notecard"><b>Injuries.</b> Struck at random before each tournament. Some players carry a hidden <i>injury-prone</i> or <i>glass</i> tendency, raising the odds they break down.</div>
   <div class="notecard"><b>Your manager.</b> More than a figurehead — his quality, how well his style fits your players, and how long he's served all shift your team's level. Churn managers and you pay for it; keep a good one and the understanding grows.</div>
   <div class="notecard"><b>The calendar.</b> A World Cup every four years, your regional (${'Euros, Copa América, AFCON, Gold Cup or Asian Cup'}) in between — a real tournament every two years.</div>
   <div class="btnrow"><button class="btn ghost" onclick="screenGuideHub()">← Guide</button> <button class="btn" onclick="screenGuideIntermediate()">Intermediate →</button></div></div>`);
