function screenGuideIntermediate(){applyTheme("home");
  // Colour-coded by SYSTEM (not importance like Advanced): gold=managers, orange=the
  // market, teal=money, blue=facilities, purple=financing. Content tracks the real
  // mechanics (baseWageFor / compensationFor / annualBudget / the Triad effects / loans).
  go(statusBar()+`<div class="wrap gadv"><div class="sechead" style="margin-top:20px"><span class="bar"></span><h2>Intermediate guide</h2><span class="sub">running the job</span></div>
   <p class="lede">The basics tell you what things are. This tells you how to <i>run</i> them — the manager, the money, and the facilities that quietly decide your future. Colour marks the system: <span class="gk gk-1">Manager</span> <span class="gk gk-2">Market</span> <span class="gk gk-3">Money</span> <span class="gk gk-4">Facilities</span> <span class="gk gk-var">Financing</span>.</p>

   <div class="gsec"><h3>🧑‍💼 Choosing a manager</h3><p class="gsub">He's not a portrait — several hidden parts of him move your team's level.</p></div>
   <div class="gcard t1"><div class="gh">What he's made of</div>
     A manager carries a <b>rating</b> (his quality — the single biggest thing he brings), a <b>playing style</b> that has to suit your squad, sometimes a <b>specialism</b> (a Tournament specialist lifts you in the finals), an <b>age</b> — bosses peak and decline too — and a <b>wage demand</b>.</div>
   <div class="gcard t1"><div class="gh">💷 He is priced by the world, not by you</div>
     A manager's wage is his <b>global market value</b> — what any federation on earth would pay him — not a share of your budget. A journeyman costs about a million; a very good coach around eleven; the best in the world north of twenty. Your budget decides only whether you can <i>afford</i> him.<br><br>
     Every nation can pay for the calibre of coach its own shortlist produces. What you cannot do is hold on to one who <b>outgrows you</b>. Overachieve for years and his reputation — and his price — climb with him, until the day his demand passes what a nation your size can pay. That day comes for every small nation with a good manager, and there is no trick to avoid it. The consolation is real: when a wealthy federation finally takes him, they buy out what he is <i>worth</i>, and that compensation can be several years of your budget in one payment.</div>
   <div class="gcard t1"><div class="gh">Style fit is worth real points</div>
     A manager whose style matches your players is worth up to <b>+1.6</b> to your level; a mismatch drags you the other way. A brilliant boss whose style your squad can't play is an expensive argument — often a worse buy than a solid one who fits. The rankings <b>% fit</b> reads exactly this, giving partial credit for neighbouring approaches (Gegenpress and Direct share an appetite for vertical football; Direct and Low Block share a reactive instinct). Because every nation now breeds players in its own tradition, the spread is wide and it <i>matters</i>: a Possession manager reads in the <b>80s</b> at Spain and the <b>teens</b> at Iceland.</div>
   <div class="gcard t1"><div class="gh">The Core 4 &amp; your nation's DNA</div>
     There are four approaches — <b>Possession</b>, <b>Gegenpress</b>, <b>Direct</b> and <b>Low Block</b> — and every nation has a footballing tradition that decides which of them its players grow up playing. Spain produces technicians, Italy produces defensive organisers, England and the Nordics produce vertical, physical footballers. Hire against your tradition and you're swimming upstream; hire with it and the squad already speaks his language.</div>
   <div class="gcard t1"><div class="gh">Chemistry, home &amp; tenure</div>
     A hidden <b>chemistry</b> roll (±2) is set the moment he signs — you won't know it until he's working. A <b>homegrown</b> manager of your own nation adds a little. And <b>time together matters</b>: a brand-new boss actually costs you in his first tournament, while long service builds an understanding worth real points. Churn managers and you keep paying the newcomer tax.</div>

   <div class="gsec"><h3>🔭 The manager market</h3><p class="gsub">Scouting, poaching, and what happens when someone comes for yours.</p></div>
   <div class="gcard t2"><div class="gh">Scout with the rankings</div>
     <b>Explore → Rankings → Managers</b> lists every manager in world football by rating, each with a colour-coded <b>% fit</b> for <i>your</i> current squad — green a strong match, amber workable, red poor. Filter by style, find a coach who suits you, and open his nation to make an approach.</div>
   <div class="gcard t2"><div class="gh">Approaching &amp; free agents</div>
     Prising a rival's manager away costs a fee, and he can still say no — in which case no fee is paid and your own boss stays put. Out-of-work managers in the hiring pool cost <b>no fee</b> at all, only their wage: often the shrewd route between windows.</div>
   <div class="gcard t2"><div class="gh">When a rival wants yours (compensation)</div>
     If you let him leave, you're <b>paid compensation</b>: his true market value times the years left on his deal, with a premium that <b>grows the longer his contract runs</b>. Note it is his market value, not the bargain you had him on — so a coach you developed from nothing is worth a fortune on the way out. Only federations that can genuinely afford him will come calling, and their offer is drawn from <i>their</i> budget, so it can be far beyond anything you could match. The renegotiation screen shows the exact figure, so you can weigh a bidding war you may not win against banking a windfall.</div>

   <div class="gsec"><h3>💰 Money — the economy</h3><p class="gsub">One budget a year, drawn on before you spend a penny.</p></div>
   <div class="gcard t3"><div class="gh">Your budget, and how it grows</div>
     Every year you get a budget scaled to your nation's size — a giant swims in it, a minnow scraps for every pound. It isn't fixed: <b>sustained</b> deep tournament runs slowly ratchet your commercial income upward, and slipping back erodes it again. Consistency pays, not one lucky cup run.</div>
   <div class="gcard t3"><div class="gh">In and out</div>
     Money comes in from the budget, sponsors, <b>prize money</b> (weighted toward minnows — a small nation's cup run is transformative) and <b>TV money</b> (weighted toward reach, so giants draw more, but a minnow going deep still lands a life-changer). It goes out on your <b>facility running costs and the manager's wage</b>, taken off the top every season.</div>
   <div class="gcard t3"><div class="gh">Debt bites</div>
     Spend beyond your means and the shortfall becomes debt. A little is survivable; <b>deep, sustained</b> debt triggers a crisis — your manager walks, facilities are force-downgraded, and the board quietly lowers what it expects of you. Respect the running costs.</div>

   <div class="gsec"><h3>🏟️ The three facilities</h3><p class="gsub">The Triad. Each runs 1–10 (5 is neutral); you set a target and it climbs one level a season. Match them to your squad's phase.</p></div>
   <div class="gcard t4"><div class="gh">🎓 Academy — the future</div>
     Better youth: higher-potential prospects, arriving faster. This is the long game. It's what turns a rare <b>golden era</b> into an actual golden <b>generation</b> — starve it and a once-in-fifty-years crop can fizzle to a third of what it should have been. Fund it always; you're paying it forward.</div>
   <div class="gcard t4"><div class="gh">🎓 Academy — the <i>identity</i></div>
     Separately from its level, you can point the academy at one of the four approaches — and slowly rewrite what kind of footballer your nation produces. Nothing happens for years (you are re-coaching fourteen-year-olds), it is roughly half done by year twelve and all but complete by twenty, and your intake suffers a little while the pipeline is rebuilt. Tradition never fully dies, so the old school always keeps coming through. Set it on the <b>Academy</b> screen under Explore.</div>
   <div class="gcard t4"><div class="gh">🏋️ Training — the present</div>
     How fully your players reach their potential, so the squad performs nearer its ceiling. Its biggest effect is on a <b>young</b> side with room to grow — pour into training while your talents are still rising and you cash the headroom in.</div>
   <div class="gcard t4"><div class="gh">🩺 Recovery — the sunset</div>
     Sports science and physios: the brake on age decline. It matters most for an <b>ageing</b> squad, buying your veterans an extra year or two near the top before time takes them. When your golden generation greys, this is what keeps the window open a little longer.</div>
   <div class="gcard t4"><div class="gh">Building costs</div>
     Higher levels cost more to <b>run</b> every season, and each level up is a one-off <b>build</b> cost that climbs steeply near the top — maxing a facility is a multi-season project. The very top rung pays a disproportionate bonus. Don't spread thin: back the facility your squad's age actually needs right now.</div>

   <div class="gsec"><h3>🏦 Sponsors &amp; loans</h3><p class="gsub">Two levers on your income — one safe, one dangerous.</p></div>
   <div class="gcard tv"><div class="gh">Sponsors</div>
     Two slots, kit and sleeve. Each is a multi-year deal paying a fixed sum every season; they <b>expire and need renewing</b>, and the offers on the table rise and fall with your results. Free money for winning — keep them filled.</div>
   <div class="gcard tv"><div class="gh">Loans — the rope</div>
     Borrowing drops cash in now, but interest is a real bill every season. Your rate depends on your size (a minnow pays far more than a giant) and climbs <b>steeply</b> the more you already owe — past roughly two to three times your budget the interest devours any benefit. Spare cash chips the principal down automatically. Enough rope to overreach for a golden window; enough to hang yourself.</div>

   <div class="gsec"><h3>🤝 Handing it over</h3><p class="gsub">You do not have to do all of this yourself — and what you delegate is genuinely played out, not skipped.</p></div>
   <div class="gcard tv"><div class="gh">The four things you can delegate</div>
     Under <b>Settings → Assistant</b>: <b>Finances</b> (facilities, sponsors and the budget — never borrows), <b>Manager contracts</b> (wage talks settle at the asking price), <b>Squad selection</b> (your matchday 23), and <b>Tactical direction</b> (your approach set to counter each opponent, and the academy kept on a long-term path). Each is an independent switch under one master switch, changeable whenever you like.</div>
   <div class="gcard tv"><div class="gh">What it costs you</div>
     Nothing in the football — delegated decisions run through exactly the same rules you would play by, and every one is reported to you as it happens. But the moment <b>any</b> delegation takes effect, this save is permanently marked <b>“Simulated”</b> on its achievement and trophy cards, and switching back to full control does not undo it. Only a fresh save can be <b>“Fully Manual”</b>.</div>

   <div class="btnrow" style="margin-top:16px"><button class="btn ghost" onclick="screenGuideBasic()">← Basic</button> <button class="btn" onclick="screenGuideAdvanced()">Advanced →</button></div></div>`);
}
function screenGuideAdvanced(){applyTheme("home");
  // Colour-coded by tier so the hierarchy is visible at a glance. These map to the
  // real match-engine weightings (squadOverall / effRating / tacticalRating / runMatch).
  go(statusBar()+`<div class="wrap gadv"><div class="sechead" style="margin-top:20px"><span class="bar"></span><h2>Advanced guide</h2><span class="sub">how &amp; why it works</span></div>
   <p class="lede">Every match runs on a real strength model, split into stages. Colour marks how big a factor is: <span class="gk gk-1">Dominant</span> <span class="gk gk-2">Major</span> <span class="gk gk-3">Meaningful</span> <span class="gk gk-4">Tactical</span> <span class="gk gk-5">Fine margin</span> <span class="gk gk-var">Variance</span>.</p>

   <div class="gsec"><h3>Stage A — squad strength</h3><p class="gsub">Your side's rating that goes into the match, built up factor by factor.</p></div>

   <div class="gcard t1"><div class="gh">Player ratings <span class="gk gk-1">Dominant</span></div>
     The average of your best available XI. This is the foundation — everything else is a modifier on top. A clearly better XI wins most of the time, but never all of it.</div>
   <div class="gcard t1"><div class="gh">Star weighting <span class="gk gk-1">Dominant</span></div>
     Your best two players count 1.5×, the next three 1.2×, the rest 0.85×. A squad carried by two world-class players rates above one that's uniformly decent. Opponents are weighted the same way, so it's fair.</div>

   <div class="gcard t2"><div class="gh">International form <span class="gk gk-2">Major</span></div>
     Moves each player up or down by up to 1.5 per point of form, capped at ±3.5 across the XI. A squad in hot international form is genuinely dangerous; a cold one underperforms its ratings.</div>
   <div class="gcard t2"><div class="gh">Major Tournament Caps <span class="gk gk-2">Major</span></div>
     Experience measured <i>against what's normal for a player's age</i>. An age-typical squad sits at parity — no free boost. But an unusually seasoned squad earns up to +4, and an untested one (especially older players with zero caps) loses up to −4. This is the "is this our year, or are we building?" lever: blood youngsters now, cash the experience in later.</div>
   <div class="gcard t2"><div class="gh">Manager quality <span class="gk gk-2">Major</span></div>
     (his rating − 70) × 0.09, so a top boss adds ~+2 and a poor one drags you down. Folded in with his other traits below.</div>

   <div class="gcard t3"><div class="gh">Morale <span class="gk gk-3">Meaningful</span></div>
     Camp mood from how you've handled off-pitch events. Swings up to ±2.</div>
   <div class="gcard t3"><div class="gh">Manager chemistry &amp; specialism <span class="gk gk-3">Meaningful</span></div>
     A hidden chemistry roll set when he signs (±2), plus +0.6 if he's a Tournament specialist.</div>
   <div class="gcard t3"><div class="gh">Archetype <span class="gk gk-3">Meaningful</span></div>
     Wonderkids and flair players carry small bonuses in their selection value.</div>

   <div class="gsec"><h3>Tactics — attack vs defence</h3><p class="gsub">These don't change your overall rating; they split it into how much you attack and how well you hold.</p></div>
   <div class="gcard t4"><div class="gh">Formation, mentality, press, tempo, style <span class="gk gk-4">Tactical</span></div>
     Formation sets your base attack/defence tilt. Mentality shifts ±3. Pressing high lifts attack but drains stamina hard — brutal on an old squad. Tempo and style nudge possession, which feeds slightly more chances to whoever holds the ball.</div>
   <div class="gcard t4"><div class="gh">Style match &amp; manager fit <span class="gk gk-4">Tactical</span></div>
     Enough players suited to your chosen style give a lift (up to ~+2.2), and a manager whose style fits your players is worth up to ±1.6. A squad that isn't a total monoculture — three of the four approaches represented — adds a little more. The rankings <b>% fit</b> is a 0–100 readout of that manager fit, weighing neighbouring styles by affinity, though the bonus itself is largest when players are his <i>exact</i> style.</div>

   <div class="gcard t5"><div class="gh">Fine margins <span class="gk gk-5">Fine margin</span></div>
     Squad form bonus, manager tenure (a new boss costs you ~−1.4, long service rewards up to +1.8), homegrown manager (+0.8), style balance (+0.8), and training facilities realising a young squad's potential (up to +2.4 where there's headroom).</div>

   <div class="gsec"><h3>Stage B — situational</h3></div>
   <div class="gcard tb"><div class="gh">Injuries → Host → Venue → Knockout <span class="gk gk-3">Meaningful</span></div>
     Injuries pull weaker players into the XI. Hosting your tournament adds ~+3. Two-legged ties give the home side +3. Knockout games run tighter — fewer chances, more tension.</div>

   <div class="gsec"><h3>Stage C — in-match variance</h3><p class="gsub">Why the same fixture plays out differently each time.</p></div>
   <div class="gcard tv"><div class="gh">Stamina → possession → shots → goals <span class="gk gk-var">Variance</span></div>
     Legs tire through the match (worse in extra time and under a high press). Possession drifts minute to minute and swings toward whoever's chasing. Shot volume scales with the attack-vs-defence ratio — but that ratio is <b>capped at 1.5×</b>, so even a huge gap can't manufacture a 10-2. Each shot's quality (xG) is randomised, with occasional big chances, and the final goals come from a Poisson roll on those chances.</div>
   <div class="gcard t3"><div class="gh">📊 How each style reads in the stats</div>
     The four approaches produce recognisably different matches, and both sides' choices count — possession is a <b>tug of war</b>, so you'll see far more of the ball against a low block than against a rival who also wants it.<br><br>
     <b>Possession</b> ~59% of the ball and plenty of attempts, but patient ones (~0.10 xG each). <b>Gegenpress</b> is chaos — the most shots at both ends, the most goals and the most conceded. <b>Direct</b> cedes the ball and takes fewer, sharper attempts (~0.14 each). <b>Low Block</b> sees least of the ball and shoots least — but its chances are the best in the game (~0.15) and it concedes fewest. Nothing here decides the result on its own; it decides what the ninety minutes <i>look</i> like.</div>
   <div class="gcard tv"><div class="gh">Bookings &amp; red cards <span class="gk gk-var">Variance</span></div>
     Cards are position-dependent and more likely under a high press. A red card <b>bites hard</b>: down to ten, a side's attack drops to ~78% and its defence to ~72%, and its legs tire faster — between even teams, going a man down turns a coin-flip into roughly a 1-in-7 chance of winning. Down to nine is near-hopeless. You're a player short, and it shows.</div>

   <div class="gsec"><h3>Stage D — the long game (golden generations)</h3><p class="gsub">Why some eras of a save feel different — and why the World Cup arrives when it does. Nations sit in six named tiers by talent factory: <b>Elite</b> <span class="tstars">★★★★★</span> (80+) · <b>Strong</b> <span class="tstars">★★★★☆</span> (66–79) · <b>Solid</b> <span class="tstars">★★★☆☆</span> (50–65) · <b>Modest</b> <span class="tstars">★★☆☆☆</span> (35–49) · <b>Minnow</b> <span class="tstars">★☆☆☆☆</span> (22–34) · <b>Micro</b> <span class="tstars">☆☆☆☆☆</span> (under 22).</p></div>

   <div class="gcard t1"><div class="gh">The tier ceiling <span class="gk gk-1">Dominant</span></div>
     Every nation has a hard ceiling on the best XI it can ever field, rising with its tier — a Micro tops out around <b>86</b>, an Elite around <b>92</b>. The ceilings sit close together on purpose: what a bigger nation really buys is how <i>often</i> a great generation arrives, not how good it can be. AI nations obey the same ceilings you do.</div>
   <div class="gcard t2"><div class="gh">Golden-era windows <span class="gk gk-2">Major</span></div>
     Roughly once a generation, an intake arrives that has no business being that good. Elite nations see one every ~12 years; a Micro waits <b>60 years or more</b>. A Micro's era burns hotter and its cohort stays together longer — they grew up in the same age-group sides. Calibrated so a perfectly-run Micro wins the World Cup about once per ~1,000 years of play; an Elite about once every ~22.</div>
   <div class="gcard t2"><div class="gh">The academy converts the era <span class="gk gk-2">Major</span></div>
     A golden era only becomes a golden <i>generation</i> through a funded academy. At level 10 the cohort arrives whole; at a starved level 1 barely a third of the magic survives. A broke federation can watch its once-in-fifty-years crop fizzle — the most expensive mistake in the game.</div>
   <div class="gcard t3"><div class="gh">Between windows <span class="gk gk-3">Meaningful</span></div>
     Ordinary intakes cap <b>3 below</b> the tier ceiling, however good your academy. You cannot grind your way to a peak squad — the window is the only road to the summit. Between windows you build the economy, blood youth, and bank Major Tournament Caps for when it opens.</div>
   <div class="gcard tb"><div class="gh">🐐 The San Marino Rule <span class="gk gk-3">Meaningful</span></div>
     The smallest football nation on Earth plays by a harsher law: their golden eras come rarer than anyone's and their summit sits lower. Winning the World Cup with San Marino is the game's legendary feat — roughly once per <b>2,000 years</b> of perfect decisions. Two trophies mark the mountain: <b>The Miracle</b> (World Cup with any Micro) and <b>The San Marino Question</b> (with them alone).</div>

   <div class="gsec"><h3>Stage E — the tactical ecosystem (the Core 4)</h3><p class="gsub">The deepest strategic layer: four approaches locked in a cycle, a national identity that breeds the players who play them, and an academy that can rewrite that identity over decades. <span class="gk gk-1">Matchup</span> <span class="gk gk-2">Identity &amp; academy</span></p></div>

   <div class="gcard t1"><div class="gh">⚔️ The Core 4 matchup</div>
     The four approaches form a cycle, each preying on one and prey to another:<br>
     <b>Possession</b> beats <b>Low Block</b> · <b>Low Block</b> beats <b>Direct</b> · <b>Direct</b> beats <b>Gegenpress</b> · <b>Gegenpress</b> beats <b>Possession</b>.<br><br>
     The reasoning is the football itself. Patient possession eventually unpicks a deep block, but is suffocated by a press that hunts the ball high. Direct balls fly straight over that press — yet find no space at all against a compact block. And the block that soaks up direct football is slowly worn down by possession. Each style is also <b>neutral</b> against the one two steps away, where neither has a hold on the other.</div>
   <div class="gcard t1"><div class="gh">What the matchup is worth</div>
     A winning matchup is worth up to <b>±3.7</b> to each side — a net swing of about seven rating points — and it is shown to you before every match. That is enough to decide a tight game: at parity it lifts your win chance from roughly <b>37% to 47%</b>, and a 75-rated side facing an 82 goes from <b>28% to 35%</b>. Being on the wrong end is just as real: at parity a losing matchup drops you to about 27%.<br><br>
     But it <b>fades as the gap in class grows</b>. Against a side ten points better it is worth barely half; at fifteen points it buys you about two and a half percent; at twenty-two, a single percent. Tactics win tight games — they never beat a genuinely better team. Talent still reigns.</div>
   <div class="gcard t2"><div class="gh">🎓 Rewriting your nation's DNA</div>
     You can point your academy at any of the four approaches — but you are re-coaching fourteen-year-olds, so nothing happens quickly. Progress follows a generational curve: about <b>11%</b> after four years, <b>27%</b> at eight, <b>53%</b> at twelve, <b>78%</b> at sixteen and <b>92%</b> at twenty. A footballing culture is not a budget line; it is the men who coach the boys.<br><br>
     And it never truly finishes. Tradition keeps a permanent hold of roughly an eighth of your intake, so even a century into a possession project the odd throwback still comes through playing the way your grandfathers did.</div>
   <div class="gcard t2"><div class="gh">The price of upheaval</div>
     While the pipeline is being rebuilt your intake suffers — worst in the early years, fading as the new methods bed in. Switching focus again mid-transition throws away the progress and restarts the clock, so a nation that keeps changing its mind gets the cost of every change and the benefit of none. Pick a philosophy you will still believe in twenty years from now.</div>
   <div class="gcard t2"><div class="gh">🧬 The Core 4 &amp; national tradition</div>
     Four approaches: <b>Possession</b>, <b>Gegenpress</b>, <b>Direct</b>, <b>Low Block</b>. Every nation carries hand-drawn tradition weights that decide which of them its players are born into — Spain ~60% possession, England ~42% direct, Italy ~52% low block, and a confederation default for everyone else. This is why manager fits vary so widely between nations, and why a coach who suits your <i>culture</i> is worth hunting for.</div>

   <div class="btnrow" style="margin-top:16px"><button class="btn ghost" onclick="screenGuideHub()">← Guide</button> <button class="btn ghost" onclick="screenGuideIntermediate()">← Intermediate</button></div></div>`);
}

function rollInjuries(){
  // note fires only if the report has something in it — see deskNote (once-only)
  setTimeout(()=>{try{if(G.pool&&G.pool.some(p=>p.injured))deskNote('injuries');}catch(e){}},0);
  G.pool.forEach(p=>{p.injured=null;const risk=INJURY_LEVELS[p.injProne].risk;if(Math.random()<risk){
    const wk=Math.round(rnd(2,8));p.injured={weeks:wk,label:pick(['hamstring','knee','ankle','calf','thigh'])+` strain (${wk}wk)`};
  }});
  ensureSelectablePool();
}
// SAFETY NET. Injured players can't be picked (see toggle/autoPick), but SQUAD_MINIMA
// still demands 2 GKs, 5 DEF, 4 MID, 3 ATT. If a roll leaves any line with fewer FIT
// players than its minimum, the squad becomes mathematically unfillable: Confirm never
// unlocks and the run is stuck with no way forward. A thin line (keepers especially)
// makes this a real outcome, not a theoretical one.
// Rather than let that happen, the worst-timed injuries clear up: we heal the fittest
// of the injured in that line until the minimum can be met. A near miss is a story;
// a dead end is a bug.
function ensureSelectablePool(){
  if(!G.pool)return;
  const healed=[];
  SQUAD_MINIMA.forEach(u=>{
    const inLine=G.pool.filter(p=>u.pos.includes(p.pos));
    let fit=inLine.filter(p=>!p.injured).length;
    if(fit>=u.min)return;
    // heal the best of the injured first — the ones who'd have played anyway
    inLine.filter(p=>p.injured)
      .sort((a,b)=>(b.rating||0)-(a.rating||0))
      .forEach(p=>{
        if(fit>=u.min)return;
        p.injured=null;healed.push(p);fit++;
      });
  });
  return healed;
}

// Confirm the 23 and move on. If we're mid-tournament (a squad change during a
// competition), return to the tournament hub we came from; otherwise go to the
// manager screen. Routing lives HERE rather than in rewritten DOM onclicks, which
// were fragile — a re-render could wipe the rewrite and strand the button.
// MINIMUM SQUAD SHAPE: a valid 23 must cover every line, so nobody can name a squad
// with (say) zero goalkeepers. Positions are grouped into the four units used elsewhere.
const SQUAD_MINIMA=[
  {label:'goalkeeper', min:2, pos:['GK']},
  {label:'defender',   min:5, pos:['RB','LB','CB','RWB','LWB']},
  {label:'midfielder', min:4, pos:['CDM','CM','CAM','RM','LM','AM']},
  {label:'forward',    min:3, pos:['RW','LW','ST','CF']},
];
// Returns the list of shortfalls, e.g. [{label:'goalkeeper',have:0,min:2}], or [] if OK.
function squadShortfalls(squad){
  return SQUAD_MINIMA.map(u=>{
    const have=squad.filter(p=>u.pos.includes(p.pos)).length;
    return {label:u.label, have, min:u.min};
  }).filter(u=>u.have<u.min);
}
function squadShapeOk(squad){return squadShortfalls(squad).length===0;}
function proceedToManager(){
  if(G.squad.length!==23)return;
  // Block progression until every line is covered to its minimum (no keeper-less squads).
  const short=squadShortfalls(G.squad);
  if(short.length){
    const msg=short.map(u=>`${u.min-u.have} more ${u.label}${(u.min-u.have)>1?'s':''}`).join(', ');
    popToast(`Squad needs ${msg} — every line must be covered.`);
    return;
  }
  const ret=G._returnTo;
  if(ret){
    G._returnTo=null;
    switch(ret){
      case 'group':  return screenGroupHub();
      case 'ko':     return screenKnockoutHub();

      case 'playoff':return screenPlayoffReturn();

}
// Auto-pick then immediately proceed — the one-tap "just get me to a game" path.
function autoPickAndGo(){

function autoPick(){
  // THE 20-MAN BUG (fixed 7.7): this used to select ONLY through a hardcoded quota map
  // of ten positions. Anyone at RM, LM, AM, CF, RWB or LWB was invisible to it, and if a
  // quota couldn't be met there was no fallback — so it handed back 20 players from a
  // pool with 40 fit ones, and the Delegate/Confirm button silently died. It now fills
  // the LEGAL SHAPE first, then shape preference, then tops up to 23 from whoever is
  // left regardless of position, and only then falls back to injured cover.
  try{ensureSelectablePool();}catch(e){}
  const need={GK:3,CB:5,RB:2,LB:2,CDM:2,CM:3,CAM:2,RW:2,LW:2,ST:3};
  const chosen=[];const used=new Set();
  const val=p=>effRating(p)+(p.age<=23?2:0)+(p.age>=32?-2:0)-(p.injured?100:0);
  const take=p=>{if(!used.has(p.id)){chosen.push(p);used.add(p.id);}};
  // 1. the legal minimum for every line, best first — this can never be crowded out
  SQUAD_MINIMA.forEach(u=>{
    G.pool.filter(p=>u.pos.includes(p.pos)&&!p.injured&&!used.has(p.id))
      .sort((a,b)=>val(b)-val(a)).slice(0,u.min).forEach(take);
  });
  // 2. preferred shape on top
  Object.entries(need).forEach(([pos,n])=>{
    G.pool.filter(p=>p.pos===pos&&!used.has(p.id)&&!p.injured)
      .sort((a,b)=>val(b)-val(a)).slice(0,n).forEach(take);
  });
  // 3. top up to 23 with the best of whoever is left, ANY position
  if(chosen.length<23){
    G.pool.filter(p=>!p.injured&&!used.has(p.id)).sort((a,b)=>val(b)-val(a))
      .slice(0,23-chosen.length).forEach(take);
  }
  // 4. last resort: knocks and all, rather than hand back an illegal squad
  if(chosen.length<23){
    G.pool.filter(p=>!used.has(p.id)).sort((a,b)=>val(b)-val(a))
      .slice(0,23-chosen.length).forEach(take);
  }
  chosen.sort((a,b)=>val(b)-val(a));
  let squad=chosen.slice(0,23);
  // GUARANTEE the minimum shape survives the trim to 23: if trimming dropped a line below
  // its minimum, swap the weakest surplus outfielders back out for the missing specialists.
  SQUAD_MINIMA.forEach(u=>{
    let have=squad.filter(p=>u.pos.includes(p.pos)).length;
    while(have<u.min){
      const cand=G.pool.filter(p=>u.pos.includes(p.pos)&&!squad.includes(p)&&!p.injured).sort((a,b)=>val(b)-val(a))[0]
        || G.pool.filter(p=>u.pos.includes(p.pos)&&!squad.includes(p)).sort((a,b)=>val(b)-val(a))[0];
      if(!cand)break;
      // drop the weakest player from an over-supplied line to make room
      const droppable=squad.filter(p=>{const un=SQUAD_MINIMA.find(x=>x.pos.includes(p.pos));return un&&squad.filter(q=>un.pos.includes(q.pos)).length>un.min;}).sort((a,b)=>val(a)-val(b))[0];
      if(!droppable)break;
      squad=squad.filter(p=>p!==droppable);squad.push(cand);
      have=squad.filter(p=>u.pos.includes(p.pos)).length;
    }
  });
  G.squad=squad.slice(0,23);renderSquadBody();
}

function scoutReport(p){
  const bits=[];
  if(p.age<=20)bits.push(`A prospect of just ${p.age}. ${p.potential>=85?'The kind of ceiling scouts dream about.':'Raw, but time is firmly on his side.'}`);
  else if(p.age>=33)bits.push(`At ${p.age}, the legs may be fading, but the mind rarely does. A tournament or two left in him.`);
  else bits.push(`In the meat of his career at ${p.age}.`);
  if(p.intlBias>=1)bits.push('Notably raises his game for the national shirt.');
  else if(p.intlBias<=-1)bits.push('Has flattered to deceive at international level despite his club returns.');
  if(p.injProne==='glass')bits.push('Fitness staff hold their breath — his body has a habit of letting him down.');
  else if(p.injProne==='niggle')bits.push('Prone to the odd niggle across a long season.');
  if(p.arch==='leader')bits.push('A natural voice in the dressing room.');
  if(p.arch==='flair')bits.push('Maddeningly inconsistent, but capable of settling any tie on his own.');
  return bits.join(' ');
}

function initHistory(){
  if(G.winners)return;
  G.winners=[];   // {year, comp, winner, iso, runnerUp, you}
  G.hallOfFame=[]; // {name, pos, peak, caps, goals, years, iso, you}
}
// How recently (and how often) a nation has been champion of THIS competition. Used to
// damp dynasties: a side that just won is complacent, targeted, and turning its squad
// over — so its odds of going again are suppressed. Returns 0 (never) upward.
function recentTitleWeight(name,compName){
  if(!G.winners||!name)return 0;
  let w=0;
  for(const rec of G.winners){
    if(rec.comp!==compName)continue;
    const age=G.year-rec.year;            // 0 = this very cycle's prior holder, etc.
    if(age<0||age>16)continue;            // only the last ~4 cycles matter
    if(rec.winner===name) w += Math.max(0, 1-age/16);
  }
  return w;                                // ~1.0 for a fresh back-to-back threat
}
// after each tournament, record who won (you, or a simulated champion)
function recordCompetitionWinner(youWon,runnerUp){
  initHistory();
  const comp=thisComp();const nat=myNation();
  let winner,iso;
  if(youWon){winner=nat.name;iso=nat.iso;}
  else{
    // The trophy is lifted by one of the strongest remaining sides — but NOT
    // deterministically the single best one, and a recent holder is dragged back toward
    // the pack so no AI nation three-peats except very rarely. We score each contender
    // by strength + noise, minus a "champion's curse" for having just won this comp.
    const field=(G.field||[]).filter(t=>!t.you);
    if(!field.length){G.winners.unshift({year:G.year,comp:comp.name,winner:'Unknown',iso:'un',runnerUp:runnerUp||'—',you:false});return;}
    const scored=field.map(t=>{
      const curse=recentTitleWeight(t.name,comp.name)*5.0;   // OVR-equivalent drag on a recent holder
      return {t,s:t.ov + gauss()*5.5 - curse};
    }).sort((a,b)=>b.s-a.s);
    const champ=scored[0].t;
    winner=champ.name;iso=champ.iso;
  }
  G.winners.unshift({year:G.year,comp:comp.name,winner,iso,runnerUp:runnerUp||'—',you:!!youWon});
}
// a player enters the Hall of Fame on retirement if they were special
function considerHallOfFame(p){
  initHistory();

  // judged relative to what their nation can produce.
  const bar=Math.max(80,(nat?nat.factory:55)*0.30+62);   // BRA≈90 · ENG≈86 · SMR≈80
  const worthy = p.potential>=bar || (p.caps>=110) || (p.hofGoals>=40);

}

function startQualification(){
  const comp=thisComp();const nat=myNation();
  // ---- SEEDED DRAW (this is the fix) ----
  // Real qualifying seeds by strength: one giant per group, then one from each
  // descending pot. England therefore draw Albania and San Marino, not Portugal AND Croatia.
  const members=(CONF_MEMBERS[nat.conf]||[]).filter(n=>n!==nat.name)
    .map(n=>({name:n,iso:FIELD_ISO[n]||'un',factory:FIELD_FACT[n]??40}))
    .sort((a,b)=>b.factory-a.factory);
  const myFactor=nat.factory;
  // where do I sit? my pot index among all confederation members
  const all=[...members,{name:nat.name,factory:myFactor}].sort((a,b)=>b.factory-a.factory);
  const myRank=all.findIndex(x=>x.name===nat.name);
  const groupSize=6;
  const nGroups=Math.max(1,Math.round(all.length/groupSize));
  const myPot=Math.min(groupSize-1,Math.floor(myRank/nGroups)); // pot 0 = top seeds
  // build the other 5 pots, take one random nation from each pot EXCEPT my own
  const potOf=t=>Math.min(groupSize-1,Math.floor(members.findIndex(m=>m.name===t.name)/nGroups));
  const pots={};for(let p=0;p<groupSize;p++)pots[p]=[];
  members.forEach(m=>{const p=Math.min(groupSize-1,Math.floor(members.indexOf(m)/nGroups));pots[p].push(m);});
  const rivals=[];
  for(let p=0;p<groupSize;p++){
    if(p===myPot)continue;                       // my pot slot is taken by me
    let bucket=pots[p].filter(x=>!rivals.includes(x));
    // Minnow mercy: bottom seeds face only ONE top-pot giant, not several.
    // Real draws spread the giants; this keeps a San Marino campaign playable.
    if(myPot>=groupSize-2&&p===0&&bucket.length>3){
      bucket=bucket.slice(Math.floor(bucket.length*0.35)); // a weaker "giant"
    }
    if(bucket.length)rivals.push(pick(bucket));
  }
  // top up if a pot was empty
  while(rivals.length<groupSize-1){
    const c=pick(members.filter(m=>!rivals.includes(m)));if(!c)break;rivals.push(c);
  }
  rivals.forEach(r=>{r.you=false;r.ov=computeTeamOVR(r);});
  const me={name:nat.name,iso:nat.iso,factory:nat.factory,you:true,ov:squadOverall(G.squad)};
  G.qualGroup=[me,...rivals].map(t=>({...t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}));
  G.qualRound=0;G.qualResults=[];G.qualDone=false;
  G.qualPot=myPot;G.qualPots=groupSize;
  setStage('qual',true);
  initStats();
  screenQualHub();
}

// Third place → a REAL, playable two-legged playoff against a comparable nation.
// How many of a 6-team group go through? Derived from the REAL confederation
// allocation: CONMEBOL sends 6 of 10 (generous), UEFA 16 of 55 (tight).
function autoQualifySpots(){
  const comp=thisComp();const nat=myNation();
  const members=(CONF_MEMBERS[nat.conf]||[]).length||24;
  const slots=qualSlots(comp);
  const share=slots/members;                 // CONMEBOL .60 · UEFA .29 · CAF .19
  const spots=Math.round(share*6);           // scaled to our 6-team group
  return clamp(spots,1,4);
}
function resolveQualification(){applyTheme('comp');
  if(TUT.active&&G.qualGroup&&G.qualGroup.length){
    // Scenario guarantee: the sandbox promises ten wins and a place at the finals.
    // Rather than depend on the per-match rig firing, seat the Director clear at the
    // top of the group here — an unbeaten record the tutorial can rely on.
    const us=G.qualGroup.find(t=>t.you);
    if(us){const P=Math.max(us.P||0,10);us.P=P;us.W=P;us.D=0;us.L=0;us.GF=Math.max(us.GF||0,P*2);us.GA=Math.min(us.GA||0,2);us.Pts=P*3;
      G.qualGroup.filter(t=>!t.you).forEach((t,i)=>{if((t.Pts||0)>=us.Pts)t.Pts=us.Pts-3-i;});}
  }
  _qualSanityFix();   // BUGFIX: never let a materially stronger nation end on 0 pts
  const table=[...G.qualGroup].sort((a,b)=>b.Pts-a.Pts||(b.GF-b.GA)-(a.GF-a.GA)||b.GF-a.GF);
  const pos=table.findIndex(t=>t.you)+1;
  G.qualPos=pos;
  const auto=autoQualifySpots();
  G.qualAutoSpots=auto;
  if(pos<=auto)return finaliseQualification(true,pos,false);
  if(pos===auto+1&&!G.playoffDone)return screenPlayoffDraw();   // next place = playoff
  return finaliseQualification(false,pos,false);
}
// BUGFIX (Alpha 3.1): the "England on 0 points with -59 GD" case. Under some rare
// combinations of match-sim state we saw the player's side end a qualifying
// campaign winless despite being far and away the strongest team in the group —
// mathematically almost impossible. This guard catches that pathological outcome
// AFTER the campaign has played out, and only if we're genuinely the class of the
// group (≥3 OVR above the group's other teams). We then re-simulate the campaign
// honestly via simScore, which respects the strength gap. A legitimately weaker
// side finishing bottom is left completely alone.
function _qualSanityFix(){
  if(!G.qualGroup||!G.qualGroup.length)return;
  const me=G.qualGroup.find(t=>t.you);
  if(!me||me.P===0||me.Pts>0)return;
  const opps=G.qualGroup.filter(t=>!t.you);
  if(!opps.length)return;
  const avgOpp=opps.reduce((s,t)=>s+(t.ov||60),0)/opps.length;
  const myOv=Math.max(me.ov||0, squadOverall(G.squad));
  if(myOv <= avgOpp-3)return;    // legitimately outmatched — leave it
  try{console.warn('[qual-sanity] resimulating: 0pts despite OVR gap', {myOv,avgOpp,me});}catch(e){}
  // Reset the table and results, keep the group and fixtures identical.
  G.qualGroup.forEach(t=>{t.P=0;t.W=0;t.D=0;t.L=0;t.GF=0;t.GA=0;t.Pts=0;});
  G.qualResults=[];
  const fixtures=qualFixtures();
  const us=G.qualGroup.findIndex(t=>t.you);
  fixtures.forEach(oi=>{
    const opp=G.qualGroup[oi];
    try{assistPickApproach(opp);}catch(e){}
    const [gf,ga]=simScoreVs(myOv, opp);   // Core 4 matchup applies (7.3)
    recordGroup(G.qualGroup[us],opp,gf,ga);
    G.qualResults.push({opp:opp.name,oppIso:opp.iso,gf,ga,you:true,resim:true});
    const others=G.qualGroup.map((_,i)=>i).filter(i=>i!==us&&i!==oi);
    for(let i=0;i+1<others.length;i+=2){
      const a=G.qualGroup[others[i]],b=G.qualGroup[others[i+1]];
      const [ga2,gb2]=simScore(a.ov,b.ov);
      recordGroup(a,b,ga2,gb2);
    }
  });
  me.ov=myOv;   // keep the stored strength honest going forward
}

function screenPlayoffDraw(){applyTheme('comp');
  const comp=thisComp();const nat=myNation();
  if(!G.playoffRival){
    const myF=nat.factory;
    const peers=ALL_NATIONS
      .filter(x=>x[0]!==nat.name&&CONF_OF[x[0]]===nat.conf)
      .map(x=>({name:x[0],iso:x[1],factory:x[2]}))
      .filter(x=>Math.abs(x.factory-myF)<=18);      // a peer, not a lottery
    const cand=peers.length?peers:ALL_NATIONS.filter(x=>x[0]!==nat.name&&CONF_OF[x[0]]===nat.conf)

function playPlayoffLeg(){
  const nat=myNation();
  const me={name:nat.name,iso:nat.iso,you:true,ov:squadOverall(G.squad)};
  const r=G.playoffRival;
  // HOME AND AWAY: first leg away at the rival's ground, second leg at home — the standard
  // two-legged format. The venue drives home advantage inside runMatch.
  const venue = G.playoffLeg===1 ? 'away' : 'home';
  G.roundLabel=`Playoff · Leg ${G.playoffLeg} of 2 (${venue==='home'?'Home':'Away'})`;G.compLabel=thisComp().name;
  // On the second leg, hand runMatch the aggregate so far, so a level aggregate after 90
  // (or after extra time) correctly triggers extra time and a real penalty shootout.
  const aggCtx = G.playoffLeg===2 ? {me:G.playoffAgg.me, them:G.playoffAgg.them} : null;
  runMatch(me,r,false,()=>{
    const md=G.matchData;
    const gf=md.hs,ga=md.as;
    // Add this leg's goals (including any scored in extra time) to the aggregate.
    G.playoffAgg.me+=gf;G.playoffAgg.them+=ga;
    G.playoffLegs.push({leg:G.playoffLeg,gf,ga,et:md.wentToET,pens:md.pens,venue});
    recordMatch(gf>ga,gf===ga,(r&&r.ov)||undefined);
    try{captureMatchStats({meNat:_natRef(myNation()), oppNat:_natRef(r), stage:'playoff'});}catch(e){console.warn(e);}
    if(G.playoffLeg===1){G.playoffLeg=2;return screenPlayoffMid();}
    return screenPlayoffResult();
  }, aggCtx, venue);
}

// ============================================================================
//  THE ASSISTANT (Alpha 5.6) — delegation without a second code path.
//  Every assisted decision calls the SAME commit functions the screens call
//  (facRaiseCore, acceptSponsor, negAcceptHis, autoPick, budgetDone). The gates
//  live at the screen routers; a toggle just changes who drives the next gate.
//  Nothing is skipped — decisions are made, logged, and surfaced as they happen.
// ============================================================================
// autoPick refuses injured players — correct for a healthy pool, but an injury
// crisis can leave it short of 23 and the one-tap path stuck. The assistant does
// what a human would: names the best remaining players as cover, knocks and all,
// preferring positions the minima still need. (Found by the autoplay harness.)
function assistCompleteSquad(){
  const used=new Set(G.squad.map(p=>p.id));
  let guard=30;
  while(G.squad.length<23&&guard-->0){
    const sh=squadShortfalls(G.squad);
    const pref=sh.length?sh.map(u=>u.pos).flat():null;
    let cands=G.pool.filter(p=>!used.has(p.id));
    if(pref){const c2=cands.filter(p=>pref.includes(p.pos));if(c2.length)cands=c2;}
    cands.sort((x,y)=>effRating(y)-effRating(x));
    const p=cands[0];if(!p)break;
    G.squad.push(p);used.add(p.id);
    assistLog(`${p.name} added as cover${p.injured?' (carrying a knock)':''}.`,true);
  }
  assistFixShortfalls();
}
// A FULL 23 can still break the position minima (e.g. autoPick returned only one fit
// keeper after an injury). At 23 there's no room to add — so swap a surplus outfielder
// for the missing specialist, exactly as the manual "swap back" logic does. Without
// this, the delegated squad silently fails squadShortfalls and the gate can't proceed.
// (Alpha 6.1 — caught by the autoplay harness: ~10% of long assisted dynasties.)
function assistFixShortfalls(){
  let guard=20;
  while(guard-->0){
    const sh=squadShortfalls(G.squad);
    if(!sh.length)break;
    const unit=SQUAD_MINIMA.find(u=>u.label===sh[0].label);   // the line that's short (has .pos)
    if(!unit)break;
    const used=new Set(G.squad.map(p=>p.id));
    const filler=G.pool
      .filter(p=>!used.has(p.id)&&unit.pos.includes(p.pos))
      .sort((a,b)=>effRating(b)-effRating(a))[0];
    if(!filler)break;                                  // pool genuinely can't cover this line
    // make room: drop the weakest squad player from a line that's above ITS own minimum
    // and isn't the short line. minForLine = the min of whichever unit owns that position.
    const minForPos=pos=>{const u=SQUAD_MINIMA.find(x=>x.pos.includes(pos));return u?u.min:0;};
    const haveInLine=lineUnit=>G.squad.filter(p=>lineUnit.pos.includes(p.pos)).length;
    const droppable=G.squad
      .filter(p=>!unit.pos.includes(p.pos))
      .filter(p=>{const u=SQUAD_MINIMA.find(x=>x.pos.includes(p.pos));return u&&haveInLine(u)>u.min;})
      .sort((a,b)=>effRating(a)-effRating(b))[0];
    if(!droppable)break;
    G.squad=G.squad.filter(p=>p.id!==droppable.id);
    G.squad.push(filler);
    assistLog(`${filler.name} in for ${droppable.name} — covering the ${sh[0].label} line.`,true);
  }
}

// ---- FINANCE: the Director of Football runs the budget ----
// Policy: good, not optimal. Fill empty sponsor slots (long deal when your stock is
// high, short when it is not). Raise the lowest facility a rung at a time, always
// keeping a prudent reserve of ~1.2x the year's fixed costs. Never borrows.
function assistRunBudget(){
  initFinance();const fin=G.finance;const notes=[];
  if(typeof rollSponsorOffers==='function')rollSponsorOffers();
  if(fin.sponsorOffers){
    Object.keys(fin.sponsorOffers).forEach(slot=>{
      const off=fin.sponsorOffers[slot];if(!off)return;
      const which=sponsorValuation()>=1.05?'long':'short';
      const deal=which==='long'?off.long:off.short;
      if(acceptSponsor(slot,which))notes.push(`Sponsor signed — ${off.name} (${slot}), ${deal.term}yrs at £${deal.perYear}m/yr.`);
    });
  }
  // Forward-looking reserve: judge affordability against the upkeep of the TARGET
  // levels (what you'll be paying), not today's — and never build while in debt.
  const fixedAtTargets=()=>{let run=0;Object.keys(fin.fac).forEach(k=>run+=facCost(fin.targets[k]));return run+(fin.wage||0);};
  let guard=12;
  while(guard-->0){
    if((fin.debt||0)>0)break;                   // in the red: hold everything, recover first
    const ks=Object.keys(fin.fac).filter(k=>fin.targets[k]<FAC_MAX&&fin.fac[k]===fin.targets[k])
      .sort((a,b)=>fin.fac[a]-fin.fac[b]||(a==='academy'?-1:b==='academy'?1:0));
    const k=ks[0];if(!k)break;
    const nextLvl=fin.targets[k]+1;const capex=facCapex(nextLvl);
    if(fin.cash-capex<(fixedAtTargets()+facCost(nextLvl)-facCost(fin.targets[k]))*1.2+2)break;   // reserve vs FUTURE upkeep
    if(!facRaiseCore(k))break;
    notes.push(`${FAC_META[k].name} → L${fin.targets[k]} commissioned (£${capex}m).`);
  }
  if(!notes.length)notes.push('No changes this year — funds held in reserve.');
  notes.forEach(n=>assistLog(n,true));
  G._assistBudgetNotes=notes;
  budgetDone();                                  // same season-turn path as manual play
}

// ============================================================
//  FINANCE & CAREER — the Triad budget, expectations floor,
//  prize money and the debt loop. Added in Alpha 1.15.
// ============================================================
// THE TRIAD — three PLAYER facilities you invest in. Levels run 1..5. Manager wages are
// NOT here: they're a negotiated figure paid off the top of the budget (see fin.wage).
//   academy  — better youth intake (higher potential) AND faster academy growth.
//   training — players REACH their potential better (development toward the ceiling).
//   recovery — reduces overall lost to age (the decline brake). Physios, sports science.
const FAC_MAX=10, FAC_MIN=1, FAC_NEUTRAL=5;   // Alpha 4.8: /10 scale, level 5 is neutral (was /5, neutral 2)
const FAC_META={
  academy: {icon:'🎓', name:'Academy',  blurb:'Higher-potential youngsters, arriving faster. The long game.'},
  training:{icon:'🏋️', name:'Training',  blurb:'Players fulfil their potential — the squad plays nearer its ceiling.'},
  recovery:{icon:'🩺', name:'Recovery',  blurb:'Sports science and physios. Slows the decline of your ageing players.'},
};
const TRIAD_KEYS=['academy','training','recovery'];
// Annual budget scaled to nation size (the talent factory). A giant swims in money;
// a minnow scraps for every pound. Returned in whole £millions.
function annualBudget(){
  const f=(myNation()||{}).factory||55;
  // Alpha 4.8: TOP END LIFTED. Weighted facilities mean a giant now inherits a 9/9/9
  // Triad running at ~£30m+; its income must sustain that with a little headroom, while a
  // minnow still scraps. Curved (superlinear at the top) so the gap widens where it should.
  //   22→~£8m · 55→~£20m · 76→~£33m · 92→~£46m
  const base=clamp(6 + Math.pow(f/92,1.6)*42, 7, 48);
  // SUSTAINED SUCCESS RATCHET: deep tournament runs grow commercial income over time,
  // lifting the budget. Built up slowly in gradeManager (G.finance.budgetBonus), it rewards
  // consistency rather than one lucky cup run — and erodes if you slip back.
  const bonus=(G.finance&&G.finance.budgetBonus)||0;
  return Math.round((base+bonus)*10)/10;
}
// Alpha 4.8: WEIGHTED STARTING FACILITY LEVEL by nation size. Brazil-tier opens world-class
// (~9, maybe an 8); a minnow starts from almost nothing (~1, maybe a 2). Linear in factory
// with a little jitter so same-tier nations aren't identical. Deterministic-ish per nation.
function seedFacLevel(factory, salt){
  const f=clamp(factory||55,18,95);
  const lvl = 1 + ((f-18)/(95-18))*8;         // 18→1, 95→9
  const jit = ((Math.sin((f*13.7)+(salt*97.3))*0.5)) ;   // ±0.5 pseudo-random by nation+facility
  return clamp(Math.round(lvl+jit), FAC_MIN, FAC_MAX);
}
// A sensible opening wage for the manager, scaled to his standing AND to the nation's means.
// Alpha 4.8: wage is now a FRACTION OF YOUR BUDGET, so it always sits in proportion to income
// — an elite boss is a big commitment for a giant and simply unaffordable for a minnow (who
// therefore draws cheaper managers anyway). Negotiation moves off this figure.
// What a nation of this size can put on the table for a manager.
function budgetForFactory(f){
  return Math.round(clamp(6 + Math.pow((f||55)/92,1.6)*42, 7, 48)*10)/10;
}
// A manager's standing in the game: sustained overachievement and trophies make him
// more expensive, wherever he happens to be working.
function mgrReputation(m){
  if(!m)return 1;
  const hist=(m.history||[]).slice(-3);
  const avg=hist.length?hist.reduce((t,h)=>t+(h.delta||0),0)/hist.length:(m.lastDelta||0);
  const titles=(m.titles||0);
  return clamp(1 + clamp(avg,0,3)*0.10 + titles*0.06, 0.85, 1.70);
}
// ============================================================================
//  THE GLOBAL MANAGER MARKET (Alpha 7.9)
//  A manager's price used to be a fraction of HIS EMPLOYER'S budget, so the same
//  78-rated coach cost £2m at a minnow and £12.7m at a giant — and a small nation
//  could keep a world-class boss forever on pocket money. His wage is now set by
//  what the WORLD would pay him. Small nations can still afford the managers their
//  own shortlists produce; they cannot afford to keep one who outgrows them.
//    r55 ≈ £2m · r65 ≈ £4.4m · r78 ≈ £11m · r85 ≈ £15.5m · r94 ≈ £22.5m
// ============================================================================
function mgrMarketValue(m){
  if(!m)return 0;
  const r=clamp(m.rating,32,96);
  const t=clamp((r-38)/56,0,1);

// MIGRATION: bring a pre-1.16 finance object onto the new schema. Old saves had a
// `wages` facility level and no `recovery`/`wage`. We convert the old wages level into a
// negotiated wage, seed recovery from the old training level, and drop the dead key.
function migrateFinance(){
  const fin=G.finance;if(!fin||!fin.fac)return;
  if(fin.fac.recovery===undefined){
    fin.fac.recovery = fin.fac.training!==undefined ? fin.fac.training : 2;   // inherit decline-brake from old training
  }
  if(fin.wage===undefined || fin.wage===0){
    // if there was an old wages level, price it; else base it on the current manager
    if(fin.fac.wages!==undefined){fin.wage = facCost(fin.fac.wages);}
    else if(G.manager){fin.wage = baseWageFor(G.manager);}
    else fin.wage = 0;
  }
  if(fin.fac.wages!==undefined)delete fin.fac.wages;   // dead key
  if(fin.fac.academy===undefined)fin.fac.academy=2;
  if(fin.fac.training===undefined)fin.fac.training=2;
  if(fin.budgetBonus===undefined)fin.budgetBonus=0;    // sustained-success ratchet (Alpha 2.0)
  if(fin.expFloor===undefined)fin.expFloor=0;
  // ---- Alpha 4.8 MIGRATION: /5 → /10 scale, targets, loans, sponsors, TV ----
  if(!fin._scale10){
    // Old scale ran 1..5; new runs 1..10. The previous linear conversion pushed the
    // TOP of the old range onto the top of the new range, which over-inflated existing
    // saves (a 3/5 nation like Scotland ended up at 8/8/8 it could never afford to run).
    // Instead we re-seed to the SAME strength curve a fresh save now uses, then nudge it
    // up slightly for whatever the player had invested above their nation's baseline — so
    // genuine investment isn't wholly wiped, but nobody inherits facilities their budget
    // can't sustain. Old level 5 (max) adds at most ~+1.5 over the fresh baseline.
    const f=(myNation()||{}).factory||55;
    const reseed=(oldLvl,salt)=>{
      const baseline=seedFacLevel(f,salt);           // what a fresh save of this nation gets
      const investBonus=clamp(((oldLvl||2)-2)*0.5,0,1.5);  // credit for old investment above neutral
      return clamp(Math.round(baseline+investBonus),FAC_MIN,FAC_MAX);
    };
    fin.fac.academy =reseed(fin.fac.academy, 1);
    fin.fac.training=reseed(fin.fac.training,2);
    fin.fac.recovery=reseed(fin.fac.recovery,3);
    // Old-scale targets are meaningless on the new scale — reset them to the migrated
    // current levels so the game doesn't chase a stale target or auto-rebuild for free.
    fin.targets={...fin.fac};
    fin._scale10=true;
    // Old budgets were tuned to the old curve; refresh to the lifted 4.8 budget so income
    // matches the new running costs (keeps any earned budgetBonus on top).
    fin.budget=annualBudget();
  }
  if(!fin.targets)fin.targets={...fin.fac};             // build targets default to current
  if(!fin.loan)fin.loan={principal:0, rate:0};
  if(!fin.sponsors)fin.sponsors={kit:null, sleeve:null};
  if(fin.sponsorOffers===undefined)fin.sponsorOffers=null;
  if(fin.lastTV===undefined)fin.lastTV=0;
  // One-time CORRECTIVE re-seed for saves that migrated under the earlier inflated
  // mapping (e.g. Scotland stuck at 8/8/8). Re-derive from the strength curve + a small
  // investment credit, matching the corrected logic above, then reset targets to match.
  if(!fin._facReseed48b){
    fin._facReseed48b=true;
    const f=(myNation()||{}).factory||55;
    const reseed=(oldLvl,salt)=>{
      const baseline=seedFacLevel(f,salt);
      const investBonus=clamp(((oldLvl||5)-5)*0.35,0,1.5);   // credit above the /10 neutral this time
      return clamp(Math.round(baseline+investBonus),FAC_MIN,FAC_MAX);
    };
    // only pull DOWN over-inflated levels; never reduce a facility already at/below its fresh baseline
    ['academy','training','recovery'].forEach((k,i)=>{
      const baseline=seedFacLevel(f,i+1);
      if((fin.fac[k]||baseline) > baseline+2){ fin.fac[k]=reseed(fin.fac[k],i+1); }
    });
    fin.targets={...fin.fac};

}

// level 1:0.5  2:2  3:4  4:6.5  5:10   → L5-across-the-board = £30m, above any budget.
// Alpha 4.8: /10 running-cost curve, gently exponential. L5 (neutral) ≈ £2m matches the old
// L2, and the top rungs are a serious income commitment so a maxed Triad needs elite income.
//   L1 .3 · L3 ~1 · L5 2 · L7 ~4.6 · L8 ~6.4 · L9 ~8.8 · L10 ~12
// 9/9/9 ≈ £26m (a giant's ~£40m+ budget sustains it with headroom); 10/10/10 ≈ £36m (a stretch).
const FAC_RUN=[0, 0.3, 0.6, 1.0, 1.4, 2.0, 3.0, 4.6, 6.4, 8.8, 12.0];

function facTriadCost(fac){return facCost(fac.academy)+facCost(fac.training)+facCost(fac.recovery);}
// CAPEX: the one-off lump to BUILD one level up, charged when you commit a higher target.
// Rises with the level you're building TO, so a top rung still takes real saving — but
// Alpha 4.8b SOFTENED it so a mid-nation can actually climb: mid-tier builds are now
// affordable within a couple of seasons, while maxing stays a long-term project.
//   →L2 ~0.9 · →L4 ~3 · →L6 ~6.5 · →L7 ~9 · →L8 ~12 · →L9 ~16 · →L10 ~20
function facCapex(toLevel){
  const L=clamp(toLevel,2,10);

// Full annual outgoings = the Triad's running cost PLUS the manager's wage.
function facTotalCost(fac){return facTriadCost(fac)+((G.finance&&G.finance.wage)||0);}
// ---- FINANCE SUMMARY (single source of truth for the balance icon + graph) ----
// Income for the year is the budget (already includes the sustained-success bonus).
// Outgoings are facilities + the manager's wage. The projected P/L is income − outgoings;
// current funds are your reserve minus any debt.
function financeSummary(){

// ---- PRIZE MONEY: the reward that plugs budget holes. Scaled to nation size so a

// expectation used to grade the manager, so a bad run drops you toward a smaller,
// winnable brief rather than an impossible one. It always decays back toward zero.
function updateExpFloor(delta){
  initFinance();

  if(delta<-0.5)      ef-=Math.min(0.5, -delta*0.35);   // failure eases expectations
  else if(delta>0.5)  ef+=Math.min(0.4,  delta*0.30);   // success raises the bar

// Alpha 4.8: total recurring sponsor income per year, across both slots.

// The DEBT LOOP (Alpha 4.8 rebuild). Called once a year after the allocation is committed.
// Order: facilities climb toward their targets (1 level/season) · income arrives (budget +
// sponsors) · running costs + wage + loan interest are drawn · loan auto-repays from surplus ·
// unpayable costs become debt · DEEP, SUSTAINED debt triggers the failure state (manager quits
// + instant forced downgrades + board eases expectations). Loans are the rope to overreach with.
function settleFinances(){
  initFinance();const fin=G.finance;
  const events=[];
  // 1) BUILD: each facility climbs one level toward its target (downgrades already applied instantly).
  TRIAD_KEYS.forEach(k=>{
    const tgt=(fin.targets&&fin.targets[k])!=null?fin.targets[k]:fin.fac[k];
    if(fin.fac[k]<tgt){ fin.fac[k]=clamp(fin.fac[k]+1,FAC_MIN,FAC_MAX); events.push({t:'built',fac:k,to:fin.fac[k]}); }
  });
  // 2) INCOME: budget + recurring sponsor money.
  const sponsors=sponsorIncome();
  const running=facTotalCost(fin.fac);                 // Triad running cost + manager wage
  const interest=Math.round(((fin.loan&&fin.loan.principal||0)*(fin.loan&&fin.loan.rate||0))*10)/10;
  fin.cash += (fin.budget + sponsors) - running - interest;
  if(interest>0)events.push({t:'interest',v:interest});
  // 3) LOAN auto-repayment: spare cash chips the principal down (min £1m/yr if you can afford it).
  if(fin.loan && fin.loan.principal>0 && fin.cash>0){
    const pay=Math.min(fin.cash, fin.loan.principal);
    fin.loan.principal=Math.round((fin.loan.principal-pay)*10)/10; fin.cash=Math.round((fin.cash-pay)*10)/10;
    if(fin.loan.principal<=0){fin.loan.principal=0;fin.loan.rate=0;events.push({t:'loanCleared'});}
  }
  // 4) DEBT: unpayable costs go into the red.
  if(fin.cash < 0){
    fin.debt += -fin.cash; fin.cash=0;
    events.push({t:'debt', v:Math.round(fin.debt*10)/10});
  } else if(fin.debt>0){
    const pay=Math.min(fin.cash, fin.debt);   // spare cash chips at old debt

  //    the manager walks, the board force-sells your priciest facility a rung, and lowers its
  //    sights. No cash bailout this time — the loss of your manager IS the punishment.
  fin.deepDebtStreak = fin.debt > fin.budget ? (fin.deepDebtStreak||0)+1 : 0;
  if(fin.debt > fin.budget && (fin.deepDebtStreak||0)>=1){
    // instant forced downgrade of the priciest facility above the floor

// There is no longer a hard cap on TOTAL debt — you can borrow unlimited amounts; the
// exponential rate (loanRate) is what limits you in practice. This function now just sets a
// sensible MAXIMUM for a single loan on the slider, so one drag offers a reasonable chunk
// (you can always come back and borrow again). Scales with budget.
function loanCeiling(){

  const mult=clamp(0.8 + (f/92)*1.4, 0.8, 2.2);        // minnow ~0.8× budget, giant ~2.2×

// The FLOOR rate for a nation with no debt — smaller nations pay more even at zero leverage.
function loanBaseRate(){

  return Math.round(clamp(0.16 - (f/92)*0.09, 0.06, 0.16)*100)/100;  // minnow ~16%, giant ~7%
}
// The rate charged on the NEXT loan, given how leveraged you already are. There is no
// borrowing CEILING any more — instead the cost climbs EXPONENTIALLY with your existing
// debt relative to your annual budget, so past ~2–3× budget the interest on the next loan
// devours any benefit and you limit yourself. Scaled by budget so it's fair across nations.
function loanRate(){
  const base=loanBaseRate();
  const budget=(G.finance&&G.finance.budget)||12;
  const debt=(G.finance&&G.finance.loan&&G.finance.loan.principal)||0;
  const lev=budget>0?debt/budget:0;
  const r=base*(1 + 0.9*Math.pow(lev,1.7));

// Take a loan: principal lands in cash now; interest accrues each season in settleFinances.
function takeLoan(amount){

// Overpay the loan early from cash reserves.

const SPONSOR_NAMES={

// A 0..~1.6 multiplier capturing how attractive a sponsor finds you right now.
function sponsorValuation(){

  const sizePull=0.5 + (f/92)*0.7;                              // 0.5 .. 1.2 by nation size
  // recent tournament reach from the manager's history delta (beating briefs => rising stock)
  const m=G.manager||{}; const hist=(m.history||[]);
  const recent = hist.length? clamp(hist[hist.length-1].delta||0,-1.5,3):0;
