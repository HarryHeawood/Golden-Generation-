}
function ageRivalPools(){
  initImmersive();
  Object.keys(G.rivalPools).forEach(key=>{
    const pool=G.rivalPools[key];if(!pool||!pool.length)return;
    const nat=NATIONS.find(n=>String(n.id)===String(key)) || NATIONS.find(n=>n.name===key);
    const factory=nat?nat.factory:55;
    const base=nationBand(factory);
    pool.forEach(p=>{
      p.age=(p.age||24)+1;
      p.rating=abilityAtAge(p.potential,p.age);
      p.caps=(p.caps||0)+Math.round(rnd(1,5));
      if(p.retireAge===undefined){
        let ra=35.5+gauss()*2.6;
        if(p.pos==='GK')ra+=Math.round(rnd(3,5));
        if(p.pos==='CB')ra+=Math.round(rnd(1,3));
        if(['RW','LW','ST'].includes(p.pos))ra-=1;
        if(p.potential>=72)ra+=(p.potential-72)*0.19;
        p.retireAge=clamp(Math.round(ra),33,43);
      }
      if(p.peakRating===undefined||p.rating>p.peakRating)p.peakRating=p.rating;
      const dueByAge=p.age>=(p.rating>=85?p.retireAge+2:p.retireAge);
      const collapsed=p.age>=35 && p.rating<=(p.peakRating||60)-12;
      p._retire=dueByAge||collapsed;
      try{refreshForm(p);const c=clubForRating(p.rating);p.club=c.name;p.clubTier=c.tier;}catch(e){}
    });
    const survivors=pool.filter(p=>!p._retire);
    const need=Math.max(0,pool.length-survivors.length);
    const openings=['CB','CM','ST','GK','LW','RW','RB','LB','CDM','CAM','CB','ST'];
    if(nat)beginNameBatch&&beginNameBatch();
    // Seed the batch with the surnames/first names the SURVIVORS already carry, so the
    // replacement players generated below avoid them — otherwise each year's new intake is
    // deduped only against itself and duplicate surnames creep back into the squad over time.
    if(nat&&_usedSurnames){
      survivors.forEach(p=>{
        if(!p.name)return;
        const parts=p.name.split(' ');
        const sur=parts[parts.length-1], fir=parts[0];
        _usedSurnames.set(sur,(_usedSurnames.get(sur)||0)+1);
        if(_usedFirst)_usedFirst.set(fir,(_usedFirst.get(fir)||0)+1);
      });
    }
    for(let i=0;i<need;i++){
      const pos=openings[i%openings.length];
      let pot=clamp(base+Math.abs(gauss())*4.0+rnd(-2,4),30,96);
      if(Math.random()<0.04+factory/900)pot=clamp(pot+rnd(4,9),30,96);
      const age=Math.round(rnd(18,22));
      const np={id:PID++,pos,name:nat?genericName(nat):('Player #'+PID),age,potential:Math.round(pot)};
      np.rating=abilityAtAge(np.potential,age);np.gem=np.potential>=89;
      np.arch=assignArchetype(np);np.style=styleForNation(nat?(nat.id||nat.name):null);
      const c=clubForRating(np.rating);np.club=c.name;np.clubTier=c.tier;
      np.injProne='none';np.injured=null;np.caps=0;np.intlBias=0;try{refreshForm(np);}catch(e){}
      survivors.push(np);
    }
    if(nat)endNameBatch&&endNameBatch();
    survivors.sort((a,b)=>b.rating-a.rating);
    G.rivalPools[key]=survivors;
  });
}

// ---- Per-tournament stat capture -----------------------------------
function initTournamentYear(){
  initImmersive();
  const yr=G.year;
  if(!G.tournamentStats[yr]){
    const comp=thisComp&&thisComp();
    G.tournamentStats[yr]={comp:comp?comp.name:'—', compType:comp?comp.type:'',
      hostId:(G.host&&G.host.hostId)||null,
      players:{}, cleanSheets:{}, awards:null, matches:0};
  }
  return G.tournamentStats[yr];
}
function _statFor(pid, meta){
  const ts=initTournamentYear();
  if(!ts.players[pid])ts.players[pid]={pid,name:meta.name,natId:meta.natId,natName:meta.natName,iso:meta.iso,pos:meta.pos,age:meta.age,
    goals:0,assists:0,mins:0,apps:0,mom:0,yellows:0,reds:0,you:!!meta.you};
  return ts.players[pid];
}
function pickMOTM(md){
  if(!md||!md.homeXI)return null;
  const gs=(pid)=>(md.ledger&&md.ledger[pid])||{goals:0,assists:0,yellow:0,red:0};
  const winSide=md.hs>md.as?'home':md.hs<md.as?'away':'none';
  const cand=[];
  md.homeXI.forEach(p=>{const l=gs(p.id);const bonus=winSide==='home'?1:winSide==='none'?0.3:0;
    cand.push({pid:p.id,side:'home',score:l.goals*4+l.assists*2+bonus-l.red*3-l.yellow*0.3+Math.random()*1.4, p});});
  (md.awayXI||[]).forEach(p=>{const l=gs(p.id);const bonus=winSide==='away'?1:winSide==='none'?0.3:0;
    cand.push({pid:p.id,side:'away',score:l.goals*4+l.assists*2+bonus-l.red*3-l.yellow*0.3+Math.random()*1.4, p});});
  cand.sort((a,b)=>b.score-a.score);
  return cand[0]||null;
}
// Main hook: called from every match callback (group/KO/qual/playoff)
function captureMatchStats(ctx){
  const md=G.matchData;if(!md||!md.homeXI)return;
  initTournamentYear();initCareers();
  const meNat=ctx.meNat, oppNat=ctx.oppNat, stage=ctx.stage||'match';
  const mins=md.wentToET?120:90;
  const rec=(p,natRef,you)=>{
    if(!p)return;
    const s=_statFor(p.id,{name:p.name,natId:natRef.id,natName:natRef.name,iso:natRef.iso,pos:p.pos,age:p.age,you});
    s.apps++;s.mins+=mins;
    const l=(md.ledger&&md.ledger[p.id])||{};
    s.goals+=(l.goals||0);s.assists+=(l.assists||0);
    s.yellows+=(l.yellow||0);s.reds+=(l.red||0);
    // careers store — unified across your squad + rivals
    const c=careerOf(p);
    c.apps=(c.apps||0)+1;c.mins=(c.mins||0)+mins;
    c.goals=(c.goals||0)+(l.goals||0);
    c.assists=(c.assists||0)+(l.assists||0);
    c.yellows=(c.yellows||0)+(l.yellow||0);
    c.reds=(c.reds||0)+(l.red||0);
    c.natId=natRef.id;c.natName=natRef.name;c.iso=natRef.iso;c.pos=p.pos;c.name=p.name;
    if(c.debut==null)c.debut=G.year;
  };
  md.homeXI.forEach(p=>rec(p, meNat, true));
  (md.awayXI||[]).forEach(p=>rec(p, oppNat, false));
  // Man of the Match
  const mom=pickMOTM(md);
  if(mom){
    const p=mom.p;const nat=mom.side==='home'?meNat:oppNat;
    const s=_statFor(p.id,{name:p.name,natId:nat.id,natName:nat.name,iso:nat.iso,pos:p.pos,age:p.age,you:mom.side==='home'});
    s.mom++;
    const c=careerOf(p);c.mom=(c.mom||0)+1;
    md._motmId=p.id;md._motmName=p.name;md._motmSide=mom.side;
  }
  // Clean sheets — the GK who kept a zero
  const ts=G.tournamentStats[G.year];
  const gkHome=md.homeXI.find(p=>p.pos==='GK');
  const gkAway=(md.awayXI||[]).find(p=>p.pos==='GK');
  if(md.as===0 && gkHome){ts.cleanSheets[gkHome.id]=(ts.cleanSheets[gkHome.id]||0)+1;
    const c=careerOf(gkHome);c.cleanSheets=(c.cleanSheets||0)+1;}
  if(md.hs===0 && gkAway){ts.cleanSheets[gkAway.id]=(ts.cleanSheets[gkAway.id]||0)+1;
    const c=careerOf(gkAway);c.cleanSheets=(c.cleanSheets||0)+1;}
  // H2H + form guides + match log
  recordH2H(meNat, oppNat, md.hs, md.as, stage);
  recordForm(meNat.id, md.hs, md.as, oppNat, stage);
  recordForm(oppNat.id, md.as, md.hs, meNat, stage);
  G.matchLog.push({year:G.year,comp:(thisComp&&thisComp()||{}).name,stage,
    aId:meNat.id,aName:meNat.name,aIso:meNat.iso,
    bId:oppNat.id,bName:oppNat.name,bIso:oppNat.iso,
    ga:md.hs,gb:md.as, motm:md._motmName||null});
  if(G.matchLog.length>400)G.matchLog.splice(0,G.matchLog.length-400);
  updateRecordBiggestWin(meNat,oppNat,md.hs,md.as);
  updateRecordSingleTournament();
  ts.matches++;
}

function recordH2H(a,b,ga,gb,stage){
  initImmersive();
  const ids=[a.id,b.id].map(String).sort();
  const key=ids.join('|');
  if(!G.h2h[key])G.h2h[key]={a:ids[0],b:ids[1],p:0,w1:0,d:0,w2:0,gf1:0,gf2:0,last:null};
  const rec=G.h2h[key];rec.p++;
  const aIsK1 = String(a.id)===ids[0];
  const g1= aIsK1?ga:gb, g2= aIsK1?gb:ga;
  rec.gf1+=g1;rec.gf2+=g2;
  if(g1>g2)rec.w1++;else if(g2>g1)rec.w2++;else rec.d++;
  rec.last={year:G.year,stage,g1,g2,comp:(thisComp&&thisComp()||{}).name};
}
function h2hFor(natIdA, natIdB){
  const ids=[natIdA,natIdB].map(String).sort();
  return (G.h2h||{})[ids.join('|')]||null;
}
function recordForm(natId,gf,ga,opp,stage){
  initImmersive();
  if(!G.formGuide[natId])G.formGuide[natId]=[];
  const res=gf>ga?'W':gf<ga?'L':'D';
  G.formGuide[natId].push({year:G.year,comp:(thisComp&&thisComp()||{}).name,stage,opp:opp.name,iso:opp.iso,gf,ga,res});
  if(G.formGuide[natId].length>12)G.formGuide[natId].shift();
}
function recordNationTournamentFinish(natId,natName,iso,resultTag){
  initImmersive();
  if(!G.nationRecent[natId])G.nationRecent[natId]=[];
  G.nationRecent[natId].unshift({year:G.year,comp:(thisComp&&thisComp()||{}).name,result:resultTag});
  if(G.nationRecent[natId].length>6)G.nationRecent[natId].pop();
}
// ============================================================================
//  LIGHTWEIGHT WORLD FORM (Alpha 4.9) — plausible, weighted-random W/D/L results for
//  every nation, so any team you click shows a real-looking form guide, not just the one
//  you happened to play. Not a real match sim: each result is ROLLED from the two nations'
//  strengths with variance, then written into the same G.formGuide store the display reads.
//  Regenerated once per season so it's stable when you re-view and refreshes each year.
//  Your own nation is skipped — its form comes from real matches.
// ============================================================================
function rollFakeMatch(myF, oppF){
  // win/draw/loss probabilities from the strength gap, with genuine variance (upsets happen).
  const gap=(myF-oppF)/100;                 // + if we're stronger
  let pWin=clamp(0.42 + gap*1.15, 0.08, 0.90);
  let pDraw=clamp(0.28 - Math.abs(gap)*0.35, 0.10, 0.34);
  let pLoss=Math.max(0.02, 1-pWin-pDraw);
  const r=Math.random()*(pWin+pDraw+pLoss);
  let res,gf,ga;
  if(r<pWin){ res='W'; gf=1+Math.floor(Math.random()*3+Math.max(0,gap*2)); ga=Math.floor(Math.random()*Math.max(1,gf-1)); }
  else if(r<pWin+pDraw){ res='D'; gf=Math.floor(Math.random()*3); ga=gf; }
  else { res='L'; ga=1+Math.floor(Math.random()*3+Math.max(0,-gap*2)); gf=Math.floor(Math.random()*Math.max(1,ga-1)); }
  return {res,gf:clamp(gf,0,6),ga:clamp(ga,0,6)};
}
function generateWorldForm(){
  initImmersive();
  const myId=(myNation()||{}).id;
  const pool=NATIONS.slice();
  NATIONS.forEach(nat=>{
    if(nat.id===myId)return;               // real form for your own nation
    const games=[];
    // 6–8 recent "matches" against a spread of plausible opponents (mostly same confederation)
    const n=6+Math.floor(Math.random()*3);
    const sameConf=pool.filter(o=>o.id!==nat.id && o.conf===nat.conf);
    for(let i=0;i<n;i++){
      const opp = (sameConf.length && Math.random()<0.7) ? pick(sameConf) : pick(pool.filter(o=>o.id!==nat.id));
      const m=rollFakeMatch(nat.factory, opp.factory);
      games.push({year:G.year, comp:'Qualifying', stage:'qual', opp:opp.name, iso:opp.iso, gf:m.gf, ga:m.ga, res:m.res});
    }
    G.formGuide[nat.id]=games;             // overwrite each season → stable within the year
  });
}

// ---- Records book bookkeeping --------------------------------------
function bumpRecord(key, value, meta){
  initImmersive();
  const cur=G.records[key];
  if(!cur || value>cur.value){G.records[key]={value,...meta};}
}
function updateRecordBiggestWin(a,b,ga,gb){
  const diff=Math.abs(ga-gb);
  if(diff<3)return;
  bumpRecord('biggestWin', diff, {winner:ga>gb?a.name:b.name, winIso:ga>gb?a.iso:b.iso,
    loser:ga>gb?b.name:a.name, loseIso:ga>gb?b.iso:a.iso, score:`${Math.max(ga,gb)}–${Math.min(ga,gb)}`, year:G.year});
}
function updateRecordSingleTournament(){
  const yr=G.year;const ts=(G.tournamentStats||{})[yr];if(!ts)return;
  const arr=Object.values(ts.players);
  const topG=arr.reduce((a,b)=>b.goals>((a&&a.goals)||0)?b:a,null);
  if(topG&&topG.goals>0)bumpRecord('mostGoalsSingleTournament',topG.goals,{
    name:topG.name,natName:topG.natName,iso:topG.iso,pid:topG.pid,year:yr});
  const topA=arr.reduce((a,b)=>b.assists>((a&&a.assists)||0)?b:a,null);
  if(topA&&topA.assists>0)bumpRecord('mostAssistsSingleTournament',topA.assists,{
    name:topA.name,natName:topA.natName,iso:topA.iso,pid:topA.pid,year:yr});
  const topM=arr.reduce((a,b)=>b.mom>((a&&a.mom)||0)?b:a,null);
  if(topM&&topM.mom>0)bumpRecord('mostMoMSingleTournament',topM.mom,{
    name:topM.name,natName:topM.natName,iso:topM.iso,pid:topM.pid,year:yr});
}
function updateRecordsFromCareers(){
  Object.values(G.careers||{}).forEach(c=>{
    const meta={name:c.name,natName:c.natName||'—',iso:c.iso||'un',pid:c.id,year:G.year};
    if(c.goals)bumpRecord('mostGoals',c.goals,meta);
    if(c.apps)bumpRecord('mostApps',c.apps,meta);
    if(c.mom)bumpRecord('mostMoMs',c.mom,meta);
    if(c.assists)bumpRecord('mostAssists',c.assists,meta);
    if(c.titles)bumpRecord('mostTitles',c.titles,meta);
    if(c.cleanSheets)bumpRecord('mostCleanSheets',c.cleanSheets,meta);
  });
}

// End-of-tournament awards
function finaliseTournamentAwards(){
  const yr=G.year;const ts=(G.tournamentStats||{})[yr];if(!ts)return null;
  const arr=Object.values(ts.players);
  if(!arr.length){ts.awards=null;return null;}
  const boot=[...arr].sort((a,b)=>b.goals-a.goals||b.assists-a.assists||b.mins-a.mins)[0];
  const ball=[...arr].sort((a,b)=>b.mom-a.mom||(b.goals+b.assists)-(a.goals+a.assists))[0];
  const gks =[...arr].filter(p=>p.pos==='GK');
  const glove=gks.length?gks.sort((a,b)=>(ts.cleanSheets[b.pid]||0)-(ts.cleanSheets[a.pid]||0)||b.mins-a.mins)[0]:null;
  const young=[...arr].filter(p=>p.age<=23).sort((a,b)=>(b.mom*2+b.goals+b.assists)-(a.mom*2+a.goals+a.assists))[0];
  ts.awards={
    boot :boot ?{pid:boot.pid, name:boot.name, natName:boot.natName, iso:boot.iso, val:boot.goals}:null,
    ball :ball ?{pid:ball.pid, name:ball.name, natName:ball.natName, iso:ball.iso, val:ball.mom}:null,
    glove:glove?{pid:glove.pid,name:glove.name,natName:glove.natName,iso:glove.iso,val:ts.cleanSheets[glove.pid]||0}:null,
    young:young?{pid:young.pid,name:young.name,natName:young.natName,iso:young.iso,age:young.age}:null,
  };
  updateRecordSingleTournament();
  updateRecordsFromCareers();
  // Social hit for the boot winner if they hit >=4 goals
  try{
    if(ts.awards.boot && ts.awards.boot.val>=4 && typeof postAchievement==='function'){
      const b=ts.awards.boot;
      postAchievement(`🥇 Golden Boot: ${b.name} (${b.natName}) tops the ${G.year} ${ts.comp} with ${b.val} goals.`,'GOLDEN BOOT');
    }
  }catch(e){}
  return ts.awards;
}
function pruneImmersive(){
  const yrs=Object.keys(G.tournamentStats||{}).map(Number).sort((a,b)=>a-b);
  if(yrs.length>25){yrs.slice(0,yrs.length-25).forEach(y=>delete G.tournamentStats[y]);}
  Object.keys(G.h2h||{}).forEach(k=>{const r=G.h2h[k];if(r&&r.last&&G.year-r.last.year>40)delete G.h2h[k];});
}

function renderPlayerRankChips(p){
  if(!G.careers||!G.squad||!G.squad.length)return '';
  const chips=[];
  const squadCareers=G.squad.map(x=>({pid:x.id,c:G.careers[x.id]})).filter(x=>x.c);
  if(!squadCareers.length)return '';
  const posGroup=(pos)=>['CB','LB','RB','LWB','RWB'].includes(pos)?'defender'
    :['CDM','CM','CAM','LM','RM','AM'].includes(pos)?'midfielder'
    :['LW','RW','ST','CF'].includes(pos)?'forward':'keeper';
  const rank=(getter,label,minVal=1)=>{
    const val=getter(G.careers[p.id]||{});if(!val||val<minVal)return;
    const sorted=[...squadCareers].sort((a,b)=>getter(b.c)-getter(a.c));
    const idx=sorted.findIndex(x=>x.pid===p.id);if(idx<0)return;
    if(idx===0)chips.push(`Top ${label} in squad`);
    else if(idx<3)chips.push(`${ordinal(idx+1)} ${label} in squad`);
  };
  rank(c=>c.goals||0,'scorer',1);
  rank(c=>c.assists||0,'assister',1);
  rank(c=>c.apps||0,'appearance-maker',3);
  rank(c=>c.mom||0,'MoM-getter',1);
  // most-capped by position group
  const myGroup=posGroup(p.pos);
  const posMates=squadCareers.filter(x=>{
    const pl=G.squad.find(s=>s.id===x.pid);return pl&&posGroup(pl.pos)===myGroup;});
  if(posMates.length>=2){
    const sorted=posMates.slice().sort((a,b)=>(b.c.apps||0)-(a.c.apps||0));
    if(sorted[0].pid===p.id && (G.careers[p.id]||{}).apps>=3){
      chips.push(`Most-capped ${myGroup}`);

  if(!chips.length)return '';
  return `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">
    ${chips.map(c=>`<span style="background:rgba(50,203,255,.14);color:#8be9ff;border:1px solid rgba(50,203,255,.3);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600">${c}</span>`).join('')}
  </div>`;
}

function renderSquadSnapshot(squad){

// Universal player opener — works from records book, awards, leaderboards.
// Finds a player anywhere (your pool, current field cache, persisted rival pool,
// or falls back to a career-only obituary card for retired legends).
function openPlayerById(id){
  if(id==null)return;
  const p= (G.pool||[]).find(x=>x.id===id)
        || (G.squad||[]).find(x=>x.id===id)
        || (G.fieldPlayers||[]).find(x=>x.id===id)
        || (G.matchPlayers||[]).find(x=>x.id===id);
  if(p){G.fieldPlayers=(G.fieldPlayers&&G.fieldPlayers.length?G.fieldPlayers:[p]);return openPlayer(id,true);}
  let found=null;
  Object.values(G.rivalPools||{}).forEach(pool=>{const f=pool.find(x=>x.id===id);if(f)found=f;});
  if(found){G.fieldPlayers=[found];return openPlayer(id,true);}
  // legend obit card
  const c=(G.careers||{})[id];if(!c)return;
  const el=document.createElement('div');el.className='modal-bg';el.onclick=e=>{if(e.target===el)el.remove()};
  el.innerHTML=`<div class="modal"><div class="mtop">
    <button class="mclose" onclick="this.closest('.modal-bg').remove()">✕</button>
    <div class="mname">${c.name}</div>
    <div class="msub">${c.pos||''} · ${shortNat(c.natName||'—')} · debut ${c.debut||'—'}</div></div>
    <div class="mbody"><p class="mr-txt" style="margin-bottom:8px">${careerSummary(c)}</p>
      ${renderPlayerCareerGrid({id})}
      <div class="btnrow" style="justify-content:center;margin-top:12px"><button class="btn ghost sm" onclick="this.closest('.modal-bg').remove();screenCareer(${id})">Full career →</button></div>
    </div></div>`;
  document.body.appendChild(el);
}

/* ===== CLOUD MODULE (accounts + cloud saves) — injected for online build ===== */
/* ============================================================
   CLOUD SAVES + ACCOUNTS  (Alpha 4.8 → online build)
   ------------------------------------------------------------
   Self-contained layer. It does three things and touches nothing
   else in the game:

     1. Boots Firebase (guarded — if the config is still the
        placeholder, or the SDK failed to load, the game runs
        exactly as before with LOCAL saves only).
     2. Overrides the three storage primitives — writeSlot,
        readSlot, clearSlot — so the game's existing slots,
        auto-save, and export/import all keep working unchanged.
          · guest / logged-out  → localStorage on this device
          · logged-in           → Firestore, per-user
     3. Provides the account UI (a small button on the title
        screen) and the guest→cloud migration on first sign-in.

   Design choice: we intercept at the STORAGE layer, not the game
   layer, so the ~12,000 lines above never need to know whether a
   save went to a device or the cloud.
   ============================================================ */
(function(){
  'use strict';

  // ---- 1. YOUR FIREBASE CONFIG ---------------------------------
  // Paste the snippet from the Firebase console here (Project
  // settings → your web app → "SDK setup and configuration" →
  // "Config"). It is SAFE for this to be public — it only names
  // your project. Real protection comes from the Firestore
  // security rules (provided separately), NOT from hiding this.
  // Until you paste real values, the game runs in local-only mode.
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyBZSjAqSZQbOFLQlxks8ZhEmZGaepxc6aU",
    authDomain:        "golden-generation-d4b54.firebaseapp.com",
    projectId:         "golden-generation-d4b54",
    storageBucket:     "golden-generation-d4b54.firebasestorage.app",
    messagingSenderId: "939809337560",
    appId:             "1:939809337560:web:c517a3c30c3184ffec27ad"
  };
  const CONFIG_IS_PLACEHOLDER = FIREBASE_CONFIG.apiKey.indexOf("PASTE_")===0;

  // ---- module state --------------------------------------------
  let fb = null;           // { app, auth, db }  once initialised
  let user = null;         // current Firebase user, or null (guest)
  let cloudReady = false;  // Firebase up AND a logged-in user
  const LOCAL_PREFIX = 'gg_save_';   // localStorage keys for guests

  // Expose a tiny status object the game can read if it wants to.
  const Cloud = window.GGCloud = {
    get user(){ return user; },
    get signedIn(){ return !!user; },
    get available(){ return !CONFIG_IS_PLACEHOLDER; },
    openAccount, signOutNow
  };

  // ---- 2. STORAGE OVERRIDES ------------------------------------
  // These replace the game's window.storage-based primitives.
  // The game calls writeSlot/readSlot/clearSlot; we route them.

  function localWrite(i, save){
    try{ localStorage.setItem(LOCAL_PREFIX+i, JSON.stringify(save)); return true; }
    catch(e){ return false; }
  }
  function localRead(i){
    try{ const s = localStorage.getItem(LOCAL_PREFIX+i); return s?JSON.parse(s):null; }
    catch(e){ return null; }
  }
  function localClear(i){
    try{ localStorage.removeItem(LOCAL_PREFIX+i); }catch(e){}
  }

  async function cloudWrite(i, save){
    const ref = fb.db.collection('saves').doc(user.uid).collection('slots').doc(String(i));
    await ref.set({ save: JSON.stringify(save), updatedAt: Date.now() });
    return true;
  }
  async function cloudRead(i){
    const ref = fb.db.collection('saves').doc(user.uid).collection('slots').doc(String(i));
    const snap = await ref.get();
    if(!snap.exists) return null;
    const d = snap.data();
    try{ return d && d.save ? JSON.parse(d.save) : null; }catch(e){ return null; }
  }
  async function cloudClear(i){
    const ref = fb.db.collection('saves').doc(user.uid).collection('slots').doc(String(i));
    await ref.delete();
  }

  // Install the overrides onto window so the game's calls hit these.
  // CLOUD-ONLY: saves live only in the signed-in user's Firestore account. There is no
  // device fallback — you must be signed in to save, load or delete. This is deliberate:
  // it keeps saves consistent across devices and nudges players to create an account.
  window.writeSlot = async function(i, save){
    if(!cloudReady) return 'no-auth';       // not signed in → the UI prompts to sign in
    try{ await cloudWrite(i, save); return true; }
    catch(e){
      window._lastCloudError = (e && (e.code||e.message)) || 'unknown';
      console.warn('[GGCloud] cloud write failed:', e);
      return false;
    }
  };
  window.readSlot = async function(i){
    if(!cloudReady) return null;
    try{ return await cloudRead(i); }
    catch(e){ console.warn('[GGCloud] cloud read failed:', e); return null; }
  };
  window.clearSlot = async function(i){
    if(!cloudReady) return false;
    try{ await cloudClear(i); return true; }
    catch(e){ console.warn('[GGCloud] cloud delete failed:', e); return false; }
  };

  // ---- 3. FIREBASE INIT + AUTH ---------------------------------
  function initFirebase(){
    if(CONFIG_IS_PLACEHOLDER) return false;
    if(typeof firebase==='undefined' || !firebase.initializeApp){
      console.warn('[GGCloud] Firebase SDK not loaded — running local-only.');
      return false;
    }
    try{
      const app  = firebase.initializeApp(FIREBASE_CONFIG);
      const auth = firebase.auth();
      const db   = firebase.firestore();
      fb = { app, auth, db };
      auth.onAuthStateChanged(function(u){
        user = u || null;
        cloudReady = !!user;
        refreshAccountButton();
      });
      return true;
    }catch(e){
      console.warn('[GGCloud] Firebase init failed — running local-only.', e);
      return false;
    }
  }

  // Sign-in methods --------------------------------------------------
  async function signInWithGoogle(){
    const provider = new firebase.auth.GoogleAuthProvider();
    try{ await fb.auth.signInWithPopup(provider); }
    catch(e){
      // Popups are blocked in some mobile in-app browsers → redirect.
      if(e && (e.code==='auth/popup-blocked' || e.code==='auth/operation-not-supported-in-this-environment')){
        await fb.auth.signInWithRedirect(provider);
      }else{ throw e; }
    }
    await afterSignIn();
  }
  async function signUpEmail(email, pass){
    await fb.auth.createUserWithEmailAndPassword(email, pass);
    await afterSignIn();
  }
  async function signInEmail(email, pass){
    await fb.auth.signInWithEmailAndPassword(email, pass);
    await afterSignIn();
  }
  async function signOutNow(){
    try{ await fb.auth.signOut(); }catch(e){}
    if(window.G) window.G._toast = 'Signed out — playing as guest on this device.';
    if(window.screenTitle) screenTitle();
  }

  // After any successful sign-in, offer to lift the current
  // device (guest) saves up to the cloud if the cloud is empty.
  async function afterSignIn(){
    user = fb.auth.currentUser; cloudReady = !!user;
    try{ await maybeMigrateGuestSaves(); }catch(e){}
    if(window.G) window.G._toast = 'Signed in — your saves now sync across devices.';
    if(window.screenTitle) screenTitle();
  }

  async function maybeMigrateGuestSaves(){
    // No-op: saves are cloud-only now, there are no device saves to migrate.
    return;
  }

  // ---- ACCOUNT UI ----------------------------------------------
  // A single floating button, top-right of the title screen.
  function refreshAccountButton(){
    let btn = document.getElementById('gg-account-btn');
    if(CONFIG_IS_PLACEHOLDER){ if(btn) btn.remove(); return; }
    if(!btn){
      btn = document.createElement('button');
      btn.id = 'gg-account-btn';
      btn.onclick = openAccount;
      btn.style.cssText =

        'font-family:sans-serif;font-weight:700;font-size:12px;padding:7px 12px;border-radius:20px;'+

        'box-shadow:0 3px 12px rgba(0,0,0,.35)';

    }
    if(user){
      const label = user.displayName || (user.email? user.email.split('@')[0] : 'Account');
      btn.textContent = '☁ '+label;

      btn.textContent = '☁ Sign in';

  function openAccount(){
    const wrap = document.getElementById('gg-auth-overlay');
    if(wrap){ wrap.remove(); return; }   // toggle closed
    const o = document.createElement('div');
    o.id = 'gg-auth-overlay';
    o.style.cssText =
      'position:fixed;inset:0;z-index:100001;display:flex;align-items:center;justify-content:center;'+
      'background:rgba(4,10,20,.72);backdrop-filter:blur(4px);padding:18px;font-family:sans-serif';
    const signedIn = !!user;
    o.innerHTML =
      '<div style="width:100%;max-width:340px;background:#0f1626;border:1px solid #26364f;'+
        'border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.5);color:#dce6f5">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
          '<b style="font-size:16px;color:#fff">'+(signedIn?'Your account':'Sign in to sync')+'</b>'+
          '<span id="gg-auth-x" style="cursor:pointer;font-size:20px;color:#7d8aa0;line-height:1">×</span>'+
        '</div>'+
        (signedIn ? accountBody() : signInBody())+
      '</div>';
    document.body.appendChild(o);
    o.addEventListener('click', function(e){ if(e.target===o) o.remove(); });
    document.getElementById('gg-auth-x').onclick = function(){ o.remove(); };
    if(!signedIn) wireSignInForm();
    else document.getElementById('gg-signout').onclick = function(){ o.remove(); signOutNow(); };
  }

  function accountBody(){
    const who = user.displayName || user.email || 'Signed in';
    return '<p style="font-size:13px;color:#9fb0c8;margin:0 0 16px">Signed in as <b style="color:#cfe">'+
             esc(who)+'</b>. Your three save slots sync to the cloud automatically.</p>'+
           '<button id="gg-signout" style="'+btnCss('#33405c','#dce6f5')+'">Sign out</button>';

  function signInBody(){
    return ''+
      '<button id="gg-google" style="'+btnCss('#fff','#1a1a1a')+';display:flex;align-items:center;justify-content:center;gap:8px">'+

  function wireSignInForm(){
    const err = function(m){ const e=document.getElementById('gg-auth-err'); if(e) e.textContent=m||''; };
    const email = function(){ return (document.getElementById('gg-email')||{}).value||''; };
    const pass  = function(){ return (document.getElementById('gg-pass') ||{}).value||''; };
    const guard = async function(fn){
      err('');
      try{ await fn(); const o=document.getElementById('gg-auth-overlay'); if(o) o.remove(); }
      catch(e){ err(friendly(e)); }
    };
    document.getElementById('gg-google').onclick   = function(){ guard(signInWithGoogle); };
    document.getElementById('gg-email-in').onclick = function(){
      if(!email()||!pass()){ err('Enter your email and password.'); return; }
      guard(function(){ return signInEmail(email(), pass()); });
    };
    document.getElementById('gg-email-up').onclick = function(){
      if(!email()||pass().length<6){ err('Use a valid email and a password of at least 6 characters.'); return; }
      guard(function(){ return signUpEmail(email(), pass()); });
    };
  }

  function friendly(e){
    const c = (e&&e.code)||'';
    if(c==='auth/invalid-email') return 'That email address looks wrong.';
    if(c==='auth/user-not-found'||c==='auth/wrong-password'||c==='auth/invalid-credential') return 'Email or password not recognised.';
    if(c==='auth/email-already-in-use') return 'That email already has an account — try signing in.';
    if(c==='auth/weak-password') return 'Password needs to be at least 6 characters.';
    if(c==='auth/popup-closed-by-user') return 'Sign-in cancelled.';
    if(c==='auth/network-request-failed') return 'Network problem — check your connection.';
    return 'Could not sign in. Please try again.';
  }

  // --- Deterministic RNG: same person id -> same appearance forever. ---
  function ggHash(str){var h=2166136261>>>0;for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function ggRng(seed){var s=ggHash(seed);return function(){s|=0;s=(s+0x6D2B79F5)|0;var t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
  function pickW(rng,arr,weights){
    if(!weights)return arr[Math.floor(rng()*arr.length)];
    var tot=0;for(var i=0;i<weights.length;i++)tot+=weights[i];
    var r=rng()*tot;for(var j=0;j<arr.length;j++){r-=weights[j];if(r<=0)return arr[j];}
    return arr[arr.length-1];
  }
  function nationIsoFor(natId){
    try{var n=NATIONS.find(function(x){return x.id===natId;});return n&&n.iso||'';}catch(_e){return '';}
  }
  function buildProfile(kind,id,iso,age,pos){
    var rng=ggRng(kind+'-'+id);
    var mix=NATION_MIX[iso]||NATION_MIX[(iso||'').split('-')[0]]||defaultMix();
    var eth=pickW(rng,mix.map(function(m){return m[0];}),mix.map(function(m){return m[1];}));
    var prof=ETH_PROFILES[eth]||ETH_PROFILES.mixed_ae;
    var skin=pickW(rng,prof.skin);
    var hair=pickW(rng,prof.hair,prof.hairW);
    var isMgr=kind==='m';
    // Hair style: short is dominant. Goalkeepers occasionally get longer.
    var lenPool = isMgr
      ? ['short','short crop','buzzed','receding hairline','balding on top','side-parted short']
      : (pos==='GK' ? ['short','short crop','curly short','longer swept back','buzzed']
                    : ['short','short crop','buzzed','faded sides','curly short','textured crop']);
    var hairLen=pickW(rng,lenPool);
    // No long ginger hair on non-European profiles (belt-and-braces: the pool
    // already excludes 'red' outside nw_european, but keep the guardrail).
    if(hair==='red' && eth!=='nw_european') hair='dark brown';
    // Beards: age- and ethnicity-gated. E-Asian less full beards.
    var beardChance = (isMgr?0.55:0.42) - (eth==='east_asian'?0.30:0);
    var beard='clean-shaven';
    if(rng()<beardChance){
      beard=pickW(rng,['short stubble','light stubble','goatee','trimmed short beard','well-groomed short beard']);
    }
    // Greying for older people.
    var hairColour=hair;
    if(isMgr){
      var grey=Math.max(0,(age-42)/22);
      if(rng()<grey) hairColour=pickW(rng,['salt-and-pepper','grey','silver']);
      if(age>=58 && rng()<0.4) hairColour='grey';
      if(age>=52 && beard!=='clean-shaven' && rng()<0.5) beard='grey '+beard;
    }
    // 16-year-olds don't get beards.
    if(!isMgr && age<=18 && rng()<0.85) beard='clean-shaven';
    return {eth:eth,skin:skin,hair:hairColour,hairLen:hairLen,beard:beard,age:age,role:isMgr?'football manager':'professional footballer'};
  }

  // --- IndexedDB cache. Falls back to in-memory if IDB is unavailable. ---
  var memCache={};
  function openDB(){
    return new Promise(function(res,rej){
      try{
        var r=indexedDB.open(DBNAME,DBVER);
        r.onupgradeneeded=function(){r.result.createObjectStore(STORE);};
        r.onsuccess=function(){res(r.result);};
        r.onerror=function(){rej(r.error);};
      }catch(e){rej(e);}
    });
  }
  var dbPromise=null;
  function db(){if(!dbPromise)dbPromise=openDB().catch(function(){return null;});return dbPromise;}
  function idbGet(k){return db().then(function(d){if(!d)return memCache[k]||null;return new Promise(function(res){try{var tx=d.transaction(STORE,'readonly').objectStore(STORE).get(k);tx.onsuccess=function(){res(tx.result||null);};tx.onerror=function(){res(null);};}catch(_){res(null);}});});}
  function idbSet(k,v){memCache[k]=v;return db().then(function(d){if(!d)return;return new Promise(function(res){try{var tx=d.transaction(STORE,'readwrite').objectStore(STORE).put(v,k);tx.onsuccess=function(){res();};tx.onerror=function(){res();};}catch(_){res();}});});}
  function idbClear(){memCache={};return db().then(function(d){if(!d)return;return new Promise(function(res){try{var tx=d.transaction(STORE,'readwrite').objectStore(STORE).clear();tx.onsuccess=function(){res();};tx.onerror=function(){res();};}catch(_){res();}});});}

  // --- Fetch queue (max 3 concurrent), dedupes by key. ---
  var inflight={}, queue=[], active=0, MAX=6;
  function enqueue(key,profile){
    if(inflight[key]) return inflight[key];
    inflight[key]=new Promise(function(resolve){
      idbGet(key).then(function(cached){
        if(cached){resolve(cached);return;}
        queue.push({key:key,profile:profile,resolve:resolve});
        pump();
      });
    });
    return inflight[key];
  }
  function pump(){
    while(active<MAX && queue.length){
      var job=queue.shift();
      active++;
      (function(j){
        fetch('/api/portrait',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seed:j.key,prompt:buildPrompt(j.profile)})})
          .then(function(r){if(!r.ok)return null;return r.json();})
          .then(function(json){
            if(!json||!json.b64_json){j.resolve(null);return;}
            var url='data:image/png;base64,'+json.b64_json;
            idbSet(j.key,url).then(function(){j.resolve(url);});
          })
          .catch(function(){j.resolve(null);})
          .then(function(){active--;pump();});
      })(job);
    }
  }

  // --- Placeholder tile: rendered synchronously inside every card. ---
  //     Returns HTML with data attributes; the observer picks it up and
  //     fetches the real portrait when the tile enters the DOM.
  function ggPortrait(kind,person){
    if(!person)return '';
    var id=person.id;
    if(id==null)return '';
    var iso=kind==='m'?(person.iso||''):nationIsoFor(person.natId);
    var age=Number(person.age)||(kind==='m'?45:24);
    var pos=person.pos||'';
    var key=kind+':'+id;
    var prof=buildProfile(kind,id,iso,age,pos);
    var initials=(person.name||'').split(/\s+/).filter(Boolean).map(function(s){return s[0];}).join('').slice(0,2).toUpperCase();
    var hue=ggHash(key)%360;
    // Store the profile on the element as JSON — one attribute, no repeat parsing.
    var payload=encodeURIComponent(JSON.stringify(prof));
    return '<span class="gg-portrait" data-pending="1" data-key="'+key+'" data-prof="'+payload+'" style="background:hsl('+hue+' 42% 42%)">'+
             '<span class="gg-portrait-ini">'+initials+'</span>'+
           '</span>';
  }
  window.ggPortrait=ggPortrait;

  function hydrate(root){
    if(!root||root.nodeType!==1&&root.nodeType!==9)return;
    var enabled=(localStorage.getItem(LS_KEY)||'on')!=='off';
    if(!enabled)return;
    var nodes=root.querySelectorAll?root.querySelectorAll('.gg-portrait[data-pending]'):[];
    for(var i=0;i<nodes.length;i++){
      (function(el){
        el.removeAttribute('data-pending');
        var key=el.getAttribute('data-key');
        var prof;try{prof=JSON.parse(decodeURIComponent(el.getAttribute('data-prof')||''));}catch(_){return;}
        enqueue(key,prof).then(function(url){
          if(!url){el.setAttribute('data-portrait-failed','1');return;}
          if(!el.isConnected)return;
          // Duplicate hydrate() calls (MutationObserver + go()'s manual call) can
          // race for the same element; only ever attach one image.
          if(el.querySelector('.gg-portrait-img'))return;
          var img=document.createElement('img');
          img.className='gg-portrait-img on';
          img.alt='';img.decoding='async';img.loading='lazy';
          img.src=url;
          el.appendChild(img);
        }).catch(function(e){try{console.warn('[portrait] hydrate failed',key,e);}catch(_){}});
      })(nodes[i]);
    }
  }
  var obs=new MutationObserver(function(muts){
    for(var i=0;i<muts.length;i++){
      var added=muts[i].addedNodes;
      for(var j=0;j<added.length;j++){
        var n=added[j];
        if(n.nodeType===1){
          if(n.classList&&n.classList.contains('gg-portrait')&&n.getAttribute('data-pending')) hydrate(n.parentNode||n);
          else hydrate(n);
        }
      }
    }
  });
  obs.observe(document.body,{childList:true,subtree:true});
  hydrate(document.body);
  // Exposed so go() can force-hydrate after each screen swap — MutationObserver
  // sometimes misses innerHTML-driven mutations depending on batching.
  window.ggPortraitsHydrate=hydrate;

  // --- User-facing controls exposed on window. ---
  window.ggPortraits={
    enable:function(){localStorage.setItem(LS_KEY,'on');location.reload();},
    disable:function(){localStorage.setItem(LS_KEY,'off');location.reload();},
    status:function(){return localStorage.getItem(LS_KEY)||'on';},
    clear:function(){return idbClear().then(function(){location.reload();});},
  };
})();
</script>
</body>
