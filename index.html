<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Golden Generation — Alpha 8.0</title>
<!-- Firebase (compat SDK) — powers optional accounts + cloud saves.
     If these fail to load (offline, blocked), the game falls back to
     local device saves automatically; nothing breaks. -->
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=Anton&family=Oswald:wght@500;600;700&family=Playfair+Display:wght@700;800;900&family=Archivo+Black&family=Bebas+Neue&family=Rubik:wght@600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1c;--bg2:#0f1626;--panel:#131c2e;--panel2:#182338;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --txt:#eef2f8;--dim:#9aa7bd;--dim2:#6b7890;
  --cyan:#26d5e0;--cyan-dk:#0e8f99;--gold:#f5c542;--gold-dk:#8a6d10;
  --red:#ff4d5e;--green:#37d67a;--amber:#ffb020;
  --accent:#26d5e0;--accent-ink:#04222a;--glow:rgba(38,213,224,.08);
}
/* ---- Home / default theme — MATCHDAY LIGHT (Alpha 2.6) ----
   A clean, football-manager "data desk": cool off-white ground, ink-dark text,
   teal + brass-gold accents, navy structure. Fonts, weights and every component
   shape are unchanged from before — this is a palette shift only. The host-world
   themes below still take over (rich and atmospheric) during their tournaments,
   so the base going light makes the "my desk → the big stage" shift a feature. */
#app.theme-home{
  --bg:#eef1f6;--bg2:#e7ebf2;--panel:#ffffff;--panel2:#f4f6fb;
  --line:rgba(20,40,80,.12);--line2:rgba(20,40,80,.20);
  --txt:#141d2e;--dim:#4a5773;--dim2:#7c88a0;
  --cyan:#0f7c8c;--cyan-dk:#0a5b67;--gold:#c8961e;--gold-dk:#7a5c12;
  --red:#d83a4a;--green:#1f9d5b;--amber:#c77f12;
  --accent:#0f7c8c;--accent-ink:#ffffff;--glow:rgba(15,124,140,.10);
  --display:'Barlow Condensed';--motif:none}
.welcome-splash{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;background:#05070d;animation:welcomeFade .5s ease}
@keyframes welcomeFade{from{opacity:0}to{opacity:1}}
.welcome-img{width:100%;max-width:520px;display:block;object-fit:contain}
.welcome-cta{position:fixed;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:20px 16px calc(24px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,#05070d 55%,rgba(5,7,13,.85) 80%,transparent);z-index:2}
.welcome-cta .btn.big{font-size:17px;padding:15px 40px;animation:welcomePulse 2s ease-in-out infinite}
@keyframes welcomePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.welcome-build{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;background:rgba(245,197,66,.12);border:1px solid rgba(245,197,66,.35);border-radius:20px;padding:4px 14px;display:inline-block}

/* ================= AUTHORED HOST IDENTITIES ================= */
/* Each host is a distinct designed world: palette + display font + background motif. */

/* USA · CANADA · MEXICO 2026 — bold American broadcast, electric red/blue, stars */
#app.host-usa{--bg:#0a1024;--bg2:#0f1733;--panel:#141d3d;--panel2:#1c2a52;--accent:#ff3b4e;--accent2:#3b7bff;--accent-ink:#fff;--glow:rgba(59,123,255,.16);--line2:rgba(255,59,78,.28);--display:'Archivo Black';
  --motif:repeating-linear-gradient(45deg,rgba(255,59,78,.04) 0 14px,transparent 14px 28px)}

/* SPAIN · PORTUGAL · MOROCCO — terracotta & Moorish zellige, elegant serif */
#app.host-iberia{--bg:#1f0f0a;--bg2:#2b1610;--panel:#37201a;--panel2:#472b22;--accent:#e8a13c;--accent2:#c65a3a;--accent-ink:#2a1400;--glow:rgba(232,161,60,.16);--line2:rgba(232,161,60,.26);--display:'Playfair Display';
  --motif:repeating-conic-gradient(from 0deg at 0 0,rgba(232,161,60,.05) 0deg 15deg,transparent 15deg 30deg)}

/* SAUDI ARABIA — desert gold & deep green, geometric */
#app.host-saudi{--bg:#0a1a0f;--bg2:#0f2416;--panel:#14301d;--panel2:#1b3f27;--accent:#e6c66e;--accent2:#3fa06a;--accent-ink:#1a1400;--glow:rgba(230,198,110,.16);--line2:rgba(230,198,110,.26);--display:'Fraunces';
  --motif:repeating-linear-gradient(0deg,rgba(230,198,110,.04) 0 2px,transparent 2px 22px),repeating-linear-gradient(90deg,rgba(230,198,110,.04) 0 2px,transparent 2px 22px)}

/* GERMANY (Euros) — precise Bauhaus, black/red/gold, industrial */
#app.host-germany{--bg:#111111;--bg2:#171717;--panel:#1e1e1e;--panel2:#282828;--accent:#ffce00;--accent2:#dd0000;--accent-ink:#1a1600;--glow:rgba(255,206,0,.14);--line2:rgba(255,206,0,.24);--display:'Oswald';
  --motif:linear-gradient(180deg,rgba(221,0,0,.06),transparent 30%)}

/* ITALY · TURKEY (Euros) — renaissance blue & marble */
#app.host-italy{--bg:#0a1626;--bg2:#0e1e33;--panel:#132a45;--panel2:#1a3a5e;--accent:#4db8ff;--accent2:#e8d9b0;--accent-ink:#04223a;--glow:rgba(77,184,255,.14);--line2:rgba(77,184,255,.24);--display:'Playfair Display';--motif:none}

/* UK · IRELAND (Euros) — classic green & royal, heritage */
#app.host-uk{--bg:#0a1f14;--bg2:#0e2a1b;--panel:#123723;--panel2:#18492e;--accent:#f5f0e6;--accent2:#3f8f5a;--accent-ink:#0a2015;--glow:rgba(245,240,230,.1);--line2:rgba(245,240,230,.2);--display:'Oswald';--motif:none}

/* BRAZIL (Copa) — tropical samba, vivid yellow/green/blue, playful rounded */
#app.host-brazil{--bg:#06260f;--bg2:#0a3416;--panel:#0e421e;--panel2:#135628;--accent:#ffe11a;--accent2:#009c5b;--accent-ink:#1a2000;--glow:rgba(255,225,26,.18);--line2:rgba(255,225,26,.3);--display:'Rubik';
  --motif:radial-gradient(circle at 15% 20%,rgba(0,156,91,.1),transparent 25%),radial-gradient(circle at 85% 70%,rgba(0,120,215,.1),transparent 25%)}

/* ARGENTINA (Copa) — sky blue & white, art-deco Buenos Aires */
#app.host-argentina{--bg:#0a1826;--bg2:#0e2338;--panel:#143050;--panel2:#1c4068;--accent:#8fd0ff;--accent2:#f0f4f8;--accent-ink:#04223a;--glow:rgba(143,208,255,.16);--line2:rgba(143,208,255,.28);--display:'Bebas Neue';--motif:none}

/* USA (Copa) — same American broadcast energy */
#app.host-usa-copa{--bg:#0a1024;--bg2:#0f1733;--panel:#141d3d;--panel2:#1c2a52;--accent:#ff3b4e;--accent2:#3b7bff;--accent-ink:#fff;--glow:rgba(59,123,255,.16);--line2:rgba(255,59,78,.28);--display:'Archivo Black';--motif:none}

/* MOROCCO (AFCON) — zellige terracotta & green */
#app.host-morocco{--bg:#1c0e08;--bg2:#26140c;--panel:#331c11;--panel2:#442817;--accent:#e0472e;--accent2:#2e8f5a;--accent-ink:#fff;--glow:rgba(224,71,46,.16);--line2:rgba(224,71,46,.26);--display:'Fraunces';
  --motif:repeating-conic-gradient(from 22deg at 50% 50%,rgba(46,143,90,.05) 0deg 22deg,transparent 22deg 45deg)}

/* IVORY COAST (AFCON) — vibrant orange & green */
#app.host-ivory{--bg:#1a1005;--bg2:#241809;--panel:#30210d;--panel2:#402d12;--accent:#ff8a1e;--accent2:#3f9e5a;--accent-ink:#241200;--glow:rgba(255,138,30,.16);--line2:rgba(255,138,30,.26);--display:'Rubik';--motif:none}

/* MEXICO (Gold Cup) — deep green & chile red, bold Anton */
#app.host-mexico{--bg:#0a1f10;--bg2:#0e2a16;--panel:#12371d;--panel2:#184827;--accent:#ce1126;--accent2:#f5f0e6;--accent-ink:#fff;--glow:rgba(206,17,38,.16);--line2:rgba(206,17,38,.3);--display:'Anton';--motif:none}
/* JAPAN (Asian Cup) — indigo & rising-sun red, precise Oswald */
#app.host-japan{--bg:#10101e;--bg2:#16162a;--panel:#1c1c38;--panel2:#252547;--accent:#e60033;--accent2:#f0f4f8;--accent-ink:#fff;--glow:rgba(230,0,51,.14);--line2:rgba(230,0,51,.26);--display:'Oswald';--motif:radial-gradient(circle at 50% -20%,rgba(230,0,51,.08),transparent 45%)}
/* NIGERIA (AFCON) — bold green & white */
#app.host-nigeria{--bg:#06260f;--bg2:#0a3416;--panel:#0e421e;--panel2:#135628;--accent:#3fd97a;--accent2:#f0f4f8;--accent-ink:#04220f;--glow:rgba(63,217,122,.16);--line2:rgba(63,217,122,.28);--display:'Anton';--motif:none}

/* apply the background motif overlay + display font */
#app[class*="host-"]{position:relative}
#app[class*="host-"] .compsplash .ctag,
#app[class*="host-"] .hero h1{font-family:var(--display),'Barlow Condensed',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;background:#0a0f1c}
/* The app frame sits on this; keep it dark so the letterbxing on very wide screens
   still reads as "broadcast", while the app's own theme controls the inside. */
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:1000px;min-height:100vh;color:var(--txt);background:
  radial-gradient(1200px 400px at 50% -10%,var(--glow),transparent 60%),
  var(--bg);
  position:relative;box-shadow:0 0 100px rgba(0,0,0,.6);overflow:hidden}
/* host motif overlay — subtle cultural texture behind everything */
#app::after{content:"";position:fixed;inset:0;max-width:1000px;left:50%;transform:translateX(-50%);
  background-image:var(--motif,none);pointer-events:none;z-index:0;opacity:.9}
#app>*{position:relative;z-index:1}
/* Robust text colour: force light on text/display elements so nothing falls back to
   browser-default black if inheritance breaks in the sandboxed artifact panel. */
#app h1,#app h2,#app h3,#app h4,#app p,#app label,#app td,#app th,#app li{color:var(--txt)}
/* ---- Alpha 1.17 UX pass ---------------------------------------------------
   Global helpers used by go(), emptyState() and future screens. Kept small
   and additive — none of these rules override existing per-screen styles. */
#screen{opacity:1;will-change:opacity}
#app h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;letter-spacing:.01em;line-height:1.05}
#app h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.02em;line-height:1.15}
#app h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
@media(max-width:480px){#app h1{font-size:24px}#app h2{font-size:19px}}
/* Empty-state block: use emptyState('📭','No offers','New bids arrive on match day.') */
.empty-state{text-align:center;padding:34px 18px;color:var(--dim);background:var(--panel);border:1px dashed var(--line2);border-radius:12px;margin:14px 0}
.empty-state .es-ic{font-size:34px;line-height:1;margin-bottom:10px;opacity:.7}
.empty-state .es-tt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.04em;text-transform:uppercase;color:var(--txt);margin-bottom:4px}
.empty-state .es-sub{font-size:12.5px;color:var(--dim2);max-width:38ch;margin:0 auto;line-height:1.5}
/* Denser player row utility: apply class="plrow" for two-line name/pos/OVR + wage/form. */
.plrow{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:5px 0}
.plrow .pl-main{min-width:0}
.plrow .pl-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;line-height:1.1;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plrow .pl-meta{font-size:11px;color:var(--dim2);letter-spacing:.04em;margin-top:2px}
.plrow .pl-ovr{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--gold);flex-shrink:0}
/* Ensure any touch target inside game screens meets 44px minimum on mobile. */
@media(max-width:480px){.opt,.btn,.navbtn{min-height:44px}}
/* ...but a newspaper is printed on paper. Dark ink, always. */
#app .paper,#app .paper h1,#app .paper h2,#app .paper h3,#app .paper h4,#app .paper p,#app .paper div,#app .paper span{color:#1a1a1a}
#app .paper .paper-masthead{color:#8f2d2d}
#app .paper-tabloid .paper-masthead{color:#c00}
#app .paper-broadsheet .paper-masthead{color:#1a2a45}
#app .paper .paper-byline{color:#8a6a1f}
#app .paper .paper-stand{color:#2a2a2a}
#app .paper .paper-pull{color:#444}
#app .paper .paper-edition{color:#666}
#app .prow .nm,#app .fixture .team,#app .scorebug .tn,#app .scorebug .sc,
#app .mname,#app .stat .sv,#app .selbar .cnt,#app .arow .an,#app .arow .ad,
#app .fopt b,#app .sopt b,#app .cev .ct,#app .newscard h3,#app .banner h2{color:var(--txt)}
/* Reinforce intentional dark-on-light (cyan/gold) — must beat the rules above. */
#app .btn{color:var(--accent-ink)}
#app .btn:disabled{color:var(--dim)}          /* legible on the panel2 disabled fill (Alpha 6.1) */
#app .btn.gold2:disabled{color:var(--dim)}
#app .btn.gold{color:#3a2c00}
#app .btn.ghost{color:var(--txt)}
#app .opt.sel,#app .opt.sel span,#app .opt.sel .h,#app .fopt.sel,#app .fopt.sel b,#app .fopt.sel span,
#app .pill.on,#app .tabbar .tb.on,#app .hubtabs .ht.on,
#app .prow.picked .add,#app .prow .nm .newbie{color:var(--accent-ink)}
#app .opt,#app .opt span,#app .opt .h,#app .fopt,#app .fopt b,#app .fopt span{color:var(--txt)}
#app .opt.sel,#app .opt.sel span,#app .opt.sel .h{color:var(--accent-ink)}
#app .prow .injtag{color:#fff}
#app .sopt.sel b,#app .sopt.sel .d,#app .sopt.sel .cnt{color:var(--txt)}
.screen{padding:0 0 80px;animation:fade .4s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.wrap{padding:0 22px 40px;padding-bottom:calc(40px + env(safe-area-inset-bottom))}

/* ---------- top status bar (broadcast lower-third motif) ---------- */
.statusbar{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--panel),var(--panel2));backdrop-filter:blur(8px);border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:14px;padding:11px 22px}
.statusbar .flag{width:30px;height:20px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px var(--line2)}
.statusbar .st-nation{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:.02em;text-transform:uppercase;line-height:1}
.statusbar .st-year{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.14em;color:var(--accent)}.statusbar .st-titles{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;color:var(--gold);display:flex;align-items:center;gap:5px}
.statusbar .divider{width:1px;height:20px;background:var(--line2)}
.topback{display:flex;justify-content:flex-start;margin:10px 0 2px}
.topback .btn{font-size:12px;padding:6px 12px}
.statusbar .st-build{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;color:var(--dim2);border:1px solid var(--line2);border-radius:4px;padding:2px 6px;margin-left:12px}
.statusbar .st-ach{cursor:pointer;font-size:15px;margin-left:10px;opacity:.75;transition:.15s}
.statusbar .st-ach:hover{opacity:1;transform:scale(1.15)}
.st-balance{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:4px 9px;cursor:pointer;transition:.14s;font-family:inherit}
.st-balance:hover{border-color:var(--accent);transform:translateY(-1px)}
.st-bal-ic{font-size:15px;line-height:1}
.st-bal-nums{display:flex;flex-direction:column;line-height:1.05;text-align:right}
.st-bal-funds{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px}
.st-bal-pl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.02em}
.statusbar .st-year{margin-left:12px}
/* ---- labeled navigation row under the status bar ---- */
.navwrap{position:sticky;top:0;z-index:39}
/* Scroll affordances: a faded arrow at each end, shown only when there's more that way.
   Toggled by .can-left / .can-right (set from a scroll listener in mountNavArrows). */
.navwrap::before,.navwrap::after{content:"";position:absolute;top:0;bottom:0;width:40px;pointer-events:none;z-index:2;opacity:0;transition:opacity .2s ease}
.navwrap::before{left:0;background:linear-gradient(90deg,var(--bg) 15%,transparent)}
.navwrap::after{right:0;background:linear-gradient(270deg,var(--bg) 15%,transparent)}
.navwrap.can-left::before{opacity:1}
.navwrap.can-right::after{opacity:1}
.nav-arrow{position:absolute;top:0;bottom:8px;display:flex;align-items:center;justify-content:center;width:30px;z-index:3;pointer-events:none;
  font-size:18px;color:var(--accent);opacity:0;transition:opacity .2s ease;font-weight:900}
.nav-arrow.l{left:2px}.nav-arrow.r{right:2px}
.navwrap.can-left .nav-arrow.l{opacity:.85}
.navwrap.can-right .nav-arrow.r{opacity:.85}
.navrow{display:flex;gap:6px;padding:8px 20px 10px 14px;
  background:linear-gradient(180deg,var(--panel2),var(--bg));backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.navrow::-webkit-scrollbar{display:none}
.navbtn{flex:1 0 auto;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:8px 10px 7px;
  cursor:pointer;transition:.14s;color:var(--txt);font-family:inherit}
.navbtn:hover,.navbtn:active{background:var(--panel2);border-color:var(--accent);transform:translateY(-1px)}
.navbtn-ic{position:relative;font-size:19px;line-height:1}
.navbtn-lb{font-size:10.5px;font-weight:700;letter-spacing:.02em;color:var(--dim);text-transform:uppercase}
.navbtn:hover .navbtn-lb{color:var(--txt)}
.navbtn-dot{position:absolute;top:-5px;right:-9px;background:var(--red);color:#fff;font-size:9px;font-weight:800;
  min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1}

/* ---------- best-23 squad stat strip (tap for trend) ---------- */
.squadstat{display:flex;align-items:center;gap:0;margin:0 14px 2px;padding:9px 6px;cursor:pointer;
  background:var(--panel);border:1px solid var(--line2);border-radius:11px;transition:.14s;position:relative}
.squadstat:hover,.squadstat:active{border-color:var(--accent);background:var(--panel2)}
.sq-cell{flex:1;text-align:center;min-width:0}
.sq-lab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dim2);white-space:nowrap}
.sq-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;line-height:1.1;color:var(--txt);
  display:flex;align-items:baseline;justify-content:center;gap:5px}
.sq-val .sq-up{color:var(--green);font-size:11px;font-weight:800}
.sq-val .sq-dn{color:var(--red);font-size:11px;font-weight:800}
.sq-val .sq-flat{color:var(--dim2);font-size:11px}
.sq-divider{width:1px;align-self:stretch;background:var(--line2);margin:2px 3px}
.sq-graph-ic{position:absolute;right:8px;top:6px;font-size:13px;opacity:.55}
@media(max-width:420px){
  .sq-val{font-size:18px}
  .sq-lab{font-size:9px;letter-spacing:.06em}
  .sq-val .sq-up,.sq-val .sq-dn,.sq-val .sq-flat{font-size:10px}
}
/* ---------- trend graph modal ---------- */
.trend-legend{display:flex;gap:20px;justify-content:center;margin-bottom:6px;font-size:13px;color:var(--dim)}
.trend-legend b{color:var(--txt);margin-left:3px}
.lg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.trend-wrap{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px}
.trend-svg{width:100%;height:auto;display:block}

/* ---------- news ticker ---------- */
/* Sits on the light theme now: a clean panel strip with dark text and the red NEWS
   flag as the one pop of colour, so it reads as part of the page rather than a dark island. */
.ticker{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line2);overflow:hidden;position:relative;height:34px;display:flex;align-items:center}
.ticker .badge{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.15em;padding:0 10px;height:100%;display:flex;align-items:center;text-transform:uppercase;flex-shrink:0;z-index:2}
.ticker .track{white-space:nowrap;animation:scroll 38s linear infinite;font-size:13px;color:var(--dim);padding-left:16px}
.ticker .track b{color:var(--txt)}
.ticker .track .sep{color:var(--accent);margin:0 14px;font-weight:700}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ---------- hero / title ---------- */
.hero{text-align:center;padding:58px 22px 34px;position:relative}
.hero .badge-top{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.42em;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(52px,13vw,104px);line-height:.86;letter-spacing:-.01em;text-transform:uppercase}
.hero h1 .g{color:var(--accent)}
.hero .tagline{font-size:15px;color:var(--dim);margin-top:14px;letter-spacing:.02em}

/* ---------- section headers ---------- */
.sechead{display:flex;align-items:center;gap:12px;margin:26px 0 14px}
.sechead .bar{width:4px;height:26px;background:var(--accent);border-radius:2px}
.sechead h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;letter-spacing:.01em;text-transform:uppercase;line-height:1}
.sechead .sub{font-size:13px;color:var(--dim);margin-left:auto}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
p.lede{font-size:14.5px;line-height:1.6;color:var(--dim);max-width:66ch;margin-bottom:18px}

/* ---------- buttons ---------- */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;background:var(--accent);color:var(--accent-ink);border:1px solid transparent;padding:12px 24px;cursor:pointer;border-radius:6px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-sizing:border-box;min-height:44px;line-height:1.1}
.btn:hover{background:#3ee2ec;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line2)}
.btn.ghost:hover{background:var(--panel2);border-color:var(--accent)}
.btn.gold{background:var(--gold);color:#3a2c00;box-shadow:0 0 0 2px rgba(245,197,66,.18),0 2px 14px rgba(245,197,66,.30)}
/* Alpha 5.7 wayfinding: SOLID yellow = the quick way forward (one per screen);
   OUTLINED yellow = the same step, hands-on. Everything else is optional. */
.btn.gold2{background:transparent;color:var(--gold-dk);border:1.5px solid var(--gold);font-weight:800}
#app .btn.gold2{color:var(--gold-dk)}
/* Disabled outline button must stay READABLE — a placeholder like "Pick 23 more"
   was pale-gold-on-white at 0.35 opacity and illegible (Alpha 6.1). Give disabled
   buttons a neutral, legible treatment instead of just fading them. */
.btn.gold2:disabled{background:var(--panel2);color:var(--dim);border:1px solid var(--line2);opacity:.85}
/* Alpha 5.9: minimalist You <-> Assistant slider */
.arow{display:flex;align-items:center;gap:12px;padding:14px 2px;border-bottom:1px solid var(--line)}
.arow:last-of-type{border-bottom:none}
.arow .at-l{flex:1;min-width:0}
.arow .at-t{font-weight:700;font-size:14.5px}
.arow .at-d{font-size:12px;color:var(--dim);margin-top:1px}
.aswrap{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ascap{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dim2);min-width:52px;text-align:right}
.ascap.on{color:var(--gold)}
.aswitch{position:relative;width:44px;height:24px;border-radius:12px;background:var(--line2);transition:background .18s}
.aswitch.on{background:var(--gold)}
.aswitch .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .18s}
.aswitch.on .knob{left:22px}
.btn.gold:hover{background:#ffd45e}
.btn.sm{padding:8px 16px;font-size:12.5px;min-height:38px}
.btn:disabled{cursor:not-allowed;transform:none;background:var(--panel2);color:var(--dim);border:1px solid var(--line2);box-shadow:none;opacity:.85}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;align-items:stretch}

/* ---------- nation cards ---------- */
.nations{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:660px){.nations{grid-template-columns:1fr}}
.ncard{position:relative;text-align:left;cursor:pointer;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:20px;transition:.16s;overflow:hidden}
.ncard::after{content:"";position:absolute;inset:0;border-radius:12px;border:1px solid transparent;transition:.16s;pointer-events:none}
.ncard:hover{transform:translateY(-4px);box-shadow:0 16px 40px -18px rgba(0,0,0,.7)}
.ncard:hover::after{border-color:var(--accent)}
.ncard .top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ncard .flag{width:52px;height:35px;border-radius:4px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.12)}
.ncard h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;text-transform:uppercase;line-height:1}
.ncard .tag{font-size:12px;color:var(--dim);letter-spacing:.04em}
.ncard .desc{font-size:13px;color:var(--dim);line-height:1.5}
.ncard .fac{margin-top:14px;display:flex;align-items:center;gap:10px}
.ncard .fac .lab{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim2)}
.ncard .fac .bars{display:flex;gap:3px}
.ncard .fac .bars i{width:20px;height:5px;background:var(--line2);border-radius:3px}
.ncard .fac .bars i.on{background:var(--accent)}
.ncard .conf{position:absolute;top:16px;right:16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);background:rgba(255,255,255,.05);padding:3px 8px;border-radius:20px}
.nations.compact{grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:720px){.nations.compact{grid-template-columns:repeat(2,1fr)}}
.ncard.compact{padding:13px 14px}
.ncard.compact .flag{width:38px;height:26px}
.ncard.compact .desc{font-size:11.5px;margin-top:8px}
.ncard.compact .fac .bars i{width:12px;height:4px}
.natsearch{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:13px 15px;color:var(--txt);font-family:inherit;font-size:15px;outline:none;transition:.15s}
.natsearch:focus{border-color:var(--accent)}
.natsearch::placeholder{color:var(--dim2)}
.qchip{position:absolute;top:10px;right:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(245,197,66,.4);border-radius:3px;padding:2px 5px;background:rgba(245,197,66,.08);z-index:2}
.ncard.compact{display:flex;flex-direction:column;min-height:150px}
.ncard.compact .desc{flex:1}
.ncard.compact .fac{margin-top:auto;padding-top:10px}

/* ---------- selection bar ---------- */
.selbar{position:sticky;top:47px;z-index:30;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 8px 24px -12px rgba(0,0,0,.7)}
.selbar .cnt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;line-height:.9}
.selbar .cnt small{display:block;font-family:'Barlow',sans-serif;font-weight:600;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:2px}
.selbar .cnt.full{color:var(--green)}
.chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.06em;padding:5px 10px;border:1px solid var(--line2);border-radius:20px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:5px;white-space:nowrap}
.chip.on{border-color:var(--green);color:var(--green);background:rgba(55,214,122,.08)}
.chip.style-on{border-color:var(--accent);color:var(--accent);background:rgba(38,213,224,.08)}

/* ---------- filter pills ---------- */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.pill{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:7px 13px;border:1px solid var(--line2);border-radius:20px;background:transparent;color:var(--dim);cursor:pointer;transition:.12s}
.pill:hover{border-color:var(--accent);color:var(--txt)}
.pill.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

/* ---------- player rows (rebuilt: no overlap, mobile-first) ---------- */
.plist{display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 12px;cursor:pointer;transition:transform .12s ease,border-color .12s,background .12s}
/* The squad-selection rows (prow-tall) stack a full-width name title above the main
   row. The name title scrolls horizontally on its own so even the longest names are
   fully readable, never truncated or broken mid-word. Other .prow uses (match squad
   viewer, penalty-taker picker) keep the compact horizontal layout above. */
.prow-tall{flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden}
.prow-tall .pname-strip{display:flex;align-items:center;gap:6px;padding:9px 12px 7px;border-bottom:1px solid var(--line);
  overflow-x:auto;overflow-y:hidden;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.prow-tall .pname-strip::-webkit-scrollbar{display:none}
.prow-tall .pname-scroll{font-weight:700;font-size:16px;line-height:1.2;color:var(--txt);white-space:nowrap;flex:0 0 auto}
/* ---- Squad-selection card: full-width horizontal bands, generous margins ---- */
/* Band 1: identity — add button, portrait+badge, club/tags (fills middle), rating+age. */
.prow-tall .ptop{display:flex;align-items:center;gap:12px;padding:12px 14px}
.prow-tall .pident{display:flex;align-items:center;gap:9px;flex-shrink:0}
.prow-tall .pmeta{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.prow-tall .club{display:flex;align-items:center;gap:7px;min-width:0}
.prow-tall .club .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.prow-tall .club .cname{font-size:13.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.prow-tall .club .lvl{flex-shrink:0}
.prow-tall .tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.prow-tall .stats{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:1px;min-width:46px}
/* Band 2: the three form stats, full width, in a bordered strip that spans the card. */
.prow-tall .pform{display:flex;align-items:stretch;margin:0 14px 12px;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel2)}
.prow-tall .pform .fm{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;min-width:0;text-align:center}
.prow-tall .pform .fm+.fm{border-left:1px solid var(--line)}
.prow-tall .pform .lbl{font-family:'Barlow',sans-serif;font-weight:600;font-size:8.5px;letter-spacing:.07em;color:var(--dim2);text-transform:uppercase;white-space:nowrap}
.prow-tall .pform .val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
/* Auto-scroll: only strips JS has marked as overflowing (.is-overflowing) animate.
   The name drifts left to reveal its end, holds, and returns — so long names are fully
   visible without any interaction, while names that already fit never move. The user
   can also still swipe the strip manually. */
@keyframes pnameDrift{
  0%,18%{transform:translateX(0)}
  50%,68%{transform:translateX(var(--pname-shift,0))}
  100%{transform:translateX(0)}
}
.prow-tall .pname-strip.is-overflowing .pname-scroll{animation:pnameDrift 6s ease-in-out infinite;will-change:transform}
.prow-tall .pname-strip.is-overflowing:hover .pname-scroll,
.prow-tall .pname-strip.is-overflowing:active .pname-scroll{animation-play-state:paused}
@media(prefers-reduced-motion:reduce){
  .prow-tall .pname-strip.is-overflowing .pname-scroll{animation:none}
}
.prow:hover{border-color:var(--line2);background:var(--panel2);transform:translateY(-1px)}
.prow.picked{border-color:var(--accent);background:linear-gradient(90deg,rgba(38,213,224,.1),var(--panel))}
.prow.injured{opacity:.55}
.prow .add{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--dim2);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--dim2);transition:.12s;flex-shrink:0}
.prow.picked .add{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.prow .posbadge{flex-shrink:0;width:38px;height:38px;border-radius:8px;background:var(--panel2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--accent);letter-spacing:.02em}
.prow .body{flex:1;min-width:0}
.prow .lvl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;line-height:1.4}
.lvl-elite{background:rgba(245,197,66,.18);color:var(--gold)}
.lvl-strong{background:rgba(38,213,224,.16);color:var(--accent)}
.lvl-mid{background:rgba(255,255,255,.09);color:var(--dim)}
.lvl-modest{background:rgba(255,255,255,.05);color:var(--dim2)}
.lvl-lower{background:rgba(255,255,255,.03);color:#4a5468}
.prow .tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;line-height:1.4}
.prow .tag.style{background:rgba(38,213,224,.12);color:var(--accent)}
.prow .tag.arche{background:rgba(255,176,32,.14);color:var(--amber)}
.prow .newbie{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:9px;letter-spacing:.1em;background:var(--accent);color:var(--accent-ink);padding:1px 6px;border-radius:3px;text-transform:uppercase}
.prow .injtag{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:9px;letter-spacing:.08em;background:var(--red);color:#fff;padding:2px 6px;border-radius:3px}
.prow-tall .stat-rat{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;line-height:1;text-align:right}
.prow-tall .stat-age{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;line-height:1;color:var(--dim);display:flex;align-items:baseline;gap:3px}
.prow-tall .stat-age.young{color:var(--green)}
.prow-tall .stat-age.old{color:var(--amber)}
.prow-tall .stat-age .u{font-family:'Barlow',sans-serif;font-weight:600;font-size:8px;letter-spacing:.08em;color:var(--dim2);text-transform:uppercase}
.rat-elite{color:var(--gold)}.rat-good{color:var(--accent)}.rat-ok{color:var(--txt)}.rat-low{color:var(--dim)}
.listhdr{display:none}
@media(max-width:520px){
  .prow-tall .stat-rat{font-size:28px}
  .prow .posbadge{width:34px;height:34px;font-size:12px}
}

/* ---------- player detail modal ---------- */
/* ---- THE SECRETARY'S GUIDE ----
   Four dimmer panels fenced around the target, leaving a real hole. NOT a full
   overlay with a lifted element: #app is position:relative + overflow:hidden and
   #app>* is z-index:1, so #app forms a stacking context. Nothing inside it can
   ever out-rank a body-level overlay, whatever z-index we give it — that's why
   lifting the target left the screen grey and dead. The hole is the only way the
   real element stays lit AND clickable, because we never cover it at all. */
.gg-dim{position:fixed;background:rgba(4,8,16,.74);z-index:60;pointer-events:auto}
/* Sandbox banner: always visible while the tutorial scenario runs, so it's obvious
   this isn't a real save and there's always a way out. */
.tut-bar{position:fixed;left:0;right:0;bottom:0;z-index:70;display:flex;align-items:center;
  justify-content:space-between;gap:12px;padding:9px 14px;background:linear-gradient(180deg,rgba(20,26,40,.96),rgba(12,16,26,.99));
  border-top:1px solid var(--gold);box-shadow:0 -8px 24px -10px rgba(0,0,0,.8)}
.tut-bar .tb-lab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--gold)}
.tut-bar .tb-sub{font-size:11px;color:var(--dim2)}
body.tut-on{padding-bottom:46px}
/* A passthrough step dims for focus but must not intercept taps — the Director is
   choosing among items spread across a container too large to fence. */
.gg-dim.gg-pass{pointer-events:none}
.gg-ring{position:fixed;z-index:61;pointer-events:none;border:2px solid var(--gold);border-radius:10px;
  box-shadow:0 0 0 3px rgba(245,197,66,.18),0 0 26px rgba(245,197,66,.30)}
.gg-card{position:fixed;z-index:62;width:min(320px,calc(100vw - 24px));background:var(--panel);
  border:1px solid var(--line2);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;
  box-shadow:0 18px 50px -12px rgba(0,0,0,.75);transition:top .2s ease,left .2s ease}
.gg-card .gg-who{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);opacity:.85;margin-bottom:6px;display:flex;justify-content:space-between}
.gg-card .gg-body{font-size:12.5px;line-height:1.55;color:var(--txt);min-height:2.4em}
.gg-card .gg-body b{color:var(--gold);font-weight:700}
.gg-card .gg-act{margin-top:8px;font-size:11.5px;color:var(--dim);font-style:italic}
.gg-card .gg-row{display:flex;gap:6px;align-items:center;margin-top:11px}
.gg-card .gg-row .sp{flex:1}
.gg-arrow{background:transparent;border:1px solid var(--line2);color:var(--gold);border-radius:6px;
  width:26px;height:26px;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.gg-arrow:disabled{opacity:.3;cursor:default}
.gg-dots{display:flex;gap:4px;align-items:center}
.gg-dots i{width:5px;height:5px;border-radius:50%;background:var(--line2);transition:background .15s}
.gg-dots i.on{background:var(--gold)}
.gg-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;
  background:var(--gold);color:#1a1405;border:0;border-radius:7px;padding:8px 15px;cursor:pointer;text-transform:uppercase}
.gg-btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line2)}
.gg-step{font-size:11px;color:var(--dim2);font-variant-numeric:tabular-nums}
@media(max-width:520px){.gg-card{width:calc(100vw - 20px);left:10px!important}}
.modal-bg{position:fixed;inset:0;background:rgba(4,8,16,.82);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:fade .2s ease;backdrop-filter:blur(3px)}
.modal{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:16px;max-width:520px;width:100%;overflow:hidden;box-shadow:0 30px 80px -20px #000}
.modal .mtop{background:linear-gradient(120deg,rgba(38,213,224,.14),transparent);padding:22px;border-bottom:1px solid var(--line);position:relative}
.modal .mclose{position:absolute;top:16px;right:18px;font-size:22px;color:var(--dim);cursor:pointer;line-height:1;background:none;border:none}
.modal .mclose:hover{color:var(--txt)}
.modal .mname{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;line-height:.95;text-transform:uppercase;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal .msub{font-size:13px;color:var(--dim);margin-top:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.modal .mbody{padding:20px 22px}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px;text-align:center}
.stat .sv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;line-height:1}
.stat .sl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);margin-top:4px;font-weight:600}
.mline{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.mline .ml-l{color:var(--dim)}
.mline .ml-r{font-weight:600;text-align:right}
.tagpill{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin:2px 3px 2px 0}
.tp-style{background:rgba(38,213,224,.14);color:var(--accent);border:1px solid rgba(38,213,224,.3)}
.tp-arche{background:rgba(255,176,32,.14);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.tp-inj{background:rgba(255,77,94,.14);color:var(--red);border:1px solid rgba(255,77,94,.3)}
.tp-gem{background:rgba(245,197,66,.14);color:var(--gold);border:1px solid rgba(245,197,66,.3)}
.scout{font-size:13px;line-height:1.6;color:var(--dim);font-style:italic;background:var(--panel);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:6px}

/* ---------- formation / tactics ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:660px){.grid2{grid-template-columns:1fr}}
.tblock .tl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 14px;cursor:pointer;font-weight:600;font-size:14px;transition:.12s;display:flex;justify-content:space-between;align-items:center;gap:10px;color:var(--txt)}
.opt span{color:var(--txt)}
.opt.sel,.opt.sel span,.opt.sel .h{color:var(--accent-ink)}
.opt:hover{border-color:var(--line2)}
.opt.sel{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.opt .h{font-family:'Barlow',sans-serif;font-weight:500;font-size:11px;opacity:.7;text-align:right}
.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:660px){.formgrid{grid-template-columns:repeat(2,1fr)}}
.fopt{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:13px 6px;cursor:pointer;transition:.12s}
.fopt:hover{border-color:var(--line2)}
.fopt.sel{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.fopt b{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;display:block;line-height:1}
.fopt span{font-size:10px;letter-spacing:.04em;opacity:.75;text-transform:uppercase}
.stylegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:660px){.stylegrid{grid-template-columns:repeat(2,1fr)}}
.sopt{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 13px;cursor:pointer;transition:.12s}
.sopt:hover{border-color:var(--line2)}
.sopt.sel{background:linear-gradient(160deg,rgba(38,213,224,.2),var(--panel));border-color:var(--accent)}
.sopt b{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;display:block;line-height:1.1}
.sopt .cnt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--accent);margin-top:5px}
.sopt .d{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.4}

/* ---------- match / commentary ---------- */
.matchscreen{padding-top:8px}
.scorebug{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:16px}
.scorebug .comp{background:rgba(38,213,224,.1);text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);padding:7px}
.scorebug .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 14px;gap:10px}
.scorebug .side{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0;overflow:hidden}
.scorebug .side.away{flex-direction:column;text-align:center}
.scorebug .side .fl{width:52px;height:35px;border-radius:5px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
.scorebug .side .tn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(12px,3.4vw,17px);text-transform:uppercase;line-height:1.05;text-align:center;max-width:100%;overflow-wrap:anywhere}
.matchstats{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.matchstats .msrow{display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.matchstats .msl,.matchstats .msr{font-size:16px;color:var(--txt);min-width:44px}
.matchstats .msl{text-align:left}.matchstats .msr{text-align:right}
.matchstats .msmid{font-family:'Barlow',sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim2)}
.matchstats .msbar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:6px}
.matchstats .msfill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
.scorebug .sc{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:46px;line-height:1;min-width:92px;text-align:center;letter-spacing:.02em;transition:transform .2s ease}
.scorebug .sc.pulse{animation:scpulse .5s ease}
@keyframes scpulse{0%{transform:scale(1)}40%{transform:scale(1.25);color:var(--accent)}100%{transform:scale(1)}}
.scorebug .clock{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.2em;color:var(--amber);padding-bottom:12px}
.scorebug .clock.ft{color:var(--green)}
.commentary{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cev{display:flex;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px;line-height:1.4;animation:slidein .3s ease;background:var(--panel)}
@keyframes slidein{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.cev .cm{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--dim2);width:34px;flex-shrink:0}
.cev.goal{background:linear-gradient(90deg,rgba(38,213,224,.14),var(--panel))}
.cev.goal .cm{color:var(--accent)}
.cev.goal .ct{font-weight:700}
.cev.goalopp{background:linear-gradient(90deg,rgba(255,77,94,.12),var(--panel))}
.cev.big .ct{font-weight:700}
.cev.ht{background:var(--panel2)}
.cev .ct .scorer{color:var(--accent);font-weight:700}
.cev .ct .assist-note{color:var(--dim2);font-size:12.5px}
.cev.card-yel{background:linear-gradient(90deg,rgba(245,197,66,.10),var(--panel))}
.cev.card-yel .cm{color:#f5c542}
.cev.card-red{background:linear-gradient(90deg,rgba(255,77,94,.12),var(--panel))}
.cev.card-red .cm{color:var(--red)}
.cev .kc{margin-right:6px}

/* ---------- tournament hub / bracket ---------- */
.hubgrid{display:grid;grid-template-columns:1fr;gap:10px}
.fixture{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.fixture.you{border-color:var(--accent);background:linear-gradient(90deg,rgba(38,213,224,.08),var(--panel))}
.fixture .fl{width:34px;height:23px;border-radius:3px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.14)}
.fixture .team{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase}
.fixture .vs{color:var(--dim2);font-size:12px;letter-spacing:.1em}
.fixture .res{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px}

/* group table */
.gtable{width:100%;border-collapse:collapse;font-size:14px}
.gtable th{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim2);padding:8px 6px;text-align:center;border-bottom:1px solid var(--line2)}
.gtable th:nth-child(2){text-align:left}
.gtable td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--line);height:44px;box-sizing:border-box}
/* fixed, tabular numerals keep every stat column the same width across tables */
.gtable td:not(.tm),.gtable th:not(:nth-child(2)){width:34px;font-variant-numeric:tabular-nums}
.gtable td:first-child,.gtable th:first-child{width:26px}
.gtable td.tm{text-align:left;font-weight:600;vertical-align:middle;white-space:nowrap}
.gtable td.tm .fl{width:26px;height:17px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.14);vertical-align:middle;display:inline-block}
.gtable td.tm .tmname{vertical-align:middle;display:inline-block;margin-left:9px}
.gtable tr.you td{background:rgba(38,213,224,.1)}
.gtable tr.qual td:first-child{box-shadow:inset 3px 0 0 var(--green)}
.gtable tr.cutline td{border-bottom:2px dashed var(--amber)}
.gtable tr.playoff td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
.gtable tr.playoff td{background:rgba(255,176,32,.06)}
.gtable .pts{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px}

/* banners */
.banner{text-align:center;padding:30px 22px;border:1px solid var(--line2);border-radius:14px;margin-bottom:20px;background:linear-gradient(165deg,var(--panel2),var(--panel))}
.banner.win{border-color:var(--gold);background:linear-gradient(165deg,rgba(245,197,66,.14),var(--panel))}
.banner.out{border-color:rgba(255,77,94,.4)}
.banner .bk{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
.banner.win .bk{color:var(--gold)}
.banner h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(30px,7vw,54px);line-height:.95;text-transform:uppercase;margin:8px 0}
.banner .bs{font-size:14px;color:var(--dim)}
.trophy{font-size:44px}
.dynasty{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.dchip{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;padding:5px 11px;border:1px solid var(--line2);border-radius:20px;color:var(--dim);display:flex;align-items:center;gap:5px}
.dchip.win{border-color:var(--gold);color:var(--gold)}

/* aging */
.agegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:660px){.agegrid{grid-template-columns:1fr}}
.acard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px}
.acard .at{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.acard.rise .at{color:var(--green)}.acard.fall .at{color:var(--red)}.acard.new .at{color:var(--accent)}.acard.ret .at{color:var(--dim)}
/* Three aligned columns: name (flex) | meta (fixed, left-aligned) | detail (right).
   Grid keeps the meta and the detail in straight vertical columns no matter how long
   or short each player's name is — so "Your continuing core" reads as a clean table. */
.arow{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;column-gap:12px;
  padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer}
.arow:last-child{border:none}
.arow:hover .an{color:var(--accent)}
.arow .aname{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:baseline;column-gap:10px;min-width:0}
.arow .an{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.arow .am{font-size:11px;color:var(--dim2);font-weight:500;white-space:nowrap;text-align:right}
.arow .ad{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;text-align:right;white-space:nowrap}
.arow .ad .up{color:var(--green)}.arow .ad .dn{color:var(--red)}
.empt{font-size:12.5px;color:var(--dim2);font-style:italic;padding:8px 0}

/* news card */
.newscard{background:linear-gradient(120deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.newscard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.newscard .src{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.newscard h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;line-height:1.1;text-transform:uppercase;margin-bottom:8px}
.newscard p{font-size:13.5px;color:var(--dim);line-height:1.6}

.notecard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:10px 0;font-size:13px;line-height:1.6;color:var(--dim)}
/* ---- Advanced guide: colour-coded by tier ---- */
.gadv .gsec{margin:22px 0 4px}
.gadv .gsec h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.02em;color:var(--txt);margin:0}
.gadv .gsub{font-size:12px;color:var(--dim2);margin:2px 0 0;line-height:1.5}
.gadv .gcard{border:1px solid var(--line);border-left-width:4px;border-radius:9px;padding:11px 14px;margin:9px 0;font-size:12.5px;line-height:1.62;color:var(--dim);background:var(--panel)}
.gadv .gcard .gh{font-weight:700;color:var(--txt);font-size:13.5px;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gadv .gcard.t1{border-left-color:var(--gold)}
.gadv .gcard.t2{border-left-color:#ff7a59}
.gadv .gcard.t3{border-left-color:var(--accent)}
.gadv .gcard.t4{border-left-color:#7c8cff}
.gadv .gcard.t5{border-left-color:var(--dim2)}
.gadv .gcard.tb{border-left-color:#c77dff}
.gadv .gcard.tv{border-left-color:var(--green)}
.gk-1,.gk-2,.gk-3,.gk-4,.gk-5,.gk-var{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap;display:inline-flex;align-items:center;line-height:1.4}
.gk-1{background:rgba(245,197,66,.16);color:var(--gold)}
.gk-2{background:rgba(255,122,89,.16);color:#ff7a59}
.gk-3{background:rgba(38,213,224,.14);color:var(--accent)}
.gk-4{background:rgba(124,140,255,.16);color:#9aa6ff}
.gk-5{background:rgba(106,122,144,.16);color:var(--dim)}
.gk-var{background:rgba(58,208,122,.14);color:var(--green)}
.hostcard{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,rgba(38,213,224,.1),var(--panel));border:1px solid var(--line2);border-radius:12px;padding:14px 16px;margin-bottom:14px;scroll-margin-top:110px}
.hostbanner{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,rgba(38,213,224,.12),var(--panel));border:1px solid var(--line2);border-radius:12px;padding:10px 14px;margin-bottom:14px}
.hostbanner .hb-flag{width:46px;height:31px;border-radius:5px;object-fit:cover;display:block;box-shadow:0 2px 8px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.12);flex:0 0 46px}
.hostbanner .hb-txt{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.hostbanner .hb-lab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
.hostbanner .hb-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-transform:uppercase;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hostbanner .hb-year{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--dim);flex-shrink:0}
.hostcard .hostflag{width:56px;height:38px;border-radius:5px;object-fit:contain;box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.12);flex-shrink:0}
.hostcard .hl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.hostcard .hn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;line-height:1.05;color:var(--txt)}
.hostcard .hc{font-size:12px;color:var(--dim);margin-top:3px}

/* ---- MANAGER CARDS ---- */
.mgrgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:720px){.mgrgrid{grid-template-columns:1fr}}
.mgrcard{text-align:left;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:15px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:10px}
.mgrcard:hover{transform:translateY(-2px);border-color:var(--line2)}
.mgrcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;background:linear-gradient(160deg,var(--glow),var(--panel))}
.mgr-top{display:flex;align-items:center;gap:11px}
.mgr-flag{width:34px;height:23px;border-radius:3px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.15);flex-shrink:0}
.mgr-id{flex:1;min-width:0}
.mgr-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;text-transform:uppercase;line-height:1.05;color:var(--txt)}
.mgr-sub{font-size:11.5px;color:var(--dim);margin-top:2px}
.mgr-sub .home{color:var(--accent);font-weight:600}
.mgr-rating{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;line-height:1;color:var(--dim)}
.mgr-rating.good{color:var(--accent)}
.mgr-rating.elite{color:var(--gold)}
.mgr-body{display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--line);padding-top:9px}
.mgr-line{display:flex;justify-content:space-between;font-size:12.5px;gap:8px}
.mgr-line .ml{color:var(--dim2);font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:9.5px;align-self:center}
.mgr-line .mv{font-weight:600;color:var(--txt);text-align:right}
.fit-perfect{color:var(--green)!important}
.fit-good{color:var(--accent)!important}
.fit-workable{color:var(--amber)!important}
.fit-poor{color:var(--red)!important}
.mgr-quote{font-size:11.5px;font-style:italic;color:var(--dim2);border-left:2px solid var(--line2);padding-left:9px}
/* ---- World ranking, nation card, manager profile, renewal (Alpha 2.9) ---- */
.ranklist{display:flex;flex-direction:column;gap:4px;margin:6px 0}
.rankhead,.rankrow{display:grid;grid-template-columns:34px 26px 1fr auto auto;align-items:center;gap:10px}
.rankhead{padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2)}
.rankrow{padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:.13s;text-align:left;font-family:inherit;color:var(--txt);width:100%}
.rankrow:hover{border-color:var(--accent);background:var(--panel2)}
.rankrow.me{border-color:var(--gold);background:linear-gradient(90deg,rgba(200,150,30,.08),var(--panel))}
.rankrow .rk-pos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:var(--dim)}
.rankrow.me .rk-pos{color:var(--gold)}
.rk-flag{width:24px;height:16px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px var(--line2)}
.rk-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-name .rk-sub{display:block;font-family:'Inter',system-ui,sans-serif;font-weight:400;font-size:11px;color:var(--dim2);white-space:normal;overflow:visible;line-height:1.35;margin-top:1px}
.rk-name .rk-sub b{font-weight:800}
.rk-name .rk-fitpill{display:inline-block;margin-top:4px;padding:1px 8px;border:1px solid;border-radius:6px;font-family:'Inter',system-ui,sans-serif;font-size:10.5px;font-weight:800;line-height:1.6;white-space:nowrap;letter-spacing:.01em}
.rk-you{font-size:9px;font-weight:800;letter-spacing:.1em;color:#fff;background:var(--gold);padding:1px 5px;border-radius:4px;vertical-align:middle}
.rk-tier{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em}
.rk-pts{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--accent)}
.rankhead .rk-pts,.rankhead .rk-tier,.rankhead .rk-name,.rankhead .rk-pos{color:var(--dim2);font-size:10px}

.pen-team{color:var(--dim);font-size:12px}
.pen-taker{font-weight:600;color:var(--txt)}

.pen-res.scored{color:var(--green)}
.pen-res.missed{color:var(--red)}

/* ============================================================
   UI AUDIT — overflow, truncation and fit guards.
   Long nation names, small phones, and dense tables all break
   layouts without these. Applied globally.
   ============================================================ */
/* Nothing may ever overflow its container horizontally */
#app,#app *{max-width:100%}
#app .wrap{overflow-x:hidden}
/* EXCEPTION: .compsplash bleeds edge-to-edge via margin:0 -22px. The global
   max-width:100% clamp above was capping its width at the wrap's CONTENT width,
   so it bled left but stopped 44px short on the right — the whole splash (and
   the flag inside it) sat offset to the left. Give it back the full bleed. */
#app .compsplash{width:calc(100% + 44px);max-width:calc(100% + 44px)}

/* --- Group / league tables: fit 8 columns on a 360px phone --- */
.gtable{table-layout:fixed;width:100%}
.gtable th,.gtable td{padding:8px 3px;font-size:13px}
.gtable th:first-child,.gtable td:first-child{width:24px;padding-left:6px}
.gtable th:nth-child(2),.gtable td:nth-child(2){width:auto;text-align:left}
.gtable th:nth-child(n+3),.gtable td:nth-child(n+3){width:30px}
.gtable td.tm{vertical-align:middle;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.gtable td.tm .fl{width:22px;height:15px;vertical-align:middle;display:inline-block}
.gtable td.tm .tmname{white-space:nowrap;font-size:13px;vertical-align:middle;display:inline-block;margin-left:7px;max-width:calc(100% - 34px);overflow:hidden;text-overflow:ellipsis}
.gtable .pts{font-size:15px;padding-right:6px}
@media(max-width:400px){
  .gtable th,.gtable td{font-size:12px;padding:7px 2px}
  .gtable th:nth-child(n+3),.gtable td:nth-child(n+3){width:26px}
  .gtable td.tm .tmname{font-size:12px}
  /* drop W/D/L on the narrowest screens — P, GD and Pts tell the story */
  .gtable th:nth-child(4),.gtable td:nth-child(4),
  .gtable th:nth-child(5),.gtable td:nth-child(5),
  .gtable th:nth-child(6),.gtable td:nth-child(6){display:none}
}

/* --- Nation cards: the WC26 chip must never collide with the flag/name --- */
.ncard.compact{position:relative;padding-top:26px}
.qchip{top:8px;right:8px;font-size:7.5px;padding:2px 5px;line-height:1.3}
.ncard.compact .top{align-items:center;gap:10px;min-width:0}
.ncard.compact h3{font-size:16px;line-height:1.1;overflow-wrap:anywhere;hyphens:auto}
.ncard.compact .tag{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ncard.compact .desc{font-size:11.5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ncard.compact .fac{min-width:0;flex-wrap:wrap;gap:8px}
@media(max-width:400px){
  .ncard.compact h3{font-size:15px}
  .nations.compact{grid-template-columns:1fr}
}

/* --- Scorebug: long names shrink rather than wrap into the score --- */
.scorebug .side .tn{font-size:clamp(11px,3.2vw,16px);overflow-wrap:anywhere;max-width:100%}
.scorebug .sc{min-width:80px;font-size:clamp(30px,10vw,46px)}
.scorebug .comp{font-size:10px;padding:7px 10px;line-height:1.4;overflow-wrap:anywhere}

/* --- Fixtures / rows: name truncates, score never gets squeezed out --- */
.fixture{min-width:0;gap:10px}
.fixture .team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.fixture .res{flex-shrink:0;white-space:nowrap}
.fixture .fl{flex-shrink:0}

/* --- Player rows --- */
/* Compact (non-tall) prow used by the match squad viewer & penalty picker: name sits
   inline in .r1 (these don't use the scrolling title strip). */
.prow:not(.prow-tall){display:flex;align-items:center;gap:9px}
.prow:not(.prow-tall) .body{min-width:0;overflow:hidden;flex:1}
.prow:not(.prow-tall) .r1{display:flex;align-items:center;gap:6px;min-width:0}
.prow:not(.prow-tall) .r1 .pname{font-weight:700;font-size:14.5px;line-height:1.2;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow:not(.prow-tall) .r2{min-width:0;margin-top:3px}
.prow:not(.prow-tall) .club{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.prow .stats{flex-shrink:0}
@media(max-width:420px){
  .prow:not(.prow-tall){gap:8px;padding:10px 10px}
  .prow-tall .ptop{gap:10px;padding:11px 12px}
  .prow-tall .pform{margin:0 12px 11px}
  .prow-tall .pname-strip{padding:8px 12px 6px}
  .prow-tall .stat-rat{font-size:27px}
}

/* --- Odds table --- */
.oddsrow .on,#app .notecard table td:nth-child(2){min-width:0;overflow:hidden}
#app .notecard table td b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%;vertical-align:bottom}

/* --- Manager cards --- */
.mgr-name{overflow-wrap:anywhere;font-size:clamp(15px,4.4vw,19px)}
.mgr-sub{overflow-wrap:anywhere;line-height:1.35}
.mgr-line{min-width:0}
.mgr-line .mv{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.mr-grid{gap:7px}
.mr-cell{padding:9px 6px;min-width:0}
.mrv{font-size:clamp(11px,3vw,14px);overflow-wrap:anywhere}

/* --- Headings & banners never overflow --- */
.banner h2{overflow-wrap:anywhere;hyphens:auto}
.sechead h2{overflow-wrap:anywhere;min-width:0}
.sechead .sub{flex-shrink:0;white-space:nowrap;font-size:12px}
.compsplash .ctag{overflow-wrap:anywhere;hyphens:auto}
.newscard h3{overflow-wrap:anywhere}
.paper .paper-headline{overflow-wrap:anywhere;hyphens:auto}

/* --- Hall of fame / winners --- */
.win-row .wn,.hof-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-row .wi{min-width:0}
.hof-i{min-width:0}
.hof-m{overflow-wrap:anywhere}

/* --- Buttons: consistent alignment, no clipping, wrap gracefully --- */
.btnrow{gap:8px;justify-content:center;align-items:center}
.btn{white-space:normal;max-width:100%;overflow:visible;text-overflow:clip;line-height:1.15;text-align:center;overflow-wrap:anywhere;hyphens:auto}
/* Primary-on-top + equal ghost row underneath (opt-in via .stack) */
.btnrow.stack{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;align-items:stretch;justify-content:center;max-width:520px;margin-left:auto;margin-right:auto}
.btnrow.stack > .btn:not(.ghost):not(.sm){grid-column:1/-1;width:100%}
/* Section subheading: allow wrap on narrow, never clip */
@media(max-width:520px){
  .sechead{flex-wrap:wrap;row-gap:4px}
  .sechead .sub{margin-left:0;white-space:normal;flex-basis:100%;font-size:11.5px}
}
@media(max-width:420px){
  .btn{font-size:13px;padding:11px 14px;min-height:42px}
  .btn.sm{font-size:11px;padding:7px 10px;min-height:34px}
  .btnrow{gap:6px}
}

/* --- Achievements --- */
.ach{min-width:0}
.ach>div:nth-child(2){min-width:0}
.ach .at,.ach .ad{overflow-wrap:anywhere}

/* --- Penalty shootout --- */

  border-radius:16px;padding:30px 26px;max-width:440px;text-align:center;box-shadow:0 24px 60px -20px rgba(0,0,0,.7)}

.btn.danger{background:var(--red);color:#fff}
.btn.danger:hover{background:#ff6b7a}

/* ============================================================
   LINEUPS — FIFA-style unit colours.
   Green GK · Yellow DEF · Blue MID · Red ATT.
   Each XI reads down its own column; colour carries the shape,
   so mismatched formations need no forced pairing or blanks.
   ============================================================ */
:root{
  --u-gk:#3fd97a;   /* green  */
  --u-def:#f5c542;  /* yellow */
  --u-mid:#4d9dff;  /* blue   */
  --u-att:#ff4d5e;  /* red    */
}
.lineups{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px;margin-bottom:14px;overflow:hidden}
.lu-head{display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;gap:6px;padding-bottom:9px;border-bottom:1px solid var(--line2)}
.lu-team{display:flex;align-items:center;gap:7px;min-width:0}
.lu-team.away{flex-direction:row-reverse}
.lu-team .fl{width:24px;height:16px;border-radius:2px;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.14)}
.lu-team span{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;
  color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lu-vs{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;color:var(--dim2);text-align:center}
.lu-sub{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:7px 0 8px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.1em;color:var(--dim)}
.lu-sub>span:last-child{text-align:right}
.lu-key{font-family:'Barlow',sans-serif;font-weight:500;font-size:8.5px;letter-spacing:0;color:var(--dim2);
  display:flex;align-items:center;gap:4px;white-space:nowrap}
.kc{display:inline-block;width:6px;height:9px;border-radius:1px;vertical-align:-1px}
.kc.yel{background:var(--u-def)}.kc.red{background:var(--u-att)}

/* Two independent columns. Every row is EXACTLY the same height and there is no
   per-band spacing — otherwise a 4-5-1 (bands of 1/4/5/1) and a 4-3-3 (1/4/3/3)
   accumulate different gaps and the two XIs drift out of alignment. Row 11 must
   always sit opposite row 11. The badge colour carries the unit instead. */
.lu-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lu-col{display:flex;flex-direction:column;gap:3px;min-width:0}

.pl-row{display:flex;align-items:center;gap:5px;min-width:0;padding:0 5px;border-radius:6px;
  background:rgba(255,255,255,.015);height:26px;box-sizing:border-box}

/* colour-coded position badge — the abbreviation you asked for */
.pbadge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:8.5px;letter-spacing:.02em;
  border-radius:3px;padding:2px 4px;flex-shrink:0;min-width:23px;text-align:center;color:#0b0f18}
.pbadge.gk {background:var(--u-gk)}
.pbadge.def{background:var(--u-def)}
.pbadge.mid{background:var(--u-mid)}
.pbadge.att{background:var(--u-att)}

/* unit label on the first player of each band only */
.bandlab{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:7.5px;letter-spacing:.08em;
  width:22px;min-width:22px;flex-shrink:0;text-align:center;opacity:.85;line-height:1}
.bandlab.gk {color:var(--u-gk)}
.bandlab.def{color:var(--u-def)}
.bandlab.mid{color:var(--u-mid)}
.bandlab.att{color:var(--u-att)}

.lu-name{font-size:12.5px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;min-width:0;flex:1;text-transform:none}
.lu-rat{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13.5px;flex-shrink:0;width:19px;text-align:center}
.lu-form{flex-shrink:0;display:flex;align-items:center}
.fpip{width:6px;height:6px;border-radius:50%;display:inline-block}
.fpip.hot{background:var(--green)}.fpip.mid{background:var(--dim2)}.fpip.cold{background:var(--red)}
.lu-icons{display:flex;align-items:center;gap:2px;flex-shrink:0;max-width:46px;overflow:hidden}
.lu-icons:empty{display:none}
.ic{font-size:10px;line-height:1;display:inline-flex;align-items:center}
.ic sup{font-size:7px;margin-left:1px;color:var(--dim)}
.ic.yel,.ic.red{width:6px;height:9px;border-radius:1px}
.ic.yel{background:var(--u-def)}
.ic.red{background:var(--u-att)}
.ic.goal{animation:icpop .35s ease}
@keyframes icpop{0%{transform:scale(0)}70%{transform:scale(1.35)}100%{transform:scale(1)}}

.lu-legend{display:flex;justify-content:center;gap:12px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:.1em;color:var(--dim2)}
.lu-legend span{display:flex;align-items:center;gap:4px}
.ld{width:7px;height:7px;border-radius:2px;display:inline-block}
.ld.gk{background:var(--u-gk)}.ld.def{background:var(--u-def)}
.ld.mid{background:var(--u-mid)}.ld.att{background:var(--u-att)}

@media(max-width:430px){
  .lineups{padding:10px 6px}
  .lu-cols{gap:5px}
  .lu-col{gap:2px}
  .pl-row{gap:3px;padding:0 3px;height:24px}
  .lu-name{font-size:11.5px}
  .lu-rat{font-size:12.5px;width:17px}
  .ic{font-size:9px}
  .lu-key{display:none}
  .lu-sub{grid-template-columns:1fr 1fr}
  .lu-sub>span:nth-child(2){display:none}
}
@media(max-width:380px){
  .bandlab{display:none}      /* the colour still says which unit */
  .pbadge{min-width:20px;font-size:8px;padding:2px 3px}
}
@media(max-width:340px){
  .lu-form{display:none}
}


/* ---- CAREER PAGE ---- */

/* NOTE: some selectors below intentionally re-declare properties defined earlier.
   The cascade order is load-bearing (compact variants, media queries, theme
   overrides). 47 apparent duplicates were audited; only 4 were dead. Do not
   blindly merge them. */

/* Auto-pick sits in the selection bar, where it cannot be missed. */

/* The primary confirm/delegate row: two perfectly equal buttons, no wrapping, matching
   size regardless of label length. Overrides autopick's smaller padding IN THIS ROW so
   both read identically. */
#topgo{display:flex;gap:10px;flex-wrap:nowrap;margin:0 0 4px;align-items:stretch}

  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
