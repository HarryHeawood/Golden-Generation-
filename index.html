      name: pick(SPONSOR_NAMES[slot]),
      short:{term:2, perYear:Math.max(0.3,shortPer)},
      long: {term:5, perYear:Math.max(0.4,longPer)},
    };
  });
  fin.sponsorOffers = Object.keys(out).length?out:null;
  return fin.sponsorOffers;
}
// Accept an offered deal into a slot.
function acceptSponsor(slot, which){
  initFinance();const fin=G.finance;
  const off=fin.sponsorOffers&&fin.sponsorOffers[slot];if(!off)return false;
  const deal=which==='long'?off.long:off.short;
  fin.sponsors[slot]={name:off.name, perYear:deal.perYear, yearsLeft:deal.term, termTotal:deal.term};
  if(fin.sponsorOffers){delete fin.sponsorOffers[slot];if(!Object.keys(fin.sponsorOffers).length)fin.sponsorOffers=null;}
  return true;
}
// The penalty to tear up a running deal early: roughly one season's value (Alpha 4.8: moderate).
function sponsorCancelFee(slot){
  const s=(G.finance&&G.finance.sponsors)||{};const d=s[slot];if(!d)return 0;
  return Math.round((d.perYear||0)*1.0*10)/10;   // ~one year's value
}
function cancelSponsor(slot){
  initFinance();const fin=G.finance;const d=fin.sponsors[slot];if(!d)return false;
  const fee=sponsorCancelFee(slot);
  fin.cash=Math.round((fin.cash-fee)*10)/10;     // pay the compensation (can push you into the red)
  if(fin.cash<0){fin.debt+=-fin.cash;fin.cash=0;}
  fin.sponsors[slot]=null;
  return fee;
}
// ---- WAGE NEGOTIATION — rival nations make moves; you fight to keep your manager. ----
// Each year an in-demand, well-performing or underpaid manager may attract a concrete
// offer from a wealthier federation. That triggers a negotiation you have to navigate:
// meet his new demand and you keep him (but the wage — drawn off the top of the budget —
// climbs, squeezing the Triad); refuse and you risk losing him.
// Returns a pending-offer object, or null.
// A rival makes their move. Tuned (Alpha 1.18) so solid — not just elite — managers get
// approached, and the SUITOR is scaled to the manager himself: a mid-tier boss draws a
// mid-tier nation, not automatically a giant. That keeps his demand, and the negotiation,
// in proportion to your own means.
function rollManagerOffer(){
  const m=G.manager;if(!m)return null;
  if(m.yearsAtNation!=null && m.yearsAtNation<1)return null;   // give a new hire one season
  // REST BITE: no fresh approaches for a couple of seasons after you've just fended one off.
  if(m.poachRestUntil!=null && (G.year||0) < m.poachRestUntil)return null;
  const sat=wageSatisfaction();
  // ---- RECENT FORM IS THE GATE ----
  // Rival nations chase managers who are DOING WELL. A boss who just underperformed —
  // never mind failed to qualify — should almost never be approached. lastDelta is how far
  // his most recent campaign beat (+) or missed (−) the brief. Two recent results, if we
  // have them, are averaged so one fluke doesn't define him.
  const hist=(m.history||[]);
  const recent = hist.length>=2 ? (hist[hist.length-1].delta + hist[hist.length-2].delta)/2
               : (m.lastDelta!=null ? m.lastDelta : 0);
  // A clear failure shuts the door; only genuine, sustained success opens it.
  if(recent < -0.4) {
    // He's underperforming. A rival gambling on him is a RARE event, not a yearly one,
    // and only ever a smaller nation — never a giant poaching a failing manager.
    if(recent < -1.2) return null;                     // outright failure: nobody comes
    if(Math.random() > 0.05) return null;              // mild miss: ~5% freak interest only
  }
  // Base interest scales with how WELL he's doing recently, tempered by his standing.
  const formDraw = clamp(recent,0,3)*0.11;             // beating the brief is the main pull
  const prestige = Math.max(0,(m.rating-64))*0.014;    // reputation adds a little on top
  const restless = sat<0 ? (-sat)*0.10 : 0;            // underpayment a minor nudge
  const loyalty  = sat>=0.3 ? 0.7 : sat>=0 ? 0.85 : 1;
  const chance=clamp((formDraw+prestige+restless)*loyalty, 0, 0.45);
  if(Math.random()>=chance)return null;
  // The suitor is scaled to how well he's doing: a manager smashing his brief pulls a
  // bigger fish; one merely ticking along draws only a slightly bigger nation.
  const myF=myNation().factory;
  const reach=clamp(2 + clamp(recent,0,3)*3 + Math.max(0,(m.rating-70))*0.25, 2, 20);
  // A suitor must be able to actually PAY him — otherwise a modest federation was
  // triggering a demand it could never have funded. (Alpha 7.9)
  const worth=mgrMarketValue(m);
  const canPay=n=>budgetForFactory(n.factory)*0.45 >= worth*0.75;
  let pool=NATIONS.filter(n=>n.id!==G.natId && n.factory>myF && n.factory<=myF+reach && canPay(n))
    .sort((a,b)=>a.factory-b.factory);
  // If nobody in his natural reach can afford him, only a genuinely wealthy federation
  // would come — and rarely. A manager who has outgrown the whole tier above him is
  // chased by giants, not by his neighbours.
  if(!pool.length){
    if(Math.random()>0.35)return null;
    pool=NATIONS.filter(n=>n.id!==G.natId && n.factory>myF && canPay(n)).sort((a,b)=>a.factory-b.factory);
  }
  // Prefer the closest-tier suitors so a modest manager isn't auto-lifted to a superpower.
  const suitor=pool.length?pick(pool.slice(0,Math.min(8,pool.length))):null;
  if(!suitor)return null;
  const want=wageExpectation(m);
  const current=(G.finance&&G.finance.wage)||0;
  // His OPENING ask to stay — the negotiation starts here, and you can talk him down.
  const suitorPush=suitor?clamp((suitor.factory-myF)*0.007,0,0.18):0.05;
  // WHAT THE SUITOR IS ACTUALLY OFFERING (7.9). A wealthy federation bids from ITS OWN
  // budget, not yours — so when a giant comes for the man who took you up, the figure
  // can be genuinely out of your reach. He'll stay for a little under it, out of loyalty.
  const suitorOffer=suitor
    ? Math.min(budgetForFactory(suitor.factory)*0.45, mgrMarketValue(m)*1.25)
    : 0;
  const ask=Math.round(Math.max(want*(1.12+suitorPush), current*(1.12+suitorPush), suitorOffer*0.92)*10)/10;
  return {managerName:m.name, suitor:suitor?suitor.name:'a wealthier federation',
          suitorIso:suitor?suitor.iso:'un', ask, current,
          floor:Math.round(Math.max(want,current,suitorOffer*0.80)*1.02*10)/10};  // least he'll take to stay
}
// Called at the season turn. If an offer lands, open the negotiation.
function checkManagerOffer(){
  // The tutorial is a clean teaching cycle: a rival poaching your manager mid-walkthrough
  // is a real event, but not one to spring on a Director learning the ropes — it derails
  // the scripted arc. Suppress rival approaches while the sandbox is active. (Alpha 6.0)
  if(TUT.active)return false;
  // ONE offer check per season turn. Revisiting the budget after a negotiation must not
  // roll a fresh approach — that caused the same nation to come back for the manager
  // immediately after you'd just kept him. Cleared at the season turn (ageAndContinue).
  if(G._offerCheckedThisTurn)return false;
  G._offerCheckedThisTurn=true;
  const offer=rollManagerOffer();
  if(!offer)return false;
  G.pendingOffer=offer;
  startNegotiation('poach', offer);
  return true;
}

// ============================================================================
//  SHARED MULTI-ROUND NEGOTIATION ENGINE (Alpha 1.18)
//  One engine, two entry points: hiring a new manager ('hire') and fighting off a
//  rival ('poach'). The manager holds a position; you counter with a real figure;
//  he reacts — softening, holding firm, or ending talks. Patience is finite.
// ============================================================================
// mode:  'hire'  — he's deciding whether to take the job at all
//        'poach' — he's already yours; a rival is circling
// Returns nothing; sets up G.negotiation which the screen reads.
function startNegotiation(mode, ctx){
  const m = (mode==='hire'||mode==='approach') ? ctx.manager : G.manager;
  const ask = ctx.ask;                       // his opening demand
  const floor = ctx.floor;                   // the least he'll settle for
  G.negotiation = {
    mode,
    managerName: m ? m.name : (ctx.managerName||'The manager'),
    suitor: ctx.suitor||null, suitorIso: ctx.suitorIso||'un',
    ask,                                     // his CURRENT position (moves as he softens)
    openingAsk: ask,
    floor,
    current: ctx.current||0,                 // what he earns now (poach) or 0 (hire)
    yourOffer: Math.round(Math.max(floor*0.82, (ctx.current||floor*0.8))*10)/10, // sensible opening bid
    patience: 3,                             // rounds of hard-ball before he snaps
    round: 0,
    log: [],                                 // [{who:'him'|'you', text}]
    resolved: null,                          // 'agreed' | 'walked' | 'declined'
    agreedWage: null,
    managerId: (mode==='hire'||mode==='approach') ? ctx.manager.id : null,
  };
  // opening line from him
  const g=G.negotiation;
  g.log.push({who:'him', text:
      mode==='hire'     ? `To take the job, I'd want <b>£${ask}m a year</b>. That reflects what I bring.`
    : mode==='approach' ? `I'm flattered ${(myNation()||{}).name||'you'} came calling. To leave ${g.suitor}, I'd want <b>£${ask}m a year</b>.`
    :                     `${g.suitor} have made their interest clear. To stay, I'll need <b>£${ask}m a year</b>.`});
}
// Nudge the player's working offer up or down (± buttons on the screen).
// The haggling step has to suit the money on the table. A flat 0.5m was useless for
// small nations: their managers ask well under 1m, so one tap overshot the ask entirely
// and the '−' greyed out immediately at the 0.2m floor — there was no negotiation left
// to have. Scale the step to the ask and round to that step's precision.
function negStepSize(){
  // Flat 0.1m for every nation, by design. Consistency was chosen over speed: the
  // button always moves the same amount whatever the wage, so there are no surprises.
  // (Trade-off: an £11m elite manager takes many taps to shift meaningfully. If that
  // becomes tedious, add a coarse ±1m button or hold-to-repeat rather than bringing
  // back a variable step.)
  return 0.1;
}
function negOfferStep(delta){
  const g=G.negotiation;if(!g||g.resolved)return;
  const step=negStepSize();
  // Snap the CURRENT offer onto the grid first, then move a whole step. Rounding the
  // post-move figure instead (as this did) ate part of the first tap whenever the
  // opening bid sat off-grid: at a £1.5m ask the offer crept 1.1 -> 1.25, a move of
  // 0.15 from a button labelled ±0.25. The button now always moves exactly one step.
  const onGrid = Math.round(g.yourOffer/step)*step;
  const raw = clamp(onGrid+delta, 0.1, g.openingAsk*1.5);
  g.yourOffer = Math.round(raw*100)/100;   // 0.1m steps need 2dp
  renderNegotiation();
}
// The heart of it: submit your current offer. He weighs it against his position and mood.
function negSubmit(){
  const g=G.negotiation;if(!g||g.resolved)return;
  g.round++;
  const offer=g.yourOffer;
  g.log.push({who:'you', text:`We can offer <b>£${offer}m</b>.`});
  // How does the offer sit relative to what he'll accept?
  if(offer>=g.ask-0.05){
    // meets or beats his current position → done, at the lower of the two
    return negFinalise(Math.round(Math.min(offer,g.ask)*10)/10, 'agreed');
  }
  const gapToFloor=(g.floor-offer)/Math.max(0.5,g.floor);   // >0 means below his floor
  const gapToAsk=(g.ask-offer)/Math.max(0.5,g.ask);
  // A close offer above his floor: he takes it.
  if(offer>=g.floor-0.05 && gapToAsk<0.14){
    return negFinalise(Math.round(offer*10)/10,'agreed');
  }
  // Above floor but you're still a bit short: he MEETS YOU PARTWAY, dropping his ask.
  if(offer>=g.floor-0.05){
    const newAsk=Math.round(Math.max(g.floor, (g.ask+offer)/2)*10)/10;
    g.ask=newAsk; g.patience--;
    if(g.patience<=0){
      // out of patience but you're in range — he issues a final, take-it figure
      g.log.push({who:'him', text:`Final offer — <b>£${newAsk}m</b> and I'm yours. No more back and forth.`});
      g.finalUltimatum=true;
      return renderNegotiation();
    }
    g.log.push({who:'him', text: pick([
      `You're not far off. Meet me at <b>£${newAsk}m</b> and we have a deal.`,
      `I can come down — <b>£${newAsk}m</b>. That's me being reasonable.`,
      `Alright. <b>£${newAsk}m</b> and I'll commit. That's fair to us both.`,
    ])});
    return renderNegotiation();
  }
  // BELOW his floor — an insult-tier bid. Patience drops hard; he may end talks.
  g.patience -= (gapToFloor>0.25?2:1);
  if(g.patience<=0){
    // he walks / declines
    return negFinalise(null, g.mode==='hire'?'declined':'walked');
  }
  g.log.push({who:'him', text: pick([
    `That's well short of what ${g.suitor||'others'} would pay. I need to see <b>£${g.ask}m</b>.`,
    `No. I know my worth — <b>£${g.ask}m</b>, or this doesn't happen.`,
    `You'll have to do a lot better than that. <b>£${g.ask}m</b> is the number.`,
  ])});
  renderNegotiation();
}
// Accept his current standing figure outright (the "just pay it" path).
function negAcceptHis(){
  const g=G.negotiation;if(!g||g.resolved)return;
  g.log.push({who:'you', text:`Agreed — <b>£${g.ask}m</b>.`});
  negFinalise(g.ask,'agreed');
}
// Walk away from the table yourself.
function negWalkAway(){
  const g=G.negotiation;if(!g||g.resolved)return;
  negFinalise(null, g.mode==='hire'?'declined':'walked');
}
// Close out the negotiation and apply consequences.
function negFinalise(wage, outcome){
  const g=G.negotiation;if(!g)return;
  g.resolved=outcome; g.agreedWage=wage;
  if(outcome==='agreed'){
    initFinance();
    // HIRE or APPROACH → defer commit; let the player pick a contract length,
    // and roll a small "chemistry" variance that colours how well he clicks.
    if(g.mode==='hire' || g.mode==='approach'){
      G._pendingContract={mode:g.mode, wage, managerId:g.managerId, natId:(G.approachCtx?G.approachCtx.natId:null)};
      return screenChooseContractLength();
    }
    // POACH DEFENCE — you kept your man
    G.finance.wage=wage;
    if(G.manager){
      G.manager.confidence=clamp((G.manager.confidence??70)+6,0,100);
      G.manager.poachRestUntil=(G.year||0)+2;
    }
    G.pendingOffer=null;

  } else if(outcome==='walked'){
    // rival poaches him after talks collapse — YOU are compensated (Alpha 2.9)
    const m=G.manager;
    initFinance();
    const bonus=compensationFor(G.finance.wage||(m?baseWageFor(m):0), G.mgrContractYearsLeft||1, m);
    G.finance.cash=(G.finance.cash||0)+bonus;
    G._poachBonus=bonus;
    initSocial();
    G.social.notifications.unshift({id:socialId(),kind:'mgr',
      who:{name:g.managerName,handle:'Manager',av:'#f5c542',v:false},
      text:`has left to join ${g.suitor}. You received £${bonus.toFixed(1)}m in compensation.`,
      read:false,year:G.year});
    socialAnnounce('presser',
      `🚨 ${g.managerName} has departed ${(myNation()||{}).name||'the national team'} to take charge of ${g.suitor}. ${(myNation()||{}).name||'They'} bank £${bonus.toFixed(1)}m compensation.`,0.85);
    G.poachedManager={name:g.managerName,suitor:g.suitor};
    G.manager=null;G.mgrShortlist=null;G.pendingOffer=null;
    G.mgrContractYearsLeft=null;
  } else if(outcome==='declined'){
    if(g.mode==='approach'){ G.approachCtx=null; G._approachFailed={name:g.managerName}; }
    else { G.negDeclined={name:g.managerName}; degradeShortlistAfterDecline(g.managerId, g.managerName); }
  }
  renderNegotiation();
}

// ============================================================================
//  WORLD MANAGERS, RANKINGS & THE MANAGER MARKET  (Alpha 2.9)
//  Rival nations now carry real, persistent managers you can inspect and poach —
//  the mirror of nations approaching yours. A world ranking driven by results feeds
//  who's who, and a compensation economy sits under sacking, renewals and poaching.
// ============================================================================

// A persistent manager for any rival nation, generated once then remembered.
function rivalManagerFor(natId){
  G.rivalMgrs=G.rivalMgrs||{};
  if(G.rivalMgrs[natId])return G.rivalMgrs[natId];
  const nat=NATIONS.find(n=>n.id===natId);if(!nat)return null;
  // A rival manager is broadly matched to his nation's stature, with spread.
  const m=genManager(mgrKeyFor(nat.iso)||undefined,nat.factory,false,false,nat.id);
  m.iso=nat.iso;
  if(!mgrKeyFor(nat.iso))m.name=buildName(nat.iso);
  m.natId=natId;
  m.wage=baseWageFor(m);
  // Rival managers hold a contract too, so poaching them costs compensation.
  m.contractYears=Math.round(rnd(1,4));
  m.yearsLeft=m.contractYears;
  m.confidence=70;
  G.rivalMgrs[natId]=m;
  return m;
}
// Age/refresh rival managers once a year so the world feels alive (called at season turn).
function ageRivalManagers(){
  if(!G.rivalMgrs)return;
  Object.keys(G.rivalMgrs).forEach(k=>{
    const m=G.rivalMgrs[k];if(!m)return;
    m.age=(m.age||45)+1;
    m.yearsLeft=Math.max(0,(m.yearsLeft||0)-1);
    // out of contract or old → a new man comes in
    if(m.yearsLeft<=0 || m.age>64){
      if(Math.random()<0.5){ delete G.rivalMgrs[k]; }   // lazily regenerated on next view
    }
  });
}

// ---- WORLD RANKINGS: points earned from EVERY match, decayed gently over time ----
function initRankings(){
  if(G.ranking)return;
  G.ranking={};
  // Seed every nation from its factory so the ladder starts sensible, then results move it.
  NATIONS.forEach(n=>{ G.ranking[n.id]=Math.round(n.factory*10); });
}
// Award ranking points for a result. Beating a stronger side is worth more.
function awardRankingPoints(myWon,drew,oppFactory){
  initRankings();
  const nat=myNation();if(!nat)return;
  const myF=nat.factory;
  const gap=(oppFactory-myF)/10;               // + if opponent stronger
  let pts;
  if(myWon)      pts = 15 + Math.round(gap*4);  // upset wins pay more (was 30 — halved to slow the climb)
  else if(drew)  pts = 6  + Math.round(gap*2.5);
  else           pts = 2  + Math.round(gap*1.5);// even a loss to a giant earns a trickle
  pts=clamp(pts,1,34);
  const before=(G.ranking[nat.id]||myF*10);
  const base=myF*10;
  // DIMINISHING RETURNS above your pedigree: the further you've ALREADY climbed above your
  // nation's baseline, the less each result adds. So a minnow's early progress is normal, but
  // pushing PAST the established giants takes sustained dominance over many years, not a few
  // good campaigns. headroom→1 near baseline, →0 as you approach the ceiling.
  const ceiling=Math.max(myF*10 + 300, 980);
  const climbed=Math.max(0, before-base);
  const room=Math.max(0, ceiling-base);
  const headroom=room>0 ? clamp(1-climbed/room, 0.08, 1) : 0.08;
  pts=Math.max(1, Math.round(pts*headroom));
  G.ranking[nat.id]=Math.min(before+pts, ceiling);
}
// Yearly decay pulls everyone toward their factory baseline. Strengthened so a quiet spell
// erodes an inflated ranking faster — you have to KEEP winning to stay up, and a minnow slides
// back toward its pedigree quickly once the golden generation fades.
function decayRankings(){
  initRankings();
  const myId=(myNation()||{}).id;
  NATIONS.forEach(n=>{
    const base=n.factory*10;
    const cur=G.ranking[n.id]??base;
    let next=cur+(base-cur)*0.22;  // 22% pull to baseline each year (was 12%)
    // A bit of variance for RIVAL nations so the table has life year to year (a giant has an off
    // cycle, a mid-tier surges) without drifting far from pedigree. Your own nation is driven by
    // real results, so it's left alone.
    if(n.id!==myId)next += (Math.random()-0.5)*base*0.10;
    G.ranking[n.id]=Math.round(clamp(next, base*0.7, base*1.3));
  });
}
// Sorted world ranking: [{nat, pts, rank}]
function worldRanking(){
  initRankings();
  // One-time correction for saves made before the ranking ceiling existed: pull any nation
  // that ran away above its pedigree cap back down to it, so an old inflated total (e.g.
  // 1618) lands at a believable figure instead of dwarfing the field.
  if(!G._rankCapped){
    G._rankCapped=true;
    NATIONS.forEach(n=>{
      const ceiling=Math.max(n.factory*10+300, 980);
      if((G.ranking[n.id]||0)>ceiling)G.ranking[n.id]=ceiling;
    });
  }
  return NATIONS.map(n=>({nat:n,pts:G.ranking[n.id]??n.factory*10}))
    .sort((a,b)=>b.pts-a.pts)
    .map((r,i)=>({...r,rank:i+1}));
}
function myRank(){
  const nat=myNation();if(!nat)return null;
  const wr=worldRanking();const e=wr.find(r=>r.nat.id===nat.id);
  return e?e.rank:null;
}

// ---- COMPENSATION MATHS (Alpha 4.8: BRUTAL) ----
// Pay-off to sack a manager, or the fee to buy one out / receive when yours is poached.
// Losing or prising a manager mid-deal is now a season-defining financial event. The FULL
// remaining wage bill is owed, with a super-linear premium on years-left so a long contract
// is genuinely expensive to break — that's the whole value of tying a manager down.
//   1yr @£8m ≈ £9.6m · 2yr ≈ £22m · 3yr ≈ £36m · 4yr ≈ £52m
function compensationFor(wage, yearsLeft, mgr){
  const w=wage||0, y=Math.max(1,yearsLeft||1);
  // A rival buys out what the man is WORTH, not the bargain you happened to have him on.
  // Develop a coach at a small nation and losing him is a genuine windfall. (Alpha 7.9)
  const worth=mgr?Math.max(w, mgrMarketValue(mgr)) : w;
  const bill=worth*y;                      // remaining bill at his true market rate
  const premium=1.0 + (y-1)*0.35;          // longer deals cost MORE than pro-rata to break
  return Math.round(Math.max(1.0, bill*premium)*10)/10;
}
// What it costs YOU to poach a rival: their nation wants a fee for breaking his deal.
// UNEMPLOYED DISCOUNT: a manager who's out of work (or barely settled — yearsAtNation<1)
// commands only a token joining payment — no long deal to buy out.
function poachFeeFor(m){
  const base=compensationFor(m.wage||baseWageFor(m), m.yearsLeft||2);
  const yrs=m.yearsAtNation==null?2:m.yearsAtNation;
  if(m.unemployed || yrs<1) return Math.max(0.3, Math.round(base*0.18*10)/10);
  return base;
}


// ---- NUTMEG HEADLINES about rival managers, tagged so you can click through ----
function postManagerHeadline(){
  initSocial();
  const wr=worldRanking();
  const myId=(myNation()||{}).id;
  // pick an interesting rival: a top-10 nation that isn't you
  const pool=wr.slice(0,12).filter(r=>r.nat.id!==myId);
  if(!pool.length)return;
  const pickR=pick(pool);
  const m=rivalManagerFor(pickR.nat.id);if(!m)return;
  const last=m.name.split(' ').slice(-1)[0];
  const lines=[
    `📈 ${pickR.nat.name} flying under ${m.name} — the ${mgrStyleLabel(m).toLowerCase()} approach is turning heads. Rated ${m.rating} and climbing.`,
    `🗣️ "${last} is the best coach in world football right now." Big claim as ${shortNat(pickR.nat.name)} sit #${pickR.rank}.`,
    `🔥 ${m.name} linked with a move away from ${shortNat(pickR.nat.name)}. His ${m.formation} has them among the elite.`,
    `⭐ Scouts rave about ${m.name}'s work at ${shortNat(pickR.nat.name)}. A ${m.rating}-rated operator in his prime.`,
    `💬 ${shortNat(pickR.nat.name)}'s board move to fend off interest in ${last}. Every big nation wants him.`,
  ];
  const who=persona('reporter');
  G.social.feed.unshift({
    id:socialId(), format:'post', who, text:pick(lines), time:'now', year:G.year,

// ---- THE BUDGET SCREEN — once-a-year allocation of the Triad. ----
// Two ways to allocate the same three facilities: the TRIANGLE (drag a point to set your
// emphasis — the tilt auto-distributes levels within your affordable spend) and the
// +/- ROWS (fine control). The manager's negotiated wage is shown but sits OUTSIDE the
// Triad, drawn off the top of the budget. Levels+budget model: you can raise all three
// if you can afford it, but the triangle makes tilt fast and tactile.
function facEffectText(k,lvl){
  if(k==='academy'){const m=academyGrowthMultAt(lvl), ib=academyIntakeBonusAt(lvl);
    return `Youth growth ${Math.round(m*100)}% · intake ${ib>=0?'+':''}${ib.toFixed(1)} ceiling`;}
  if(k==='training'){const r=trainingRealiseAt(lvl);
    return `Potential realised ${r>=0?'+':''}${r.toFixed(1)} — squad plays ${lvl>=6?'nearer':lvl<5?'further from':'at'} its ceiling`;}
  if(k==='recovery'){const b=recoveryDecayBrakeAt(lvl);
    return `Age decline ${b>0?'softened':b<0?'sharper':'normal'} — veterans last ${lvl>=6?'longer':lvl<5?'less':'as expected'}`;}
  return '';
}
// Level-parameterised versions of the effect scalars (for previewing any level in the UI).
function academyGrowthMultAt(l){const base=1+(l-5)*0.09;const top=l>8?(l-8)*0.22:0;return base+top;}
function academyIntakeBonusAt(l){const base=(l-5)*0.7;const top=l>8?(l-8)*1.6:0;return base+top;}
function trainingRealiseAt(l){return (l-5)*0.25 + (l>8?(l-8)*0.2:0);}
function recoveryDecayBrakeAt(l){return (l-5)*0.09 + (l>8?(l-8)*0.05:0);}
function facColorFor(lvl){return lvl>=8?'var(--gold)':lvl>=6?'var(--green)':lvl>=5?'var(--accent)':lvl>=4?'var(--dim)':'var(--amber)';}

// Render a simple, clean SVG line chart of funds over time.
function financeChartSVG(series){
  if(!series||series.length<2){
    return `<div class="notecard" style="text-align:center;color:var(--dim)">📊 Play a few seasons and your balance history will chart here.</div>`;
  }
  const W=320,H=150,padL=8,padR=8,padT=14,padB=22;
  const ys=series.map(p=>p.funds);
  let min=Math.min(...ys,0),max=Math.max(...ys,1);
  if(max===min)max=min+1;
  const span=max-min;
  const x=i=>padL+(i/(series.length-1))*(W-padL-padR);
  const y=v=>padT+(1-(v-min)/span)*(H-padT-padB);
  // zero line
  const zeroY=y(0);
  const linePts=series.map((p,i)=>`${x(i).toFixed(1)},${y(p.funds).toFixed(1)}`).join(' ');
  // area under the line
  const areaPts=`${x(0).toFixed(1)},${(H-padB).toFixed(1)} ${linePts} ${x(series.length-1).toFixed(1)},${(H-padB).toFixed(1)}`;
  const dots=series.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.funds).toFixed(1)}" r="${p.proj?4:3}" fill="${p.proj?'var(--gold)':'var(--accent)'}" stroke="var(--panel)" stroke-width="1.5"/>`).join('');
  const labels=series.map((p,i)=>{
    if(series.length>8 && i%2!==0 && i!==series.length-1)return '';
    return `<text x="${x(i).toFixed(1)}" y="${H-6}" font-size="9" fill="var(--dim2)" text-anchor="middle" font-family="Barlow Condensed">${String(p.year).slice(2)}</text>`;
  }).join('');
  return `<div class="fin-chart">
    <svg viewBox="0 0 ${W} ${H}" class="fin-chart-svg">
      <defs><linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
      ${min<0?`<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="var(--red)" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`:''}
      <polygon points="${areaPts}" fill="url(#finGrad)"/>
      <polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${labels}
    </svg>
    <div class="fin-chart-key"><span class="fck-dot" style="background:var(--accent)"></span>Balance each year <span class="fck-dot" style="background:var(--gold);margin-left:12px"></span>Projected</div>
  </div>`;
}

// Commit one rung: pay capex now, raise the target. It builds at the next season turn.
function facRaiseCore(k){
  initFinance();const fin=G.finance;
  if(fin.targets[k]>=FAC_MAX || fin.fac[k]!==fin.targets[k])return false;   // one at a time
  const to=fin.targets[k]+1;const capex=facCapex(to);
  if(capex>fin.cash)return false;
  fin.cash=Math.round((fin.cash-capex)*10)/10;
  fin.targets[k]=to;
  return true;
}
function facRaise(k){
  if(facRaiseCore(k)){window._preserveScroll=true;screenBudget();}
}
// Instant downgrade: drops current level (and target) now. No capex refund.
function facDowngrade(k){
  initFinance();const fin=G.finance;
  if(fin.fac[k]<=FAC_MIN)return;
  confirmAction(`Downgrade ${FAC_META[k].name} to L${fin.fac[k]-1}? This is instant and you get no capex back.`,()=>{
    fin.fac[k]--; if(fin.targets[k]>fin.fac[k])fin.targets[k]=fin.fac[k];
    window._preserveScroll=true;screenBudget();
  });
}

// Browsable qualifying groups per confederation. Tables are GENERATED from nation strength
// with variance (not simulated match-by-match), stored per season so they're stable when
// you re-view and refresh each year. Purely for flavour/immersion — looking legit is the goal.
function buildQualTables(){
  const byConf={};
  NATIONS.forEach(n=>{ (byConf[n.conf||'Other']=byConf[n.conf||'Other']||[]).push(n); });
  const tables={};
  Object.keys(byConf).forEach(conf=>{
    const nats=byConf[conf].slice().sort(()=>Math.random()-0.5);   // shuffle then chunk into groups of ~5-6
    const groups=[];
    const size=nats.length>36?6:nats.length>18?5:4;
    for(let i=0;i<nats.length;i+=size)groups.push(nats.slice(i,i+size));
    tables[conf]=groups.map((grp,gi)=>{
      const played=8+Math.floor(Math.random()*3);   // same for every team in the group
      const rows=grp.map(n=>{
        // expected win share from strength, with variance; convert to a plausible points haul
        const strength=clamp((n.factory-40)/55,0,1);
        const base=strength*played*0.62;                 // stronger → more wins
        const noise=(Math.random()-0.5)*played*0.9;       // real variance: upsets, bad campaigns
        const wins=clamp(Math.round(base+noise),0,played);
        const draws=clamp(Math.round(Math.random()*(played-wins)*0.5),0,played-wins);
        const losses=played-wins-draws;
        return {nat:n, played, wins, draws, losses, pts:wins*3+draws, gd:Math.round((wins-losses)*1.4+(Math.random()-0.5)*4)};
      }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd);
      return {name:`Group ${String.fromCharCode(65+gi)}`, rows};
    });
  });
  return tables;
}

    }).join('');

  return `<p class="lede" style="margin:0 0 12px">Qualifying across the world — top two of each group go through (green). Tables reflect each nation's pedigree with real campaign variance; tap a region to expand.</p>${blocks}`;

// Begin an approach for a rival manager: pay the fee, then run the negotiation.
function approachManager(natId){
  const nat=NATIONS.find(n=>n.id===natId);if(!nat)return;
  const m=rivalManagerFor(natId);if(!m)return;
  initFinance();
  const fee=poachFeeFor(m);
  const affordable=(G.finance.cash||0)+ (G.finance.budget||0);
  if(fee > affordable){
    popToast(`You can't afford the £${fee.toFixed(1)}m release fee.`);
    return;
  }
  // Stash the deal context; the fee is charged only if a wage is agreed.
  G.approachCtx={natId, fee, managerId:m.id, managerName:m.name, iso:m.iso, natName:nat.name};
  const want=wageExpectation(m);
  const ask=Math.round(Math.max(want, m.wage||baseWageFor(m))*1.1*10)/10;
  const floor=Math.round(Math.max(want,m.wage||baseWageFor(m))*0.9*10)/10;
  startNegotiation('approach', {manager:m, ask, floor, current:m.wage||baseWageFor(m),
    suitor:nat.name, suitorIso:m.iso});
  renderNegotiation();
}

// The manager career ladder: named tiers over the 32-96 rating range.
function mgrTier(r){
  if(r>=90)return {t:'World Class',icon:'👑',col:'var(--gold)',d:'One of the finest in the game. Nations queue for his signature.'};
  if(r>=82)return {t:'Elite',icon:'⭐',col:'var(--green)',d:'A top operator. Deep tournament runs are the expectation.'};
  if(r>=72)return {t:'Established',icon:'🎯',col:'var(--accent)',d:'A proven international manager who belongs at this level.'};
  if(r>=60)return {t:'Promising',icon:'📈',col:'var(--cyan)',d:'Making a name. Results will decide if he kicks on.'};
  if(r>=48)return {t:'Journeyman',icon:'🧭',col:'var(--dim)',d:'Solid, unspectacular. A safe pair of hands.'};
  return {t:'Novice',icon:'🌱',col:'var(--dim2)',d:'Untested at this level. Everything to prove.'};
}

// ============================================================
//  MANAGER CAREER — hire, renew, sack. They age, grow and fade.
//  Graded against EXPECTATIONS for the nation, not raw results.
// ============================================================
// What SHOULD this nation achieve? Drives fair manager grading.
// ---- Two SEPARATE yardsticks: qualifying campaigns and tournament finals ----
// Grading a qualifying campaign against "reach the quarter-finals" was a category
// error that made every successful England campaign read as a disaster.

// FINALS: how far should this nation go once they're there? (0-6 scale)
function nationExpectation(){
  const nat=myNation();const f=nat.factory;
  let base;
  if(f>=84)base=5;        // Brazil/Argentina — semis minimum
  else if(f>=76)base=4;   // Spain/Germany/England — quarters
  else if(f>=66)base=3;   // Croatia/Morocco/Japan — last 16
  else if(f>=55)base=2;   // Ghana/Australia — escape the group
  else if(f>=42)base=1;   // Qatar/Haiti — a competitive showing
  else base=0;            // Cape Verde/San Marino — just being there
  // DYNAMIC FLOOR: a rough patch eases the brief; a purple patch hardens it.
  const ef=(G.finance&&G.finance.expFloor)||0;
  return clamp(base+ef, 0, 6);
}
// QUALIFYING: what's expected of the campaign itself? (0-4 scale)
// Big nations are simply expected to qualify; minnows aren't.
function qualExpectation(){
  const nat=myNation();const f=nat.factory;
  if(f>=76)return 3.1;    // England/Germany — expected to top the group
  if(f>=66)return 2.9;    // Croatia/Portugal — top the group, or a strong second
  if(f>=55)return 2.5;    // Japan/Ghana — qualify, ideally top two
  if(f>=42)return 2.0;    // Albania/Panama — qualification is the target
  if(f>=30)return 1.5;    // Malta/Kazakhstan — a playoff push would be a triumph
  return 0.45;            // San Marino — a single win is a national holiday
}
// QUALIFYING outcomes on the 0-4 scale
// How hard was the group you were actually drawn in? Finishing second behind Spain
// is a very different achievement to finishing second behind Slovakia.
function groupDifficulty(){
  if(!G.qualGroup||!G.qualGroup.length)return 0;
  const me=G.qualGroup.find(t=>t.you);if(!me)return 0;
  const rivals=G.qualGroup.filter(t=>!t.you);
  const strongest=Math.max(...rivals.map(t=>t.factory||40));
  const avg=rivals.reduce((a,t)=>a+(t.factory||40),0)/rivals.length;
  // relative to me: positive = a hard group for a nation of my standing
  const myF=(myNation()||{}).factory||50;
  const d=((strongest-myF)*0.035)+((avg-myF*0.62)*0.018);
  return clamp(d,-0.6,0.9);
}
function qualResultScore(tag,pos){
  const hard=groupDifficulty();   // credit for a brutal draw, less for an easy one
  const auto=(typeof autoQualifySpots==='function')?autoQualifySpots():2;
  if(tag==='failed_qual'){
    if(pos===3)return 1.4+hard*0.7;
    if(pos===4)return 1.0+hard*0.5;
    if(pos===5)return 0.6+hard*0.4;
    return 0.3+hard*0.3;
  }
  if(pos===1)return 3.4+hard*0.5;   // topping a group of death is special
  if(pos===2)return 2.9+hard*0.9;   // second behind a giant is near-par; second behind minnows isn't
  // PLAYOFF ROUTE: scraping in through the playoff should never read as beating the
  // brief when automatic top-two qualification was the actual expectation. For any
  // nation expected to qualify outright (exp>=2), qualifying via the scenic route is
  // par at best — cap it just at/below their expectation so the verdict lands as "job
  // done", not "overachieved". Genuine minnows, for whom a playoff was the dream, still
  // get full credit for the same outcome.
  const exp=qualExpectation();
  const base=2.4+hard*0.6;
  if(exp>=2.4)return Math.min(base, exp-0.15);   // auto-qualify was the aim: playoff is a slight miss
  if(exp>=2.0)return Math.min(base, exp);        // qualification the target: playoff is exactly par
  return base;                                    // playoff was the ceiling: full credit
}
// FINALS outcomes on the 0-6 scale
const RESULT_SCORE={group_exit:1,'Round of 32':2,'Round of 16':3,'Quarter-final':4,'Semi-final':5,FINAL:5.5,champions:6};
function resultScore(tag){
  if(tag==='champions')return 6;
  if(tag==='group_exit')return 1;
  return RESULT_SCORE[tag]??2;
}
// grade the manager on the RIGHT yardstick for the competition he just contested
// Managers retire. Nobody coaches into their eighties.
function checkManagerRetirement(){
  const m=G.manager;if(!m)return false;
  const age=m.age||44;
  // ADVANCE WARNING: warn the player a year or two AHEAD, while the actual retirement
  // chance this turn is still low, so a key departure never comes as a total surprise and
  // there's time to line up a successor. Fired once per manager as he enters the danger
  // zone (early sixties / a couple of years shy of the hard cap).
  const hardCapForWarn = mgrIsHome(m)?71:69;
  const thisYearChance = age<62 ? 0 : clamp((age-61)*0.16,0,1);
  if(!m._retireWarned && thisYearChance<0.35 && (age>=61 || age>=hardCapForWarn-4)){
    m._retireWarned=true;
    initSocial();
    G.social.notifications.unshift({id:socialId(),kind:'mgr-warn',
      who:{name:m.name,handle:'Manager',av:'#f5c542',v:false},
      text:`is getting on — at ${age}, he'll retire within a few years. Worth lining up a successor.`,
      read:false,year:G.year});
    G.mgrRetireWarning={name:m.name,age};
  }
  // Managers retire with age. The chance ramps from 64, and by 70 it is CERTAIN —
  // nobody manages into their 70s here, so you are always eventually forced to find a
  // successor. A homegrown legend hangs on a year or two longer, but not forever.
  const hardCap = mgrIsHome(m)?71:69;
  let chance = age<62 ? 0 : clamp((age-61)*0.16,0,1);
  if(age>=hardCap)chance=1;
  if(Math.random()<chance){
    const titles=(m.history||[]).filter(h=>h.result==='champions').length;
    G.retiredManager={name:m.name,age,years:m.yearsAtNation||0,titles};
    // Announce it on social media — a key moment in the dynasty's story.
    const nat=myNation();
    initSocial();
    const legacy = titles>=3?`a bona fide legend — ${titles} major titles`
      : titles>=1?`${titles} major title${titles===1?'':'s'} to his name`
      : 'a servant who gave everything';
    // A direct notification so the player is unmistakably made aware he's leaving.
    G.social.notifications.unshift({id:socialId(),kind:'mgr',
      who:{name:m.name,handle:'Manager',av:'#f5c542',v:false},
      text:`has retired at ${age} — you'll appoint a successor before the next campaign`,
      read:false,year:G.year});
    socialAnnounce('presser',
      `🚨 BREAKING: ${m.name} has announced his retirement from management at ${age}, ending ${m.yearsAtNation||0} year${(m.yearsAtNation||0)===1?'':'s'} in charge of ${nat?nat.name:'the national team'}. He leaves as ${legacy}. The search for a successor begins.`,
      0.9);
    if(titles>=1){
      socialAnnounce('fan',
        `end of an era. thank you for everything, gaffer. ${titles>=3?'we will never see his like again 🐐😢':'❤️'}`,0.7);
    }
    G.manager=null;G.mgrShortlist=null;
    return true;
  }
  return false;
}
// Rebuilds ONLY the review display object (G.mgrReview) to match the given
// result — no rating/confidence/tenure mutation. Called unconditionally when a
// result is finalised, so the card can never show a stale earlier verdict (e.g.
// a partial-table "5th / failed" frozen in before the campaign actually settled)
// even though the one-time grading mutation stays guarded to once per year.
function refreshMgrReview(resultTag,qualPos){
  const m=G.manager;if(!m)return;
  const isQual = resultTag==='qualified'||resultTag==='failed_qual';
  let exp,got,scale;
  if(isQual){ exp=qualExpectation(); got=qualResultScore(resultTag,qualPos||3); scale='qual'; }
  else      { exp=nationExpectation(); got=resultScore(resultTag);              scale='finals'; }
  const delta=got-exp;
  let groupNote=null;
  if(isQual&&G.qualGroup){
    const hard=groupDifficulty();
    const rivals=G.qualGroup.filter(t=>!t.you).sort((a,b)=>(b.factory||0)-(a.factory||0));
    const top=rivals[0];
    if(top){
      if(hard>=0.45)groupNote=`A brutal draw — ${top.name} in the same group. The board factored that in.`;
      else if(hard>=0.15)groupNote=`A testing group, ${top.name} the standout rival.`;
      else if(hard<=-0.3)groupNote=`A kind draw. Little excuse for anything less than top spot.`;
      else groupNote=`A fair draw, ${top.name} the main threat.`;
    }
  }
  // preserve the rating move already computed by gradeManager this year, if any
  const move=(G.mgrReview&&G.mgrReview.move)||'0.0';
  G.mgrReview={delta,exp,got,resultTag,scale,qualPos,groupNote,move};
}
function gradeManager(resultTag,qualPos){
  const m=G.manager;if(!m)return;
  initStats();
  const isQual = resultTag==='qualified'||resultTag==='failed_qual';
  let exp,got,scale;
  if(isQual){
    exp=qualExpectation();
    got=qualResultScore(resultTag,qualPos||3);
    scale='qual';
  }else{
    exp=nationExpectation();
    got=resultScore(resultTag);
    scale='finals';
  }
  const delta=got-exp;
  m.tenure=(m.tenure||0)+1;
  m.age=(m.age||44)+1;
  m.lastResult=resultTag;m.lastDelta=delta;
  m.history=(m.history||[]);m.history.push({year:G.year,result:resultTag,delta,scale});
  // ---- FINANCE: bank prize money for the result, and shift the expectations floor ----
  initFinance();
  const prize=prizeFor(resultTag);
  const tv=tvFor(resultTag);
  if(prize>0){G.finance.cash+=prize;G.finance.lastPrize=prize;}
  else G.finance.lastPrize=0;
  if(tv>0){G.finance.cash+=tv;G.finance.lastTV=tv;}
  else G.finance.lastTV=0;
  updateExpFloor(delta);
  // ---- SUSTAINED-SUCCESS BUDGET RATCHET ----
  // Deep runs at the finals grow TV/commercial income, lifting future budgets; poor
  // showings let it drift back down. Slow on the way up so it rewards CONSISTENCY, not a
  // single fluke, and capped relative to your base budget so it never runs away.
  if(!isQual){
    const bb=G.finance.budgetBonus||0;
    let d=0;
    if(resultTag==='champions')        d=1.4;
    else if(resultTag==='FINAL')       d=1.0;
    else if(resultTag==='Semi-final')  d=0.7;
    else if(resultTag==='Quarter-final')d=0.4;
    else if(resultTag==='Round of 16') d=0.15;
    else if(resultTag==='Round of 32') d=-0.12;
    else /* group exit */              d=-0.28;
    // beating your brief adds a little extra; falling short trims a little
    d+=clamp(delta*0.12,-0.4,0.4);
    // SLIGHT SKEW TOWARD GROWTH: erosion bites a little softer than accrual rewards, so a
    // career of mixed results drifts gently upward rather than flat. Downside is dampened,
    // never removed — a sustained bad run still shrinks the budget.
    if(d<0)d*=0.75;
    const base=Math.round(clamp(4+((myNation()||{}).factory||55)*0.24,6,28));
    const cap=Math.max(4, base*0.6);   // ratchet can lift the budget by up to ~60%
    G.finance.budgetBonus=Math.round(clamp(bb+d, 0, cap)*10)/10;
  } else {
    // a full campaign missed (didn't even qualify) gently erodes the commercial base
    if(resultTag==='failed_qual'){
      G.finance.budgetBonus=Math.round(Math.max(0,(G.finance.budgetBonus||0)-0.22)*10)/10;
    }
  }
  // ---- rating movement: age curve + performance ----
  // Age gives a gentle drift, but PERFORMANCE dominates: a real underperformance must be
  // able to overpower the age bonus so a disaster (e.g. a giant going out in the R32)
  // always nets to a DROP, while sustainable growth stays slow and earned.
  let ageMove=0;
  if(m.age<50)      ageMove+=0.9;
  else if(m.age<58) ageMove+=0.3;
  else if(m.age<63) ageMove-=0.2;
  else              ageMove-=1.1;
  // a qualifying campaign is a lower-stakes event: it moves the needle less
  const weight=isQual?0.45:0.7;
  // SKEW TOWARD GROWTH: a superb result should lift a manager MORE than an equivalent
  // disaster drops him. We give the upside more room (wider positive clamp) than the
  // downside, so over a career of mixed results reputations tend to climb — while a true
  // failure still stings and a genuine disaster still nets to a clear drop.
  let perfMove=clamp(delta*weight,-2.2,2.8);
  // A clear failure (missing the brief by a full band or more) OVERRIDES age growth —
  // you can't grow your reputation while presiding over a genuine embarrassment.
  if(delta<=-1){
    perfMove+=clamp((delta+1)*0.5,-1.3,0);   // extra sting, a touch gentler than before
    if(ageMove>0)ageMove*=0.15;              // neutralise nearly all of the age bonus
  }
  // AN EXCEPTIONAL RESULT (smashing the brief — a shock final or title) earns a bonus on
  // top, so the skew toward growth is felt most where it's most deserved.
  if(delta>=1.5){
    perfMove+=clamp((delta-1)*0.5,0,1.2);
  }
  let move=ageMove+perfMove;
  move+=gauss()*0.4;
  // A disaster can never read as a net gain, whatever the age curve or noise did.
  if(delta<=-1.5)move=Math.min(move,-0.3);
  // HOMEGROWN PROJECT: a loyal native coach who succeeds grows beyond what his
  // nation could ever have bought. This is the small nation's route to greatness.
  if(m.homegrownProject && mgrIsHome(m)){
    const yrs=m.yearsAtNation||0;
    // A native coach who stays and succeeds becomes far more than his nation could buy.
    if(delta>0)move+=0.55+Math.min(0.6,yrs*0.06);
    if(yrs>=5)move+=0.3;
    if(yrs>=10)move+=0.2;
    // his late-career decline is gentler — he knows this squad inside out
    if(m.age>=63)move+=0.5;
    // diminishing returns as he approaches genuine world class
    if(m.rating>=80)move*=0.55;
    if(m.rating>=88)move*=0.5;
  }
  // ---- APPLY THE MOVE ON A PRECISE SCALE ----
  // The displayed rating is an integer, but we accumulate the TRUE value as a float so
  // fractional growth is never lost to rounding. On-par (~+0.9) reliably nudges the real
  // rating up; the shown number ticks over once enough has banked, rather than a +0.9
  // season sometimes rounding to +0 and looking like the manager stood still.
  if(m.ratingExact==null)m.ratingExact=m.rating;   // seed from the current integer
  m.ratingExact=clamp(m.ratingExact+move,32,96);
  m.rating=Math.round(m.ratingExact);
  // ---- board / fan confidence ----
  m.confidence=clamp((m.confidence??70)+delta*(isQual?8:11)+(!isQual&&got>=5?8:0),0,100);
  let groupNote=null;
  if(isQual&&G.qualGroup){
    const hard=groupDifficulty();
    const rivals=G.qualGroup.filter(t=>!t.you).sort((a,b)=>(b.factory||0)-(a.factory||0));
    const top=rivals[0];
    if(hard>=0.45)groupNote=`A brutal draw — ${top.name} in the same group. The board factored that in.`;
    else if(hard>=0.15)groupNote=`A testing group, ${top.name} the standout rival.`;
    else if(hard<=-0.3)groupNote=`A kind draw. Little excuse for anything less than top spot.`;
    else groupNote=`A fair draw, ${top.name} the main threat.`;
  }
  G.mgrReview={delta,exp,got,resultTag,scale,qualPos,groupNote,move:move.toFixed(1)};
}
function qualExpLabel(v){
  if(v>=3.1)return 'Top the group, comfortably';
  if(v>=2.9)return 'Top the group, or a strong second';
  if(v>=2.5)return 'Qualify, ideally in the top two';
  if(v>=2.0)return 'Qualification is the target';
  if(v>=1.4)return 'A playoff push would be a triumph';
  return 'A single win would be historic';
}
function expLabel(v,scale){
  if(scale==='qual')return qualExpLabel(v);
  return ['Just being there','A competitive showing','Escape the group','Reach the last 16','Reach the quarters','Reach the semis','Win it'][Math.round(clamp(v,0,6))];
}
function gotLabel(tag,pos){
  if(tag==='champions')return 'Champions';
  if(tag==='qualified')return pos===1?'Qualified — topped the group':pos===2?'Qualified (2nd)':'Qualified via playoff';
  if(tag==='failed_qual')return pos===3?'Lost the playoff':`Failed to qualify (${pos?ordinal(pos):'—'})`;
  if(tag==='group_exit')return 'Group stage exit';
  if(tag==='FINAL')return 'Runners-up';
  return tag;
}

function renewManager(){

function screenRenewContract(){applyTheme('home');

    return `<button class="renew-opt" onclick="confirmRenew(${yrs})">
      <div class="ro-yrs">${yrs} yr${yrs>1?'s':''}</div>
      <div class="ro-fee">poach fee £${comp.toFixed(1)}m</div>

function confirmRenew(yrs){
  const m=G.manager;if(!m)return;
  initFinance();
  G.mgrContractYears=yrs;G.mgrContractYearsLeft=yrs;
  m.poachRestUntil=(G.year||0)+1;   // just re-signed — brief settle
  G.mgrReview=null;G.mgrRenewed=true;G._reviewReturn=null;
  popToast(`${m.name.split(' ').slice(-1)[0]} signs a ${yrs}-year deal`);
  proceedAfterReview();
}
function cancelRenew(){
  // return to the review if we came from there, else the manager screen
  if(G.mgrReview)return screenManager();
  screenManager();
}
function sackManager(){
  const m=G.manager;
  initFinance();
  // COMPENSATION: sacking a manager under contract costs a pay-off on his remaining term.
  const comp = m ? compensationFor(G.finance.wage||baseWageFor(m), G.mgrContractYearsLeft||1, m) : 0;
  const midReview = !!G._reviewReturn;
  G.finance.cash=(G.finance.cash||0)-comp;
  if(G.finance.cash<0){G.finance.debt=(G.finance.debt||0)+(-G.finance.cash);G.finance.cash=0;}
  if(m)G._sackedPayoff={name:m.name, comp};
  G.manager=null;G.mgrReview=null;
  G._reviewReturn=null;
  G.mgrSacked=true;
  G.mgrContractYearsLeft=null;
  G.appointingAfterReview = midReview;
  if(comp>0)popToast(`${m.name.split(' ').slice(-1)[0]} paid off · £${comp.toFixed(1)}m compensation`);
  screenManager();
}
function proceedAfterReview(){
  // continue whatever flow we were in
  if(G._afterReview){const fn=G._afterReview;G._afterReview=null;fn();}
  else ageAndContinue();
}

function backToReview(){
  // Only ever return to the screen we ACTUALLY came from. A stale callback from an
  // earlier cycle must never be able to re-run and change game state.
  if(typeof G._reviewReturn==='function')return G._reviewReturn();
  // no valid hook: fall back somewhere safe and read-only
  if(G.tournamentActive&&G.stage==='ko')return screenKnockoutHub();
  if(G.tournamentActive&&G.stage==='group')return screenGroupHub();
  if(G.tournamentActive&&G.stage==='qual')return screenQualHub();
  return screenSquad();
}

// STYLE AFFINITY (Alpha 6.9): how well a player's style serves a manager's approach.
// 1.0 = his exact style; partial credit for related approaches; near-0 for opposites.
// Feeds the DISPLAYED manager fit % (mgrFit) so a squad built for his approach reads high
// (90s) and a mismatch low (~15-25%). Symmetric matrix built from the pairs below.
// (The on-pitch manager bonus still runs on exact-style depth — see mgrFit.onStyle.)
const STYLE_AFF=(()=>{
  const K=STYLE_KEYS;
  // Proactive pair (possession/gegenpress) and reactive pair (direct/lowblock) share
  // the most traits; across the divide the credit falls away.
  const P={'possession-gegenpress':0.45,'possession-direct':0.20,'possession-lowblock':0.18,
    'gegenpress-direct':0.55,'gegenpress-lowblock':0.12,
    'direct-lowblock':0.55};
  const M={};K.forEach(a=>{M[a]={};K.forEach(b=>{M[a][b]=a===b?1:(P[a+'-'+b]??P[b+'-'+a]??0);});});
  return M;
})();
const MGR_FORMATIONS=['4-3-3','4-4-2','3-5-2','5-3-2','4-2-3-1','4-5-1'];
const MGR_TRAITS=['Man-manager','Disciplinarian','Youth developer','Tournament specialist','Motivator','Tactician','Pragmatist','Serial winner'];
function mgrNationality(){
  // mostly foreign, sometimes homegrown — the nationality bonus matters
  const isos=Object.keys(MGR_FIRST).filter(k=>k!=='dflt');
  return pick(isos);
}
function mgrName(iso){
  // bespoke manager pool if we have one, otherwise reuse the nation's PLAYER name pool
  if(MGR_FIRST[iso]&&MGR_LAST[iso])return pick(MGR_FIRST[iso])+' '+pick(MGR_LAST[iso]);
  const base=(iso||'').split('-')[0];
  if(MGR_FIRST[base]&&MGR_LAST[base])return pick(MGR_FIRST[base])+' '+pick(MGR_LAST[base]);
  if(iso&&(NATION_NAMES[iso]||NATION_NAMES[base]||FAMILY_OF[iso]||FAMILY_OF[base]))return buildName(iso);
  return pick(MGR_FIRST.dflt)+' '+pick(MGR_LAST.dflt);
}
// ---- Manager quality is bounded by who's willing to take the job. ----
// Guardiola will not manage San Marino. A nation attracts coaches in proportion
// to its prestige — with rare exceptions, and homegrown coaches as the way out.
// How good a coach will realistically take this job?
// A nation's PRESTIGE lifts the floor as much as the ceiling: England's worst
// serious candidate is still an experienced international manager, not a journeyman.
// (Previously the floor barely moved with prestige, so 51% of England's candidates
// rated below 70 — absurd for a four-star nation.)
function mgrCeilingFor(factory,isHome,lean){
  let ceiling = 50 + factory*0.48;   // SMR 54 · MLT 60 · CRO 84 · ENG 88 · BRA 94
  let floor   = 30 + factory*0.53;   // SMR 34 · MLT 41 · CRO 67 · ENG 72 · BRA 79
  if(lean){
    // A lean market: the CEILING falls (no elite coach is available), but the floor
    // holds. England in a bad year gets 74-80, not 59 — a serious nation never
    // interviews a journeyman. Previously the floor collapsed harder than the ceiling.
    ceiling -= factory*0.16;
    floor   -= factory*0.05;
  }
  if(isHome){
    // a homegrown coach will take the job regardless — but starts modest and GROWS
    ceiling = Math.max(ceiling, 40 + factory*0.30);
    floor   = Math.max(34, floor - 8);
  }
  return {floor:clamp(floor,32,80), ceiling:clamp(ceiling,44,94)};
}
function genManager(forceIso,forNationFactory,isHome,lean,styleRef){
  const iso=forceIso||mgrNationality();
  // A nation tends to appoint coaches who speak its footballing language — but not
  // always: a third of appointments still break with tradition. (Alpha 7.3)
  const style=(styleRef&&Math.random()<0.66)
    ? (MGR_STYLES.find(x=>x.key===styleForNation(styleRef))||pick(MGR_STYLES))
    : pick(MGR_STYLES);
  const nat=myNation();
  const factory=(forNationFactory!==undefined?forNationFactory:(nat?nat.factory:55));
  const {floor,ceiling}=mgrCeilingFor(factory,!!isHome,!!lean);
  // Exponent < 1 skews toward the CEILING. Most candidates for a strong nation are
  // strong; the old 1.55 squashed everyone down onto the floor.
  let rating = floor + (ceiling-floor)*Math.pow(Math.random(),0.8);
  // EXCEPTIONALLY rare: a great coach takes a project job — a genuine "why on earth?"
  // story. ~1 shortlist in 80 for a minnow. Kept deliberately, thrillingly unlikely.
  let freak=false;
  if(!isHome && Math.random() < 0.012){
    rating = ceiling + rnd(10,22);   // far beyond what the nation should attract
    freak=true;
  }
  rating = Math.round(clamp(rating,32,94));
  const age=Math.round(rnd(36,62));
  return {
    id:PID++, name:mgrName(iso), iso:(MGR_FLAG_ISO&&MGR_FLAG_ISO[iso])||iso,
    rating, style:style.key, styleLabel:style.label, styleDesc:style.d,
    formation:pick(MGR_FORMATIONS),
    mentality:pick(['defensive','balanced','attacking']),
    trait:pick(MGR_TRAITS),
    wage:Math.round(rating*1.4),
    age,
    confidence:70,tenure:0,history:[],
    homegrownProject:!!isHome,
    freakHire:freak,
  };
}

const MGR_KEY={'gb-eng':'en','gb-sct':'en','gb-wls':'en'};
function mgrKeyFor(iso){return MGR_KEY[iso]||(MGR_FIRST[iso]?iso:null);}
// Name-pool keys aren't all valid flagcdn iso codes ('en' has no flag — it needs 'gb-eng').
// Without this map, foreign candidates drawn from the 'en' pool render a broken flag.
const MGR_FLAG_ISO={en:'gb-eng'};

function managerShortlist(){
  if(G.mgrShortlist&&G.mgrShortlistYear===G.year)return G.mgrShortlist;
  const nat=myNation();
  const F=nat.factory;
  // ~1 cycle in 5 the market is lean: the good coaches are all in work, or unwilling.
  const lean = Math.random() < 0.20;
  G.mgrMarketLean = lean;
  // Three foreign candidates, drawn from the SAME market. The spread between the best
  // and worst was reaching 15+ points, which is why England saw a 60 next to an 84.
  const list=[genManager(undefined,F,false,lean),genManager(undefined,F,false,lean),genManager(undefined,F,false,lean)];
  // ALWAYS one homegrown candidate — the route to greatness for a small nation
  const home=genManager(mgrKeyFor(nat.iso)||undefined,F,true,lean);
  home.iso=nat.iso;
  if(!mgrKeyFor(nat.iso))home.name=buildName(nat.iso);
  list.push(home);
  list.sort((a,b)=>b.rating-a.rating);
  G.mgrShortlist=list;G.mgrShortlistYear=G.year;
  G._mgrDeclineCount=0;   // fresh cycle — reset the walked-away penalty ladder
  return list;
}
// Consequence for failed HIRE talks: the declined manager walks away for good this
// cycle, and word gets round — the coach who replaces him on the shortlist is
// visibly weaker. Prevents the "just try again with no cost" loophole.
function degradeShortlistAfterDecline(declinedId, declinedName){
  if(!G.mgrShortlist||!G.mgrShortlist.length)return;
  const nat=myNation();if(!nat)return;
  const F=nat.factory;
  // Remove the one who walked (by id, name fallback).
  const idx=G.mgrShortlist.findIndex(m=>m.id===declinedId||m.name===declinedName);
  if(idx<0)return;
  const gone=G.mgrShortlist[idx];
  G.mgrShortlist.splice(idx,1);
  // Track who has walked this cycle so failing on the replacement keeps degrading.
  G._mgrDeclineCount=(G._mgrDeclineCount||0)+1;
  // Build a replacement that is genuinely weaker than the man who walked.
  // Cascading downgrade: each subsequent decline pushes the ceiling further down.
  const wasHome=!!gone.homegrownProject;
  const penalty = 6 + G._mgrDeclineCount*3;      // -6, -9, -12 rating vs the walker
  let replacement = genManager(wasHome?nat.iso:undefined, F, wasHome, true /* lean */);
  // Cap the replacement's rating at (walker - penalty), with a hard floor of 40.
  const cap = Math.max(40, gone.rating - penalty);
  if(replacement.rating > cap){
    replacement.rating = Math.round(cap);
    // reflavour so a "Tactician" doesn't stay elite by trait alone
    replacement.trait = pick(['Pragmatist','Disciplinarian','Journeyman','Firefighter']);
  }
  replacement.freakHire = false;   // no shock candidate as consolation
  G.mgrShortlist.push(replacement);
  G.mgrShortlist.sort((a,b)=>b.rating-a.rating);
  // Signal the market as visibly lean on the reopened screen.
  G.mgrMarketLean = true;
  // Small news beat so the player sees the consequence.
  try{
    initSocial&&initSocial();
    if(G.social&&G.social.notifications){
      G.social.notifications.unshift({id:socialId(),kind:'mgr',
        who:{name:declinedName,handle:'Manager',av:'#f5c542',v:false},
        text:`walked away from talks. Word gets round — the coach who replaces him on the shortlist is a step down.`,
        read:false,year:G.year});
    }
  }catch(e){}
}
// how well does a manager's style fit the squad you already picked?
function mgrFit(m){
  const avail=(G.squad||[]).filter(p=>!p.injured);
  if(!avail.length)return {onStyle:0,suited:0,pct:0,verdict:'—',raw:0};
  const ms=normStyle(m.style);
  const row=STYLE_AFF[ms]||{};
  let raw=0,onStyle=0;
  avail.forEach(p=>{ const ps=normStyle(p.style); raw+=(row[ps]||0); if(ps===ms)onStyle++; });
  raw/=avail.length;
  // affinity (0..1) → readable 0-100, calibrated against tradition-weighted squads:
  // a nation's classic style reads ~75-90 (Spain/possession ~85), its opposite ~10-25
  // (Spain/low block ~13), and a style-agnostic squad sits mid-table. (Alpha 7.1)
  const pct=Math.max(2,Math.min(100,Math.round((raw-0.27)/(0.80-0.27)*96+4)));
  const suited=Math.round(raw*avail.length);   // affinity-weighted "effectively suited" count
  const verdict=pct>=80?'Perfect fit':pct>=55?'Good fit':pct>=35?'Workable':'Poor fit';
  return {onStyle,suited,pct,verdict,raw};
}
function mgrIsHome(m){
  const nat=myNation();
  return m.iso===nat.iso||m.iso===nat.iso.split('-')[0];
}
// hidden bonus: manager quality + nationality fit + style fit
function managerBonus(){
  const m=G.manager;if(!m)return 0;
  let b=(m.rating-70)*0.09;                 // quality — Tier 2 (was 0.06)
  if(mgrIsHome(m))b+=0.8;                    // homegrown understanding
  const fit=mgrFit(m);
  b+=clamp((fit.onStyle-4)*0.22,-1.2,1.6);   // does his style suit YOUR players?
  if(m.trait==='Tournament specialist')b+=0.6;
  // SETTLING IN: a brand-new manager doesn't know the group. Real cost to churn.
  const yrs=m.yearsAtNation||0;
  if(yrs===0)b-=1.4;
  else if(yrs===1)b-=0.5;
  // CONTINUITY: long service breeds understanding — a real, growing reward.
  b+=clamp((yrs-2)*0.22,0,1.8);
  // CHEMISTRY: a small hidden click-with-the-team roll set at signing (Alpha 3.1)
  if(typeof m.chemistry==='number') b+=clamp(m.chemistry,-2,2);
  return b;
}

// human-readable continuity state, shown on the manager screen
function mgrContinuity(){
  const m=G.manager;if(!m)return null;
  const y=m.yearsAtNation||0;
  if(y===0)return {t:'Settling in',d:'A new manager needs time. The squad are still learning his ways.',v:-1.4,col:'var(--red)'};
  if(y===1)return {t:'Bedding in',d:'Beginning to impose his ideas.',v:-0.5,col:'var(--amber)'};
  if(y<4)return {t:'Established',d:'The group know exactly what he wants.',v:clamp((y-2)*0.22,0,1.8),col:'var(--accent)'};
  if(y<8)return {t:'Deep understanding',d:'Years of shared work. They play for him.',v:clamp((y-2)*0.22,0,1.8),col:'var(--green)'};
  return {t:'An institution',d:'He IS the national team. A bond forged over a decade.',v:clamp((y-2)*0.22,0,1.8),col:'var(--gold)'};
}

// Picking a manager no longer signs him on the spot — it opens WAGE TALKS. He names a
// figure based on his overall; you negotiate. Only once terms are agreed is he committed
// (see finishHire, called from the negotiation engine).
function hireManager(id){
  const m=managerShortlist().find(x=>x.id===id);if(!m)return;
  initFinance();
  const ask=baseWageFor(m);                            // his opening demand, from his overall
  const floor=Math.round(ask*0.8*10)/10;               // the least he'll take to sign
  startNegotiation('hire', {manager:m, ask, floor, current:0});
  renderNegotiation();
}
// Commit the hire once wage terms are settled at `wage`.
function finishHire(id, wage){
  const m=managerShortlist().find(x=>x.id===id);if(!m)return;
  m.yearsAtNation=0;   // brand new — carries the settling-in penalty
  m._retireWarned=false;
  G.mgrSacked=false;
  G.mgrRetireWarning=null;   // fresh manager — clear any old warning
  G.manager=m;
  initFinance();G.finance.wage=wage;   // the negotiated wage, drawn off the budget
  G.mgrContractYears=2;G.mgrContractYearsLeft=2;   // standard opening deal (Alpha 2.9)
  // the manager sets the tactical identity
  G.tactics.style=m.style;G.tactics.formation=m.formation;G.tactics.mentality=m.mentality;
  G.tactics.tempo=m.style==='direct'?'direct':m.style==='possession'?'patient':'measured';
  G.tactics.press=m.style==='gegenpress'?'high':m.style==='lowblock'?'low':'mid';
}

//  chooses 1–4 years. A small "chemistry" roll (±small) is applied to how the
//  new man clicks with the group — a sprinkle of variance, nothing more.
// ============================================================================
function rollChemistry(){
  const r=(Math.random()+Math.random()+Math.random())/3;  // 0..1, bell-ish
  return Math.round((r-0.5)*4*10)/10;                     // ~-2.0 .. +2.0
}
function chemistryLabel(c){
  if(c>=1.2)return {t:'Instant click',d:'The dressing room take to him at once.',col:'var(--green)'};
  if(c>=0.4)return {t:'Warm reception',d:'A promising first impression.',col:'var(--accent)'};
  if(c>-0.4)return {t:'Neutral fit',d:'They\'ll judge him on results.',col:'var(--dim)'};
  if(c>-1.2)return {t:'Cool welcome',d:'Some scepticism to win over.',col:'var(--amber)'};
  return {t:'Awkward start',d:'He hasn\'t quite read the room yet.',col:'var(--red)'};
}

  go(statusBar()+`<div class="wrap">

    <div class="notecard">Wage agreed with <b>${m.name}</b> at <b>£${pc.wage.toFixed(1)}m/yr</b>. ${fromLine}</div>

    <div class="renew-opts">${[1,2,3,4].map(opt).join('')}</div>
    <p class="lede" style="text-align:center;font-size:12px;color:var(--dim2);margin-top:10px">A longer deal ties him down — and if a rival poaches him later, you're compensated on the length that's left.</p>

function confirmNewContract(yrs){
  const pc=G._pendingContract;if(!pc)return screenManager();
  initFinance();
  const chem = (pc.chemistry!=null)?pc.chemistry:rollChemistry();
  // Alpha 4.8: no signing fee for term length. (Approach still pays its poach/compensation costs below.)

  if(pc.mode==='approach'){
    const ac=G.approachCtx||{};
    const rf=ac.fee||0;
    G.finance.cash=(G.finance.cash||0)-rf;
    if(G.finance.cash<0){G.finance.debt=(G.finance.debt||0)+(-G.finance.cash);G.finance.cash=0;}
    if(G.manager){
      const comp=compensationFor(G.finance.wage||baseWageFor(G.manager), G.mgrContractYearsLeft||1, G.manager);
      G.finance.cash=(G.finance.cash||0)-comp;
      if(G.finance.cash<0){G.finance.debt=(G.finance.debt||0)+(-G.finance.cash);G.finance.cash=0;}
      G._approachOldMgr={name:G.manager.name, comp};
    }
    const nm=(G.rivalMgrs&&G.rivalMgrs[ac.natId])?G.rivalMgrs[ac.natId]:null;
    if(nm){
      delete G.rivalMgrs[ac.natId];
      nm.yearsAtNation=0; nm._retireWarned=false; nm.confidence=72;
      nm.chemistry=chem;
      G.manager=nm;
    }
    G.finance.wage=pc.wage;
    G.mgrContractYears=yrs; G.mgrContractYearsLeft=yrs;
    if(G.manager){
      G.tactics.style=G.manager.style;G.tactics.formation=G.manager.formation;G.tactics.mentality=G.manager.mentality;
    }
    G.mgrSacked=false;G.mgrRetireWarning=null;G.mgrShortlist=null;
    G._approachDone={name:G.manager?G.manager.name:'',fee:rf, natName:ac.natName};
    G.approachCtx=null;
    G._pendingContract=null;
    G.negotiation={mode:'approach', resolved:'agreed', agreedWage:pc.wage, managerName:G.manager?G.manager.name:''};
    return renderNegotiation();
  }
  // HIRE
  finishHire(pc.managerId, pc.wage);
  if(G.manager){G.manager.chemistry=chem;}
  G.mgrContractYears=yrs; G.mgrContractYearsLeft=yrs;
  G._pendingContract=null;
  G.negotiation={mode:'hire', resolved:'agreed', agreedWage:pc.wage, managerId:pc.managerId, managerName:G.manager?G.manager.name:''};
  renderNegotiation();
}

// Assistant coach: soft, indicative reads on your setup — not gospel, but a nudge
function coachFeedback(){
  const t=G.tactics;const avail=G.squad.filter(p=>!p.injured);
  if(avail.length<11)return 'Get me a full squad first, boss.';
  const notes=[];
  if(G.manager){const fit=mgrFit(G.manager);
    if(mgrIsHome(G.manager))notes.push(`${G.manager.name.split(' ').slice(-1)[0]} knows this country inside out — the lads respond to him.`);
    if(fit.pct>=82)notes.push(`His ${mgrStyleLabel(G.manager)} is tailor-made for this group.`);
    else if(fit.pct<28)notes.push(`Between us, his ${mgrStyleLabel(G.manager)} doesn't suit these players at all.`);}
  const sc=styleMatchCount(avail);const onStyle=sc[t.style]||0;
  if(onStyle>=8)notes.push(`This group is <b>made</b> for ${styleLabelOf(t.style)} — ${onStyle} of them live and breathe it.`);
  else if(onStyle>=6)notes.push(`Decent fit for ${styleLabelOf(t.style)} (${onStyle} suited). Workable.`);
  else notes.push(`Honest opinion? Only ${onStyle} of these lads suit ${styleLabelOf(t.style)}. We're forcing it a bit.`);
  const avgAge=avail.reduce((s,p)=>s+p.age,0)/avail.length;
  if(t.press==='high'&&avgAge>28.5)notes.push(`A high press with an average age of ${avgAge.toFixed(1)}? The legs will go by the hour mark, boss.`);
  else if(t.press==='high'&&avgAge<26.5)notes.push(`Young legs, high press — teams will hate playing us.`);
  const need=FORMATIONS[t.formation].need;
  const cbNeed=need.CB||0;const cbs=avail.filter(p=>p.pos==='CB').length;
  if(cbNeed>=3&&cbs<4)notes.push(`We're asking for ${cbNeed} centre-backs but only carry ${cbs}. One knock and it's square pegs.`);
  const leaders=avail.filter(p=>p.arch==='leader'||p.arch==='veteran').length;
  if(leaders===0)notes.push(`No natural leaders in this group. Fine while we're winning...`);
  if((G.moraleMod||0)>0)notes.push(`Mood in camp is good after how you handled things.`);
  else if((G.moraleMod||0)<0)notes.push(`The camp's a bit flat, between us. Your call ruffled feathers.`);
  return notes.slice(0,3).join('<br>');
}

function buildField(myOv,myName,comp){
  const nat=myNation();
  let names;
  if(comp.type==='WC'){
    if(G.year===2026){
      // real 48, but YOUR campaign decides your place (alternate timeline)
      names=WC26_QUALIFIERS.map(x=>x[0]).filter(n=>n!==myName);
      if(names.length>comp.teams-1){const minnows=names.filter(n=>FIELD_FACT[n]<=48);
        if(minnows.length)names.splice(names.indexOf(pick(minnows)),1);else names.pop();}
    }else{
      // future WCs: qualification churn — strong nations usually make it, but form matters.
      // Italy CAN qualify in 2030; a big name CAN miss out. Occasional shocks (~1 in 8 per big nation).
      const scored=ALL_NATIONS.filter(x=>x[0]!==myName).map(x=>({n:x[0],s:x[2]+gauss()*8-(Math.random()<0.10?rnd(55,75):0)}));
      scored.sort((a,b)=>b.s-a.s);
      names=scored.slice(0,comp.teams-1).map(x=>x.n);
    }
  }
  else{names=(CONF_MEMBERS[nat.conf]||[]).filter(n=>n!==myName).sort(()=>Math.random()-0.5).slice(0,comp.teams-1);}
  const others=names.map(n=>{const f=FIELD_FACT[n]??rnd(48,64);const team={name:n,iso:FIELD_ISO[n]||'un',you:false,factory:f};team.ov=computeTeamOVR(team);
    // Champion's curse: a nation that has recently won THIS competition carries a small
    // OVR penalty (squad turnover, complacency, everyone's biggest game of the year).
    // This makes it genuinely harder — not impossible — to string titles together, so
    // three-in-a-row by an AI nation becomes the rare event it should be.
    const curse=recentTitleWeight(n,comp.name);
    if(curse>0)team.ov=Math.max(40,Math.round(team.ov-curse*2.2));
    return team;});
  return [{name:myName,iso:nat.iso,you:true,ov:myOv,factory:nat.factory},...others];
}
// lazily generate a viewable squad for any opponent nation (same realistic scale + depth as player)
function fieldSquad(team){
  if(team._squad)return team._squad;
  // Persistent rival pool: if we've generated this nation's players before,
  // they've aged year-by-year alongside your own — reuse them so careers
  // truly span eras, not just a single tournament.
  const persisted = team.you ? null : rivalPoolFor(team);
  if(persisted && persisted.length){
    team._squad = persisted.slice().sort((a,b)=>b.rating-a.rating);
    return team._squad;
  }
  beginNameBatch();
  const fakeFactory=team.factory||58;
  const base=nationBand(fakeFactory);
  const gen=[];
  const spread=['GK','GK','GK','RB','RB','RB','LB','LB','LB','CB','CB','CB','CB','CB','CB',
    'CDM','CDM','CM','CM','CM','CM','CAM','CAM','RW','RW','RW','LW','LW','LW','ST','ST','ST','ST'];
  while(spread.length<40)spread.push(pick(['CM','CDM','CAM','CB','ST','RW','LW','RB','LB']));
  spread.forEach(pos=>{
    let pot=clamp(base+Math.abs(gauss())*4.0+rnd(-2,4),30,96);
    if(Math.random()<0.04+fakeFactory/900)pot=clamp(pot+rnd(4,9),30,96);
    // Alpha 5.2: AI squads sit under the same tier window ceiling as the player's —
    // this trims the old 95-rated super-Brazils to a beatable ~93. AI get the FULL
    // ceiling (goldenBorn=true): their static strength stands in for nations across
    // every phase of their cycle, and it keeps the player's odds table honest.
    pot=capYouthPot(pot,fakeFactory,false,true);
    const age=Math.round(rnd(19,33));
    const p={id:PID++,pos,name:genericName(team),age,potential:Math.round(pot)};
    p.rating=abilityAtAge(p.potential,age);p.gem=p.potential>=89;p.arch=assignArchetype(p);p.style=styleForNation(team.id||team.name);
    const c=clubForRating(p.rating);p.club=c.name;p.clubTier=c.tier;p.injProne='none';p.injured=null;
    p.caps=Math.max(0,Math.round((age-18)*rnd(3,9)));p.intlBias=0;
    // Opposition players get the same seeded tournament experience as your own pool,
    // so their profiles read consistently when you scout them or click them in a line-up.
    const sy=Math.max(0,age-18);
    p.tourns=clamp(Math.round(sy/2*rnd(0.55,1.15)),0,Math.min(10,Math.floor(sy/2)+1));
    if(age<=19)p.tourns=Math.random()<0.15?1:0;
    p.tournGoals=p.tourns>0?Math.max(0,Math.round(p.tourns*rnd(0,1.4))):0;
    refreshForm(p);
    gen.push(p);
  });
  endNameBatch();
  team._squad=gen.sort((a,b)=>b.rating-a.rating);
  if(!team.you) storeRivalPool(team, team._squad);
  return team._squad;
}

// Merge a bespoke national pool with its regional supplement (deduped), cached per iso.
function augmentedPool(iso, base){
  if(_poolCache[iso])return _poolCache[iso];
  const supKey=SUPPLEMENT_FAMILY[iso]||SUPPLEMENT_FAMILY[(iso||'').split('-')[0]];
  const sup = supKey && supKey!==iso ? (NATION_NAMES[supKey]||NAME_FAMILIES[supKey]) : null;
  if(!sup){_poolCache[iso]=base;return base;}
  const uniq=(a,b)=>{const s=new Set(a);(b||[]).forEach(x=>s.add(x));return [...s];};
  const merged={
    f: uniq(base.f, sup.f),
    l: uniq(base.l, sup.l),
    mig: base.mig
  };
  _poolCache[iso]=merged;
  return merged;
}

function resolvePool(iso){
  const base=(iso||'').split('-')[0];
  // bespoke national pool — augmented with its regional family for depth
  if(NATION_NAMES[iso])return augmentedPool(iso, NATION_NAMES[iso]);
  if(NATION_NAMES[base])return augmentedPool(base, NATION_NAMES[base]);
  const fam=FAMILY_OF[iso]||FAMILY_OF[base];
  if(fam){
    if(NATION_NAMES[fam])return NATION_NAMES[fam];   // e.g. kp → kr
    if(NAME_FAMILIES[fam])return NAME_FAMILIES[fam];
  }
  return NATION_NAMES.dflt;
}

  if(!counts)return pick(list);
  let min=Infinity;
  for(const x of list){ const c=counts.get(x)||0; if(c<min)min=c; }
  const free=list.filter(x=>(counts.get(x)||0)===min);   // all names at the lowest usage count
  const chosen=free.length?pick(free):pick(list);
  counts.set(chosen,(counts.get(chosen)||0)+1);
  return chosen;
}
function pickSurname(list){ return pickLeastUsed(list,_usedSurnames); }
function pickFirst(list){ return pickLeastUsed(list,_usedFirst); }
function buildName(iso){
  const pool=resolvePool(iso);
  if(iso==='is'){
    const first=(pool.mig&&Math.random()<0.12)?pickFirst(pool.mig.f):pickFirst(pool.f);
    const pat=pick(ISL_PATRONYM);
    return first+' '+pat+(pat.endsWith('s')?'son':'sson');
  }
  const useMig=pool.mig&&Math.random()<0.22;
  if(useMig){
    // sometimes a native first name with a heritage surname, sometimes both — like real life
    const f=Math.random()<0.45?pickFirst(pool.f):pickFirst(pool.mig.f);
    return f+' '+pickSurname(pool.mig.l);
  }
  return pickFirst(pool.f)+' '+pickSurname(pool.l);
}
function genericName(team){return buildName(team.iso||'');}

  // is reached with the wrong comp context) — those reads throw and the screen dies mid-

  if(!Array.isArray(G.field)||G.field.length<2||G.field.some(t=>!t||!t.name)){

  // Scale the softmax temperature to the standard deviation of the top 12 sides, so a
  // tightly-bunched elite gives close odds and a lopsided field gives a clear favourite.

  const temp=Math.max(1.5,sd*1.5);

function oddsRow(rk,x){
  return `<tr style="${x.you?'background:rgba(38,213,224,.1)':''}">

}
// Bookmakers round long odds to sensible increments — 250/1, not 317/1.
function toDecimal(prob){
  const dec=Math.max(1.2,1/Math.max(prob,0.0004));
  if(dec<10)return dec.toFixed(1);
  if(dec<20)return String(Math.round(dec));
  if(dec<50)return String(Math.round(dec/5)*5);
  if(dec<100)return String(Math.round(dec/10)*10);
  if(dec<300)return String(Math.round(dec/25)*25);
  if(dec<1000)return String(Math.round(dec/50)*50);
  return '1000+';
}
