.realsharecard{position:relative;overflow:hidden;border-radius:18px;margin:0 0 18px;
  background:linear-gradient(135deg,#1a1030,#0d1b3a 55%,#0a2a2e);
  border:2px solid var(--gold);box-shadow:0 8px 28px -6px rgba(0,0,0,.55),0 0 0 4px rgba(245,197,66,.10)}
.realsharecard .rsc-ribbon{background:var(--gold);color:#1a1205;font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:11px;letter-spacing:.12em;text-align:center;padding:5px 8px;text-transform:uppercase}
.realsharecard .rsc-glow{position:absolute;top:20px;right:-50px;width:180px;height:180px;
  background:radial-gradient(circle,var(--gold),transparent 70%);opacity:.18;pointer-events:none}
.realsharecard .rsc-inner{padding:16px}
.realsharecard .rsc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.realsharecard .rsc-flag{width:44px;height:30px;border-radius:5px;object-fit:cover;flex:0 0 44px;
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.14)}
.realsharecard .rsc-headtxt{min-width:0}
.realsharecard .rsc-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:27px;line-height:1;
  text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:8px}
.realsharecard .rsc-emoji{font-size:26px}
.realsharecard .rsc-sub{font-size:12.5px;color:var(--gold);font-weight:600;margin-top:4px}
.realsharecard .rsc-stats{display:flex;gap:8px;margin-bottom:14px}
.realsharecard .rsc-stat{flex:1;background:rgba(255,255,255,.07);border-radius:10px;padding:9px 4px;text-align:center}
.realsharecard .rsc-stat b{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:23px;color:var(--gold);line-height:1}
.realsharecard .rsc-stat span{font-size:9.5px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.realsharecard .rsc-btn{width:100%;font-size:15px;padding:13px}
.realsharecard .rsc-foot{text-align:center;font-size:11.5px;color:rgba(255,255,255,.55);margin-top:9px}
/* ---- NATIVE ADS (Instagram/Facebook-style sponsored posts) ---- */
.post.ad-post{background:var(--panel);border:1px solid var(--line)}
.ad-verified{color:var(--dim2);font-size:12px;margin-left:2px}
.ad-sponsored{font-size:11px;color:var(--dim2);font-weight:600;margin:-2px 0 6px;letter-spacing:.02em;display:flex;align-items:center;gap:4px}
.ad-sponsored::before{content:'📣';font-size:10px}
.ad-creative{margin:10px 0;height:150px;border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ad-creative span{color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:.06em;text-shadow:0 2px 14px rgba(0,0,0,.4);text-align:center;padding:0 16px}
.ad-cta{display:block;width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:9px;
  padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.05em;
  text-transform:uppercase;cursor:pointer;margin-bottom:8px;transition:.14s}
.ad-cta:hover{filter:brightness(1.08)}
/* ---- forced social checkpoint ---- */
.checkpoint-head{text-align:center;padding:6px 0 2px}
.checkpoint-head .ch-sub{font-size:13px;color:var(--dim);margin-top:6px}
.ch-scrollcue{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:7px 16px;border-radius:20px;
  background:rgba(245,197,66,.14);border:1px solid rgba(245,197,66,.4)}
.ch-scrollcue-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gold)}
.ch-scrollcue-arrow{color:var(--gold);font-size:16px;font-weight:900;display:inline-block;animation:chbounce 1.3s ease-in-out infinite}
@keyframes chbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
.ad-interstitial{background:var(--panel);border:1px solid var(--line2);border-radius:16px;overflow:hidden;margin:14px 0}
.ad-inter-creative{height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative}
.ad-inter-creative .ad-inter-brand{color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;letter-spacing:.08em;text-shadow:0 2px 16px rgba(0,0,0,.45)}
.ad-inter-creative .ad-inter-tag{color:rgba(255,255,255,.92);font-size:14px;font-weight:600}
.ad-inter-body{padding:14px 16px 16px}
.ad-inter-spons{font-size:11px;color:var(--dim2);font-weight:600;margin-bottom:6px}
.ad-inter-cta{display:block;width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:10px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}
/* ---- content post media (spotlights, cards) ---- */
.post-media{margin:10px 0;border-radius:12px;overflow:hidden}
.post-media.spotlight{padding:16px;color:#fff;position:relative;min-height:96px;display:flex;flex-direction:column;justify-content:center}
.post-media .pm-badge{font-size:10px;font-weight:800;letter-spacing:.1em;opacity:.9;text-transform:uppercase;margin-bottom:4px}
.post-media .pm-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;line-height:1}
.post-media .pm-sub{font-size:12.5px;opacity:.92;margin-top:3px}
.post-media .pm-stat{position:absolute;top:14px;right:16px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;background:rgba(0,0,0,.22);padding:3px 10px;border-radius:20px}
.post-media.card{padding:14px 16px;color:#fff}
.feed-friend{border-left:3px solid #3cc6ff}
.feed-scout{border-left:3px solid #b98bff}
/* ---- search ---- */
.social-search{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line2);
  border-radius:22px;padding:10px 16px;margin:12px 0;cursor:pointer}
.social-search.live{cursor:default;padding:6px 16px}
.ss-icon{font-size:15px;opacity:.7}
.ss-placeholder{color:var(--dim2);font-size:14px}
.ss-input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:15px;padding:8px 0}
.search-results{margin-top:6px}
.sr-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s;border-radius:8px}
.sr-row:hover{background:var(--panel2)}
.sr-row:active{transform:scale(.99)}
.sr-row .sr-body{flex:1;min-width:0}
.sr-go{color:var(--dim2);font-size:22px;font-weight:400;padding-right:4px;flex-shrink:0}
.sr-follow{flex-shrink:0;background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);border-radius:16px;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  padding:6px 14px;cursor:pointer;transition:.12s}
.sr-follow:hover{filter:brightness(1.1)}
.sr-follow.on{background:transparent;color:var(--dim);border-color:var(--line2)}
.sr-icon{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sr-icon .fl{width:28px;height:19px;border-radius:3px}
.sr-pos{width:32px;height:32px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--dim)}
.sr-title{font-weight:600;font-size:14.5px;color:var(--txt)}
.sr-sub{font-size:12px;color:var(--dim2);margin-top:1px}
/* ---- checkpoint footer (only reachable after scrolling) ---- */
.checkpoint-foot{text-align:center;padding:20px 0 8px;margin-top:10px;border-top:1px solid var(--line)}
.cf-caught{color:var(--dim2);font-size:13px;margin-bottom:12px}
.btn.big{padding:15px 34px;font-size:17px}
.notif-row{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:12px 14px;margin-bottom:8px}
.notif-row.unread{border-color:var(--line2);background:var(--panel2)}
.notif-icon{font-size:18px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-head{font-size:13.5px;color:var(--txt);line-height:1.45}
.notif-year{font-size:11px;color:var(--dim2);margin-top:2px}
.reply-pending{font-size:12px;color:var(--accent);padding:8px 4px 2px;font-style:italic;opacity:.85;
  animation:pendPulse 1.4s ease-in-out infinite}
@keyframes pendPulse{0%,100%{opacity:.45}50%{opacity:.9}}
/* ---- REPLY-TO-REPLY ARGUMENTS ---- */
.reply-block{margin-bottom:4px}
.post-av.xs{width:26px;height:26px;font-size:12px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;color:#fff}
.reply-actions{display:flex;align-items:center;gap:14px;margin-top:5px}
.reply-btn{background:none;border:none;color:var(--dim2);font-size:11.5px;cursor:pointer;font-family:inherit;padding:0;transition:.14s}
.reply-btn:hover{color:var(--accent)}
.argue-thread{margin-left:22px;padding-left:14px;border-left:2px solid var(--line2);margin-top:4px}
.thread-reply-link{background:none;border:none;color:var(--accent);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:6px 0 2px;margin-top:2px;display:inline-block}
.thread-reply-link:hover{text-decoration:underline}
.reply.argue{margin-top:6px}
.reply.argue.mine-reply .reply-text{color:var(--txt)}
.reply.argue.mine-reply .reply-body{background:rgba(38,213,224,.06);border-radius:8px;padding:6px 9px}
.argue-composer{margin:8px 0 4px 22px;padding-left:14px;border-left:2px solid var(--accent)}
.argue-input{min-height:44px;font-size:14px;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:8px 10px;width:100%}
.argue-composer-bar{display:flex;gap:8px;margin-top:6px}

/* ---- BUDGET / FINANCE ---- */
.budget-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.bs-cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;min-width:0}
.bs-lab{font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.bs-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(17px,5vw,22px);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* On phones, four across is too tight and the last card clips — go 2x2 instead. */
@media(max-width:560px){.budget-summary{grid-template-columns:repeat(2,1fr)}}
.fac-list{display:flex;flex-direction:column;gap:12px;margin:14px 0}
.fac-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.fac-head{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.fac-ic{font-size:26px;line-height:1}
.fac-name{font-weight:700;font-size:15.5px}
.fac-blurb{font-size:12.5px;color:var(--dim);margin-top:2px;line-height:1.35}
.fac-ctrl{display:flex;align-items:center;gap:14px;justify-content:center}
.fac-btn{width:46px;height:46px;border-radius:12px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);font-size:26px;font-weight:700;line-height:1;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
.fac-btn:active{transform:scale(.92)}
.fac-btn:disabled{opacity:.3;cursor:default}
.fac-lvlbox{text-align:center;min-width:120px}
.fac-dots{display:flex;gap:4px;justify-content:center;margin-bottom:5px}
.fac-dot{flex:1 1 0;min-width:0;max-width:22px;height:9px;border-radius:3px;background:var(--panel2);border:1px solid var(--line);transition:.15s}
.fac-dot.on{border-color:transparent}
.fac-cost{font-size:12px;color:var(--dim2);font-variant-numeric:tabular-nums}
.fac-eff{text-align:center;font-size:12.5px;font-weight:600;margin-top:11px;min-height:16px}
/* ternary triangle */
.tri-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0 16px}
.tri-svg{width:100%;max-width:320px;height:auto;user-select:none;-webkit-user-select:none;pointer-events:none}
.tri-poly{fill:rgba(15,124,140,.06);stroke:var(--line2);stroke-width:1.5}
.tri-grid{stroke:var(--line);stroke-width:1;stroke-dasharray:3 4}
.tri-lab{fill:var(--dim);font-size:12px;font-weight:600;font-family:inherit}
.tri-dot{fill:var(--accent);stroke:#fff;stroke-width:2.5;filter:drop-shadow(0 2px 5px rgba(20,40,80,.28))}
.tri-hint{font-size:11.5px;color:var(--dim2);margin-top:2px}
/* wage line on budget screen */
.wage-line{display:flex;align-items:center;gap:11px;background:linear-gradient(90deg,rgba(245,197,66,.08),var(--panel));border:1px solid rgba(245,197,66,.28);border-radius:11px;padding:11px 13px;margin:0 0 14px}
/* negotiation */
.neg-card{background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:16px;margin:12px 0}
.neg-suitor{display:flex;align-items:center;gap:9px;font-size:15px;margin-bottom:10px}
.neg-suitor .flag{width:26px;height:18px;border-radius:3px}
.neg-body{font-size:13.5px;color:var(--dim);line-height:1.45;margin:0 0 14px}
.neg-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.neg-cell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 6px;text-align:center}
.neg-lab{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.neg-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;line-height:1}
/* multi-round negotiation */
.neg-quote{background:var(--panel2);border:1px solid var(--line2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:11px 13px;margin:10px 0;font-size:13.5px;line-height:1.5;color:var(--txt);font-style:italic}
.neg-quote b{color:var(--gold);font-style:normal}
.neg-mood{display:flex;align-items:center;gap:8px;margin:12px 0}
.neg-mood-lab{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.neg-patience{flex:1;height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--line)}
.neg-patience-fill{height:100%;border-radius:4px;transition:width .35s ease}
.neg-offerbox{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:12px 13px;margin:12px 0}
.neg-offerbox .val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;line-height:1;color:var(--gold)}
.neg-step{background:var(--panel);border:1px solid var(--line2);color:var(--txt);width:40px;height:40px;border-radius:10px;font-size:22px;cursor:pointer;transition:.13s;line-height:1;font-weight:700}
.neg-step:hover{background:var(--gold);color:#1a1400;border-color:var(--gold)}
.neg-step:disabled{opacity:.3;cursor:not-allowed}
.neg-your-offer{flex:1;text-align:center}
.neg-your-offer .lab{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px}
.neg-your-offer .num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;line-height:1;color:var(--txt)}
.neg-gap{font-size:12px;color:var(--dim);text-align:center;margin-top:2px}
.neg-log{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.neg-log-row{font-size:12.5px;line-height:1.4;padding:7px 10px;border-radius:8px}
.neg-log-you{background:rgba(63,159,217,.09);border:1px solid rgba(63,159,217,.22);color:var(--dim);align-self:flex-end;max-width:82%}
.neg-log-him{background:var(--panel2);border:1px solid var(--line);color:var(--dim);align-self:flex-start;max-width:82%}
.neg-log-row b{color:var(--txt)}
.fin-list{display:flex;flex-direction:column;gap:8px}
.fin-row{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.fin-ladder{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.fl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.fl-title{font-weight:800;font-size:17px}
.fl-rating{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;line-height:1}
.fl-bar{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
.fl-fill{height:100%;border-radius:5px;transition:width .4s}
.fl-sub{font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.35}
/* ---- ACADEMY ---- */
.acad-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:11px 14px;margin-bottom:8px}
.acad-pos{width:38px;height:38px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--dim);flex-shrink:0}
.acad-main{flex:1;min-width:0}
.acad-name{font-weight:600;font-size:14.5px;color:var(--txt)}
.acad-meta{font-size:12px;color:var(--dim2);margin-top:1px}
.acad-pot{text-align:right;flex-shrink:0}
.acad-pot-range{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--accent)}
.acad-pot-lab{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.05em}

/* ---- MODAL WINDOW (academy as its own window) ---- */
.modal-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s ease}
.modal-overlay.show{opacity:1}
.modal-window{background:var(--bg);width:100%;max-width:620px;max-height:92vh;border-radius:20px 20px 0 0;
  border:1px solid var(--line2);border-bottom:none;display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(28px);transition:transform .24s cubic-bezier(.2,.8,.2,1);box-shadow:0 -12px 44px rgba(0,0,0,.5)}
.modal-overlay.show .modal-window{transform:translateY(0)}
@media(min-width:560px){.modal-overlay{align-items:center}.modal-window{border-radius:18px;border-bottom:1px solid var(--line2)}}
.modal-titlebar{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;
  border-bottom:1px solid var(--line);flex-shrink:0;background:var(--panel)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--txt);display:flex;align-items:center;gap:8px}
.modal-sub{font-size:13px;color:var(--dim2);font-weight:400}
.modal-close{background:var(--panel2);border:1px solid var(--line2);color:var(--dim);width:34px;height:34px;
  border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;transition:.14s;line-height:1}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.modal-scroll{overflow-y:auto;padding:16px 18px 26px;-webkit-overflow-scrolling:touch}
/* (scroll-lock removed — academy is a normal screen now, never an overlay) */

/* ---- THREADED REPLIES ---- */
.thread{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:11px}
.reply{display:flex;gap:10px}
.reply-body{flex:1;min-width:0;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 12px}
.reply-head{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12.5px;color:var(--txt)}
.reply-text{font-size:13px;color:var(--dim);margin-top:3px;line-height:1.45;overflow-wrap:anywhere}
.reply-likes{font-size:10.5px;color:var(--dim2);margin-top:5px}
.reply-empty{font-size:12px;color:var(--dim2);font-style:italic}

.mediahead{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--dim);margin:14px 0 10px;display:flex;align-items:center;gap:8px}
.mediahead::before{content:"";width:20px;height:2px;background:var(--accent)}
.qs-goal{font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line);color:var(--txt)}
.qs-goal:last-child{border:none}
/* Tier star rating (Alpha 5.4) — instant read of a nation's class */
.tstars{color:var(--gold);font-size:.88em;letter-spacing:.04em;white-space:nowrap}
/* ---- Competition splash (branded intro) ---- */
.compsplash{position:relative;text-align:center;padding:34px 22px 28px;margin:0 -22px 4px;background:
  radial-gradient(120% 100% at 50% 0%,var(--glow),transparent 70%);
  border-bottom:1px solid var(--line2);overflow:hidden}
.compsplash .splash-flag{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.12;filter:saturate(1.3)}
.compsplash>*{position:relative}

.compsplash .ctag{font-family:var(--display),'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(30px,8vw,52px);text-transform:uppercase;line-height:.92;letter-spacing:0;color:var(--txt)}

.compsplash .csub{font-family:var(--display),serif;font-size:16px;color:var(--accent);margin-top:10px;font-style:italic;opacity:.95}
.compsplash .cband{display:inline-block;margin-top:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt);border:1px solid var(--line2);border-radius:20px;padding:6px 18px}

.hubtabswrap{position:relative;margin:14px 0 16px}
.hubtabswrap .hub-arrow{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;width:28px;z-index:3;pointer-events:none;font-size:18px;font-weight:900;color:var(--accent);opacity:0;transition:opacity .2s ease}
.hubtabswrap .hub-arrow.l{left:0;background:linear-gradient(90deg,var(--panel),transparent)}
.hubtabswrap .hub-arrow.r{right:0;background:linear-gradient(270deg,var(--panel),transparent)}
.hubtabswrap.can-left .hub-arrow.l{opacity:.9}
.hubtabswrap.can-right .hub-arrow.r{opacity:.9}
.hubtabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hubtabs::-webkit-scrollbar{display:none}
.hubtabs .ht{flex:0 0 auto;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--dim);transition:.15s;white-space:nowrap}
.hubtabs .ht:hover{color:var(--txt)}
.hubtabs .ht.on{background:var(--accent);color:var(--accent-ink)}
/* ---- Scorers ---- */
.scorer-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:.12s}
.scorer-row:hover{border-color:var(--line2);transform:translateY(-1px)}
.scorer-row .rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--accent);width:26px;text-align:center}
.scorer-row .fl{width:26px;height:17px;border-radius:2px;object-fit:cover;flex-shrink:0}
.scorer-row .sn{flex:1;font-weight:600;font-size:14.5px}
.scorer-row .sn small{display:block;color:var(--dim2);font-size:11px;font-weight:500}
.scorer-row .goals{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px}
.scorer-row .goals small{font-size:10px;color:var(--dim2);font-weight:600;letter-spacing:.1em}
/* ---- Bracket ---- */
.bracket{display:flex;flex-direction:column;gap:8px}
.br-tie{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:14px}
.br-tie.live{border-color:var(--accent);background:linear-gradient(90deg,var(--glow),var(--panel))}
.br-tie .fl{width:26px;height:17px;border-radius:2px;object-fit:cover}
.br-tie .nm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase}
.br-tie .sc{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px}

.elsewhere .ew-row{display:grid;grid-template-columns:22px 1fr auto 1fr 22px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--dim)}
.elsewhere .ew-row .fl{width:22px;height:15px;border-radius:2px;object-fit:cover}

.tabbar{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px}

/* AI-generated portraits. Each is a circular tile that renders an initials

.gg-portrait{position:relative;display:inline-block;width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,.14),inset 0 -6px 12px rgba(0,0,0,.12)}

// ---------- LIFECYCLE ----------
// FIFA-realistic curve. Potential is the player's ceiling; ability rises toward it,
// peaks 26-29, declines after. Youth breaking into a national pool are already special.
function abilityAtAge(pot,age){
  // Smooth, continuous, ANNUAL arc: debut ~86% of ceiling, +1-2/yr to peak at 27,
  // plateau to 31, then a gentle, gradually-accelerating decline. The decline is mild
  // enough that a high-ceiling player stays well above replacement level deep into his
  // thirties (declining, but still worth picking) rather than falling off a cliff at 34.
  let f;
  if(age<=27){const t=clamp((age-17)/10,0,1);f=0.86+0.14*(t*t*(3-2*t));}
  else if(age<=31)f=1.0;
  else{const d=age-31;f=clamp(1-(0.018*d+0.0032*d*d),0.55,1);}
  return Math.round(clamp(pot*f+gauss()*0.5,42,99));
}
// Nation strength band → where the pool sits. Elite nations 79-91, minnows shifted down
// but their BEST is still a proper international. Never a 70 for France.
function nationBand(factory){
  // A gently accelerating curve: the elite pull away at the top so the very best
  // nations (Brazil, France, Argentina) sit clearly above the merely-strong, giving
  // the player a real mountain to climb even with a good side. Mid and lower tiers
  // are largely unchanged.
  //   factory 92(BRA)→~88, 86(FRA)→~85, 80(ENG)→~82, 66(SEN)→~74, 34→~66, 22→~62
  const base = 44 + factory*0.42;
  const eliteLift = factory>70 ? Math.pow((factory-70)/22, 1.6)*6 : 0;
  return base + eliteLift;
}
// ---- TIER WINDOW CEILING (Alpha 5.2 difficulty calibration) ----
// The best XI a nation of this size can EVER field. Control points tuned by Monte
// Carlo (3,500 tournament sims per OVR × 150 400-year dynasty runs per tier) so
// landed title rates hit the design targets at MAX academy:
//   micro ≈1 per ~960yrs · 2/5 ≈250 · 3/5 ≈110 · 4/5 ≈47 · elite ≈22.
// Peaks compress into a narrow band (86.2 → 92): tiers differ mainly in window
// FREQUENCY and baseline, not peak height. Applies to player youth AND AI squads.
function windowCeil(factory){
  const f=clamp(factory||55,8,95);
  const P=[[8,85.4],[12,86.2],[36,86.8],[58,87.2],[78,89.4],[95,92]];
  for(let i=1;i<P.length;i++){
    if(f<=P[i][0]){const[a,ca]=P[i-1],[b,cb]=P[i];return ca+(cb-ca)*(f-a)/(b-a);}
  }
  return P[P.length-1][1];
}
// Cap an individual youth potential under the tier ceiling. The FULL ceiling is only
// reachable by a cohort born in a GOLDEN ERA — ordinary intakes cap 3 lower, so the
// window is the only road to the summit and grinding a max academy between windows
// cannot manufacture a peak squad. The generational FREAK still transcends it a
// little — Weah played for Liberia, after all.
function capYouthPot(pot,factory,isFreak,goldenBorn){
  return Math.min(pot, Math.round(windowCeil(factory)-(goldenBorn?0:3)+(isFreak?5:0)));
}
// Once in a generation, a nation produces someone it has no business producing.
// Iceland made Sigurðsson. Liberia made Weah. Even San Marino gets a lottery ticket.
// Returns a bonus on top of the normal band — vanishingly rare, but never impossible.

// ============================================================
//  YOUTH COHORTS — where golden generations actually come from
//
//  Previously every player rolled independently, so a "golden generation" was
//  pure coincidence: several rare events landing in the same age group by luck.
//  Across 900 simulated years, San Marino NEVER fielded an XI above 58.
//
//  Real golden generations have a shared cause — a coaching revolution, a
//  facility, one inspirational cohort. Iceland built indoor pitches and trained
//  coaches, and an entire age group rose together.
//
//  So the youth intake now has an ERA quality that drifts, with rare golden eras
//  that lift EVERY player born into them. A weak nation's golden era is
//  proportionally larger — but far rarer. Given enough decades, anyone can rise.
// ============================================================
function initYouthEra(){
  if(G.youthEra===undefined){
    G.youthEra=0;        // bonus applied to all youth generated now
    G.eraLeft=0;         // years left in this era
    G.sinceGolden=0;     // how long since the last golden era
    G.goldenEra=false;   // is the current era a golden one?
  }
}
function advanceYouthEra(){
  initYouthEra();
  const nat=myNation();
  const factory=nat?nat.factory:55;
  G.sinceGolden++;
  if(G.eraLeft>0){G.eraLeft--; if(G.eraLeft===0&&G.goldenEra){G.goldenEraEnded=true;G.goldenEra=false;} return;}
  // ordinary drift: some intakes are simply better than others
  G.youthEra=gauss()*2.2;
  G.eraLeft=Math.round(rnd(2,5));
  G.goldenEra=false;
  // A GOLDEN ERA. Rare, rarer still for a minnow — but pressure builds, so given
  // enough decades it will come. Nobody is excluded forever.
  // Calibrated so a strong nation sees a golden generation roughly once every 25-35
  // years (a real generational cycle), a minnow perhaps once a century — and the
  // pressure term guarantees that even San Marino gets one eventually.
  // Alpha 5.2 DIFFICULTY CALIBRATION: window frequency per tier (measured, 400yr sims):
  //   f12 ~61yr · f36 ~29yr · f58 ~19yr · f78 ~14yr · f92 ~12yr between golden eras.
  // The old flat base+heavy pressure made every tier ~40-75yr — minnows were close but
  // strong nations got generations far too rarely. Pressure is now only a slow-burn
  // guarantee for micros (starts at 32 barren years, capped low).
  const baseChance=Math.min(0.42, 0.018+Math.pow(factory/92,1.25)*0.42);
  const pressure=Math.min(0.03,Math.max(0,G.sinceGolden-32)*0.0012);
  // THE SAN MARINO RULE (Alpha 5.3). The smallest football nation on Earth waits
  // longer than anyone for its generation, and its summit sits lower (see windowCeil's
  // f8 control point). Winning the World Cup here is the game's legendary feat —
  // measured at roughly once per ~2,000 years of correct decisions. Two achievements
  // ride on it: The Miracle (any Micro) and The San Marino Question (them alone).
  const smrRule=(nat&&nat.name==='San Marino')?0.65:1;
  if(Math.random()<(baseChance+pressure)*smrRule){
    // Alpha 5.2: a micro-nation's generation is hotter and stays together longer —
    // they grow up in the same age-group sides, so the window burns brighter (this is
    // also what lifts their peak to the tier ceiling, calibrated with the trigger above).
    const scale=1+Math.max(0,(70-factory))/70*1.5;
    G.youthEra=rnd(factory<35?6.5:5, factory<35?12:11)*scale;
    G.eraLeft=Math.round(factory<35?rnd(5,8):rnd(4,7));      // a whole cohort of intakes
    G.sinceGolden=0;
    G.goldenEra=true;G.goldenEraStarted=true;
  }
}
// A readable description for the aging report
function youthEraLabel(){
  initYouthEra();
  if(G.goldenEra)return {t:'A golden generation is coming through',

  if(G.youthEra>=3)return {t:'A strong intake',d:'The academies are producing well.',col:'var(--green)'};

}

// ============================================================
//  THE ACADEMY — prospects at 14/15/16 you can watch develop.
//  A prospect has a TRUE potential (hidden) and a SCOUTED range that
//  narrows as he ages. When he graduates (~17) his true potential is
//  locked and revealed: some meet their billing, some flatter to
//  deceive, a rare few exceed all expectations. This is the pipeline
//  that feeds your senior pool.
// ============================================================
// ============================================================
//  ACADEMY STYLE FOCUS — the multi-decade culture shift (Alpha 7.4)
//  You can point your academy at a different approach, but rewriting a nation's
//  footballing DNA takes a generation of coaches, not a budget meeting. Progress
//  follows a logistic S-curve centred on year ~11-12: slow at first (the first
//  re-coached kids are still 14), accelerating as those cohorts graduate, then
//  levelling off. And it NEVER completes — tradition keeps a permanent pull, so
//  classic players of the old school always keep coming through.
// ============================================================
function initAcadFocus(){
  if(!G.acadFocus)G.acadFocus={focus:null,since:null,prev:null};
  return G.acadFocus;
}
// Raw transition progress 0..1 — matches the locked milestones:
// yr4 ≈11% · yr8 ≈27% · yr12 ≈54% · yr16 ≈78% · yr20 ≈92% · yr25 ≈98%
function acadShiftPct(){
  const a=initAcadFocus();
  if(!a.focus||a.since==null)return 0;
  const t=Math.max(0,(G.year||2026)-a.since);
  return 1/(1+Math.exp(-0.28*(t-11.5)));
}
// Tradition never dies: even a fully completed shift leaves this much of the old DNA.
const TRADITION_FLOOR=0.12;
// A nation's LIVING style weights — tradition blended with any academy focus.
function livingWeights(natId){
  const trad=traditionOf(natId);
  const mine=(myNation()||{}).id;
  if(!mine||String(natId)!==String(mine))return trad;   // only YOUR academy shifts
  const a=initAcadFocus();
  if(!a.focus)return trad;
  const s=acadShiftPct();
  const fi=STYLE_KEYS.indexOf(normStyle(a.focus));
  if(fi<0)return trad;
  const blended=trad.map((w,i)=>w*(1-s)+(i===fi?1:0)*s);
  // permanent tradition dividend — the old school always leaks through
  return blended.map((w,i)=>w*(1-TRADITION_FLOOR)+trad[i]*TRADITION_FLOOR);
}
// Rebuilding a coaching pipeline costs you in the short term: the disruption fades
// as the new methods bed in.
function acadTransitionDrag(){
  const a=initAcadFocus();
  if(!a.focus)return 0;
  return -1.0*(1-acadShiftPct());
}
function setAcademyFocus(style){
  const a=initAcadFocus();
  const k=normStyle(style);
  const trad=traditionOf((myNation()||{}).id);
  const ti=trad.indexOf(Math.max(...trad));
  a.prev=a.focus; a.focus=k; a.since=G.year; a.seen=[];
  const natural=STYLE_KEYS[ti]===k;
  try{
    socialAnnounce('presser',
      natural
        ? `🎓 ${(myNation()||{}).name} recommit to what they have always been: every academy age group will now be coached in ${styleLabelOf(k)}. No argument from the old guard on this one.`
        : `🎓 BOLD: ${(myNation()||{}).name} order a root-and-branch change of footballing philosophy — every academy age group will now be coached in ${styleLabelOf(k)}. It will be a decade before anyone knows if it worked, and the traditionalists are already furious.`,
      natural?0.6:0.9);
  }catch(e){}
  popToast(natural?'Academy focus confirmed.':'Academy focus changed — this will take a generation.');
}

// Pick the approach that best counters this opponent — but only if the squad can
// actually play it. A counter you have no players for is worse than no counter.
function assistPickApproach(opp){
  if(!assistOn('tactics')||!opp)return;
  const theirs=teamStyle(opp);
  // Guard hard: squadOverall can come back null/NaN on a half-built squad, and a bad
  // myOv silently inflates the talent gap, fading the tactical edge to nothing and
  // leaving the Assistant choosing on squad fit alone.
  const num=v=>(typeof v==='number'&&isFinite(v))?v:null;
  const myOv=(()=>{try{return num(squadOverall(G.squad));}catch(e){return null;}})() ?? 75;
  const oppOv=num(opp.ov) ?? myOv;
  let best=null;
  STYLE_KEYS.forEach(k=>{
    // value = the tactical swing it buys + how well the squad suits it
    const shift=tacticalShift(k,theirs,myOv,oppOv);
    const fit=(()=>{try{return mgrFit({style:k}).pct/100;}catch(e){return 0.5;}})();
    const score=shift*1.0+fit*2.4;
    if(!best||score>best.score)best={k,score,shift,fit};
  });
  if(!best)return;
  const cur=normStyle((G.tactics||{}).style);
  if(best.k===cur)return;
  G.tactics.style=best.k;
  assistLog(`Approach set to ${styleLabelOf(best.k)} against ${opp.name||'them'}${best.shift>0.5?' — it counters their '+styleLabelOf(theirs):''}.`,true);
}

function genProspect(age){
  const factory=myNation()?myNation().factory:55;
  const pos=pick(['GK','CB','CB','RB','LB','CDM','CM','CM','CAM','RW','LW','ST','ST']);
  // true potential clusters on the nation's band, with the same tails as senior youth,
  // and benefits from the current youth era (a golden era academy is special).
  initYouthEra();
  // Alpha 5.2: a golden era only fully converts through a FUNDED academy. At L10 the
  // generation arrives whole; at a starved L1 barely a third of the magic survives —
  // "the generation we wasted" is a real (and painful) outcome for a broke federation.
  let eraBonus=G.youthEra||0;
  if(G.goldenEra && eraBonus>0){
    const al=(typeof _fl==='function')?_fl('academy'):5;
    eraBonus*= (0.35+0.65*al/10);
  }
  let truePot = nationBand(factory)+eraBonus + Math.abs(gauss())*4.2 + rnd(-3,4);
  if(Math.random()<0.05+factory/900) truePot+=rnd(4,10);
  const freak=generationalFreak(factory);if(freak>0)truePot+=freak;
  if(typeof academyIntakeBonus==='function')truePot+=academyIntakeBonus();   // better academy → better intake
  truePot=capYouthPot(clamp(truePot,30,97),factory,freak>0,!!G.goldenEra);   // tier window ceiling (5.2)
  // developmental noise: whether he'll MEET, MISS or EXCEED his ceiling, decided at birth
  // but only revealed on graduation. -8..+4, skewed slightly negative (most kids fade).
  const devLuck = clamp(gauss()*3.5 - 1.5, -10, 6);
  return {
    id:PID++, pos, name:nameFor(myNation().id), age:age??14,
    style:styleForNation(myNation().id),   // the school he was raised in (7.4)
    truePot: Math.round(truePot), devLuck: Math.round(devLuck), _freak:freak>0, _golden:!!G.goldenEra,
    // scouting uncertainty is wide at 14, narrow by 16
    _seed: Math.random(),
    gem: truePot>=88,

// The scouted potential the player is shown — a RANGE that narrows with age.
function scoutedRange(pr){

  const bias=(pr._seed-0.5)*6*(pr.age<=14?1:pr.age<=15?0.6:0.3);

function replenishAcademy(initial){

// Age every prospect a year. Those who reach 17 graduate — their true potential is
// realised (true + devLuck), locked, and they become a senior player returned to the
// caller to be added to the pool.
function advanceAcademy(){
  initAcademy();
  const graduates=[];
  const stay=[];
  const aMult=academyGrowthMult();   // your academy investment speeds/slows development
  G.academy.forEach(pr=>{
    pr.age+=1;
    // ACADEMY FACILITIES: a strong academy nudges a prospect's realised ceiling upward
    // (good dev luck amplified, bad luck cushioned); a starved one lets them stagnate.
    if(pr.devLuck!==undefined){
      const push=(aMult-1)*2.4;   // ±~1.3 at the extremes, per year, compounding
      pr.devLuck=clamp(pr.devLuck+push, -8, 10);
    }
    if(pr.age>=17){
      // realise potential: true ceiling adjusted by his developmental luck — still under
      // the tier window ceiling (5.2). A golden-BORN cohort keeps its full ceiling even
      // if the era has expired by graduation day; dev luck fills headroom, never breaks it.
      const realised=capYouthPot(clamp(pr.truePot+pr.devLuck,30,97),(myNation()||{}).factory||55,!!pr._freak,!!pr._golden);
      const p=genPlayer(myNation().id, pr.pos, 18, true);
      // overwrite the generic generated potential with his realised academy ceiling

      p.rating=abilityAtAge(p.potential,p.age);

      // graduate can arrive sharing a surname with an existing player. Dedup at the moment he
      // actually joins: if his surname already exists in the pool, re-roll his name until it
      // doesn't (bounded attempts, then accept — tiny name pools can genuinely run out).
      try{
        const surOf=nm=>{const q=(nm||'').split(' ');return q[q.length-1];};
        const taken=new Set((G.pool||[]).map(q=>surOf(q.name)));

      }catch(e){}
      if(pr.style)p.style=normStyle(pr.style);   // he plays how he was taught (7.4)
      p.gem=p.potential>=89;

      p._academyDev=pr.devLuck;

function generationalFreak(factory){
  // ~1 in 900 for a micro-nation, ~1 in 130 for a giant (they get more, and better)
  const chance=0.0011+factory*0.00009;
  if(Math.random()>=chance)return 0;
  // heavy tail: usually a very good player, occasionally an all-timer
  const magnitude=Math.pow(Math.random(),2.2);   // skewed toward the smaller end
  return 8+magnitude*30;                          // +8 .. +38
}
function genPlayer(natId,pos,forcedAge,isYouth){
  const factory=NATIONS.find(n=>n.id===natId).factory;
  // Youth born into a golden era rise together. Established players are unaffected —
  // you cannot retroactively improve a 30-year-old. Alpha 5.2: the era's magnitude
  // converts through the academy (see genProspect) and sits under the tier ceiling.
  let eraBonus=(isYouth&&natId===G.natId&&G.youthEra)?G.youthEra:0;
  if(eraBonus>0&&G.goldenEra){const al=(typeof _fl==='function')?_fl('academy'):5;eraBonus*=(0.35+0.65*al/10);}
  const base=nationBand(factory)+eraBonus;
  // potential clustered around the nation's band; right tail produces stars & gems
  let pot=base + Math.abs(gauss())*4.0 + rnd(-2,4);
  // the freak: a player who transcends his nation entirely (vanishingly rare). If a nation
  // lands its generational freak, that IS its star — we don't also stack a gem on top, so
  // a mid-tier nation reaches the 90s only via the freak, not by luck compounding.
  const freak=generationalFreak(factory);
  if(freak>0){
    pot+=freak;
  }else{
    // gem lottery — scales with talent factory (Brazil often, Cape Verde rarely). The
    // SIZE of the gem also scales with the nation's tier: an elite nation's gem is a
    // world-beater, a mid-tier nation's gem is a very good player but not a superstar.
    if(Math.random()<0.04+factory/900){
      const gemMax=clamp(3+factory*0.075,4,9);   // factory 58→~7.4, 92→9, 30→~5.3
      pot+=rnd(3,gemMax);
    }
  }
  pot=clamp(pot,30,97);
  if(isYouth&&natId===G.natId)pot=capYouthPot(pot,factory,freak>0,!!G.goldenEra);   // tier window ceiling (5.2)
  // youth entering the pool are already high (they've earned national contention)
  const age=forcedAge??Math.round(rnd(19,33));
  const p={id:PID++,pos,natId,name:nameFor(natId),age,potential:Math.round(pot)};
  p.rating=abilityAtAge(p.potential,age);
  p.gem=p.potential>=89;
  p.freak=freak>0 && p.potential>=nationBand(factory)+16;   // transcends his nation
  p.arch=assignArchetype(p);
  if(p.arch==='wonderkid')p.potential=clamp(p.potential+2,30,96);
  p.style=styleForNation(natId);   // his nation's footballing DNA (Alpha 7.1)
  p.injProne=assignInjuryProne();
  p.injured=null;
  const c=clubForRating(p.rating);p.club=c.name;p.clubTier=c.tier;
  p.caps=Math.max(0,Math.round((age-18)*rnd(3,9)));
  // MAJOR-TOURNAMENT EXPERIENCE. A distinct count of major tournaments (World Cups /
  // continental finals) the player has actually featured in. Seeded at save start so
  // the world doesn't begin at zero — an established 30-year-old should already look
  // like a seasoned international, a teenager like a debutant — then REAL participation
  // takes over from the first tournament played. Roughly one tournament every ~2 years
  // of senior career, capped so nobody starts absurdly decorated, with variance so not
  // every veteran is equally travelled.
  const seniorYears=Math.max(0,age-18);
  p.tourns=clamp(Math.round(seniorYears/2 * rnd(0.55,1.15)), 0, Math.min(10, Math.floor(seniorYears/2)+1));
  if(age<=19)p.tourns=Math.random()<0.15?1:0;      // most teens are uncapped at tournaments
  p.tournGoals=p.tourns>0?Math.max(0,Math.round(p.tourns*rnd(0,1.4))):0;   // flavour for the profile
  refreshForm(p);
  p.newbie=false;
  return p;
}
function refreshForm(p){
  p.clubForm=Math.round(clamp(gauss()*1.25,-2,2));
  if(p.intlBias===undefined)p.intlBias=Math.round(clamp(gauss()*1.2,-2,2));
  p.intlForm=clamp(p.clubForm+p.intlBias+Math.round(rnd(-1,1)),-2,2);

    'RW','RW','RW','LW','LW','LW',
    'ST','ST','ST','ST','CF','CF'];
  while(spread.length<POOL_TARGET)spread.push(pick(['CM','CDM','CAM','RM','LM','CB','ST','RW','LW','RB','LB','CF']));
  spread.forEach(pos=>pool.push(genPlayer(natId,pos)));
  endNameBatch();
  return enforceLineFloors(pool,natId,true);
}
// Guarantee every line has enough bodies. Used at creation and again every season.
function enforceLineFloors(pool,natId,atBirth){
  LINE_FLOOR.forEach(f=>{
    let have=pool.filter(p=>f.pos.includes(p.pos)).length;
    let guard=0;
    while(have<f.min && guard++<40){
      const pos=f.fill[have%f.fill.length];
      const np=atBirth?genPlayer(natId,pos):genPlayer(natId,pos,Math.round(rnd(18,21)),true);
      if(!atBirth){np.newbie=true;np.hofGoals=0;}
      pool.push(np);have++;
    }
  });
  return pool;
}

// ---------- RATINGS ----------
function effRating(p){
  // Per-player value that feeds the XI average. Ordered to match the Stage A hierarchy:
  //  international form (Tier 2) > tournament experience (Tier 2) > archetype (Tier 3).
  let e=p.rating;
  e+=p.intlForm*1.5;                          // Tier 2: form matters more than before (was 1.3)
  e+=tournExpValue(p);                         // Tier 2: age-scaled major-tournament experience
  if(p.arch==='wonderkid')e+=1;                // Tier 3: archetype flavour
  if(p.arch==='flair')e+=gauss()*2;
  // style-match bonus is applied at squad level, not here
  return e;
}
// A STABLE, deterministic rating for the rankings table — same value every render.
// effRating() deliberately adds live randomness (gauss/flair) for match-day variety, which
// makes it unsuitable for a ranked ladder (the table would reshuffle and show different
// numbers each time it opened). This keeps the deterministic parts only.
function stableRating(p){
  let e=p.rating;
  e+=(p.intlForm||0)*1.5;
  e+=tournExpValue(p);
  if(p.arch==='wonderkid')e+=1;
  return e;
}
// MAJOR-TOURNAMENT EXPERIENCE as a selection factor — deliberately a big one.
// The idea: a player who has been there before is worth meaningfully more on the day
// than his raw rating suggests, and a player who NEVER has is a gamble that can cost
// you when the pressure is real. It's scaled by age so it creates a genuine dilemma:
//   - A YOUNG player with no tournaments is only lightly penalised — he's expected to
//     be raw, and taking him now is how he gains the very experience that matters later.
//   - A PRIME/VETERAN player with no tournaments carries a real penalty — an untested
//     30-year-old at a World Cup is a liability, and the game should say so.
//   - Experience saturates: the jump from 0→3 tournaments matters far more than 6→9.
// This is what forces the "is this our year, or are we still building?" decision:
// a squad of raw talent rates lower NOW even if it's better on paper, so blooding kids
// costs you in the present and pays you back in future tournaments once they're seasoned.
function tournExpValue(p){
  const t=p.tourns||0;
  // diminishing-returns experience bonus: ~+0..+4.5 as tournaments rise
  const bonus=4.5*(1-Math.exp(-t/2.2));
  // inexperience penalty, heavier the older the player is
  let penalty=0;
  if(t===0){
    if(p.age>=30)      penalty=5.5;   // untested veteran — a real problem
    else if(p.age>=26) penalty=3.5;   // should have been blooded by now
    else if(p.age>=23) penalty=1.6;   // a little raw for a prime-age pick
    else               penalty=0.4;   // young and green — barely counts against him
  } else if(t===1 && p.age>=30){
    penalty=1.5;                       // one tournament late in a career is still thin
  }
  return bonus-penalty;
}
function tournExpWord(p){
  const t=p.tourns||0;
  if(t>=6)return'Seasoned';
  if(t>=3)return'Experienced';
  if(t>=1)return'Blooded';
  return p.age>=28?'Untested':'Uncapped';
}
function tournExpColor(p){
  const t=p.tourns||0;
  if(t>=3)return'var(--green)';
  if(t>=1)return'var(--accent)';
  return p.age>=28?'var(--red)':'var(--dim)';
}
function styleMatchCount(squad){
  const c={};STYLE_KEYS.forEach(k=>c[k]=0);squad.forEach(p=>c[normStyle(p.style)]++);return c;
}
// Fill the most SPECIALIST slots first, or a strong centre-back wins the right-back
// berth on raw rating. Used for squad ratings AND the displayed XI, so they agree.
const SLOT_PRIORITY=['GK','RB','LB','RW','LW','CDM','CAM','RM','LM','AM','ST','CB','CM'];
function bestXIFrom(list,formation){
  const need=FORMATIONS[formation].need;const slots=[];
  Object.entries(need).forEach(([pos,n])=>{for(let i=0;i<n;i++)slots.push(pos)});
  slots.sort((a,b)=>SLOT_PRIORITY.indexOf(a)-SLOT_PRIORITY.indexOf(b));
  const chosen=[];const used=new Set();
  slots.forEach(slot=>{const c=list.filter(p=>!used.has(p.id)&&!p.injured).sort((a,b)=>slotRate(b,slot)-slotRate(a,slot));if(c[0]){chosen.push({...c[0],slot});used.add(c[0].id)}});
  return chosen;
}
// Which player positions can fill which slot, best-fit first.
const SLOT_FAMILY={
  GK:['GK'],
  RB:['RB','LB','CB'], LB:['LB','RB','CB'], CB:['CB','RB','LB'],
  CDM:['CDM','CM','CB'],         // the holder: a destroyer, or a deep-lying CM
  CM:['CM','CDM','CAM'],
  CAM:['CAM','CM','RW','LW'],    // the creator
  RM:['RW','CM','RB'],           // a wide midfielder: winger or a tucked-in CM
  LM:['LW','CM','LB'],
  AM:['CAM','CM','RW','LW','ST'],// the number ten slot prefers a natural CAM
  RW:['RW','LW','ST','CAM'], LW:['LW','RW','ST','CAM'], ST:['ST','RW','LW'],
};
function slotRate(p,slot){
  // Hard position lock for goalkeepers. A GK can ONLY fill the GK slot, and the GK slot can
  // ONLY be filled by a goalkeeper — outfield players are never keepers and keepers never
  // play out (no more a GK slotted at LB, and no more keepers scoring goals).
  if(slot==='GK')return p.pos==='GK'?effRating(p):-999;
  if(p.pos==='GK')return -999;
  if(p.pos===slot)return effRating(p);
  const fam=SLOT_FAMILY[slot];
  if(!fam)return effRating(p)-12;
  const i=fam.indexOf(p.pos);
  if(i<0)return effRating(p)-12;
  return effRating(p)-(i===0?0:i===1?3:6);   // penalty grows with how far out of position
}
function squadBonuses(squad){
  const avail=squad.filter(p=>!p.injured);
  if(!avail.length)return{list:[],total:0,styleBonus:0};
  const ages=avail.map(p=>p.age),avgAge=ages.reduce((a,b)=>a+b,0)/ages.length;
  const young=avail.filter(p=>p.age<=23).length,exp=avail.filter(p=>p.age>=30).length;
  const inForm=avail.filter(p=>p.intlForm>=1).length;
  const leaders=avail.filter(p=>p.arch==='leader'||p.arch==='veteran').length;
  const seasoned=avail.filter(p=>(p.tourns||0)>=3).length;   // been to 3+ major tournaments
  const greenStarters=avail.filter(p=>(p.tourns||0)===0&&p.age>=26).length;   // untested & not young
  // style: reward players matching the team style, but reward BALANCE not monoculture
  const sc=styleMatchCount(avail);const matched=sc[G.tactics.style]||0;
  const distinct=STYLE_KEYS.filter(k=>sc[k]>=2).length;
  // 3-of-4 under the Core 4 (was 4-of-6): rewards not being a monoculture without
  // punishing a nation for having a genuine tradition. (Alpha 7.1)
  const styleBonus=clamp(matched*0.18,0,2.2)+ (distinct>=3?0.8:0); // matching core + balanced spread
  const list=[
    {k:'Balance',on:young>=4&&exp>=4,desc:'Youth & experience both well represented'},
    {k:'In Form',on:inForm>=6,desc:'Six or more players arriving in good international form'},
    {k:'Leadership',on:leaders>=2,desc:'At least two natural leaders'},
    {k:'Tournament-hardened',on:seasoned>=7,desc:'Seven or more players with real tournament experience'},
    {k:'Untested spine',on:greenStarters>=4,desc:'Four or more prime-age players who\u2019ve never been to a major \u2014 a gamble',neg:true},
    {k:'Freshness',on:avgAge<=27.5,desc:'Fresh average age for a long tournament'},
    {k:`${matched} on-style`,on:matched>=6,style:true,desc:'Enough players suited to your chosen style'},
    {k:'Balanced styles',on:distinct>=4,style:true,desc:'A spread of styles — adaptable, not one-dimensional'},
  ];
  const total=list.filter(x=>x.on&&!x.style&&!x.neg).length;
  return{list,total,styleBonus};
}
// ---------- BEST-23 SNAPSHOT (squad strength & age over time) ----------
// The "best 23" is the strongest 23 fit players in the pool by rating — the natural
// tournament squad — independent of whom the user has actually picked. Returns the
// average overall rating and average age of that group.
function best23Stats(){
  const avail=(G.pool||[]).filter(p=>!p.injured);
  if(avail.length<11)return null;
  const top=[...avail].sort((a,b)=>b.rating-a.rating).slice(0,23);
  const ov=top.reduce((s,p)=>s+p.rating,0)/top.length;
  const age=top.reduce((s,p)=>s+p.age,0)/top.length;
  return {ov:Math.round(ov*10)/10, age:Math.round(age*10)/10, n:top.length};
}
// Record this year's snapshot into the trend history (once per year, no duplicates).
function recordSquadTrend(){
  const s=best23Stats();if(!s)return;
  const mgr=(G.manager&&typeof G.manager.rating==='number')?G.manager.rating:null;
  G.squadTrend=G.squadTrend||[];
  const last=G.squadTrend[G.squadTrend.length-1];
  if(last&&last.year===G.year){last.ov=s.ov;last.age=s.age;last.mgr=mgr;return;}   // overwrite same-year
  G.squadTrend.push({year:G.year, ov:s.ov, age:s.age, mgr});
  if(G.squadTrend.length>80)G.squadTrend.shift();   // keep it bounded
}
function squadOverall(squad){
  squad=squad||[];
  let avail=squad.filter(p=>!p.injured);
  // SAFETY: never collapse to a 0 rating (which would make you lose every match by a
  // landslide — the "bottom of the group on 0 points" bug). If injuries thin the available
  // pool below a full XI, fall back to the best 11 we have, counting the walking wounded so
  // there's always a real rating on the pitch rather than a phantom zero.
  if(avail.length<11)avail=[...squad];
  if(avail.length<11)return avail.length?Math.round(avail.reduce((s,p)=>s+p.rating,0)/avail.length):0;
  // Tier 1 — PLAYER RATINGS. Raw best-XI, on exactly the same scale as computeTeamOVR so
  // player and opponents stay fair (the odds-fairness fix). This is the dominant term.
  const xi=[...avail].sort((a,b)=>b.rating-a.rating).slice(0,11);
  // Star weighting (Tier 2): the best players count more than a flat mean — a squad
  // carried by three world-class players rates meaningfully above one that's uniformly
  // decent. Weight the top end firmly so this is a real distinction, not a rounding error.
  let wsum=0,w=0;
  xi.forEach((p,i)=>{const k=i<2?1.5:i<5?1.2:0.85;wsum+=p.rating*k;w+=k;});
  let base=wsum/w;
  // Tier 2 — INTERNATIONAL FORM and TOURNAMENT EXPERIENCE, each as its OWN bounded
  // modifier on the fair base (not baked in, so opponents on raw ratings stay comparable).
  // Separate clamps so they don't fight for one budget — both are genuine Tier-2 swings.
  const formGap=xi.reduce((s,p)=>s+p.intlForm*1.5,0)/xi.length;
  base+=clamp(formGap,-3.5,3.5);               // form: up to ±3.5
  // Experience is RELATIVE to what's normal for each player's age, so a typical squad
  // sits at parity with an equal-rated opponent (who carries no experience history). Only
  // squads that are unusually seasoned OR unusually green for their age deviate — which is
  // exactly the "blood the kids now, pay later" tension, without a blanket edge over the AI.
  const expGap=xi.reduce((s,p)=>{
    const expectedTourns=clamp(Math.round(Math.max(0,p.age-18)/2),0,8);
    const expected=tournExpValue({tourns:expectedTourns,age:p.age});
    return s+(tournExpValue(p)-expected);
  },0)/xi.length;
  base+=clamp(expGap,-4,4);                     // experience vs age-norm: up to ±4
  // Archetype flavour (Tier 3), averaged across the XI.
  base+=xi.reduce((s,p)=>s+(p.arch==='wonderkid'?1:0),0)/xi.length;
  // Tier 2 — MANAGER QUALITY (and his tenure/fit/chemistry, all inside managerBonus).
  base+=managerBonus();
  // Tier 3/5 — squad form & style bonuses, tiered so they can't rival Tier-2 factors.
  const b=squadBonuses(squad);
  base+=clamp(b.total*0.22+b.styleBonus*0.35,0,2.2);
  // Tier 5 — TRAINING → reaching potential, scaled by how much headroom the XI has.
  const headroom=xi.reduce((s,p)=>s+Math.max(0,(p.potential||p.rating)-p.rating),0)/xi.length;
  base+=trainingRealise()*clamp(headroom/6,0.35,1.6);
  return Math.round(base);
}
// Opponent OVR must be computed the SAME WAY as the player's squad: best-XI average of a
// generated squad. This is the fix for the odds bug — previously opponents used a single
// gaussian draw on a different scale, so the player towered over the field.
function computeTeamOVR(team){
  const squad=fieldSquad(team); // full generated squad
  const xi=squad.slice(0,11);   // already sorted best-first
  // Same star-weighting the player's squadOverall uses, so a top-heavy opponent is rated
  // on the identical scale — this keeps the matchup odds fair (no hidden edge either way).
  let wsum=0,w=0;
  xi.forEach((p,i)=>{const k=i<2?1.5:i<5?1.2:0.85;wsum+=p.rating*k;w+=k;});
  return Math.round(wsum/w);
}

const S=document.getElementById('screen');
// --- Screen scroll memory ---------------------------------------------------
// Every screen is keyed by the calling function name (via the JS call stack).
// Re-rendering the SAME screen (e.g. clicking a budget +/- button) restores
// the user's prior scroll position instead of yanking them to the top. A true
// navigation (different screen key) still scrolls to top as before.
// The 120ms fade hides the jank of full innerHTML swaps for near-zero cost.
const _scrollMem={};let _lastScreenKey=null;
function _screenKey(){
  try{
    const st=(new Error()).stack||'';
    const m=st.match(/at\s+(screen[A-Za-z0-9_]+)/);
    if(m)return m[1];
    const m2=st.match(/at\s+(render[A-Za-z0-9_]+)/);if(m2)return m2[1];
  }catch(e){}
  return null;
}
function go(html,opts){
  opts=opts||{};
  // Defensive: any modal that ever locked page scroll is released on every navigation,
  // so the game can never be left frozen/unscrollable by a stuck overlay.
  try{document.body.classList.remove('modal-open');const stray=document.getElementById('academy-window');if(stray)stray.remove();}catch(e){}
  const key=opts.key||_screenKey();
  const preserve=opts.preserveScroll||window._preserveScroll||(key&&key===_lastScreenKey);
  const savedY=preserve?(window.scrollY||window.pageYOffset||0):0;
  window._preserveScroll=false;
  S.style.transition='opacity .12s ease-out';
  S.style.opacity='0';
  // We swap immediately (opacity handles the visual smoothing) so any focus/DOM
  // logic downstream still sees the new markup this tick.
  S.innerHTML=html;
  if(preserve){window.scrollTo(0,savedY);}else{window.scrollTo(0,0);}
  requestAnimationFrame(()=>{S.style.opacity='1';updateNavArrows();});
  // Belt-and-braces: the portrait module's MutationObserver normally picks up
  // new tiles from innerHTML swaps, but some browsers batch these differently.
  // Manually hydrate after every screen render so manager and player faces
  // reliably fetch — the hydrate() dedupes internally.
  try{if(window.ggPortraitsHydrate)window.ggPortraitsHydrate(S);}catch(e){}
  _lastScreenKey=key;
}

// A compact, tappable readout of the current best-23's average OVR and age. Tapping either
// opens the trend graph showing how both have moved over the dynasty.
function squadStatStrip(){
  const s=best23Stats();if(!s)return '';
  const prev=(G.squadTrend&&G.squadTrend.length>1)?G.squadTrend[G.squadTrend.length-2]:null;
  // arrow helper: `higherIsBetter` flips the colour for age, where getting younger is good.
  const delta=(now,was,higherIsBetter=true)=>{
    if(was==null||now==null)return '';
    const d=now-was;if(Math.abs(d)<0.05)return '<span class="sq-flat">–</span>';
    const rising=d>0;
    const good=higherIsBetter?rising:!rising;
    return `<span class="sq-${good?'up':'dn'}">${rising?'▲':'▼'}${Math.abs(d).toFixed(1)}</span>`;
  };
  const mgr=(G.manager&&typeof G.manager.rating==='number')?G.manager.rating:null;

    <div class="sq-divider"></div>
    <div class="sq-cell">
      <div class="sq-lab">Manager</div>
      <div class="sq-val">${mgr} ${delta(mgr,prev&&prev.mgr,true)}</div>
    </div>`:'';
  return `<div class="squadstat" onclick="showSquadTrend()" title="Tap for the trend over time">
    <div class="sq-cell">
      <div class="sq-lab">Squad OVR</div>

    <div class="sq-cell">
      <div class="sq-lab">Avg Age</div>
      <div class="sq-val">${s.age.toFixed(1)} ${delta(s.age,prev&&prev.age,false)}</div>

    ${mgrCell}

  </div>`;
}
// Trend graph: two lines (OVR and average age) across every recorded year, drawn as inline
// SVG so it needs no libraries. Opens as a dismissable modal overlay.
function showSquadTrend(){
  const data=(G.squadTrend||[]).slice();
  if(data.length<1)return;
  const W=520,H=280,PL=44,PR=44,PT=24,PB=34;
  const iw=W-PL-PR, ih=H-PT-PB;
  const years=data.map(d=>d.year);
  const yMin=Math.min(...years), yMax=Math.max(...years);
  const xFor=y=>years.length<2?PL+iw/2:PL+((y-yMin)/(yMax-yMin))*iw;
  const ovs=data.map(d=>d.ov), ages=data.map(d=>d.age);
  const mgrs=data.map(d=>d.mgr).filter(v=>typeof v==='number');
  const hasMgr=mgrs.length>0;
  const band=(arr,pad)=>{let lo=Math.min(...arr),hi=Math.max(...arr);if(hi-lo<pad){const m=(hi+lo)/2;lo=m-pad/2;hi=m+pad/2;}const p=(hi-lo)*0.15;return[lo-p,hi+p];};
  // OVR and manager share the left "rating" axis so they're directly comparable
  const [ratLo,ratHi]=band(ovs.concat(hasMgr?mgrs:[]),4), [agLo,agHi]=band(ages,2);
  const yRat=v=>PT+ih-((v-ratLo)/(ratHi-ratLo))*ih;
  const yAg=v=>PT+ih-((v-agLo)/(agHi-agLo))*ih;
  // build a path over only the points where `key` is a number (manager may be absent early)
  const line=(yf,key)=>{let out='',started=false;data.forEach(d=>{const v=d[key];if(typeof v!=='number'){started=false;return;}out+=`${started?'L':'M'}${xFor(d.year).toFixed(1)} ${yf(v).toFixed(1)} `;started=true;});return out.trim();};
  const dots=(yf,key,col)=>data.filter(d=>typeof d[key]==='number').map(d=>`<circle cx="${xFor(d.year).toFixed(1)}" cy="${yf(d[key]).toFixed(1)}" r="2.6" fill="${col}"/>`).join('');
  const step=Math.max(1,Math.ceil(data.length/6));
  const xlabels=data.filter((d,i)=>i%step===0||i===data.length-1).map(d=>
    `<text x="${xFor(d.year).toFixed(1)}" y="${H-12}" text-anchor="middle" class="ax">${d.year}</text>`).join('');
  const ratTicks=[ratLo,(ratLo+ratHi)/2,ratHi].map(v=>`<text x="${PL-8}" y="${(yRat(v)+4).toFixed(1)}" text-anchor="end" class="ax ov">${Math.round(v)}</text>`).join('');
  const agTicks=[agLo,(agLo+agHi)/2,agHi].map(v=>`<text x="${W-PR+8}" y="${(yAg(v)+4).toFixed(1)}" text-anchor="start" class="ax ag">${v.toFixed(1)}</text>`).join('');
  const grid=[0,0.5,1].map(f=>{const y=PT+ih*f;return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" class="grid"/>`;}).join('');
  const cur=data[data.length-1];
  const svg=`<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">
    <style>
      .trend-svg .ax{font:600 11px 'Barlow Condensed',sans-serif;fill:var(--dim2)}
      .trend-svg .ax.ov{fill:var(--accent)} .trend-svg .ax.ag{fill:var(--gold)}
      .trend-svg .grid{stroke:var(--line);stroke-width:1}
    </style>
    ${grid}
    <path d="${line(yAg,'age')}" fill="none" stroke="var(--gold)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${hasMgr?`<path d="${line(yRat,'mgr')}" fill="none" stroke="var(--green)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="1 5"/>`:''}
    <path d="${line(yRat,'ov')}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots(yAg,'age','var(--gold)')}
    ${hasMgr?dots(yRat,'mgr','var(--green)'):''}
    ${dots(yRat,'ov','var(--accent)')}
    ${ratTicks}${agTicks}${xlabels}
  </svg>`;
  const el=document.createElement('div');el.className='modal-bg';el.onclick=e=>{if(e.target===el)el.remove()};
  el.innerHTML=`<div class="modal" style="max-width:560px">
    <div class="mtop">
      <button class="mclose" onclick="this.closest('.modal-bg').remove()">✕</button>
      <div class="mname">Squad trend</div>
      <div class="msub">Best 23 overall &amp; age${hasMgr?' · manager rating':''} over the dynasty</div>
    </div>
    <div class="mbody">
      <div class="trend-legend">
        <span><i class="lg-dot" style="background:var(--accent)"></i>Overall <b>${cur.ov.toFixed(1)}</b></span>
        <span><i class="lg-dot" style="background:var(--gold)"></i>Avg age <b>${cur.age.toFixed(1)}</b></span>
        ${(cur.mgr!=null)?`<span><i class="lg-dot" style="background:var(--green)"></i>Manager <b>${cur.mgr}</b></span>`:''}
      </div>
      ${data.length<2?`<p class="lede" style="text-align:center;padding:14px 0 4px">One season on record so far — the graph fills in as the years pass.</p>`:''}
      <div class="trend-wrap">${svg}</div>
      <p class="footnote" style="margin-top:10px">A rising overall with a falling age is the dream — a golden generation arriving. A climbing age with a flat overall is a squad due a refresh.</p>
    </div>
  </div>`;
  document.body.appendChild(el);
}

}

// ---- engagement numbers that feel plausible for the moment ----
function engagement(weight){
  const base=weight*(0.6+Math.random()*0.9);
  return {
    likes:Math.max(12,Math.round(base*(800+Math.random()*4000))),
    rt:Math.max(3,Math.round(base*(180+Math.random()*900))),
    replies:Math.max(1,Math.round(base*(60+Math.random()*400))),
  };
}
function fmtNum(n){
  if(n>=1000000)return (n/1000000).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(1)+'k';
  return String(n);
}
function timeAgo(){return pick(['2m','7m','14m','23m','41m','1h','2h','3h']);}

function mediaContext(){
  const nat=myNation();
  const comp=thisComp();
  const pool=G.pool||[];
  const star=[...pool].sort((a,b)=>b.rating-a.rating)[0]||null;
  const kid=[...pool].filter(p=>p.age<=21).sort((a,b)=>b.potential-a.potential)[0]||null;
  const vet=[...pool].filter(p=>p.age>=33).sort((a,b)=>b.rating-a.rating)[0]||null;
  const freak=[...pool].find(p=>p.freak)||null;
  const mgr=G.manager||null;
  const topScorer=G.scorers?Object.values(G.scorers).filter(x=>x.you&&x.goals>0).sort((a,b)=>b.goals-a.goals)[0]:null;
  const avgAge=pool.length?(pool.reduce((a,p)=>a+p.age,0)/pool.length):27;
  return {nat,comp,star,kid,vet,freak,mgr,topScorer,avgAge,
    N:nat?shortNat(nat.name):'we', S:star?shortName(star.name):'the captain',
    K:kid?shortName(kid.name):'the kid', V:vet?shortName(vet.name):'the veteran',
    M:mgr?shortName(mgr.name):'the manager'};
}

const REPLY_BANK={
  agree:['This. All of this.','Finally someone says it.','Nailed it.','Spot on as always.','100%.'],
  disagree:['Absolute nonsense.','Delete this.','Terrible take, respectfully.','You watch a different sport to me.','Bookmarking this to laugh at later.'],
  stat:['Do you have a source for that?','The underlying numbers say otherwise.','xG disagrees but go off.','Context matters here.'],
  fan:['\ud83d\ude2d\ud83d\ude2d\ud83d\ude2d','GET IN','I\u2019m in bits','no notes','crying in the club rn'],
  snark:['Bold words from someone who was silent last week.','Screenshotting this.','Ratio incoming.','Every single tournament with you lot.'],
  wise:['Long game. Always was.','Judge it in four years.','Patience. The kids are coming.'],
};
function buildThread(kind,weight){
  const n=weight>0.75?3:weight>0.5?2:1;
  const out=[];
  const pools=kind==='hottake'?['disagree','snark','agree']
    :kind==='stats'?['stat','agree','disagree']
    :kind==='fan'?['fan','agree','fan']
    :['agree','disagree','wise','snark'];
  const used=new Set();
  for(let i=0;i<n;i++){
    const who=pick(PERSONAS.filter(p=>!used.has(p.id)));
    if(!who)break;
    used.add(who.id);
    out.push({who,text:pick(REPLY_BANK[pick(pools)]),likes:Math.round(rnd(8,900))});
  }
  return out;
}

function buildMediaFeed(context){
  const c=mediaContext();
  const r=context||{};
  const key=r.type&&POSTS[r.type]?r.type:'pre';
  const bank=POSTS[key];
  const feed=[];

  // 1. the newspaper front page
  feed.push(buildPaper(key,r,c));

  // 2. a spread of voices — always different, weighted by drama
  const kinds=Object.keys(bank);
  const chosen=kinds.sort(()=>Math.random()-0.5).slice(0,Math.min(5,kinds.length));
  chosen.forEach(kind=>{
    const opts=bank[kind](c);
    const item=pick(opts);
    if(!item)return;
    const who = kind==='fan' ? fanPersona(c.nat) : persona(
      kind==='pundit'?'gaffer':kind==='stats'?'xg':kind==='hottake'?'tom':kind==='scout'?'scout':
      kind==='meme'?'meme':kind==='reporter'?'presser':kind==='insider'?'insider':
      kind==='science'?'academic':kind==='ref'?'ref':kind==='oldguard'?'oldman':
      kind==='neutral'?'rival':kind==='tifo'?'tifo':'gaffer');
    const w=item.w||0.5;
    feed.push({format:'post',id:'m'+(++_feedSeq)+'_'+feed.length,who,text:item.text,kind,
      reacts:engagement(w),time:timeAgo(),
      thread:buildThread(kind,w),liked:false,expanded:false,convo:[]});
  });

  // 3. a freak-of-nature story, if one exists
  if(c.freak&&Math.random()<0.6){
    feed.splice(1,0,{format:'post',id:'mf'+(++_feedSeq),who:persona('scout'),kind:'scout',
      text:`I need to talk about ${shortName(c.freak.name)}. ${c.nat?shortNat(c.nat.name):'This nation'} should not be capable of producing a player like this. Ceiling of ${c.freak.potential}. I've watched him four times now. He's real. \ud83d\udd2d`,
      reacts:engagement(0.95),time:timeAgo(),thread:buildThread('scout',0.9),liked:false,expanded:false,convo:[]});
  }
  return feed;
}
function buildPaper(key,r,c){
  const S=c.S, mgrL=c.M;
  const TAB=['THE BACK PAGE','THE DAILY ROAR','KICK OFF!','THE TERRACE','FULL TIME'];
  const BROAD=['The Chronicle','The Gazette','The Observer Sport','The Standard'];
  const BYLINES=['James Alderton','Priya Nair','Tomás Herrera','Ellen Rourke','Marcus Whitfield','Sofia Lindqvist'];
  const isWC=c.comp&&c.comp.type==='WC';
  const CROWN={
    'FIFA World Cup':['CHAMPIONS OF THE WORLD','ON TOP OF THE WORLD','WORLD CHAMPIONS'],
    'Euros':['KINGS OF EUROPE','CHAMPIONS OF EUROPE','EUROPE IS OURS'],
    'Copa América':['CHAMPIONS OF THE AMÉRICAS','GLORIA!','KINGS OF THE CONTINENT'],
    'AFCON':['KINGS OF AFRICA','CHAMPIONS OF AFRICA','AFRICA IS OURS'],
    'Gold Cup':['KINGS OF THE REGION','GOLD CUP CHAMPIONS'],
    'Asian Cup':['KINGS OF ASIA','CHAMPIONS OF ASIA'],
    'OFC Nations Cup':['CHAMPIONS OF OCEANIA','KINGS OF THE PACIFIC'],
  };
  const byline=pick(BYLINES);
  const base={format:'paper',byline,time:'Late edition'};
  if(key==='win')return {...base,outlet:{name:pick(TAB),cls:'paper-tabloid'},
    headline:pick([`${c.N.toUpperCase()} MARCH ON`,'INTO THE NEXT ROUND','DREAM STILL ALIVE','JOB DONE','ONE STEP CLOSER','BELIEVE']),
    standfirst:pick([
      `${c.N} beat ${r.opp} ${r.score} to book their place in the ${r.next||'next round'}. ${S} the hero.`,
      `A ${r.score} win over ${r.opp} sends ${c.N} through, and ${mgrL} looks like a man who knows something we don't.`,
      `They said it would be tight. It wasn't. ${c.N} ${r.score} ${r.opp} — and a nation dares to dream again.`]),
    pull:pick([`"We're not finished yet." — ${mgrL}`,`${S}: "This is why you play football."`])};
  if(key==='loss')return {...base,outlet:{name:pick(TAB),cls:'paper-tabloid'},
    headline:pick(['HEARTBREAK','SO CLOSE','THE DREAM IS OVER','AGONY','WHAT MIGHT HAVE BEEN','GONE','SILENCE']),
    standfirst:pick([
      `${c.N} crash out to ${r.opp}, losing ${r.score}. A nation mourns what might have been.`,
      `${r.score} to ${r.opp}. Four years of hope undone in ninety minutes. ${mgrL} faces the questions now.`,
      `Grown men wept. ${c.N} are out, beaten ${r.score} by a ${r.opp} side who wanted it more.`]),
    pull:pick([`"They gave everything. It wasn't enough." — ${mgrL}`,`Inside: the inquest begins on page 4`])};
  if(key==='champions'){
    const crown=(c.comp&&CROWN[c.comp.name])||['CHAMPIONS'];
    return {...base,outlet:{name:pick(TAB),cls:'paper-tabloid'},
      headline:pick([...crown,'GLORY!','HISTORY MADE','IMMORTAL','WE DID IT','ETERNAL']),
      standfirst:pick([
        `${c.N} are ${c.comp?c.comp.name:'tournament'} winners after beating ${r.opp} ${r.score} in the final. Scenes of pure joy.`,
        `They'll talk about this team for a hundred years. ${c.N} ${r.score} ${r.opp}. Champions.`,
        `${mgrL} said they'd do it. Nobody believed him. ${c.N} are ${isWC?'champions of the world':(c.comp?c.comp.name:'tournament')+' champions'}.`]),
      pull:pick([`"For everyone who never stopped believing." — ${S}`,`Souvenir edition: 16-page pullout inside`])};
  }
  if(key==='qualified')return {...base,outlet:{name:pick(TAB),cls:'paper-tabloid'},
    headline:pick(["WE'RE GOING!",'BOOK THE FLIGHTS','QUALIFIED','SEE YOU THERE']),
    standfirst:`${c.N} secure their place at the ${c.comp?c.comp.forComp:'finals'}. The hard work starts now.`,
    pull:`"Nothing has been achieved yet." — ${mgrL}`};
  if(key==='failed_qual')return {...base,outlet:{name:pick(TAB),cls:'paper-tabloid'},
    headline:pick(['HUMILIATION','A SUMMER WITHOUT US','NOT GOING','DISGRACE']),
    standfirst:`${c.N} will not be at the ${c.comp?c.comp.forComp:'finals'}. Recriminations begin immediately.`,
    pull:`Inside: how did it come to this? Pages 2–5`};
  return {...base,outlet:{name:pick(BROAD),cls:'paper-broadsheet'},
    headline:pick([`${c.N}: Ready for ${G.host?shortNat(G.host.nation).split(' · ')[0]:'the finals'}?`,`The ${G.year} Reckoning`,'A Nation Dares to Dream','The Weight of Expectation','Hope, Again']),
    standfirst:pick([
      `As ${c.comp?c.comp.name:'the tournament'} approaches, ${c.N} carry the hopes of millions. ${S} will be key.`,
      `A young squad, an unproven spine, and a nation that has learned to expect disappointment. And yet.`,
      `${mgrL} has named his squad. The debate begins — as it always does, and always will.`]),
    pull:pick([`Analysis: the tactical question nobody is asking`,`Long read: the making of ${c.K}`])};
}
